---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app birdcam-youtube
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 30m
  dependsOn:
    - name: frigate
      namespace: home
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"

        replicas: 1

        type: statefulset
        containers:
          main:
            image:
              repository: ghcr.io/jrottenberg/ffmpeg
              tag: 8.1-vaapi@sha256:9b886e09d3cb88b0231e5f306f6b157c3f09e2406eaf1b68e492980997b766af

            args:
              - "-v"
              - "verbose"
              - "-rtsp_transport"
              - "tcp"
              - "-stimeout"
              - "5000000"
              - "-fflags"
              - "+genpts"
              - "-i"
              - "rtsp://frigate.home:8554/birdcam"
              - "-vcodec"
              - "copy"
              - "-acodec"
              - "copy"
              - "-f"
              - "flv"
              - "rtmp://a.rtmp.youtube.com/live2/$(YOUTUBE_KEY)"

            envFrom:
              - secretRef:
                  name: *app

            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    host: frigate.home
                    path: /api/version
                    port: 5000
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 7
                  failureThreshold: 30
            resources:
              requests:
                cpu: 800m
                memory: 2Gi
              limits:
                memory: 2Gi
