---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app exercisediary
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset
        containers:
          main:
            image:
              repository: ghcr.io/aceberg/exercisediary
              tag: 0.1.9@sha256:bfa75741bf347faf8fe859c90e6db5440e9e51c1ced1e27a66f50e6b77c8ab71

            env:
              HOST: "0.0.0.0" # optional, default: 0.0.0.0
              PORT: "8851" # optional, default: 8851
              THEME: "darkly" # optional, default: grass
              COLOR: "dark" # optional, default: light

            resources:
              requests:
                cpu: 15m
                memory: 160M
              limits:
                memory: 160M

    service:
      main:
        controller: main
        ports:
          http:
            port: &httpPort 8851

    route:
      main:
        annotations:
          glance/name: "Exercise Diary"
          glance/show: "true"
          # glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/paperless-ngx.png"
          glance/id: "Collaboration"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *httpPort
    persistence:
      config:
        existingClaim: exercisediary-data-pvc
        globalMounts:
          - path: /data/ExerciseDiary
