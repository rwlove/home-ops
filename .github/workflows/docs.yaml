---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Docs: Publish to Github Pages"

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - docs/**
      - README.md
      - .github/workflows/docs.yaml
      - kubernetes/**
  pull_request:
    paths:
      - docs/**
      - README.md
      - .github/workflows/docs.yaml

permissions:
  actions: write
  contents: read
  id-token: write
  pages: write

jobs:
  publish:
    # Self-hosted to stay off GitHub-hosted quota. Runs on the bare ARC
    # runner (not a container:) so the runner-provided node satisfies the
    # JS actions (setup-python, gh-pages deploy); a python container would
    # lack node — same gotcha documented in flux-local.yaml's diff/comment
    # split. setup-python self-downloads CPython; pip reaches PyPI via the
    # runner CNP's wildcard 443 egress.
    runs-on: arc-runner-set-home-ops
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Generate Token
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          client-id: "${{ secrets.LOVENET_RENOVATE_OPERATOR_CLIENT_ID }}"
          private-key: "${{ secrets.LOVENET_RENOVATE_OPERATOR_PRIVATE_KEY }}"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: "${{ steps.app-token.outputs.token || github.token }}"

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.14.x

      - name: Install mkdocs-material
        shell: bash
        working-directory: docs
        run: pip install -r requirements.txt

      - name: Build with mkdocs
        shell: bash
        working-directory: docs
        run: mkdocs build --strict

      - name: Deploy
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: "${{ steps.app-token.outputs.token }}"
          publish_dir: ./docs/site
          user_name: "rosey-the-renovator-bot[bot]"
          user_email: "rosey-the-renovator-bot <98764075+rosey-the-renovator-bot[bot]@users.noreply.github.com>"
