---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Docs: Publish to Github Pages"

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - docs/**
      - README.md
      - .github/workflows/docs.yaml
      - kubernetes/**
  pull_request:
    paths:
      - docs/**
      - README.md
      - .github/workflows/docs.yaml

permissions:
  actions: write
  contents: read
  id-token: write
  pages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - name: Generate Token
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          client-id: "${{ secrets.LOVENET_RENOVATE_OPERATOR_CLIENT_ID }}"
          private-key: "${{ secrets.LOVENET_RENOVATE_OPERATOR_PRIVATE_KEY }}"

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: "${{ steps.app-token.outputs.token || github.token }}"

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.14.x

      - name: Install mkdocs-material
        shell: bash
        working-directory: docs
        run: pip install -r requirements.txt

      - name: Build with mkdocs
        shell: bash
        working-directory: docs
        run: mkdocs build --strict

      - name: Deploy
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: "${{ steps.app-token.outputs.token }}"
          publish_dir: ./docs/site
          user_name: "rosey-the-renovator-bot[bot]"
          user_email: "rosey-the-renovator-bot <98764075+rosey-the-renovator-bot[bot]@users.noreply.github.com>"
