---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Image Registry Check

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter-changes:
    name: Filter changes
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get changed files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: |-
            kubernetes/**/*
            .github/image-registry-allowlist.txt
            .github/workflows/image-registry-check.yaml
            tools/check-image-registry.sh

  extract-images:
    if: ${{ needs.filter-changes.outputs.changed-files != '[]' }}
    name: Extract images
    # Self-hosted runner so flux-local can resolve
    # oci://zot.kube-system.svc.cluster.local — same reason as the
    # Flux Local Test job in flux-local.yaml (see PR #11677).
    runs-on: arc-runner-set-home-ops
    container:
      image: ghcr.io/allenporter/flux-local:v8.1.0
    needs:
      - filter-changes
    strategy:
      matrix:
        branches:
          - default
          - pull
      fail-fast: false
    outputs:
      default: ${{ steps.extract.outputs.default }}
      pull: ${{ steps.extract.outputs.pull }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: "${{ matrix.branches == 'default' && github.event.repository.default_branch || '' }}"

      # Retry mostly covers first-call cold-cache misses on ZOT — the
      # underlying upstream-registry transients that motivated this on
      # ubuntu-latest are largely absorbed by the in-cluster pull-through
      # cache, but cold tags still occasionally 5xx on first reach.
      - name: Gather images
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          shell: sh
          command: |
            flux-local get cluster \
              --all-namespaces \
              --path "$GITHUB_WORKSPACE/kubernetes/flux" \
              --enable-images \
              --only-images \
              --output json \
              --output-file images.json

      # Multi-line heredoc avoids needing jq inside the flux-local
      # container (it isn't there) — file is already valid JSON, just
      # plumb it through.
      - name: Emit images
        id: extract
        shell: sh
        run: |
          {
            echo "${{ matrix.branches }}<<EOF"
            cat images.json
            echo EOF
          } >> "$GITHUB_OUTPUT"

  check-new-images:
    if: ${{ needs.extract-images.outputs.default != needs.extract-images.outputs.pull }}
    name: Check new images
    runs-on: ubuntu-latest
    needs:
      - extract-images
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Diff images (pull − default)
        id: diff
        run: |
          new_images=$(jq --compact-output --null-input \
            --argjson f1 '${{ needs.extract-images.outputs.default }}' \
            --argjson f2 '${{ needs.extract-images.outputs.pull }}' \
            '$f2 - $f1')
          echo "$new_images" > new-images.json
          {
            echo "## New images on this PR"
            echo '```json'
            echo "$new_images" | jq
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Validate registries
        run: |
          ./tools/check-image-registry.sh --json new-images.json

  image-registry-check-success:
    if: ${{ !cancelled() }}
    needs:
      - check-new-images
    name: Image registry check successful
    runs-on: ubuntu-latest
    steps:
      - name: Check job status
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
