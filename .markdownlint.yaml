---
# yaml-language-server: $schema=https://raw.githubusercontent.com/DavidAnson/markdownlint/main/schema/markdownlint-config-schema.json

# Sane defaults — tuned for operational runbooks where
# wrapping text rigidly hurts readability.

default: true

# Line length: don't enforce. Tables, code blocks with long URLs,
# and copy-pasted shell snippets all blow past 80 chars routinely.
MD013: false

# Allow duplicate header text under different parents (e.g. multiple
# "Step 1" sections under different scenario headings).
MD024:
  siblings_only: true

# Inline HTML is occasionally needed (mdBook supports it).
MD033: false

# SUMMARY.md (mdBook nav) doesn't begin with H1.
MD041: false

# SUMMARY.md uses two H1 headings ("Summary", "Welcome"); mdBook nav convention.
MD025: false

# Table style: don't enforce "compact" pipes — readable tables with surrounding
# whitespace are clearer.
MD060: false
