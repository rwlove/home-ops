---
# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json
site_name: Home Operations
site_url: https://rwlove.github.io/home-ops/
site_description: GitOps-managed home Kubernetes cluster — runbooks, design docs, audits.
site_author: Bubba
repo_url: https://github.com/rwlove/home-ops
repo_name: rwlove/home-ops
edit_uri: edit/main/docs/src/
docs_dir: src
site_dir: site

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: [".", "..", "src"]
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      # GitHub-compatible slugs (matches markdownlint MD051's expectation
      # and mdBook's behavior — em-dashes / `+` become hyphens, double
      # hyphens preserved where surrounding spaces existed).
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

hooks:
  - hooks.py

nav:
  - Welcome:
      - introduction.md
      - index.md
  - AI & Workflow:
      - ai_architecture.md
      - homeaiops_dod.md
      - stage2_gap_analysis.md
      - workflow_automation.md
      - routing_policy.md
      - khoj.md
      - memory_mcp.md
      - mcp_observability.md
      - tei_spark.md
      - coral.md
      - p40.md
  - Cluster Lifecycle:
      - cluster_rebuild.md
      - cluster_upgrade.md
      - promote_worker_to_control_plane.md
      - init_teardown.md
      - master1_etcd_disk_swap.md
      - power-outage.md
  - DR & Restore:
      - rook_ceph_dr.md
      - cnpg_restore.md
      - longhorn_restore.md
      - garage_restore.md
      - frigate_dr.md
      - immich_cnpg.md
      - offsite_recovery.md
  - Network & Security:
      - per-route-cert-migration.md
      - apiserver_audit_logging.md
      - networkpolicy_rollout_plan.md
      - egress_restriction_design.md
      - mtls_rollout_design.md
      - pod_security_audit.md
      - rbac_audit.md
  - Substrate & Orchestration:
      - orchestration_substrate.md
      - task_queue_substrate_design.md
      - github_webhook.md
      - limits.md
  - Audits:
      - audit/post-spark-tool-call-leakage-2026-05-18.md
      - audit/repo-audit-2026-07-01.md
  - Reference:
      - debugging.md
