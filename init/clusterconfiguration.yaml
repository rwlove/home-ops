---
apiVersion: kubeadm.k8s.io/v1beta4
bootstrapTokens:
- groups:
  - system:bootstrappers:kubeadm:default-node-token
  token: hrbrbd.61natuc4sb45au85
  ttl: 24h0m0s
  usages:
  - signing
  - authentication
kind: InitConfiguration
localAPIEndpoint:
  advertiseAddress: 192.168.1.9
  bindPort: 6443
nodeRegistration:
  criSocket: unix:///var/run/crio/crio.sock
  imagePullPolicy: IfNotPresent
  imagePullSerial: true
  name: master1.${SECRET_DOMAIN}
  taints:
  - effect: NoSchedule
    key: node-role.kubernetes.io/control-plane
skipPhases:
- addon/kube-proxy
timeouts:
  controlPlaneComponentHealthCheck: 4m0s
  discovery: 5m0s
  etcdAPICall: 2m0s
  kubeletHealthCheck: 4m0s
  kubernetesAPICall: 1m0s
  tlsBootstrap: 5m0s
  upgradeManifests: 5m0s
---
apiVersion: kubeadm.k8s.io/v1beta4
apiServer:
  # Cap the kube-apiserver Go heap so its working set stops growing to ~2x the
  # live heap before GC. Without this the apiserver balloons to 5-6Gi on the
  # memory-tight control-plane VMs (master2 12Gi / master3 9.6Gi). Cluster-wide
  # value: master2's ~3.3Gi live heap sets the floor. Applied live via the
  # kubeadm-config ConfigMap + `kubeadm init phase control-plane apiserver`
  # per node; this file is bootstrap-only (not Flux-reconciled).
  extraEnvs:
  - name: GOMEMLIMIT
    value: 4GiB
caCertificateValidityPeriod: 87600h0m0s
certificateValidityPeriod: 8760h0m0s
certificatesDir: /etc/kubernetes/pki
clusterName: kubernetes
controlPlaneEndpoint: 192.168.6.1:6443
controllerManager:
  extraArgs:
  - name: bind-address
    value: 0.0.0.0
dns: {}
encryptionAlgorithm: RSA-2048
etcd:
  local:
    dataDir: /var/lib/etcd
    extraArgs:
    - name: listen-metrics-urls
      value: http://0.0.0.0:2381
imageRepository: registry.k8s.io
kind: ClusterConfiguration
kubernetesVersion: v1.35.4
networking:
  dnsDomain: cluster.local
  podSubnet: 10.42.0.0/16
  serviceSubnet: 10.43.0.0/16
proxy: {}
scheduler:
  extraArgs:
  - name: bind-address
    value: 0.0.0.0
