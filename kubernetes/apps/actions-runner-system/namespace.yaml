---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/namespace-v1.json
apiVersion: v1
kind: Namespace
metadata:
  name: actions-runner-system
  labels:
    kustomize.toolkit.fluxcd.io/prune: disabled
    # PSA: audit-only baseline (see docs/src/pod_security_audit.md).
    # ARC runners spawn user-defined workloads; start at baseline (not
    # restricted) until we have a known-good runner spec.
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/audit-version: latest
