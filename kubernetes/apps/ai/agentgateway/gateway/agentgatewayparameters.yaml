---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/agentgateway.dev/agentgatewayparameters_v1alpha1.json
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayParameters
metadata:
  name: agentgateway-config
spec:
  deployment:
    spec:
      replicas: 1
  service:
    metadata:
      annotations:
        external-dns.alpha.kubernetes.io/hostname: "agentgateway-mcp.${SECRET_DOMAIN}"
        lbipam.cilium.io/ips: "${SVC_AGENTGATEWAY_ADDR}"

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi
