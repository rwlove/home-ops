---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/persistentvolume-v1.json
apiVersion: v1
kind: PersistentVolume
metadata:
  name: comfyui-output-pv
  labels:
    type: nfs
spec:
  storageClassName: comfyui-output-storage-class
  capacity:
    storage: 4.5T
  accessModes:
    - ReadWriteOnce
  mountOptions: ["nfsvers=4.2", "nconnect=8", "hard", "noatime"]
  nfs:
    server: "${NFS_HOST_2}"
    path: /mnt/mass_storage/kubernetes/comfyui/output

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: comfyui-output-pvc
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 4.5T
  volumeName: comfyui-output-pv
  storageClassName: comfyui-output-storage-class
