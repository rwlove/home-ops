---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dex
spec:
  hostnames:
    - mcp-dex.${SECRET_DOMAIN}
  parentRefs:
    - name: external
      namespace: network
  rules:
    - backendRefs:
        - name: dex
          port: 5556
