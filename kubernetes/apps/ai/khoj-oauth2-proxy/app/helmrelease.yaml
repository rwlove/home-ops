---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app khoj-oauth2-proxy
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      khoj-oauth2-proxy:
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 2000
            runAsGroup: 2000
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: quay.io/oauth2-proxy/oauth2-proxy
              tag: v7.15.2
            args:
              - --provider=oidc
              - --oidc-issuer-url=https://auth.${SECRET_DOMAIN}
              - --client-id=khoj-oauth2-proxy
              - --redirect-url=https://khoj.${SECRET_DOMAIN}/oauth2/callback
              - --upstream=http://khoj.ai.svc.cluster.local:42110
              - --http-address=0.0.0.0:4180
              - --cookie-name=_oauth2_proxy_khoj
              - --cookie-secure=true
              - --cookie-samesite=lax
              - --email-domain=*
              - --whitelist-domain=.${SECRET_DOMAIN}
              - --reverse-proxy=true
              - --pass-user-headers=true
              - --set-xauthrequest=true
              - --skip-provider-button=true
              - --scope=openid email profile groups
              - --code-challenge-method=S256
              # Obsidian plugin + Khoj CLI clients send Bearer tokens, not
              # session cookies. Carve them out so the plugin keeps working
              # while the web UI stays gated. Same pattern as immich's
              # mobile-app exception.
              - --skip-auth-route=^/api/
            envFrom:
              - secretRef:
                  name: khoj-oauth2-proxy-secret
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
              seccompProfile:
                type: RuntimeDefault
    service:
      app:
        controller: khoj-oauth2-proxy
        ports:
          http:
            port: 4180
    route:
      app:
        annotations:
          glance/name: "Khoj"
          glance/show: "true"
          glance/id: "AI"
        hostnames:
          - khoj.${SECRET_DOMAIN}
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 4180
