---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: khoj-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: khoj
  # Additive — default-deny is what triggers the lockdown; these rules
  # punch holes through it.
  enableDefaultDeny:
    egress: false
    ingress: false
  # No ingress rules needed: khoj-oauth2-proxy is the only door, and the
  # baseline allow-intra-namespace already permits oauth2-proxy → khoj.
  # No external clients hit khoj directly.
  egress:
    # CNPG cluster `postgres-khoj` in databases ns (Pattern B).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            cnpg.io/cluster: postgres-khoj
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Searxng in collab ns (KHOJ_SEARXNG_URL).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: collab
            app.kubernetes.io/name: searxng
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # HuggingFace model downloads (embedding/search models cached to
    # khoj-models PVC on first run + on model config changes).
    #
    # huggingface.co is at its canonical DNS form (A-records only, no
    # CNAME chain), so Cilium 1.19's toFQDNs.matchPattern silently
    # fails — see project_cilium_matchpattern_fqdn_limits.md. PR
    # #11494 originally moved these to toEntities:world; PR #11499
    # reverted to matchPattern based on PR #11492's pattern; that
    # revert was wrong for canonical FQDNs. Restore world:443.
    #
    # FQDNs covered by the world:443 rule below:
    #   - huggingface.co  (canonical, A-only)
    #
    # cdn-lfs.huggingface.co matchPattern REMOVED — NXDOMAIN, dead
    # rule. The actual LFS endpoint is e.g. cdn-lfs-us-1.hf.co (also
    # canonical, also covered by world:443 above).
    #
    # *.huggingface.co, *.hf.co matchPattern entries retained per
    # audit classification.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toFQDNs:
        - matchPattern: "*.huggingface.co"
        - matchPattern: "*.huggingface.co.*"
        - matchPattern: "*.hf.co"
        - matchPattern: "*.hf.co.*"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
