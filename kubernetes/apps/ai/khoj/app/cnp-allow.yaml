---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: khoj-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: khoj
  # Additive — default-deny is what triggers the lockdown; these rules
  # punch holes through it.
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # Internal gateway (envoy) → khoj:42110. Auth is enforced at the
    # gateway by the extAuth SecurityPolicy (#12767); the oauth2-proxy
    # hop is retired.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "42110"
              protocol: TCP
  egress:
    # CNPG cluster `postgres-khoj` in databases ns (Pattern B).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            cnpg.io/cluster: postgres-khoj
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Searxng in collab ns (KHOJ_SEARXNG_URL).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: collab
            app.kubernetes.io/name: searxng
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # HuggingFace model downloads (embedding/search models cached to
    # khoj-models PVC on first run + on model config changes).
    #
    # huggingface.co, hf.co, and their subdomains (cdn-lfs-*.hf.co,
    # cas-bridge.xethub.hf.co, cdn-thumbnails.huggingface.co, etc.) all
    # resolve to A-records only (no CNAME chain). Cilium 1.19's
    # toFQDNs.matchPattern only walks one label per `.*` and follows
    # CNAME canonical names — so `*.huggingface.co` / `*.hf.co` are
    # inert against A-only FQDNs. Coverage is provided by the
    # toEntities: [world]:443 rule below.
    #
    # See project_cilium_matchpattern_fqdn_limits.md for the cluster-
    # wide audit.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
