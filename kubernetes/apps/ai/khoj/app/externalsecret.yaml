---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: khoj
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: khoj-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # --- Postgres (CNPG-managed) ---
        POSTGRES_HOST: postgres-khoj-rw.databases.svc.cluster.local
        POSTGRES_PORT: "5432"
        POSTGRES_DB: khoj
        POSTGRES_USER: "{{ .POSTGRES_USER }}"
        POSTGRES_PASSWORD: "{{ .POSTGRES_PASS }}"
        # --- Khoj admin bootstrap ---
        KHOJ_DJANGO_SECRET_KEY: "{{ .django_secret_key }}"
        KHOJ_ADMIN_EMAIL: "{{ .admin_email }}"
        KHOJ_ADMIN_PASSWORD: "{{ .admin_password }}"
        # --- OpenAI-compatible client points at Ollama ---
        # Ollama doesn't validate the key; any non-empty string works.
        OPENAI_API_KEY: "{{ .openai_api_key_placeholder }}"
  dataFrom:
    - extract:
        key: khoj
    - extract:
        key: cloudnative-pg
