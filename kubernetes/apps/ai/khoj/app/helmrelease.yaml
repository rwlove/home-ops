---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app khoj
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  install:
    # First start downloads sentence-transformers + HF embedding models
    # (~500MB) into khoj-models PVC; helm-controller's 5-min wait can
    # outlast this. Match the pattern in project_helmrelease_disablewait.md.
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    disableWait: true
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      khoj:
        annotations:
          reloader.stakater.com/auto: "true"
        # khoj-ai/khoj hardcodes paths under /root/.khoj (config) and
        # /root/.cache (embedding model downloads). UID 1000 can write *into*
        # the PVCs (fsGroup), but Python's `~/.khoj` resolution still fails
        # because /root itself is mode 0700 root:root. Falling back to root
        # is the upstream-supported path; readOnlyRootFilesystem stays off
        # for Django collectstatic + /tmp scratch.
        pod:
          securityContext:
            runAsGroup: 0
            runAsNonRoot: false
            runAsUser: 0
        type: deployment
        replicas: 1
        strategy: Recreate  # single-replica, RWO PVCs
        containers:
          app:
            image:
              repository: ghcr.io/khoj-ai/khoj
              tag: 2.0.0-beta.28
            # First-run superuser bootstrap is automatic when KHOJ_ADMIN_EMAIL
            # + KHOJ_ADMIN_PASSWORD are set; --non-interactive skips the
            # TTY prompt that would otherwise CrashLoop the pod.
            # --host 0.0.0.0 overrides upstream default of 127.0.0.1
            # (src/khoj/utils/cli.py) so the Service can reach uvicorn.
            # --anonymous-mode treats every request as the auto-bootstrapped
            # "default" KhojUser (configure.py:_initialize_default_user),
            # skipping khoj's own login UI. Safe because the gateway
            # extAuth SecurityPolicy (Authelia + lldap, admin-only) gates
            # khoj.${SECRET_DOMAIN} at the edge — only authenticated
            # household users ever reach this pod.
            args:
              - --non-interactive
              - --anonymous-mode
              - --host
              - 0.0.0.0
            env:
              KHOJ_DOMAIN: khoj.${SECRET_DOMAIN}
              KHOJ_ALLOWED_DOMAIN: khoj.${SECRET_DOMAIN}
              KHOJ_NO_HTTPS: "true"  # TLS terminates at Envoy Gateway
              KHOJ_TELEMETRY_DISABLE: "true"
              KHOJ_DEBUG: "false"
              KHOJ_SEARXNG_URL: http://searxng.collab.svc.cluster.local:8080
              # --- model providers (Ollama via OpenAI-compatible API) ---
              # Embedding model is configured post-bootstrap in /server/admin
              # → SearchModelConfig; default `thenlper/gte-small` (~130 MB)
              # pulls from HuggingFace into the models PVC on first run.
              # To route embeddings to ollama nomic-embed-text instead, set
              # api_type=OPENAI in the admin UI.
              OPENAI_BASE_URL: http://ollama.ai.svc.cluster.local:11434/v1
              KHOJ_DEFAULT_CHAT_MODEL: qwen2.5:7b
              # KHOJ_OPERATOR_ENABLED + KHOJ_TERRARIUM_URL left unset; both
              # gated off-by-default via is_*_enabled() helpers.
            envFrom:
              - secretRef:
                  name: khoj-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &httpPort 42110
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *httpPort
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              # First start downloads ~500MB of embedding models into
              # khoj-models PVC — wide failureThreshold accommodates the
              # cold-cache case (matches disableWait rationale above).
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *httpPort
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 60
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              # readOnlyRootFilesystem omitted: khoj's startup writes to /tmp
              # for Django collectstatic + cache fragments. The two PVCs cover
              # durable state; rest is acceptable as writable rootfs given
              # the app's behavior. Revisit with RO + tmpfs /tmp if needed.
              seccompProfile:
                type: RuntimeDefault
    service:
      app:
        controller: khoj
        ports:
          http:
            port: 42110
    persistence:
      config:
        existingClaim: khoj-config
        advancedMounts:
          khoj:
            app:
              - path: /root/.khoj
      models:
        existingClaim: khoj-models
        advancedMounts:
          khoj:
            app:
              - path: /root/.cache
      tmp:
        type: emptyDir
        advancedMounts:
          khoj:
            app:
              - path: /tmp
