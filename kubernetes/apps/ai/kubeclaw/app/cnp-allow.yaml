---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kubeclaw-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: kubeclaw
  # Additive — default-deny is what triggers the lockdown; these rules
  # punch holes through it. Selector covers all 4 kubeclaw components
  # (gateway, chromium, qmd-embed Job, qmd-update Job).
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # HTTPRoute on internal gateway → kubeclaw-gateway:18789. Chromium /
    # CronJob pods don't have HTTPRoutes; the gateway is the public face.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "18789"
              protocol: TCP
  egress:
    # Ollama in same ns (intra-namespace baseline already permits this,
    # but explicit here for grep-ability when reading kubeclaw config).
    # The kubeclaw `models.providers.ollama.baseUrl` resolves to
    # ollama.ai.svc.cluster.local:11434.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: ai
            app.kubernetes.io/name: ollama
      toPorts:
        - ports:
            - port: "11434"
              protocol: TCP
    # mcporter skill talks to MCP servers via mcp-gateway. kubeclaw
    # config references this implicitly through the bundled mcporter
    # entrypoint; allow egress to the gateway pods in mcp-system.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: mcp-system
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
            - port: "50051"
              protocol: TCP
    # External HTTPS for qmd-embed (HuggingFace embedding-model
    # downloads on first run + on model rotation) and qmd-update
    # (GitHub skill-repo updates).
    #
    # huggingface.co, hf.co, github.com are at their canonical DNS
    # form (A-records only, no CNAME chain), so Cilium 1.19's
    # toFQDNs.matchPattern silently fails — see
    # project_cilium_matchpattern_fqdn_limits.md. PR #11494 originally
    # moved these to toEntities:world; PR #11499 reverted to
    # matchPattern based on PR #11492's pattern; that revert was
    # wrong for canonical FQDNs. Restore world:443.
    #
    # FQDNs covered by the world:443 rule below:
    #   - huggingface.co      (canonical, A-only)
    #   - hf.co               (canonical, A-only)
    #   - github.com          (canonical, A-only)
    #
    # cdn-lfs.huggingface.co matchPattern REMOVED — NXDOMAIN, dead
    # rule. The actual LFS endpoint is e.g. cdn-lfs-us-1.hf.co (also
    # canonical, also covered by world:443 above).
    #
    # *.hf.co, *.huggingface.co, *.githubusercontent.com,
    # codeload.github.com, raw.githubusercontent.com matchPattern
    # entries retained per audit classification.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toFQDNs:
        - matchPattern: "*.huggingface.co"
        - matchPattern: "*.huggingface.co.*"
        - matchPattern: "*.hf.co"
        - matchPattern: "*.hf.co.*"
        - matchPattern: "codeload.github.com"
        - matchPattern: "codeload.github.com.*"
        - matchPattern: "raw.githubusercontent.com"
        - matchPattern: "raw.githubusercontent.com.*"
        - matchPattern: "*.githubusercontent.com"
        - matchPattern: "*.githubusercontent.com.*"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
