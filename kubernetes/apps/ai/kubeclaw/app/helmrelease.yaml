---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubeclaw
spec:
  chartRef:
    kind: OCIRepository
    name: kubeclaw
  interval: 1h
  values:
    secret:
      create: false
      existingSecretName: kubeclaw-secrets
    extraEnv:
      - name: ANTHROPIC_API_KEY
        valueFrom:
          secretKeyRef:
            name: kubeclaw-secrets
            key: ANTHROPIC_API_KEY
    persistence:
      size: 10Gi
    obsidian:
      enabled: true
      persistence:
        size: 5Gi
    chromium:
      enabled: true
    litellm:
      enabled: false
    observability:
      enabled: false
    tailscale:
      expose:
        enabled: false
      ssh:
        enabled: false
    gatewayAPI:
      enabled: false
      controller:
        enabled: false
    ingress:
      enabled: false
    networkPolicy:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 2Gi
