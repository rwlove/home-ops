---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kubeclaw
  annotations:
    glance/name: "KubeClaw"
    glance/show: "true"
    glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/anthropic-dark.png"
    glance/id: "AI"
spec:
  hostnames: ["kubeclaw.${SECRET_DOMAIN}"]
  parentRefs:
    - name: internal
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: kubeclaw-gateway
          namespace: ai
          port: 18789
      matches:
        - path:
            type: PathPrefix
            value: /
