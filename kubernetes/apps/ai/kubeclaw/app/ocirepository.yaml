---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/ocirepository-source-v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kubeclaw
spec:
  insecure: true
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 2026.4.2
  # Routed through in-cluster ZOT pull-through cache. insecure: true
  # because the in-cluster service is plain HTTP; external pulls would
  # use https://zot.${SECRET_DOMAIN}.
  url: oci://zot.kube-system.svc.cluster.local:5000/ghcr.io/imerica/kubeclaw
