---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: langfuse
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: langfuse-secret
    template:
      engineVersion: v2
      data:
        # NextAuth shared secret — used to sign JWTs for langfuse's
        # built-in user sessions. 32+ chars, random. Rotating this
        # invalidates all active sessions.
        NEXTAUTH_SECRET: "{{ .NEXTAUTH_SECRET }}"

        # SALT — 32+ chars, random. Used to salt API key hashes; only
        # rotate if you reissue every API key downstream.
        SALT: "{{ .SALT }}"

        # ENCRYPTION_KEY — exactly 64 hex chars (32 bytes). Used to
        # encrypt stored secrets/integration credentials. Rotating
        # invalidates stored secrets — leave alone unless required.
        ENCRYPTION_KEY: "{{ .ENCRYPTION_KEY }}"

        # Subchart auth — the bundled bitnami clickhouse / valkey
        # (redis) / minio (s3) each hard-require an existingSecret
        # with a known key name. The helmrelease.yaml points all
        # three at `langfuse-secret` with these specific key names;
        # the values must be present here for the chart's pods to
        # start. Rotating any of these requires restarting the
        # matching subchart pods.
        CLICKHOUSE_PASSWORD: "{{ .CLICKHOUSE_PASSWORD }}"
        REDIS_PASSWORD: "{{ .REDIS_PASSWORD }}"
        S3_ROOT_USER: "{{ .S3_ROOT_USER }}"
        S3_ROOT_PASSWORD: "{{ .S3_ROOT_PASSWORD }}"

        # First-boot bootstrap. Langfuse's init script only fires when
        # LANGFUSE_INIT_ORG_ID + _PROJECT_ID are both set — missing
        # ORG_ID silently skips user/project creation (warning in web
        # pod logs: `LANGFUSE_INIT_ORG_ID is not set but other
        # LANGFUSE_INIT_* variables are configured...`). Pre-generated
        # public/secret keys (pk-lf-…/sk-lf-…) flow straight into the
        # 1P `langgraph-agents` item as LANGFUSE_PUBLIC_KEY /
        # _SECRET_KEY, so the SDK wiring picks them up on next
        # reconcile without a manual UI bootstrap step.
        LANGFUSE_INIT_ORG_ID: "{{ .LANGFUSE_INIT_ORG_ID }}"
        LANGFUSE_INIT_ORG_NAME: "{{ .LANGFUSE_INIT_ORG_NAME }}"
        LANGFUSE_INIT_PROJECT_ID: "{{ .LANGFUSE_INIT_PROJECT_ID }}"
        LANGFUSE_INIT_PROJECT_NAME: "{{ .LANGFUSE_INIT_PROJECT_NAME }}"
        LANGFUSE_INIT_PROJECT_PUBLIC_KEY: "{{ .LANGFUSE_INIT_PROJECT_PUBLIC_KEY }}"
        LANGFUSE_INIT_PROJECT_SECRET_KEY: "{{ .LANGFUSE_INIT_PROJECT_SECRET_KEY }}"
        LANGFUSE_INIT_USER_NAME: "{{ .LANGFUSE_INIT_USER_NAME }}"
        LANGFUSE_INIT_USER_EMAIL: "{{ .LANGFUSE_INIT_USER_EMAIL }}"
        LANGFUSE_INIT_USER_PASSWORD: "{{ .LANGFUSE_INIT_USER_PASSWORD }}"
  dataFrom:
    - extract:
        key: langfuse-app
