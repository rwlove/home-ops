---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: langfuse
spec:
  chart:
    spec:
      chart: langfuse
      sourceRef:
        kind: HelmRepository
        name: langfuse
      version: 1.5.31
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    # ----- External Postgres -----
    # Use the CNPG-managed `postgres-langfuse` cluster instead of the
    # chart's bundled bitnami postgresql. The CNPG-generated secret is
    # mirrored into the ai namespace by emberstack reflector (see
    # databases/cloudnative-pg/config/langfuse/cluster.yaml).
    postgresql:
      deploy: false
      auth:
        existingSecret: postgres-langfuse-app
        secretKeys:
          # CNPG exposes the full DSN at key `uri`.
          userPasswordKey: uri

    # ----- Bundled dependencies the chart deploys in-namespace -----
    # ClickHouse, Valkey (Redis), MinIO (S3) are all required by
    # langfuse v3 — the chart deploys them with sane defaults.
    # Persistent storage uses the cluster default (ceph-block via
    # the rook-ceph default StorageClass).
    clickhouse:
      deploy: true
    redis:
      deploy: true
    s3:
      deploy: true

    # ----- Langfuse web + worker -----
    # The chart's worker deployment template references
    # `.Values.langfuse.salt` directly (along with
    # `.Values.langfuse.nextauth.secret` and
    # `.Values.langfuse.encryptionKey`). These MUST be set at the
    # top-level langfuse.* paths with the chart's `secretKeyRef`
    # shape — putting them in `additionalEnv` worked for the web
    # pod but left the worker pod's template unrenderable
    # (`no valid value, secretKeyRef, fieldRef, or resourceFieldRef
    # provided for langfuse.salt`).
    langfuse:
      web:
        replicas: 1
      worker:
        replicas: 1
      salt:
        secretKeyRef:
          name: langfuse-secret
          key: SALT
      encryptionKey:
        secretKeyRef:
          name: langfuse-secret
          key: ENCRYPTION_KEY
      nextauth:
        url: https://langfuse.${SECRET_DOMAIN}
        secret:
          secretKeyRef:
            name: langfuse-secret
            key: NEXTAUTH_SECRET
      # DATABASE_URL + optional first-boot bootstrap stay in
      # additionalEnv because they aren't first-class chart values.
      # CNPG exposes the full DSN at the `uri` key on the
      # postgres-langfuse-app secret.
      additionalEnv:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-langfuse-app
              key: uri
        - name: LANGFUSE_INIT_ORG_NAME
          valueFrom:
            secretKeyRef:
              name: langfuse-secret
              key: LANGFUSE_INIT_ORG_NAME
              optional: true
        - name: LANGFUSE_INIT_USER_NAME
          valueFrom:
            secretKeyRef:
              name: langfuse-secret
              key: LANGFUSE_INIT_USER_NAME
              optional: true
        - name: LANGFUSE_INIT_USER_EMAIL
          valueFrom:
            secretKeyRef:
              name: langfuse-secret
              key: LANGFUSE_INIT_USER_EMAIL
              optional: true
        - name: LANGFUSE_INIT_USER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: langfuse-secret
              key: LANGFUSE_INIT_USER_PASSWORD
              optional: true
        - name: TELEMETRY_ENABLED
          value: "false"

    # ----- Native Ingress is disabled; we wire Gateway API HTTPRoute
    # in a sibling route.yaml so the cluster's existing Envoy Gateway
    # handles the edge.
    ingress:
      enabled: false
