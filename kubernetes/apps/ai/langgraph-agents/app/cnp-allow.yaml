---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: langgraph-agents-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: langgraph-agents
  # Additive — default-deny is what triggers the lockdown; these rules
  # punch holes through it.
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # HTTPRoute on internal gateway → langgraph-agents:8765
    # (agents.${SECRET_DOMAIN}). Windmill workers + app (in home ns)
    # POST here directly for the inbox / approval / awaiting-user /
    # cost-cap-watcher / daily-digest flows (replacing n8n's role).
    # collab/open-webui hits the in-cluster Service directly via
    # OPENAI_API_BASE_URLS (each agent id registered as a model).
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
        - matchLabels:
            io.kubernetes.pod.namespace: collab
            app.kubernetes.io/name: open-webui
        - matchExpressions:
            - key: io.kubernetes.pod.namespace
              operator: In
              values: [home]
            - key: app.kubernetes.io/name
              operator: In
              values:
                - windmill-app
                - windmill-workers
      toPorts:
        - ports:
            - port: "8765"
              protocol: TCP
  egress:
    # Two CNPG clusters in databases ns: checkpoints + memory (Pattern B).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            cnpg.io/cluster: postgres-langgraph-checkpoints
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            cnpg.io/cluster: postgres-langgraph-memory
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Both Ollama Services in the ai ns. baseline allow-intra-namespace
    # covers this, but explicit for grep-ability — the agents.llm factory
    # routes per-agent across both endpoints (settings.ollama_p40_url +
    # settings.ollama_spark_url; see agents.llm.AGENT_GROUP for the split).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: ai
            app.kubernetes.io/name: ollama
        - matchLabels:
            io.kubernetes.pod.namespace: ai
            app.kubernetes.io/name: ollama-spark
      toPorts:
        - ports:
            - port: "11434"
              protocol: TCP
    # MCP gateway (mcp-system ns). The agent fleet talks to every MCP
    # tool via this gateway; per project_mcp_gateway_auth_done the
    # gateway is the only ingress point. Use the istio-managed gateway
    # service which langgraph-agents addresses by name.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: mcp-system
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Zulip in collab ns — the agent fleet posts updates / receives
    # commands via the Zulip bot API.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: collab
            app.kubernetes.io/name: zulip
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
    # Dragonfly in databases ns — idempotency-key dedup store backing
    # the /inbox handler. Phase 3.G; see
    # langgraph-agents `src/agents/idempotency.py`. Dragonfly pods carry
    # `app.kubernetes.io/part-of: dragonfly` (set by the operator from
    # the Dragonfly CR's topology selector).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            app.kubernetes.io/part-of: dragonfly
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
    # External APIs: api.pushover.net for Tier-1 alert escalations,
    # api.anthropic.com for the Claude API gated on ENABLE_CLAUDE_API.
    #
    # Both are canonical FQDNs (no CNAME chain). Per memory
    # project_cilium_matchpattern_fqdn_limits.md, Cilium 1.19
    # matchPattern silently fails for canonical FQDNs queried through
    # K8s DNS search-domain augmentation — use toEntities:world+443,
    # matches the precedent in PRs #11498/#11512/#11517/#11533.
    # Langfuse: user intends self-hosted in-cluster. LANGFUSE_HOST is
    # currently empty so the client doesn't instantiate. When the
    # in-cluster Langfuse lands, add a toEndpoints rule here for the
    # langfuse ns + app label.
    - toEntities: [world]
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
