---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: langgraph-agents
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: langgraph-agents-secret
    template:
      engineVersion: v2
      data:
        # Anthropic Claude API. Optional — agents that opt in (coder, errand-runner,
        # homelab/smart-home/property-engineer, ml-tuner) use this. health-tracker
        # is architecturally blocked from importing the anthropic SDK at all.
        ANTHROPIC_API_KEY: "{{ .ANTHROPIC_API_KEY }}"

        # Pushover Tier 1 escalations. Reuses the alertmanager-secret keys.
        PUSHOVER_APP_TOKEN: "{{ .PUSHOVER_APP_TOKEN }}"
        PUSHOVER_USER_KEY: "{{ .PUSHOVER_USER_KEY }}"

        # Langfuse — populated once Langfuse is deployed (phase 4.5 / 5).
        # Empty values are fine; the runtime skips tracing if these are blank.
        LANGFUSE_HOST: "{{ .LANGFUSE_HOST }}"
        LANGFUSE_PUBLIC_KEY: "{{ .LANGFUSE_PUBLIC_KEY }}"
        LANGFUSE_SECRET_KEY: "{{ .LANGFUSE_SECRET_KEY }}"

        # HMAC key for /approval requests posted by Windmill's
        # approval-receive workflow. MUST match the value Windmill sees
        # (sourced from the same 1Password item — see
        # kubernetes/apps/home/windmill/app/externalsecret-workflows.yaml).
        LANGGRAPH_APPROVAL_SIGNING_KEY: "{{ .LANGGRAPH_APPROVAL_SIGNING_KEY }}"

        # Zulip reply-back path for /inbox source=zulip. When the
        # Windmill zulip-triager-webhook adapter forwards a DM, the
        # graph runs to completion and POSTs the final output back as
        # a triager-bot DM to the originating user. Creds live in the
        # `zulip-bots-langgraph` 1P item (single source — same place
        # the bot identities pull from).
        ZULIP_HOST: chat.${SECRET_DOMAIN}
        ZULIP_TRIAGER_EMAIL: "{{ .ZULIP_TRIAGER_EMAIL }}"
        ZULIP_TRIAGER_API_KEY: "{{ .ZULIP_TRIAGER_API_KEY }}"

        # Approval-post webhook (Phase 4.M2 follow-on / langgraph-agents
        # 0.2.28). The queue worker POSTs ApprovalRequest payloads
        # when graph.ainvoke pauses at interrupt(). Same Windmill
        # webhook token alertmanager uses for the HolmesGPT route
        # (1P `windmill.alertmanager_webhook_token`) — single-token
        # rotation surface for everything that hits the run/p/
        # endpoint.
        APPROVAL_POST_WEBHOOK_URL: http://windmill-app.home.svc.cluster.local:8000/api/w/lovenet/jobs/run/p/f/lovenet/langgraph-approval-post
        APPROVAL_POST_WEBHOOK_TOKEN: "{{ .alertmanager_webhook_token }}"
  dataFrom:
    - extract:
        key: langgraph-agents
    # Bot email + API key for triager-bot (used by the Zulip
    # reply-back path on source=zulip).
    - extract:
        key: zulip-bots-langgraph
    # Windmill webhook token for the approval-post call (reused
    # from the same token alertmanager uses to invoke HolmesGPT).
    - extract:
        key: windmill
