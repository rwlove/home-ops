---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: langgraph-agents
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: langgraph-agents-secret
    template:
      engineVersion: v2
      data:
        # Anthropic Claude API. Optional — agents that opt in (coder, errand-runner,
        # homelab/smart-home/property-engineer, ml-tuner) use this. health-tracker
        # is architecturally blocked from importing the anthropic SDK at all.
        ANTHROPIC_API_KEY: "{{ .ANTHROPIC_API_KEY }}"

        # Pushover Tier 1 escalations. Reuses the alertmanager-secret keys.
        PUSHOVER_APP_TOKEN: "{{ .PUSHOVER_APP_TOKEN }}"
        PUSHOVER_USER_KEY: "{{ .PUSHOVER_USER_KEY }}"

        # Langfuse — populated once Langfuse is deployed (phase 4.5 / 5).
        # Empty values are fine; the runtime skips tracing if these are blank.
        LANGFUSE_HOST: "{{ .LANGFUSE_HOST }}"
        LANGFUSE_PUBLIC_KEY: "{{ .LANGFUSE_PUBLIC_KEY }}"
        LANGFUSE_SECRET_KEY: "{{ .LANGFUSE_SECRET_KEY }}"

        # HMAC key for /approval requests posted by Windmill's
        # approval-receive workflow. MUST match the value Windmill sees
        # (sourced from the same 1Password item — see
        # kubernetes/apps/home/windmill/app/externalsecret-workflows.yaml).
        LANGGRAPH_APPROVAL_SIGNING_KEY: "{{ .LANGGRAPH_APPROVAL_SIGNING_KEY }}"

        # Zulip reply-back path for /inbox source=zulip. When the
        # Windmill zulip-triager-webhook adapter forwards a DM, the
        # graph runs to completion and POSTs the final output back as
        # a triager-bot DM to the originating user. Creds live in the
        # `zulip-bots-langgraph` 1P item (single source — same place
        # the bot identities pull from).
        ZULIP_HOST: chat.${SECRET_DOMAIN}
        ZULIP_TRIAGER_EMAIL: "{{ .ZULIP_TRIAGER_EMAIL }}"
        ZULIP_TRIAGER_API_KEY: "{{ .ZULIP_TRIAGER_API_KEY }}"

        # Phase 4.M2 worker-side approval webhook. When a specialist
        # node calls `interrupt()` with an ApprovalRequest, the queue
        # worker POSTs `{task_id, approval_request}` to this URL so
        # the ntfy + Zulip approval-post path fires immediately.
        # Without it, the first user-visible signal is the 30-min
        # escalation tier from `langgraph-awaiting-user-sweep.ts`.
        #
        # URL embeds a Windmill API token via query param because the
        # worker's httpx call sends no Authorization header. Token is
        # a dedicated webhook-scoped token in the same `windmill` 1P
        # item that holds `alertmanager_webhook_token` and `mcp_token`.
        APPROVAL_POST_WEBHOOK_URL: "http://windmill-app.home.svc.cluster.local:8000/api/w/lovenet/jobs/run/p/f/lovenet/langgraph-approval-post?token={{ .WINDMILL_APPROVAL_POST_TOKEN }}"
  data:
    # Dedicated Windmill webhook token. Required 1P field:
    # `windmill.approval_post_webhook_token` — create via
    # `op item edit windmill approval_post_webhook_token=<token>`
    # with a Windmill API token scoped to run
    # `f/lovenet/langgraph-approval-post`.
    - secretKey: WINDMILL_APPROVAL_POST_TOKEN
      remoteRef:
        key: windmill
        property: approval_post_webhook_token
  dataFrom:
    - extract:
        key: langgraph-agents
    # Bot email + API key for triager-bot (used by the Zulip
    # reply-back path on source=zulip).
    - extract:
        key: zulip-bots-langgraph
