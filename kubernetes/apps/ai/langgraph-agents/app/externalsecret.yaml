---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: langgraph-agents
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: langgraph-agents-secret
    template:
      engineVersion: v2
      data:
        # Anthropic Claude API. Optional — agents that opt in (coder, errand-runner,
        # homelab/smart-home/property-engineer, ml-tuner) use this. health-tracker
        # is architecturally blocked from importing the anthropic SDK at all.
        #
        # Single source of truth: the `anthropic_api_key` field on the 1P
        # `claude-runner` item — shared with the `automation/claude-runner`
        # ExternalSecret. Rotating that one field rotates both lanes.
        # (Previous home was an empty `ANTHROPIC_API_KEY` field on the
        # `langgraph-agents` item; that field can be removed in 1P.)
        ANTHROPIC_API_KEY: "{{ .anthropic_api_key }}"

        # Pushover Tier 1 escalations. Reuses the alertmanager-secret keys.
        PUSHOVER_APP_TOKEN: "{{ .PUSHOVER_APP_TOKEN }}"
        PUSHOVER_USER_KEY: "{{ .PUSHOVER_USER_KEY }}"

        # Langfuse — populated once Langfuse is deployed (phase 4.5 / 5).
        # Empty values are fine; the runtime skips tracing if these are blank.
        LANGFUSE_HOST: "{{ .LANGFUSE_HOST }}"
        LANGFUSE_PUBLIC_KEY: "{{ .LANGFUSE_PUBLIC_KEY }}"
        LANGFUSE_SECRET_KEY: "{{ .LANGFUSE_SECRET_KEY }}"

        # HMAC key for /approval requests posted by Windmill's
        # approval-receive workflow. MUST match the value Windmill sees
        # (sourced from the same 1Password item — see
        # kubernetes/apps/home/windmill/app/externalsecret-workflows.yaml).
        LANGGRAPH_APPROVAL_SIGNING_KEY: "{{ .LANGGRAPH_APPROVAL_SIGNING_KEY }}"

        # Zulip reply-back path for /inbox source=zulip. When the
        # Windmill zulip-triager-webhook adapter forwards a DM, the
        # graph runs to completion and POSTs the final output back as
        # a triager-bot DM to the originating user. Creds live in the
        # `zulip-bots-langgraph` 1P item (single source — same place
        # the bot identities pull from).
        ZULIP_HOST: chat.${SECRET_DOMAIN}
        # ZULIP_BASE_URL overrides the implicit `https://{ZULIP_HOST}`
        # constructed in agents.tools.zulip.send_dm. Set to the
        # cluster-internal Service URL because chat.${SECRET_DOMAIN}
        # resolves via split-horizon DNS to an external LB IP that
        # pods can't reach (Cilium kube-proxy-replacement quirk —
        # same pattern as windmill-workflows-secret ZULIP_API_URL).
        # Available in langgraph-agents 0.2.31+ (PR #62).
        ZULIP_BASE_URL: http://zulip.collab.svc.cluster.local
        ZULIP_TRIAGER_EMAIL: "{{ .ZULIP_TRIAGER_EMAIL }}"
        ZULIP_TRIAGER_API_KEY: "{{ .ZULIP_TRIAGER_API_KEY }}"

        # Approval-post webhook (Phase 4.M2 follow-on / langgraph-agents
        # 0.2.28). The queue worker POSTs ApprovalRequest payloads
        # when graph.ainvoke pauses at interrupt(). Same Windmill
        # webhook token alertmanager uses for the HolmesGPT route
        # (1P `windmill.alertmanager_webhook_token`) — single-token
        # rotation surface for everything that hits the run/p/
        # endpoint.
        APPROVAL_POST_WEBHOOK_URL: http://windmill-app.home.svc.cluster.local:8000/api/w/lovenet/jobs/run/p/f/lovenet/langgraph-approval-post
        APPROVAL_POST_WEBHOOK_TOKEN: "{{ .alertmanager_webhook_token }}"

        # Completion-post webhook — POSTs to a Windmill workflow when
        # a task transitions to status=done in the queue. The workflow
        # DMs Rob (Zulip user 8) with a human-readable card: which
        # agent finished, the original prompt, the output. Same auth
        # token as APPROVAL_POST_WEBHOOK_TOKEN (single rotation
        # surface). When unset, the worker silently skips — older
        # versions of home-ops without the completion-post workflow
        # remain backward-compatible.
        COMPLETION_POST_WEBHOOK_URL: http://windmill-app.home.svc.cluster.local:8000/api/w/lovenet/jobs/run/p/f/lovenet/langgraph-completion-post
        COMPLETION_POST_WEBHOOK_TOKEN: "{{ .alertmanager_webhook_token }}"

        # Stage 2 — Bearer token the `hai` CLI presents on /inbox and
        # /admin/* endpoints. Validated by the middleware in
        # agents/api/auth.py. Sourced from the `hai-cli` 1P item created
        # alongside the hai.${SECRET_DOMAIN} ingress (home-ops PR #11943).
        # When unset, the middleware short-circuits (dev mode) — production
        # must have this populated.
        HAI_CLI_TOKEN: "{{ .TOKEN }}"
  dataFrom:
    - extract:
        key: langgraph-agents
    # Bot email + API key for triager-bot (used by the Zulip
    # reply-back path on source=zulip).
    - extract:
        key: zulip-bots-langgraph
    # Windmill webhook token for the approval-post call (reused
    # from the same token alertmanager uses to invoke HolmesGPT).
    - extract:
        key: windmill
    # Anthropic Claude API key, shared with claude-runner. Single
    # rotation surface (see ANTHROPIC_API_KEY template above).
    - extract:
        key: claude-runner
    # Stage 2 — `hai` CLI bearer token. Field name `TOKEN`. Same
    # 1P item that hai-cli-oauth2-proxy references for the public
    # ingress side; the CLI bearer + the OIDC client secret are
    # distinct fields (TOKEN vs OAUTH_CLIENT_SECRET / COOKIE_SECRET
    # which live in `hai-cli-oauth2-proxy` 1P item).
    - extract:
        key: hai-cli
