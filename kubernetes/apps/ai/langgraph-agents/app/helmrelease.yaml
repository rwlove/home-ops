---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: langgraph-agents
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  values:
    controllers:
      langgraph-agents:
        type: deployment
        replicas: 1
        strategy: Recreate  # single-replica with Postgres-backed state

        containers:
          app:
            image:
              repository: ghcr.io/rwlove/langgraph-agents
              tag: 0.2.13@sha256:9f15316ade75ea71c4a4729840d57f575ad9ce10c1ca07e8c5f94b10a8696e29

            env:
              # --- vault ---
              VAULT_ROOT: /vault

              # --- model providers ---
              # Routing happens in code via AGENT_GROUP in
              # src/agents/llm.py — settings.ollama_p40_url and
              # settings.ollama_spark_url default to the right cluster
              # Services so no overrides are needed here. The legacy
              # OLLAMA_BASE_URL setting was deprecated in v0.2.x and
              # removed in this PR.
              ENABLE_CLAUDE_API: "false"  # flip to true once Claude key is in 1Password

              # --- MCP gateway ---
              MCP_GATEWAY_URL: http://mcp-gateway-istio.mcp-system.svc.cluster.local:8080

              # --- cost caps (per security review cat 7) ---
              COST_CAP_PER_TASK_USD: "5.0"
              COST_CAP_PER_AGENT_DAILY_USD: "10.0"
              COST_CAP_GLOBAL_DAILY_USD: "30.0"

              # --- runtime ---
              LOG_LEVEL: INFO
              USER_TIMEZONE: America/New_York

            envFrom:
              - secretRef:
                  name: langgraph-agents-secret

              # CNPG-managed secrets: full connection URI under .uri
              # The Python settings expects POSTGRES_URL + MEMORY_POSTGRES_URL,
              # but CNPG exposes them as `uri`. Map via a tiny patch below.
              - secretRef:
                  name: postgres-langgraph-checkpoints-app
                  optional: false

            # Map CNPG's `uri` key onto the env names the app expects.
            # (CNPG also exposes username/password/host/port/dbname separately;
            # but a single URI is simplest.)
            #
            # Because both CNPG secrets expose a key named `uri`, we can't
            # blindly envFrom both — they'd collide. So `langgraph-memory` is
            # mapped explicitly here as MEMORY_POSTGRES_URL.

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &httpPort 8765
                  initialDelaySeconds: 20
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: *httpPort
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *httpPort
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 60

            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 1Gi

            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]

        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault

    service:
      app:
        controller: langgraph-agents
        ports:
          http:
            port: *httpPort

    # No external HTTPRoute. langgraph-agents is a webhook/MCP backend
    # consumed exclusively via the in-cluster Service
    # (langgraph-agents.ai.svc.cluster.local:8765) by open-webui and the
    # Windmill langgraph-* workflows. Exposing /docs, /openapi.json, /healthz
    # at agents.${SECRET_DOMAIN} without auth leaked the full FastAPI
    # schema to anyone on LAN. Use `kubectl -n ai port-forward
    # svc/langgraph-agents 8765` for one-off /docs access.

    persistence:
      # Vault content is split into two PVCs (pvc.yaml).
      #
      # `vault-rw` provides the writable surface mounted at /vault; agents
      # write drafts/reports/activity logs here. It's small (2Gi) since
      # it holds only agent outputs.
      #
      # `vault-ro` is the persona content sync-receiver pulls from laptop.
      # It overlays onto /vault/agents/{workspaces,skills} via subPath
      # mounts so the agent code sees one unified /vault tree without
      # knowing about the split.
      vault-rw:
        existingClaim: langgraph-vault-rw
        advancedMounts:
          langgraph-agents:
            app:
              - path: /vault

      vault-ro-workspaces:
        existingClaim: langgraph-vault
        advancedMounts:
          langgraph-agents:
            app:
              - path: /vault/agents/workspaces
                subPath: agents/workspaces
                readOnly: true

      vault-ro-skills:
        existingClaim: langgraph-vault
        advancedMounts:
          langgraph-agents:
            app:
              - path: /vault/agents/skills
                subPath: agents/skills
                readOnly: true

      # Writable tmp because the rootfs is read-only.
      tmp:
        type: emptyDir
        advancedMounts:
          langgraph-agents:
            app:
              - path: /tmp

      # Cache dir for any pip/uv runtime cache or langgraph local state.
      cache:
        type: emptyDir
        advancedMounts:
          langgraph-agents:
            app:
              - path: /home/app/.cache

  # The langgraph-memory CNPG secret has the same `uri` key as
  # langgraph-checkpoints, so envFrom would collide. Project the memory
  # secret's `uri` into MEMORY_POSTGRES_URL via a postRenderer.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: langgraph-agents
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value:
                  name: POSTGRES_URL
                  valueFrom:
                    secretKeyRef:
                      name: postgres-langgraph-checkpoints-app
                      key: uri
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value:
                  name: MEMORY_POSTGRES_URL
                  valueFrom:
                    secretKeyRef:
                      name: postgres-langgraph-memory-app
                      key: uri
