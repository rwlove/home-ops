---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: langgraph-agents-approval
spec:
  hostnames:
    - "langgraph.${SECRET_DOMAIN}"
  parentRefs:
    # Public via cloudflared. ntfy action buttons on the phone POST
    # here directly with pre-signed HMAC approval tokens. The token
    # IS the auth — anyone with a leaked token can issue a single
    # verdict on a single task, but the paused-state machine in
    # langgraph-agents enforces single-use and the token's HMAC is
    # only valid when the matching task is genuinely paused at an
    # interrupt.
    - name: external
      namespace: network
      sectionName: https
  rules:
    # Path-restricted: only /approval. No other langgraph-agents
    # endpoints are exposed publicly.
    - matches:
        - path:
            type: Exact
            value: /approval
      backendRefs:
        - name: langgraph-agents
          port: 8765
