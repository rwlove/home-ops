---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ollama-spark-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: ollama-spark
  # Additive — default-deny is what triggers the lockdown; these rules
  # punch holes through it.
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # HTTPRoute on internal gateway → ollama-spark:11434 (ollama-spark.${SECRET_DOMAIN}
    # for direct user access).
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "11434"
              protocol: TCP
    # Cross-ns callers (mirrors the existing ollama CNP; both Services
    # serve the same surface of consumers post-Phase-2 factory cutover).
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: home
            app.kubernetes.io/name: home-assistant
        - matchLabels:
            io.kubernetes.pod.namespace: home
            app.kubernetes.io/name: windmill-workers
        - matchLabels:
            io.kubernetes.pod.namespace: media
            app.kubernetes.io/name: suggestarr
        - matchLabels:
            io.kubernetes.pod.namespace: collab
            app.kubernetes.io/name: open-webui
        - matchLabels:
            io.kubernetes.pod.namespace: mcp-system
        # OllamaWedged synthetic probe (ollama_embed blackbox module
        # against bge-m3). Distinct from the Prometheus scrape allowed
        # by the baseline allow-monitoring-scrape — that one matches
        # `app.kubernetes.io/name: prometheus`.
        - matchLabels:
            io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: prometheus-blackbox-exporter
        # HolmesGPT chat-mode investigation LLM calls. MODEL is
        # `ollama/qwen3-next:80b-a3b-instruct-q4_K_M` served here per the Spark-Unblocks-RAG
        # cutover (PR #11752); the holmesgpt egress side allows :11434
        # to the cluster.
        - matchLabels:
            io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: holmesgpt
      toPorts:
        - ports:
            - port: "11434"
              protocol: TCP
  egress:
    # Model registry — ollama pulls model blobs on first invocation
    # (`ollama pull <model>`) and on Modelfile changes.
    # See sibling ollama CNP for the canonical-FQDN limitation rationale;
    # toEntities:world+443 covers ollama.com / registry.ollama.ai / HF / R2.
    - toEntities: [world]
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
