---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama-spark
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  values:
    controllers:
      backend:
        pod:
          nodeSelector:
            node-role.kubernetes.io/gpu: blackwell

          tolerations:
            - key: nvidia.com/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule

          priorityClassName: ai-gpu-critical

        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        containers:
          main:
            image:
              repository: docker.io/ollama/ollama
              tag: 0.24.0@sha256:a6149234667efc71d37766d61c1a16f24c33e4cd7a0bf4125c44a7e47e2419c4

            env:
              OLLAMA_HOST: 0.0.0.0
              OLLAMA_ORIGINS: "*"
              OLLAMA_LOG_LEVEL: info
              OLLAMA_MODELS: &pvc /models
              OLLAMA_LOAD_TIMEOUT: 10m
              OLLAMA_KV_CACHE_TYPE: q8_0
              OLLAMA_FLASH_ATTENTION: 1
              OLLAMA_CONTEXT_LENGTH: 16384
              OLLAMA_NUM_PARALLEL: 4
              # Spark's 128 GB unified memory comfortably runs 30b-class
              # models concurrently. P40-era cap of 1 lifted.
              OLLAMA_MAX_LOADED_MODELS: 2

            resources:
              requests:
                memory: 32Gi
                cpu: 2000m
                nvidia.com/gpu: 1
              limits:
                memory: 64Gi
                nvidia.com/gpu: 1

            securityContext:
              privileged: true

    service:
      backend:
        controller: backend
        ports:
          http:
            port: &httpPort 11434

    route:
      main:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: backend
                port: *httpPort

    persistence:
      data:
        existingClaim: ollama-spark-data-pvc
        advancedMounts:
          backend:
            main:
              - path: /.ollama

      models:
        existingClaim: ollama-spark-models-pvc
        advancedMounts:
          backend:
            main:
              - path: *pvc

      tmp:
        type: emptyDir
        enabled: true
        medium: Memory
        globalMounts:
          - path: /tmp
