---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama-spark
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  install:
    disableWait: true
  upgrade:
    disableWait: true
  values:
    controllers:
      backend:
        pod:
          nodeSelector:
            node-role.kubernetes.io/gpu: blackwell

          tolerations:
            # Spark is tainted kubernetes.io/arch=arm64:NoSchedule to keep
            # amd64-only workloads off it (the scheduler doesn't validate
            # image arch pre-binding; the kubelet only catches mismatches at
            # pull time — too late). This HR is arm64-native (ollama image
            # is multi-arch), so we tolerate it explicitly.
            - key: kubernetes.io/arch
              operator: Equal
              value: arm64
              effect: NoSchedule
            - key: nvidia.com/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule

          priorityClassName: ai-gpu-critical

        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        containers:
          main:
            image:
              repository: docker.io/ollama/ollama
              tag: 0.30.11@sha256:c484b703176aa19dfc0a54cbfb60ab8094b38faa04283fb77eba1d33319e5eca

            env:
              OLLAMA_HOST: 0.0.0.0
              OLLAMA_ORIGINS: "*"
              OLLAMA_LOG_LEVEL: info
              OLLAMA_MODELS: &pvc /models
              # qwen3-next:80b-a3b-instruct is a ~50 GB model whose cold-load
              # off the ceph PVC + novel-arch init exceeds the old 10m bound
              # (it hit OLLAMA_LOAD_TIMEOUT and aborted mid-load). 20m gives
              # it room. KNOWN DOWNSIDE: a cold-load (pod restart / eviction)
              # stalls the reasoning tier for >10m — the MAX_LOADED keep-warm
              # below makes cold-loads rare, but can't make them fast.
              OLLAMA_LOAD_TIMEOUT: 20m
              OLLAMA_KV_CACHE_TYPE: q8_0
              OLLAMA_FLASH_ATTENTION: 1
              OLLAMA_CONTEXT_LENGTH: 16384
              OLLAMA_NUM_PARALLEL: 4
              # Never idle-unload. MAX_LOADED lets the working set co-reside,
              # but the default 5m keep-alive would unload qwen3-next between
              # bursts on this low-traffic fleet — and its cold-load is ~8.6m.
              # -1 pins the loaded set (qwen3-next + coder + embedders) warm so
              # cold-loads happen only on an actual pod restart, not every idle.
              OLLAMA_KEEP_ALIVE: "-1"
              # Working set after the qwen2.5:32b -> qwen3-next swap:
              #   qwen3-next:80b-a3b-instruct  -- fleet reasoning + HolmesGPT
              #                                   + Open WebUI (one shared model)
              #   qwen2.5-coder:32b            -- coder / reviewer agents
              #   bge-m3 + nomic-embed-text    -- RAG + wedge probe (always-warm)
              # = 4 distinct models steady-state; 5 lets the old qwen2.5:32b
              # stay resident through the swap transition without eviction
              # churn. q8 KV + qwen3-next's hybrid attention keep KV modest;
              # worst-case unified-memory residence ~qwen3-next(50) + coder(20)
              # + embedders(1.3) + KV ~ 90-105 GB of 128 GB. CUDA-mapped
              # weights on Grace-Blackwell unified memory don't bill against
              # the kubelet's pod RSS (~14 GB observed), so the 80Gi pod limit
              # (runtime + KV headroom) still holds.
              OLLAMA_MAX_LOADED_MODELS: 5

            resources:
              requests:
                memory: 32Gi
                cpu: 2000m
                nvidia.com/gpu: 1
              limits:
                memory: 80Gi
                nvidia.com/gpu: 1

            securityContext:
              privileged: true

    service:
      backend:
        controller: backend
        ports:
          http:
            port: &httpPort 11434

    route:
      main:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: backend
                port: *httpPort

    persistence:
      data:
        existingClaim: ollama-spark-data-pvc
        advancedMounts:
          backend:
            main:
              - path: /.ollama

      models:
        existingClaim: ollama-spark-models-pvc
        advancedMounts:
          backend:
            main:
              - path: *pvc

      tmp:
        type: emptyDir
        enabled: true
        medium: Memory
        globalMounts:
          - path: /tmp
