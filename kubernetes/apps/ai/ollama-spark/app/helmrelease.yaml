---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama-spark
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  install:
    disableWait: true
  upgrade:
    disableWait: true
  values:
    controllers:
      backend:
        pod:
          nodeSelector:
            node-role.kubernetes.io/gpu: blackwell

          tolerations:
            # Spark is tainted kubernetes.io/arch=arm64:NoSchedule to keep
            # amd64-only workloads off it (the scheduler doesn't validate
            # image arch pre-binding; the kubelet only catches mismatches at
            # pull time — too late). This HR is arm64-native (ollama image
            # is multi-arch), so we tolerate it explicitly.
            - key: kubernetes.io/arch
              operator: Equal
              value: arm64
              effect: NoSchedule
            - key: nvidia.com/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule

          priorityClassName: ai-gpu-critical

        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        containers:
          main:
            image:
              repository: docker.io/ollama/ollama
              tag: 0.30.7@sha256:46399ef084d97b381955b5dc585c5d836dbe7ed3f79f170d1c04660fed511e3a

            env:
              OLLAMA_HOST: 0.0.0.0
              OLLAMA_ORIGINS: "*"
              OLLAMA_LOG_LEVEL: info
              OLLAMA_MODELS: &pvc /models
              OLLAMA_LOAD_TIMEOUT: 10m
              OLLAMA_KV_CACHE_TYPE: q8_0
              OLLAMA_FLASH_ATTENTION: 1
              OLLAMA_CONTEXT_LENGTH: 16384
              OLLAMA_NUM_PARALLEL: 4
              # Spark's 128 GB unified memory comfortably runs 30b-class
              # models concurrently. P40-era cap of 1 lifted.
              # 2026-05-22: held at 3 through HolmesGPT 32b→72b upgrade.
              # Working set is bge-m3 (always-warm, RAG + wedge probe)
              # + qwen2.5:72b (HolmesGPT) + qwen2.5:32b (Open WebUI
              # default chat). max=3 forces ollama to evict the
              # rarely-used coder:32b under pressure rather than evict
              # bge-m3 — which would wedge RAG and the wedge probe.
              # Worst-case unified-memory residence reported by
              # /api/ps: ~66 GB (72b) + ~22 GB (32b) + 1.3 GB (bge-m3)
              # ≈ 89 GB of the 128 GB node. The pod cgroup RSS stays
              # much lower (~14 GB observed with 72b loaded) because
              # CUDA-mapped model weights on Grace-Blackwell unified
              # memory don't bill against the kubelet's pod accounting.
              # Pod limit bumped 64Gi → 80Gi as defensive headroom for
              # ollama runtime + 16K context KV cache (q8) across
              # NUM_PARALLEL=4 slots — not strictly required by the
              # measured RSS but cheap on a 128 GB node.
              OLLAMA_MAX_LOADED_MODELS: 3

            resources:
              requests:
                memory: 32Gi
                cpu: 2000m
                nvidia.com/gpu: 1
              limits:
                memory: 80Gi
                nvidia.com/gpu: 1

            securityContext:
              privileged: true

    service:
      backend:
        controller: backend
        ports:
          http:
            port: &httpPort 11434

    route:
      main:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: backend
                port: *httpPort

    persistence:
      data:
        existingClaim: ollama-spark-data-pvc
        advancedMounts:
          backend:
            main:
              - path: /.ollama

      models:
        existingClaim: ollama-spark-models-pvc
        advancedMounts:
          backend:
            main:
              - path: *pvc

      tmp:
        type: emptyDir
        enabled: true
        medium: Memory
        globalMounts:
          - path: /tmp
