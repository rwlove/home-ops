---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ollama-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: ollama
  # Additive — default-deny is what triggers the lockdown; these rules
  # punch holes through it.
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # HTTPRoute on internal gateway → ollama:11434 (ollama.${SECRET_DOMAIN}
    # for direct user access).
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "11434"
              protocol: TCP
    # Cross-ns callers observed via Hubble + helmrelease survey:
    #   home/home-assistant   — voice assist / conversation agent
    #   media/suggestarr      — LLM-driven recommendation enrichment
    #   collab/open-webui     — primary OLLAMA_BASE_URL
    #   mcp-system/*          — some MCP servers may proxy ollama calls
    # Intra-ns callers (kubeclaw-gateway, langgraph-agents, khoj,
    # comfyui prompt eval) are covered by baseline allow-intra-namespace.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: home
            app.kubernetes.io/name: home-assistant
        - matchLabels:
            io.kubernetes.pod.namespace: media
            app.kubernetes.io/name: suggestarr
        - matchLabels:
            io.kubernetes.pod.namespace: collab
            app.kubernetes.io/name: open-webui
        - matchLabels:
            io.kubernetes.pod.namespace: mcp-system
      toPorts:
        - ports:
            - port: "11434"
              protocol: TCP
  egress:
    # Model registry — ollama pulls model blobs on first invocation
    # (`ollama pull <model>`) and on Modelfile changes.
    # *.cloudflarestorage.com covers the rotating GCS-backed R2 blob
    # host (e.g. dd20bb891979d25aebc8bec07b2b3bbc.r2.cloudflarestorage.com).
    # huggingface.co + *.huggingface.co + cdn-lfs.huggingface.co cover
    # community model GGUFs.
    #
    # Cilium 1.19's toFQDNs.matchName doesn't match through Kubernetes
    # pod DNS search-domain augmentation (pod queries e.g.
    # `ollama.com.ai.svc.cluster.local.` and the FQDN cache stores
    # the augmented name; matchName misses it). The bare + `.*`
    # dual-form matchPattern covers both un-augmented and
    # search-domain-augmented forms — see PR #11492 for the canonical
    # example.
    - toFQDNs:
        - matchPattern: "ollama.com"
        - matchPattern: "ollama.com.*"
        - matchPattern: "registry.ollama.ai"
        - matchPattern: "registry.ollama.ai.*"
        - matchPattern: "*.ollama.ai"
        - matchPattern: "*.ollama.ai.*"
        - matchPattern: "*.cloudflarestorage.com"
        - matchPattern: "*.cloudflarestorage.com.*"
        - matchPattern: "huggingface.co"
        - matchPattern: "huggingface.co.*"
        - matchPattern: "*.huggingface.co"
        - matchPattern: "*.huggingface.co.*"
        - matchPattern: "cdn-lfs.huggingface.co"
        - matchPattern: "cdn-lfs.huggingface.co.*"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
