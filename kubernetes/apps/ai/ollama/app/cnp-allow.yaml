---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ollama-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: ollama
  # Additive — default-deny is what triggers the lockdown; these rules
  # punch holes through it.
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # HTTPRoute on internal gateway → ollama:11434 (ollama.${SECRET_DOMAIN}
    # for direct user access).
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "11434"
              protocol: TCP
    # Cross-ns callers observed via Hubble + helmrelease survey:
    #   home/home-assistant   — voice assist / conversation agent
    #   home/windmill-workers — Windmill flows that hit Ollama API
    #   media/suggestarr      — LLM-driven recommendation enrichment
    #   collab/open-webui     — primary OLLAMA_BASE_URL
    #   mcp-system/*          — some MCP servers may proxy ollama calls
    # Intra-ns callers (langgraph-agents, khoj, comfyui prompt eval) are
    # covered by baseline allow-intra-namespace.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: home
            app.kubernetes.io/name: home-assistant
        - matchLabels:
            io.kubernetes.pod.namespace: home
            app.kubernetes.io/name: windmill-workers
        - matchLabels:
            io.kubernetes.pod.namespace: media
            app.kubernetes.io/name: suggestarr
        - matchLabels:
            io.kubernetes.pod.namespace: collab
            app.kubernetes.io/name: open-webui
        - matchLabels:
            io.kubernetes.pod.namespace: mcp-system
      toPorts:
        - ports:
            - port: "11434"
              protocol: TCP
  egress:
    # Model registry — ollama pulls model blobs on first invocation
    # (`ollama pull <model>`) and on Modelfile changes.
    # Intended endpoints:
    #   - ollama.com, registry.ollama.ai, *.ollama.ai (canonical)
    #   - *.cloudflarestorage.com (R2 blob host, e.g.
    #     dd20bb891979d25aebc8bec07b2b3bbc.r2.cloudflarestorage.com)
    #   - huggingface.co, *.huggingface.co, cdn-lfs.huggingface.co
    #
    # The ollama.* family is canonical-only (no CNAME chain) and
    # matchPattern silently fails on it (per memory
    # project_cilium_matchpattern_fqdn_limits.md). Since we'd have
    # to fall back to toEntities:[world]+443 to cover those, the
    # whole rule collapses to world:443 — adding matchPattern allows
    # for the CNAME-fronted ones (HF, R2) would be redundant
    # (world:443 already covers them). Matches the precedent in
    # PRs #11498/#11512/#11517/#11533.
    - toEntities: [world]
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
