---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  values:
    controllers:
      backend:
        pod:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: nvidia.com/gpu.present
                        operator: In
                        values:
                          - "true"

          nodeSelector:
            nvidia.com/gpu.present: "true"

          priorityClassName: ai-gpu-critical

        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        containers:
          main:
            image:
              repository: docker.io/ollama/ollama
              tag: 0.24.0@sha256:a6149234667efc71d37766d61c1a16f24c33e4cd7a0bf4125c44a7e47e2419c4

            env:
              # LIBVA_DRIVER_NAME: i965
              OLLAMA_HOST: 0.0.0.0
              OLLAMA_ORIGINS: "*"
              OLLAMA_LOG_LEVEL: info
              OLLAMA_MODELS: &pvc /models
              OLLAMA_LOAD_TIMEOUT: 10m
              # https://github.com/ollama/ollama/blob/main/docs/faq.md#how-can-i-set-the-quantization-type-for-the-kv-cache
              OLLAMA_KV_CACHE_TYPE: q8_0
              OLLAMA_FLASH_ATTENTION: 1
              OLLAMA_CONTEXT_LENGTH: 16384
              OLLAMA_NUM_PARALLEL: 4
              # P40 VRAM budget is tight (24G total, ~15G steady-used by
              # Frigate/Immich/etc). Without this, ollama tries to keep
              # multiple models resident concurrently and OOMs when a
              # langgraph-agents specialist (qwen2.5:14b, 9GB) is invoked
              # while the triager's qwen2.5:7b (11GB) is still in keep-alive.
              # Temporary until L40S/Spark lands per project_gpu_upgrade_decision.
              OLLAMA_MAX_LOADED_MODELS: 1

            resources:
              requests:
                memory: 6G
                cpu: 2000m
                nvidia.com/gpu: 1
              limits:
                memory: 6G
                nvidia.com/gpu: 1

            securityContext:
              privileged: true

    service:
      backend:
        controller: backend
        ports:
          http:
            port: &httpPort 11434

    route:
      main:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: backend
                port: *httpPort

    persistence:
      data:
        existingClaim: ollama-data-pvc
        advancedMounts:
          backend:
            main:
              - path: /.ollama

      # PV needs to be on the node running Ollama. I'm currently using a Longhorn volume with 1 replica
      # and locality set to 'strict-local' so that I ensure it gets scheduled onto the right node. If
      # I don't do this then I get model loading timeouts from the clients: https://github.com/ollama/ollama/issues/9016
      models:
        existingClaim: ollama-models-pvc
        advancedMounts:
          backend:
            main:
              - path: *pvc

      tmp:
        type: emptyDir
        enabled: true
        medium: Memory
        globalMounts:
          - path: /tmp
