---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    disableWait: true
  interval: 30m
  upgrade:
    disableWait: true
  values:
    controllers:
      backend:
        pod:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: nvidia.com/gpu.present
                        operator: In
                        values:
                          - "true"

          nodeSelector:
            nvidia.com/gpu.present: "true"

          priorityClassName: ai-gpu-critical

        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        containers:
          main:
            image:
              repository: docker.io/ollama/ollama
              tag: 0.30.11@sha256:c484b703176aa19dfc0a54cbfb60ab8094b38faa04283fb77eba1d33319e5eca

            env:
              # LIBVA_DRIVER_NAME: i965
              OLLAMA_HOST: 0.0.0.0
              OLLAMA_ORIGINS: "*"
              OLLAMA_LOG_LEVEL: info
              OLLAMA_MODELS: &pvc /models
              OLLAMA_LOAD_TIMEOUT: 10m
              # https://github.com/ollama/ollama/blob/main/docs/faq.md#how-can-i-set-the-quantization-type-for-the-kv-cache
              OLLAMA_KV_CACHE_TYPE: q8_0
              OLLAMA_FLASH_ATTENTION: 1
              # Tightened 2026-05-18 (Phase 0d audit caught CPU-spill from
              # P40 VRAM exhaustion): NUM_PARALLEL=4 × KV cache at 16384
              # context blew past 24 GiB VRAM headroom after immich-ml
              # workloads landed. NUM_PARALLEL=1 + CONTEXT=8192 keeps
              # qwen2.5:7b + KV cache fully GPU-resident (~5.7 GiB total).
              # See docs/src/audit/post-spark-tool-call-leakage-2026-05-18.md.
              OLLAMA_CONTEXT_LENGTH: 8192
              OLLAMA_NUM_PARALLEL: 1
              # Post-v48 dual-concurrent Ollama: 14b/32b never live on the
              # P40 (heavy agents route to ollama-spark on Blackwell). P40
              # only serves qwen2.5:7b for light agents + HolmesGPT, so the
              # MAX_LOADED_MODELS=1 cap is safe — there's nothing to evict.
              OLLAMA_MAX_LOADED_MODELS: 1

            resources:
              requests:
                memory: 6G
                cpu: 2000m
                nvidia.com/gpu: 1
              limits:
                memory: 6G
                nvidia.com/gpu: 1

            securityContext:
              privileged: true

    service:
      backend:
        controller: backend
        ports:
          http:
            port: &httpPort 11434

    route:
      main:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: backend
                port: *httpPort

    persistence:
      data:
        existingClaim: ollama-data-pvc
        advancedMounts:
          backend:
            main:
              - path: /.ollama

      # PV needs to be on the node running Ollama. I'm currently using a Longhorn volume with 1 replica
      # and locality set to 'strict-local' so that I ensure it gets scheduled onto the right node. If
      # I don't do this then I get model loading timeouts from the clients: https://github.com/ollama/ollama/issues/9016
      models:
        existingClaim: ollama-models-pvc
        advancedMounts:
          backend:
            main:
              - path: *pvc

      tmp:
        type: emptyDir
        enabled: true
        medium: Memory
        globalMounts:
          - path: /tmp
