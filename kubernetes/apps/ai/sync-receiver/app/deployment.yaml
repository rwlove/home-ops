---
# Minimal sshd that exposes the langgraph-vault PVC for rsync-over-ssh push
# from the laptop. RWX PVC mounted alongside langgraph-agents (which reads
# the same PVC read-only). ceph-filesystem supports multi-attach.
#
# Authorized keys come from 1Password via ExternalSecret. No password auth.
# Service is ClusterIP-only; reach from laptop via `kubectl port-forward`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sync-receiver
  labels:
    app.kubernetes.io/name: sync-receiver
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: sync-receiver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sync-receiver
    spec:
      securityContext:
        # fsGroup=1000 so ceph PVC contents are group-readable by uid 1000
        # (the user the linuxserver image drops to via PUID/PGID after its
        # root-side init runs useradd/chown). Do NOT set runAsUser here — the
        # linuxserver/openssh-server image must start as root to create the
        # USER_NAME account, chown /config, and write sshd_config. It drops
        # to PUID after init.
        fsGroup: 1000
      containers:
        - name: sshd
          image: lscr.io/linuxserver/openssh-server:10.2_p1-r0-ls225@sha256:29d4e3f887596c4c2fc609f4e07040b08890a238178da400ffa2a602b55245bc
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: America/New_York
            - name: PUBLIC_KEY_FILE
              # Avoid /run/secrets — Kubernetes auto-mounts the service
              # account token tree at /run/secrets/kubernetes.io/..., which
              # shadows a Secret volume mounted at /run/secrets so its files
              # are invisible to the application. /etc/lgsync avoids that.
              value: /etc/lgsync/authorized_keys
            - name: USER_NAME
              # NOT "sync" — that collides with a stock user in the base image
              # and halts s6-overlay init before sshd starts (silent: pod
              # stays Running, TCP accepts, SSH handshake gets reset).
              value: lgsync
            - name: PASSWORD_ACCESS
              value: "false"
            - name: SUDO_ACCESS
              value: "false"
          ports:
            - name: ssh
              containerPort: 2222
              protocol: TCP
          volumeMounts:
            - name: vault
              mountPath: /vault
            - name: vault-rw
              mountPath: /vault-rw
              readOnly: true
            - name: authorized-keys
              mountPath: /etc/lgsync
              readOnly: true
            # linuxserver/openssh-server writes its host keys, sshd_config
            # template, and the in-container user's ~/.ssh into /config.
            # Without this mount the init script fails at "touch /config/.ssh/
            # authorized_keys: No such file or directory" and sshd never
            # starts. emptyDir is sufficient — losing host keys across pod
            # restarts is fine since the laptop reconnects with a new
            # known_hosts entry anyway (StrictHostKeyChecking=no is OK for
            # a cluster-internal port-forward target).
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
      volumes:
        - name: vault
          persistentVolumeClaim:
            # langgraph-vault PVC declared by the langgraph-agents app.
            # RWX ceph-filesystem — both the agent pod (RO) and this pod (RW)
            # can mount concurrently.
            claimName: langgraph-vault
        - name: vault-rw
          persistentVolumeClaim:
            # langgraph-vault-rw PVC — agent output (drafts, reports, activity
            # logs). Mounted read-only here so the laptop can rsync-pull drafts
            # without risking a clobber back into agent output state.
            claimName: langgraph-vault-rw
        - name: authorized-keys
          secret:
            secretName: sync-receiver-secret
            items:
              - key: authorized_keys
                path: authorized_keys
                mode: 0400
        - name: config
          emptyDir: {}
