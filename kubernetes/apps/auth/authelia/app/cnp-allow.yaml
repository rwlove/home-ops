---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: authelia-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: authelia
  # Additive — default-deny is what triggers the lockdown; these rules
  # punch holes through it.
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # Envoy → authelia:9091, three flows: the auth-portal HTTPRoute on
    # the external gateway, per-route ext_authz checks from the extAuth
    # SecurityPolicies (#12767, replaced the oauth2-proxy fleet), and
    # the mcp-gateway rotator / JWKS fetches via
    # https://auth.${SECRET_DOMAIN}. Both `external` and `internal`
    # envoy deployments share app.kubernetes.io/name: envoy.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "9091"
              protocol: TCP
    # Inclusive belt-and-suspenders: allow any in-cluster pod to reach
    # authelia:9091. The extAuth backendRefs dial the authelia Service
    # directly from envoy (covered above), and native-OIDC apps ride
    # envoy via auth.${SECRET_DOMAIN} — but Authelia is the auth choke
    # point for every gated app; losing it locks the user out of all of
    # them. Better to permit a flow that isn't used than to break one
    # we missed.
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: "9091"
              protocol: TCP
  # Metrics port 9959 is covered by the baseline allow-monitoring-scrape.
  # LLDAP egress (intra-ns, port 3893) is covered by allow-intra-namespace.
  egress:
    # CNPG cluster `postgres-authelia` in databases ns (Pattern B).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            cnpg.io/cluster: postgres-authelia
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Session store: Dragonfly redis in databases ns
    # (configmap.yaml: session.redis.host=dragonfly.databases.svc.cluster.local).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            app.kubernetes.io/name: dragonfly
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
    # SMTP relay for password-reset / notification emails — Maddy in
    # home ns on port 2525 (Pattern E). configmap.yaml notifier.smtp
    # block: smtp://smtp-relay.home.svc.cluster.local:2525.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: home
            app.kubernetes.io/name: smtp-relay
      toPorts:
        - ports:
            - port: "2525"
              protocol: TCP
