---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/configmap-v1.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia-config
data:
  configuration.yml: |
    server:
      address: 'tcp://0.0.0.0:9091/'
      buffers:
        # Historically each oauth2-proxy set `_oauth2_proxy_<app>_csrf`
        # cookies (~600B each) on `.${SECRET_DOMAIN}`, overflowing the 4096
        # default ("431 Request Header Fields Too Large"). The fleet is
        # retired (#12767) but ext-authz checks still forward the full
        # Cookie header, and native-OIDC clients remain — keep the headroom.
        read: 32768
        write: 32768

    log:
      level: 'info'
      format: 'text'

    telemetry:
      metrics:
        enabled: true
        address: 'tcp://0.0.0.0:9959/'

    theme: 'auto'

    identity_validation:
      reset_password:
        # jwt_secret comes from env: AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET

    authentication_backend:
      password_reset:
        disable: false
      refresh_interval: '5 minutes'
      ldap:
        implementation: 'lldap'
        address: 'ldap://lldap.auth.svc.cluster.local:3893'
        timeout: '5 seconds'
        start_tls: false
        base_dn: 'dc=${SECRET_DOMAIN/./,dc=}'
        additional_users_dn: 'ou=people'
        additional_groups_dn: 'ou=groups'
        users_filter: '(&({username_attribute}={input})(objectClass=person))'
        groups_filter: '(member={dn})'
        user: 'uid=admin,ou=people,dc=${SECRET_DOMAIN/./,dc=}'
        # password from env: AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD

    password_policy:
      standard:
        enabled: true
        min_length: 8
        require_uppercase: false
        require_lowercase: false
        require_number: false
        require_special: false

    access_control:
      # THIS block is the gate for every extAuth-fronted app (Envoy
      # Gateway SecurityPolicy → /api/authz/ext-authz, #12767). The
      # rules replicate the per-client authorization_policy the retired
      # oauth2-proxy fleet carried in the 1P clients.yml: admin-tier
      # domains require group lldap_admin; household-tier domains need
      # any authenticated user. OIDC clients (native-OIDC apps) are NOT
      # governed here — they keep authorization_policy per client.
      # default deny: a new extAuth route stays closed until its domain
      # is added to a rule.
      default_policy: 'deny'
      rules:
        # Admin-tier (was authorization_policy: admin_only)
        - domain:
            - 'hai.${SECRET_DOMAIN}'
            - 'hai-web.${SECRET_DOMAIN}'
            - 'khoj.${SECRET_DOMAIN}'
            - 'glance.${SECRET_DOMAIN}'
            - 'prowlarr.${SECRET_DOMAIN}'
            - 'bt.${SECRET_DOMAIN}'
            - 'downloader.${SECRET_DOMAIN}'
            - 'sabnzbd.${SECRET_DOMAIN}'
            - 'soulseek.${SECRET_DOMAIN}'
            - 'kube-ops-view.${SECRET_DOMAIN}'
            - 'goldilocks.${SECRET_DOMAIN}'
            - 'garage.${SECRET_DOMAIN}'
            - 'holmesgpt.${SECRET_DOMAIN}'
            - 'pump.${SECRET_DOMAIN}'
            - 'konflate.${SECRET_DOMAIN}'
          policy: 'one_factor'
          subject: 'group:lldap_admin'
        # Household-tier (was authorization_policy: one_factor)
        - domain:
            - 'start.${SECRET_DOMAIN}'
            - 'frigate.${SECRET_DOMAIN}'
            - 'windmill.${SECRET_DOMAIN}'
            - 'av1corrector.${SECRET_DOMAIN}'
            - 'batocera.${SECRET_DOMAIN}'
            - 'lidarr.${SECRET_DOMAIN}'
            - 'medialyze.${SECRET_DOMAIN}'
            - 'radarr.${SECRET_DOMAIN}'
            - 'sonarr.${SECRET_DOMAIN}'
            - 'soularr.${SECRET_DOMAIN}'
            - 'suggestarr.${SECRET_DOMAIN}'
          policy: 'one_factor'

    session:
      cookies:
        - domain: '${SECRET_DOMAIN}'
          authelia_url: 'https://auth.${SECRET_DOMAIN}'
          default_redirection_url: 'https://glance.${SECRET_DOMAIN}'
          inactivity: '5 minutes'
          expiration: '1 hour'
          remember_me: '1 month'
      redis:
        host: 'dragonfly.databases.svc.cluster.local'
        port: 6379
        database_index: 5

    regulation:
      max_retries: 5
      find_time: '2 minutes'
      ban_time: '5 minutes'

    storage:
      postgres:
        address: 'tcp://postgres-authelia-rw.databases.svc.cluster.local:5432'
        database: 'authelia'
        username: 'authelia'
        # password from env: AUTHELIA_STORAGE_POSTGRES_PASSWORD
      # encryption_key from env: AUTHELIA_STORAGE_ENCRYPTION_KEY

    notifier:
      disable_startup_check: true
      smtp:
        address: 'smtp://smtp-relay.home.svc.cluster.local:2525'
        sender: 'Authelia <auth@${SECRET_DOMAIN}>'
        subject: '[Authelia] {title}'
        disable_require_tls: true
        disable_starttls: true
        disable_html_emails: false

    identity_providers:
      oidc:
        # hmac_secret from env: AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET
        # issuer_private_key from env: AUTHELIA_IDENTITY_PROVIDERS_OIDC_ISSUER_PRIVATE_KEY
        cors:
          endpoints: ['authorization', 'token', 'revocation', 'introspection', 'userinfo']
          allowed_origins_from_client_redirect_uris: true
        authorization_policies:
          admin_only:
            default_policy: 'deny'
            rules:
              - policy: 'one_factor'
                subject: 'group:lldap_admin'
        claims_policies:
          default:
            id_token: ['email', 'email_verified', 'preferred_username', 'name', 'groups']
        lifespans:
          custom:
            # Long-lived access tokens for the mcp-gateway client_credentials
            # rotator; rotation cadence is 6d (overlap window with 7d TTL).
            mcp-gateway:
              access_token: '7d'
        # OIDC clients (including argon2id client_secret hashes) live in
        # /secrets/clients.yml, rendered by ExternalSecret from the
        # OIDC_CLIENTS_YAML field of the `authelia` 1P item. See
        # externalsecret.yaml and the --config arg in helmrelease.yaml.
        # Authelia merges per-file configs; the clients array is contributed
        # entirely by clients.yml.
