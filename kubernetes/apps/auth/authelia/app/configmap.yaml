---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/configmap-v1.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia-config
data:
  configuration.yml: |
    server:
      address: 'tcp://0.0.0.0:9091/'
      buffers:
        read: 4096
        write: 4096

    log:
      level: 'info'
      format: 'text'

    telemetry:
      metrics:
        enabled: true
        address: 'tcp://0.0.0.0:9959/'

    theme: 'auto'

    identity_validation:
      reset_password:
        # jwt_secret comes from env: AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET

    authentication_backend:
      password_reset:
        disable: false
      refresh_interval: '5 minutes'
      ldap:
        implementation: 'lldap'
        address: 'ldap://lldap.auth.svc.cluster.local:3893'
        timeout: '5 seconds'
        start_tls: false
        base_dn: 'dc=thesteamedcrab,dc=com'
        additional_users_dn: 'ou=people'
        additional_groups_dn: 'ou=groups'
        users_filter: '(&({username_attribute}={input})(objectClass=person))'
        groups_filter: '(member={dn})'
        user: 'uid=admin,ou=people,dc=thesteamedcrab,dc=com'
        # password from env: AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD

    password_policy:
      standard:
        enabled: true
        min_length: 8
        require_uppercase: false
        require_lowercase: false
        require_number: false
        require_special: false

    access_control:
      default_policy: 'deny'
      rules:
        - domain: 'auth.thesteamedcrab.com'
          policy: 'bypass'
        # Admin-only forward-auth targets (must be in lldap_admin group)
        - domain:
            - 'bt.thesteamedcrab.com'              # qbittorrent
            - 'downloader.thesteamedcrab.com'      # jdownloader2
            - 'garage.thesteamedcrab.com'          # garage webui
            - 'goldilocks.thesteamedcrab.com'
            - 'kube-ops-view.thesteamedcrab.com'
            - 'prowlarr.thesteamedcrab.com'
            - 'sabnzbd.thesteamedcrab.com'
            - 'soulseek.thesteamedcrab.com'        # slskd
          policy: 'one_factor'
          subject: 'group:lldap_admin'
        # Catch-all: any other subdomain just needs authentication (any user)
        - domain: '*.thesteamedcrab.com'
          policy: 'one_factor'

    session:
      cookies:
        - domain: 'thesteamedcrab.com'
          authelia_url: 'https://auth.thesteamedcrab.com'
          default_redirection_url: 'https://glance.thesteamedcrab.com'
          inactivity: '5 minutes'
          expiration: '1 hour'
          remember_me: '1 month'
      redis:
        host: 'dragonfly.databases.svc.cluster.local'
        port: 6379
        database_index: 5

    regulation:
      max_retries: 5
      find_time: '2 minutes'
      ban_time: '5 minutes'

    storage:
      postgres:
        address: 'tcp://postgres-authelia-rw.databases.svc.cluster.local:5432'
        database: 'authelia'
        username: 'authelia'
        # password from env: AUTHELIA_STORAGE_POSTGRES_PASSWORD
      # encryption_key from env: AUTHELIA_STORAGE_ENCRYPTION_KEY

    notifier:
      disable_startup_check: true
      smtp:
        address: 'smtp://smtp-relay.home.svc.cluster.local:2525'
        sender: 'Authelia <auth@thesteamedcrab.com>'
        subject: '[Authelia] {title}'
        disable_require_tls: true
        disable_starttls: true
        disable_html_emails: false

    identity_providers:
      oidc:
        # hmac_secret from env: AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET
        # issuer_private_key from env: AUTHELIA_IDENTITY_PROVIDERS_OIDC_ISSUER_PRIVATE_KEY
        cors:
          endpoints: ['authorization', 'token', 'revocation', 'introspection', 'userinfo']
          allowed_origins_from_client_redirect_uris: true
        authorization_policies:
          admin_only:
            default_policy: 'deny'
            rules:
              - policy: 'one_factor'
                subject: 'group:lldap_admin'
        clients:
          - client_id: 'open-webui'
            client_name: 'Open WebUI'
            client_secret: '$argon2id$v=19$m=65536,t=3,p=4$ghwUPb4pg8xFt6HRoR+Wcg$Aob+gT6YMASp+pRZKbLwm/CTcd2dgMh+lOsMEPzBBnw'
            public: false
            authorization_policy: 'one_factor'
            require_pkce: true
            pkce_challenge_method: 'S256'
            redirect_uris:
              - 'https://open-webui.thesteamedcrab.com/oauth/oidc/callback'
            scopes:
              - 'openid'
              - 'profile'
              - 'email'
              - 'groups'
            grant_types:
              - 'authorization_code'
            response_types:
              - 'code'
            userinfo_signed_response_alg: 'none'
            token_endpoint_auth_method: 'client_secret_basic'
          - client_id: 'mealie'
            client_name: 'Mealie'
            client_secret: '$argon2id$v=19$m=65536,t=3,p=4$nv27JpnBBGWtg2Q560Im1g$AaiB1jMvgmKc8UavShyB9sXLdD+lFl8uPaBDs6LPcT8'
            public: false
            authorization_policy: 'one_factor'
            require_pkce: true
            pkce_challenge_method: 'S256'
            redirect_uris:
              - 'https://mealie.thesteamedcrab.com/login'
            scopes:
              - 'openid'
              - 'profile'
              - 'email'
              - 'groups'
            grant_types:
              - 'authorization_code'
            response_types:
              - 'code'
            userinfo_signed_response_alg: 'none'
            token_endpoint_auth_method: 'client_secret_basic'
          - client_id: 'immich'
            client_name: 'Immich'
            client_secret: '$argon2id$v=19$m=65536,t=3,p=4$tEi+f53DmSl1AOcx5HL4oA$9ARNNb3pJUSt/GymcQoOwvHYKQ+lRZGwDFArNACAnz4'
            public: false
            authorization_policy: 'one_factor'
            require_pkce: true
            pkce_challenge_method: 'S256'
            redirect_uris:
              - 'https://photos.thesteamedcrab.com/auth/login'
              - 'https://photos.thesteamedcrab.com/user-settings'
              - 'app.immich:///oauth-callback'
            scopes:
              - 'openid'
              - 'profile'
              - 'email'
              - 'groups'
              - 'offline_access'
            grant_types:
              - 'authorization_code'
              - 'refresh_token'
            response_types:
              - 'code'
            userinfo_signed_response_alg: 'none'
            token_endpoint_auth_method: 'client_secret_post'
