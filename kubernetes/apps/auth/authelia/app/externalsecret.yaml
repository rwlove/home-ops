---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authelia
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: authelia-secret
    creationPolicy: Owner
    template:
      data:
        # LDAP bind password (lldap admin)
        AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD: "{{ .LDAP_PASSWORD }}"
        # Postgres storage password
        AUTHELIA_STORAGE_POSTGRES_PASSWORD: "{{ .POSTGRES_PASSWORD }}"
        AUTHELIA_STORAGE_ENCRYPTION_KEY: "{{ .STORAGE_ENCRYPTION_KEY }}"
        # Session secret
        AUTHELIA_SESSION_SECRET: "{{ .SESSION_SECRET }}"
        # JWT for password reset
        AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET: "{{ .JWT_SECRET }}"
        # OIDC
        AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET: "{{ .OIDC_HMAC_SECRET }}"
        # JWKS (PEM private key) needs to be in a config file, not env (Authelia
        # doesn't support array indexing in env vars). Mounted alongside the
        # main configmap as /secrets/jwks.yml and loaded via --config.
        jwks.yml: |
          identity_providers:
            oidc:
              jwks:
                - key_id: 'main'
                  algorithm: 'RS256'
                  use: 'sig'
                  key: |
                    {{ .OIDC_ISSUER_PRIVATE_KEY | nindent 20 }}
        # OIDC clients block — pulled from 1P as a single multi-line field so
        # client_secret argon2id hashes don't sit in git. Mounted as
        # /secrets/clients.yml and merged into the main config via --config.
        # SECRET_DOMAIN is pre-substituted in 1P (no flux postBuild reach here).
        clients.yml: '{{ .OIDC_CLIENTS_YAML }}'
        # Postgres init container needs these
        INIT_POSTGRES_DBNAME: "authelia"
        INIT_POSTGRES_HOST: "postgres-authelia-rw.databases.svc.cluster.local"
        INIT_POSTGRES_USER: "{{ .POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .POSTGRES_PASSWORD }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: cloudnative-pg
    - extract:
        key: authelia
