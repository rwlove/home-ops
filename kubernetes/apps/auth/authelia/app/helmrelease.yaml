---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app authelia
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  install:
    disableWait: true
  upgrade:
    disableWait: true
  values:
    defaultPodOptions:
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: Always
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
    controllers:
      authelia:
        annotations:
          reloader.stakater.com/auto: "true"
        labels:
          postgres: "true"
        type: deployment
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
            envFrom: &envFrom
              - secretRef:
                  name: authelia-secret
        containers:
          app:
            image:
              repository: ghcr.io/authelia/authelia
              tag: 4.39.20@sha256:1b363e9279e742397966333f364e0876ae02bf5c876de73e83af6d48c57ff51b
            args:
              - "--config"
              - "/config/configuration.yml,/secrets/jwks.yml,/secrets/clients.yml"
            envFrom: *envFrom
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: &httpPort 9091
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *httpPort
                  initialDelaySeconds: 0
                  periodSeconds: 5
                  timeoutSeconds: 2
                  failureThreshold: 60
            resources:
              requests:
                cpu: 10m
                memory: 192Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"]}
    service:
      app:
        controller: authelia
        ports:
          http:
            port: *httpPort
          metrics:
            port: 9959
    route:
      app:
        annotations:
          glance/name: "Authelia"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/authelia.png"
          glance/id: "Security"
        hostnames:
          - "auth.${SECRET_DOMAIN}"
        parentRefs:
          - name: external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *httpPort
    persistence:
      config:
        type: configMap
        name: authelia-config
        globalMounts:
          - path: /config/configuration.yml
            subPath: configuration.yml
      jwks:
        type: secret
        name: authelia-secret
        globalMounts:
          - path: /secrets/jwks.yml
            subPath: jwks.yml
      # Separate persistence entry so the chart generates a Secret volume
      # projecting `clients.yml` as its own item. With both subPaths sharing
      # one `jwks` persistence the chart only puts jwks.yml in `items:` and
      # /secrets/clients.yml ends up as an empty directory (subPath of a
      # missing key) — see PRs #11587/#11594 and the post-mortem in commit
      # message.
      clients:
        type: secret
        name: authelia-secret
        globalMounts:
          - path: /secrets/clients.yml
            subPath: clients.yml
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
