---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/gateway.networking.k8s.io/referencegrant_v1beta1.json
#
# Permits extAuth SecurityPolicies in other namespaces to reference the
# authelia Service as their ext-authz backend (#12767 oauth2-proxy →
# extAuth migration). Add one `from:` entry per namespace as the
# rollout proceeds — do NOT wildcard.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: authelia-extauth-securitypolicies
spec:
  from:
    - group: gateway.envoyproxy.io
      kind: SecurityPolicy
      namespace: observability
  to:
    - group: ""
      kind: Service
      name: authelia
