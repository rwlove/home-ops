---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kanidm
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  values:
    controllers:
      kanidm:
        pod:
          annotations:
            reloader.stakater.com/auto: "true"
          securityContext:
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 2000
            runAsNonRoot: true
            runAsUser: 2000
        replicas: 1
        type: statefulset
        containers:
          app:
            image:
              repository: docker.io/kanidm/server
              tag: 1.9.2
            env:
              KANIDM_ADMIN_BIND_PATH: /var/run/kanidmd.sock
              KANIDM_BINDADDRESS: "[::]:8443"
              KANIDM_DB_PATH: /data/kanidm.db
              KANIDM_DOMAIN: idm.${SECRET_DOMAIN}
              KANIDM_LDAPBINDADDRESS: "[::]:3636"
              KANIDM_ORIGIN: https://idm.${SECRET_DOMAIN}
              KANIDM_TLS_CHAIN: /certs/tls.crt
              KANIDM_TLS_KEY: /certs/tls.key
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      data:
        existingClaim: kanidm-data-pvc
        globalMounts:
          - path: /data
            subPath: data
      certs:
        type: secret
        name: idm-lovenet-tls
        defaultMode: 0400
        globalMounts:
          - path: /certs
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /var/run
            subPath: var-run
    route:
      app:
        hostnames:
          - idm.${SECRET_DOMAIN}
        parentRefs:
          - name: external
            namespace: network
    service:
      app:
        ports:
          http:
            port: 8443
          ldap:
            port: 3636
