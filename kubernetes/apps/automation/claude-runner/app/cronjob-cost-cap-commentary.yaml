---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/cronjob-batch-v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: claude-runner-cost-cap-commentary
  labels:
    app.kubernetes.io/name: claude-runner-cost-cap-commentary
spec:
  # 0 22 * * * UTC = 18:00 EDT / 17:00 EST. Per Phase 4 Outcomes table.
  # Runs daily at end-of-business so the projection is over a full
  # day of activity.
  schedule: "0 22 * * *"
  timeZone: Etc/UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      # 30 min hard cap (was 600s, too tight — Claude tool-call latency
      # plus langgraph/Prometheus queries pushed this past 10 min on
      # 2026-05-19's run).
      activeDeadlineSeconds: 1800
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: claude-runner-cost-cap-commentary
          annotations:
            # See sibling cronjob-pr-triage.yaml for the explanation.
            # tl;dr: k8tz's injected initContainer fails PodSecurity
            # `restricted` admission on this namespace; skip injection.
            k8tz.io/inject: "false"
        spec:
          serviceAccountName: claude-runner-cost-cap-commentary
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          containers:
            - name: runner
              # PLACEHOLDER — see ../README.md gating item 1.
              image: ghcr.io/rwlove/claude-runner:0.1.1
              imagePullPolicy: IfNotPresent
              command: ["claude"]
              args:
                - "--print"
                - "--max-turns"
                - "10"
                - |
                  Fetch http://langgraph-agents.ai.svc.cluster.local:8765/admin/costs/today
                  AND query Prometheus
                  (http://prometheus-kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090)
                  for langgraph_cost_usd_total{group="claude"} over the
                  trailing 7 days. Project monthly Claude spend based
                  on the 7d trend. If trending > $30/mo, flag as a
                  hardware-upgrade signal per
                  feedback_local_first_agent_design (Claude API is a
                  ceiling indicator, not a routine fallback). Post a
                  single Zulip card to stream "ops", topic
                  "cost-cap-commentary".
              env:
                - name: HOME
                  value: /workspace
              envFrom:
                - secretRef:
                    name: claude-runner-secret
                    optional: false
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: [ALL]
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - name: workspace
                  mountPath: /workspace
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: workspace
              emptyDir:
                medium: Memory
                sizeLimit: 256Mi
            - name: tmp
              emptyDir:
                medium: Memory
                sizeLimit: 64Mi
