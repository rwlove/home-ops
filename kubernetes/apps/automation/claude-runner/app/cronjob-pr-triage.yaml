---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/cronjob-batch-v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: claude-runner-pr-triage
  labels:
    app.kubernetes.io/name: claude-runner-pr-triage
spec:
  # 0 13 * * * UTC = 09:00 EDT / 08:00 EST. Per Phase 4 Outcomes table.
  schedule: "0 13 * * *"
  timeZone: Etc/UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      # one retry then give up — preserves daily Claude budget
      backoffLimit: 1
      # 30 min hard cap. The previous 10-min budget proved too tight:
      # PR triage with `--max-turns 20` plus Claude Opus 4.7 thinking +
      # tool-calls per turn routinely runs ~12-15 min, and any tail-
      # latency spike trips DeadlineExceeded. 30 min covers normal +
      # slow runs without risking runaway spend (backoffLimit:1 + the
      # daily schedule cap the worst case to one over-budget run).
      activeDeadlineSeconds: 1800
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: claude-runner-pr-triage
          annotations:
            # Skip k8tz timezone-sidecar injection. The injected k8tz
            # initContainer doesn't set securityContext.runAsNonRoot=true,
            # which `automation`'s pod-security enforce=restricted policy
            # rejects — every CronJob fire produced a series of
            # `pods is forbidden: violates PodSecurity` events and the
            # Job ended Failed with no pod ever scheduled (PodSecurity
            # admission rejected before scheduling). Symptom was a
            # Pushover storm of KubeJobFailed on 2026-05-22.
            # k8tz isn't needed here — the runner sets TZ via env.
            k8tz.io/inject: "false"
        spec:
          serviceAccountName: claude-runner-pr-triage
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          containers:
            - name: runner
              # PLACEHOLDER — see ../README.md gating item 1. The image
              # doesn't exist yet; Renovate will track once
              # rwlove/containers publishes claude-runner.
              image: ghcr.io/rwlove/claude-runner:0.1.1
              imagePullPolicy: IfNotPresent
              command: ["claude"]
              args:
                - "--print"
                - "--max-turns"
                - "20"
                - |
                  Read open PRs at rwlove/home-ops via the gh MCP. For
                  each open PR, summarize the change in one paragraph
                  covering: current → target version, release-notes
                  risk, any breaking changes. For Renovate PRs, surface
                  the OCI digest if present. Post one Zulip card per PR
                  to stream "ops", topic "pr-triage". Skip PRs that
                  have been triaged in the last 24h (look for a "🤖
                  triaged" emoji reaction).
              env:
                - name: HOME
                  value: /workspace
              envFrom:
                - secretRef:
                    name: claude-runner-secret
                    optional: false
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: [ALL]
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - name: workspace
                  mountPath: /workspace
                - name: tmp
                  mountPath: /tmp
          volumes:
            # /workspace + /tmp are tmpfs — the runner is stateless
            # per Claude-Code-session and writes nothing durable.
            - name: workspace
              emptyDir:
                medium: Memory
                sizeLimit: 256Mi
            - name: tmp
              emptyDir:
                medium: Memory
                sizeLimit: 64Mi
