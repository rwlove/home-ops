---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/serviceaccount-v1.json
apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-runner-pr-triage
  # Workflow needs zero K8s API access (everything is HTTP egress).
  # automountServiceAccountToken: false is enforced on the pod spec.
automountServiceAccountToken: false
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/serviceaccount-v1.json
apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-runner-cost-cap-commentary
automountServiceAccountToken: false
