---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/namespace-v1.json
apiVersion: v1
kind: Namespace
metadata:
  name: automation
  labels:
    kustomize.toolkit.fluxcd.io/prune: disabled
    # PSA: restricted — cron-runner workloads are stateless Claude Code
    # sessions running with the security defaults in
    # `.agents/instructions/helmrelease.security.md`. No reason to relax.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
