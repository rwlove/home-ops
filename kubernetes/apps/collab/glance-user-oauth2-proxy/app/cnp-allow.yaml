---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: glance-user-oauth2-proxy-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: glance-user-oauth2-proxy
  # Additive — default-deny is what triggers the lockdown; these rules
  # punch holes through it.
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # HTTPRoute on internal gateway (start.${SECRET_DOMAIN}) →
    # glance-user-oauth2-proxy:4180
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "4180"
              protocol: TCP
  egress:
    # OIDC discovery + token exchange against Authelia. Upstream →
    # glance-user.collab.svc.cluster.local:8081 is same-ns, baseline.
    #
    # auth.${SECRET_DOMAIN} is canonical (no CNAME chain). Cilium 1.19
    # matchPattern silently fails for canonical FQDNs through K8s DNS
    # search-domain augmentation — per memory
    # project_cilium_matchpattern_fqdn_limits.md. Use toEntities:world+443.
    - toEntities: [world]
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
