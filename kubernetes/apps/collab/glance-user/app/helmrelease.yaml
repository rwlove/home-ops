---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app glance-user
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      glance-user:
        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000

        containers:
          glance:
            image:
              repository: docker.io/glanceapp/glance
              tag: v0.8.5@sha256:32ab73d80f2b8b5fb0735b0431deb36b93fbb6b2fb43592449b0178c8b83e350

            env:
              # glance.yml uses ${SECRET_DOMAIN} which glance expands at
              # runtime from the env. ConfigMap substitution is disabled
              # so Flux leaves the ${...} placeholders for glance to expand.
              SECRET_DOMAIN: ${SECRET_DOMAIN}

            resources:
              requests:
                cpu: 25m
                memory: 32Mi
              limits:
                memory: 64Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

    service:
      app:
        controller: glance-user
        ports:
          http:
            port: 8081

    route:
      app:
        hostnames:
          - "start.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - kind: Service
                name: glance-user
                port: 8081

    persistence:
      config-file:
        type: configMap
        name: glance-user-configmap
        globalMounts:
          - path: /app/config/glance.yml
            subPath: glance.yml
            readOnly: true
