server:
  port: 8081
  proxied: true

pages:
  - name: Home
    columns:
      - size: full
        widgets:
          - type: bookmarks
            groups:
              - title: Watch
                links:
                  - title: Frigate (cameras)
                    url: https://frigate.${SECRET_DOMAIN}/
                    icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/frigate.png
                  - title: Music Assistant
                    url: https://music-assistant.${SECRET_DOMAIN}/
                    icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/music-assistant.png

              - title: Manage
                links:
                  - title: Home Assistant
                    url: https://home-assistant.${SECRET_DOMAIN}/
                    icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/home-assistant.png
                  - title: KitchenOwl (recipes & shopping)
                    url: https://kitchenowl.${SECRET_DOMAIN}/
                    icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/kitchenowl.png
                  - title: Paperless
                    url: https://paperless.${SECRET_DOMAIN}/
                    icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/paperless.png
                  - title: Photos (Immich)
                    url: https://photos.${SECRET_DOMAIN}/
                    icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/immich.png

              - title: Request
                links:
                  - title: Seerr (request movies/TV)
                    url: https://seerr.${SECRET_DOMAIN}/
                    icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/jellyseerr.png
