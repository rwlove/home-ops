---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: glance-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: glance
  # Additive — default-deny is what triggers the lockdown; these rules
  # punch holes through it.
  enableDefaultDeny:
    egress: false
    ingress: false
  # No ingress rule — inbound to glance always rides through
  # glance-oauth2-proxy → glance:8081 (same-ns; baseline
  # allow-intra-namespace covers it). The k8s-extension sidecar on
  # container port 8080 is glance-local only (glance scrapes it via
  # localhost).
  egress:
    # Widgets pull from arbitrary upstreams configured in glance.yml
    # (RSS feeds, Reddit, Hacker News, weather, GitHub, Docker Hub,
    # Twitch, YouTube, calendar ICS, etc.). The widget set evolves
    # outside this repo, so err on the side of broad HTTPS egress.
    # Apiserver + DNS are covered by baseline.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "80"
              protocol: TCP
