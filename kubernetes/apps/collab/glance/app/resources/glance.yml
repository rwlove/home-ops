---
server:
  port: 8081
  proxied: true
theme:
  background-color: 240 21 15
  contrast-multiplier: 1.2
  primary-color: 217 92 83
  positive-color: 115 54 76
  negative-color: 347 70 65
pages:
  - name: Startpage
    width: default
    hide-desktop-navigation: true
    center-vertically: true
    columns:
      - size: full
        widgets:
          - type: search
            search-engine: kagi
            autofocus: true

          # Auto-discovered apps split into one widget per glance/id
          # category. Each block renders as its own card on the page so
          # every link is visible without tabbing. Add a category by
          # copying a block and changing the title + show-if filter.
          - &apps-by-id
            type: extension
            title: AI
            url: http://glance-k8s-extension:8080/extension/apps
            allow-potentially-dangerous-html: true
            cache: 1s
            parameters:
              show-if: |
                namespace != "kube-system" and
                annotations["glance/id"] == "AI" and
                ("glance/hide" in annotations || annotations["glance/show"] == "true")
          - <<: *apps-by-id
            title: Collaboration
            parameters:
              show-if: |
                namespace != "kube-system" and
                annotations["glance/id"] == "Collaboration" and
                ("glance/hide" in annotations || annotations["glance/show"] == "true")
          - <<: *apps-by-id
            title: Databases
            parameters:
              show-if: |
                namespace != "kube-system" and
                annotations["glance/id"] == "Databases" and
                ("glance/hide" in annotations || annotations["glance/show"] == "true")
          - <<: *apps-by-id
            title: Downloads
            parameters:
              show-if: |
                namespace != "kube-system" and
                annotations["glance/id"] == "Downloads" and
                ("glance/hide" in annotations || annotations["glance/show"] == "true")
          - <<: *apps-by-id
            title: Fitness
            parameters:
              show-if: |
                namespace != "kube-system" and
                annotations["glance/id"] == "Fitness" and
                ("glance/hide" in annotations || annotations["glance/show"] == "true")
          - <<: *apps-by-id
            title: Home Automation
            parameters:
              show-if: |
                namespace != "kube-system" and
                annotations["glance/id"] == "Home Automation" and
                ("glance/hide" in annotations || annotations["glance/show"] == "true")
          - <<: *apps-by-id
            title: Media
            parameters:
              show-if: |
                namespace != "kube-system" and
                annotations["glance/id"] == "Media" and
                ("glance/hide" in annotations || annotations["glance/show"] == "true")
          - <<: *apps-by-id
            title: Network
            parameters:
              show-if: |
                namespace != "kube-system" and
                annotations["glance/id"] == "Network" and
                ("glance/hide" in annotations || annotations["glance/show"] == "true")
          - <<: *apps-by-id
            title: Observability
            parameters:
              show-if: |
                namespace != "kube-system" and
                annotations["glance/id"] == "Observability" and
                ("glance/hide" in annotations || annotations["glance/show"] == "true")
          - <<: *apps-by-id
            title: Private
            parameters:
              show-if: |
                namespace != "kube-system" and
                annotations["glance/id"] == "Private" and
                ("glance/hide" in annotations || annotations["glance/show"] == "true")
          - <<: *apps-by-id
            title: Renovate
            parameters:
              show-if: |
                namespace != "kube-system" and
                annotations["glance/id"] == "Renovate" and
                ("glance/hide" in annotations || annotations["glance/show"] == "true")
          - <<: *apps-by-id
            title: Security
            parameters:
              show-if: |
                namespace != "kube-system" and
                annotations["glance/id"] == "Security" and
                ("glance/hide" in annotations || annotations["glance/show"] == "true")
          - <<: *apps-by-id
            title: Storage
            parameters:
              show-if: |
                namespace != "kube-system" and
                annotations["glance/id"] == "Storage" and
                ("glance/hide" in annotations || annotations["glance/show"] == "true")
          - <<: *apps-by-id
            title: System
            parameters:
              show-if: |
                namespace != "kube-system" and
                annotations["glance/id"] == "System" and
                ("glance/hide" in annotations || annotations["glance/show"] == "true")
          - <<: *apps-by-id
            title: Uncategorized
            parameters:
              show-if: |
                namespace != "kube-system" and
                !("glance/id" in annotations) and
                ("glance/hide" in annotations || annotations["glance/show"] == "true")

          - type: extension
            url: http://glance-k8s-extension:8080/extension/nodes
            allow-potentially-dangerous-html: true
            cache: 1s

          - type: bookmarks
            groups:
              - title: Infrastructure
                color: 200 50 50
                links:
                  - title: Cloudflare
                    url: https://dash.cloudflare.com/
                  - title: Pi-Hole (Unbound)
                    url: https://pihole.thesteamedcrab.com/admin/
                    icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/pi-hole-unbound.png
                  # - title: News page
                  #   url: https://glance.juno.moe/news
                  - title: Home-Ops Repo
                    url: https://github.com/rwlove/home-ops
              # - title: Git Cleaner
              #   url: https://gitcleaner.com
              # - title: GitHub Folder Download
              #   url: https://download-directory.github.io

              - title: Kubernetes
                color: 115 60 30
                links:
                  - title: k8s-at-home Search
                    url: https://nanne.dev/k8s-at-home-search/

              - title: DNS & Networking
                color: 180 60 45
                links:
                  - title: DNSChecker
                    url: https://dnschecker.org
                  - title: ViewDNS
                    url: https://viewdns.info
                  - title: BGP View
                    url: https://bgp.he.net

              # - title: Security Intelligence
              #   color: 347 70 35
              #   links:
              #     - title: Shodan
              #       url: https://shodan.io
              #     - title: GreyNoise
              #       url: https://greynoise.io
              #     - title: Intel X
              #       url: https://intelx.io
              #     - title: GrayHatWarfare
              #       url: https://grayhatwarfare.com

              # - title: Personal
              #   color: 160 50 50
              #   links:
              #     - title: Music (Squid)
              #       url: https://tidal.squid.wtf/
              #     - title: Diving Sites
              #       url: https://divesites.com
              #     - title: Selfhosted blog
              #       url: https://selfh.st
              - title: Utilities
                color: 270 50 50
                links:
                  # - title: Download book
                  #   url: https://z-lib.gd/
                  - title: Dashboard Icons
                    url: https://dashboardicons.com/

  - name: News
    head-widgets:
      - type: markets
        hide-header: true
        symbol-link-template: https://www.google.com/search?tbm=nws&q={SYMBOL}
        chart-link-template: https://www.tradingview.com/chart/?symbol={SYMBOL}
        markets:
          - symbol: VOO
            name: Vanguard S&P 500
          - symbol: ETH-USD
            name: Ethereum USD
            chart-link: https://www.tradingview.com/chart/?symbol=INDEX:ETHUSD
          - symbol: IBM
            name: IBM
          - symbol: BNMR
            name: Bitmine Immersion Technologies
    columns:
      - size: full
        widgets:
          - type: group
            widgets:
              # - type: hacker-news
              #   sort-by: best
              #   limit: 18
              #   collapse-after: 10
              - type: lobsters
                sort-by: hot
                limit: 18
                collapse-after: 10
              - type: reddit
                subreddit: selfhosted
                show-thumbnails: true
                sort-by: "top"
                limit: 15
                collapse-after: 10
                comments-url-template: "https://redlib.lol/{POST-PATH}"
              - type: reddit
                subreddit: kubernetes
                show-thumbnails: true
                sort-by: "top"
                limit: 15
                collapse-after: 10
                comments-url-template: "https://redlib.lol/{POST-PATH}"
              # - type: reddit
              #   subreddit: europe
              #   show-thumbnails: true
              #   sort-by: "top"
              #   limit: 15
              #   collapse-after: 10
              #   comments-url-template: "https://redlib.lol/{POST-PATH}"
              # - type: reddit
              #   subreddit: plex
              #   show-thumbnails: true
              #   sort-by: "top"
              #   limit: 15
              #   collapse-after: 10
              #   comments-url-template: "https://redlib.lol/{POST-PATH}"
              # - type: reddit
              #   subreddit: chatgpt
              #   show-thumbnails: true
              #   sort-by: "top"
              #   limit: 15
              #   collapse-after: 10
              #   comments-url-template: "https://redlib.lol/{POST-PATH}"
              - type: reddit
                subreddit: NonCredibleDefense
                show-thumbnails: true
                sort-by: "top"
                limit: 15
                collapse-after: 10
                comments-url-template: "https://redlib.lol/{POST-PATH}"
