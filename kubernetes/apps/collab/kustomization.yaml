---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: collab
components:
  - ../../components/alerts
  - ../../components/network-policy/baseline
  # default-deny re-enabled 2026-05-18 (Phase 3, 6th user-facing ns).
  # Pre-flight audit confirmed all 14 HTTPRoute backends + oauth2-proxy
  # pairs covered. zulip-memcached / rabbitmq covered by intra-ns. All
  # oauth2-proxy CNPs use envoy:10443 (PRs #11559/11562/11563). Hubble
  # drop alerting (PR #11574) active.
  - ../../components/network-policy/default-deny
resources:
  - ./namespace.yaml
  - ./atuin/ks.yaml
  - ./bentopdf/ks.yaml
  - ./glance/ks.yaml
  - ./glance-user/ks.yaml
  - ./it-tools/ks.yaml
  - ./kitchenowl/ks.yaml
  - ./medikeep/ks.yaml
  - ./nametag/ks.yaml
  - ./obsidian-couchdb/ks.yaml
  - ./open-webui/ks.yaml
  - ./paperless/ks.yaml
  - ./pump/ks.yaml
  - ./pump-cv/ks.yaml
  - ./searxng/ks.yaml
  # startpunkt-oauth2-proxy retired in favour of glance-user at
  # start.${SECRET_DOMAIN}. Directory remains on disk and the Authelia
  # client / 1P entry are intact; re-add to roll back.
  - ./swiparr/ks.yaml
  - ./zulip/ks.yaml
