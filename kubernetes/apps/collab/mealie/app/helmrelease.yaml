---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mealie
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      mealie:
        type: statefulset

        containers:
          app:
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: v3.17.0@sha256:d570139f1891346131d02f8e4d1853100ae4846474958ca6c68cfe1648058467

            env:
              BASE_URL: https://mealie.${SECRET_DOMAIN}
              ALLOW_SIGNUP: false
              API_DOCS: false
              SMTP_HOST: smtp-relay.home
              SMTP_PORT: 25
              SMTP_AUTH_STRATEGY: NONE
              SMTP_FROM_EMAIL: mealie@${SECRET_DOMAIN}
              # OIDC SSO via Authelia
              OIDC_AUTH_ENABLED: true
              OIDC_PROVIDER_NAME: Authelia
              OIDC_CONFIGURATION_URL: https://auth.${SECRET_DOMAIN}/.well-known/openid-configuration
              OIDC_CLIENT_ID: mealie
              # OIDC_CLIENT_SECRET via envFrom secret
              OIDC_AUTO_REDIRECT: false
              OIDC_SIGNUP_ENABLED: true
              OIDC_REMEMBER_ME: true
              OIDC_ADMIN_GROUP: lldap_admin
              OIDC_GROUPS_CLAIM: groups
            envFrom:
              - secretRef:
                  name: mealie-secret

            resources:
              requests:
                cpu: 100m
                memory: 800Mi
              limits:
                memory: 800Mi

    service:
      app:
        controller: mealie
        ports:
          http:
            port: &httpPort 9000

    route:
      main:
        annotations:
          glance/name: "Mealie"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/mealie.png"
          glance/id: "Collaboration"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *httpPort
    persistence:
      config:
        existingClaim: mealie-config-pvc
        globalMounts:
          - path: /app/data
