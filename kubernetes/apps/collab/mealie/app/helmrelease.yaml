---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mealie
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      main:
        type: statefulset

        containers:
          main:
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: v3.16.0@sha256:74496aed2c5055e3b7b6c4e1bb9b4f16b1f566601582b258a10bae851f19ac24

            env:
              ALLOW_SIGNUP: false
              API_DOCS: false
              BASE_URL: https://mealie.${SECRET_DOMAIN}
              SMTP_AUTH_STRATEGY: NONE
              SMTP_FROM_EMAIL: mealie@${SECRET_DOMAIN}
              # LDAP_AUTH_ENABLED: true
              # LDAP_SERVER_URL: "ldap://lldap.auth.svc.cluster.local:3890"
              # LDAP_TLS_INSECURE: true
              # LDAP_BIND_TEMPLATE: cn={},dc=thesteamedcrab,dc=com
              # LDAP_BASE_DN: dc=thesteamedcrab,dc=com
              # LDAP_ADMIN_FILTER: cn=admin,ou=people,dc=thesteamedcrab,dc=com

              SMTP_HOST: smtp-relay.home
              SMTP_PORT: 25
            resources:
              requests:
                cpu: 100m
                memory: 800Mi
              limits:
                memory: 800Mi

    service:
      main:
        controller: main
        ports:
          http:
            port: &httpPort 9000

    route:
      main:
        annotations:
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/mealie.png"
          glance/id: "Collaboration"

          glance/name: "Mealie"
          glance/show: "true"
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *httpPort
    persistence:
      config:
        existingClaim: mealie-config-pvc
        globalMounts:
          - path: /app/data
