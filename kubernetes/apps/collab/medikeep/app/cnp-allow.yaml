---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: medikeep-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: medikeep
  # Additive — default-deny is what triggers the lockdown; these rules
  # punch holes through it.
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # HTTPRoute on internal gateway → medikeep:8000 (React frontend).
    # The FastAPI port (8005) is in-pod only.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
  egress:
    # CNPG cluster postgres-medikeep in databases ns (Pattern B).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            cnpg.io/cluster: postgres-medikeep
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Paperless-ngx integration: medikeep dials the external paperless
    # FQDN, which split-horizon DNS resolves to the envoy LB IP. Cilium's
    # socket-lb rewrites the connect() to the envoy pod on its container
    # port 10443 BEFORE policy evaluation (per memory
    # project_cilium_l4_port_targetport.md), so the policy must allow the
    # envoy pod on its container port, NOT world:443 (which doesn't match
    # cluster LB IPs). Mirrors paperless's own OIDC egress rule.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "10443"
              protocol: TCP
