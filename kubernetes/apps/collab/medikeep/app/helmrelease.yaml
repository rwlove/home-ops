---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app medikeep
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      main:
        pod:
          securityContext:
            fsGroup: 999
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 999
            #runAsNonRoot: true
            runAsUser: 999
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3.0@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf

            envFrom: &envFrom
              - secretRef:
                  name: medikeep

        containers:
          main:
            image:
              repository: ghcr.io/afairgiant/medikeep
              tag: v0.63.0@sha256:876f42ba911b5e09603e6382403a095586ec40af02a23dd239d6bf53d2a9c12b

            env:
              LOG_LEVEL: "info"
              SSO_ENABLED: "false"
              PUID: 999
              PGID: 999
              MPLCONFIGDIR: /app/matplotlib

            envFrom: *envFrom
            probes:
              startup:
                enabled: false


            resources:
              requests:
                cpu: 15m
                memory: 320M
              limits:
                memory: 320M

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    service:
      main:
        controller: main
        ports:
          react:
            port: &reactPort 8000
          fast:
            port: &fastAPI 8005

    route:
      main:
        annotations:
          glance/name: "MediKeep"
          glance/show: "true"
          # glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/paperless-ngx.png"
          glance/id: "Collaboration"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *reactPort

    persistence:
      app:
        existingClaim: medikeep-data-pvc

    serviceMonitor:
      main:
        serviceName: *app
        endpoints:
          - port: metrics
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s
