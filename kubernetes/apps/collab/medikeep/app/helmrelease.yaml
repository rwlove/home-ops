---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app medikeep
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template

  values:
    controllers:
      main:
        type: statefulset

        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3.0@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf

            envFrom: &envFrom
              - secretRef:
                  name: medikeep

        containers:
          main:
            image:
              repository: ghcr.io/afairgiant/medikeep
              tag: v0.61.1@sha256:c9722e0e8b6e601b09081090854fc7a2163d497529763641e772a251f45ca050

            env:
              LOG_LEVEL: "info"
              SSO_ENABLED: "false"
              PUID: 999
              PGID: 999
              MPLCONFIGDIR: /app/matplotlib

            envFrom: *envFrom

            resources:
              requests:
                cpu: 15m
                memory: 320M
              limits:
                memory: 320M

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

            probes:
              startup:
                enabled: false

        pod:
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
            fsGroup: 999
            fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        ports:
          react:
            port: &reactPort 8000
          fast:
            port: &fastAPI 8005

    route:
      main:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *reactPort
        annotations:
          glance/name: "MediKeep"
          glance/show: "true"
          #glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/paperless-ngx.png"
          glance/id: "Collaboration"

    serviceMonitor:
      main:
        serviceName: *app
        endpoints:
          - port: metrics
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s

    persistence:
      logs:
        type: emptyDir
        globalMounts:
          - path: /app/logs
      uploads:
        type: emptyDir
        globalMounts:
          - path: /app/uploads
      backups:
        type: emptyDir
        globalMounts:
          - path: /app/backups
      matplotlib:
        type: emptyDir
        globalMounts:
          - path: /app/matplotlib
