---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nametag
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3.0@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
            envFrom: &envFrom
              - secretRef:
                  name: nametag-secret

        containers:
          main:
            image:
              repository: ghcr.io/mattogodoy/nametag
              tag: 0.42.2@sha256:214274e7ad48b7f83ec86c42778108b00ad5aceae9011db9d4fbc7b89a347321
            env:
              LOG_LEVEL: debug
              NEXTAUTH_URL: http://localhost:3000
              NEXT_PUBLIC_APP_URL: http://localhost:3000
              REDIS_URL: redis://dragonfly.databases.svc.cluster.local:6379/0 # redis://:${REDIS_PASSWORD}@redis:6379

            envFrom: *envFrom

            resources:
              requests:
                cpu: 15m
                memory: 200Mi
              limits:
                memory: 200Mi

    service:
      main:
        controller: main
        ports:
          http:
            port: &httpPort 3000

    route:
      main:
        annotations:
          glance/name: "Nametag"
          glance/show: "true"
          #glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/paperless-ngx.png"
          glance/id: "Collaboration"
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *httpPort
