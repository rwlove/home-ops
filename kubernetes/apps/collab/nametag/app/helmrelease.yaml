---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nametag
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      nametag:
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
            envFrom: &envFrom
              - secretRef:
                  name: nametag-secret

        containers:
          app:
            image:
              repository: ghcr.io/mattogodoy/nametag
              tag: 0.48.1@sha256:fce66be0c91742ffa2e467dfc9b6bff93ea44fd6e54ef16abce38aae1e5c861f
            env:
              LOG_LEVEL: debug
              NEXTAUTH_URL: http://localhost:3000
              NEXT_PUBLIC_APP_URL: http://localhost:3000
              REDIS_URL: redis://dragonfly.databases.svc.cluster.local:6379/0 # redis://:${REDIS_PASSWORD}@redis:6379

            envFrom: *envFrom

            resources:
              requests:
                cpu: 15m
                memory: 200Mi
              limits:
                memory: 200Mi

    service:
      app:
        controller: nametag
        ports:
          http:
            port: &httpPort 3000

    route:
      app:
        annotations:
          glance/name: "Nametag"
          glance/show: "true"
          # glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/paperless-ngx.png"
          glance/id: "Collaboration"
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *httpPort
