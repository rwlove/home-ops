---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app open-webui
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      open-webui:
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: v0.9.2

            env:
              OLLAMA_BASE_URL: http://ollama.ai.svc.cluster.local:11434
              ENABLE_RAG_WEB_SEARCH: true
              RAG_WEB_SEARCH_ENGINE: searxng
              SEARXNG_QUERY_URL: http://searxng.collab.svc.cluster.local:8080/search?q=<query>
              AUDIO_OPENAI_API_BASE_URL: https://piper.${SECRET_DOMAIN}/v1
              AUDIO_OPENAI_API_KEY: sk-111111111111 # fake key needed to make ui happy

            resources:
              requests:
                cpu: 15m
                memory: 3Gi
              limits:
                memory: 3Gi

    service:
      app:
        controller: open-webui
        ports:
          http:
            port: &httpPort 8080

    route:
      main:
        annotations:
          glance/name: "Open Web UI"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/open-webui.png"
          glance/id: "Collaboration"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *httpPort
    persistence:
      config:
        existingClaim: open-webui-data-pvc
        globalMounts:
          - path: /app/backend/data
