---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app open-webui
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      open-webui:
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: v0.9.5

            env:
              # Multi-endpoint: Spark (qwen2.5:32b) is the new default,
              # P40 (qwen2.5:7b) remains user-selectable per
              # conversation. Open WebUI parses this as `;`-separated
              # endpoints and exposes each model under its own provider
              # label in the model picker. First entry is the default
              # for new chats.
              OLLAMA_BASE_URLS: http://ollama-spark.ai.svc.cluster.local:11434;http://ollama.ai.svc.cluster.local:11434
              # langgraph-agents exposes an OpenAI-compatible surface; each
              # agent id is registered as a model. The key is a placeholder —
              # the langgraph-agents Service has no auth (cluster-internal only).
              OPENAI_API_BASE_URLS: http://langgraph-agents.ai.svc.cluster.local:8765/v1
              OPENAI_API_KEYS: sk-langgraph-agents-cluster-internal
              ENABLE_RAG_WEB_SEARCH: true
              RAG_EMBEDDING_ENGINE: ollama
              RAG_EMBEDDING_MODEL: nomic-embed-text
              # Cross-encoder reranker — runs in-process via sentence-transformers
              # on CPU. Adds ~2.5GiB to the pod's resident set (model weights);
              # latency is ~hundreds of ms per batch which is fine for homelab
              # RAG volume. v0.9.5 also supports external rerank (TEI etc.) via
              # RAG_RERANKING_ENGINE=external + RAG_EXTERNAL_RERANKER_URL — but
              # the P40 is Pascal (sm_61) so no prebuilt TEI image fits without
              # a custom Pascal build. Revisit if Spark lands.
              RAG_RERANKING_MODEL: BAAI/bge-reranker-v2-m3
              RAG_TOP_K_RERANKER: "5"
              RAG_WEB_SEARCH_ENGINE: searxng
              QDRANT_URI: http://qdrant.databases.svc.cluster.local:6333
              SEARXNG_QUERY_URL: http://searxng.collab.svc.cluster.local:8080/search?q=<query>
              VECTOR_DB: qdrant
              AUDIO_OPENAI_API_BASE_URL: https://piper.${SECRET_DOMAIN}/v1
              AUDIO_OPENAI_API_KEY: sk-111111111111 # fake key needed to make ui happy
              # OIDC SSO via Authelia
              ENABLE_OAUTH_SIGNUP: true
              OAUTH_MERGE_ACCOUNTS_BY_EMAIL: true
              OAUTH_PROVIDER_NAME: Authelia
              OAUTH_CLIENT_ID: open-webui
              # OAUTH_CLIENT_SECRET via envFrom secret
              OPENID_PROVIDER_URL: https://auth.${SECRET_DOMAIN}/.well-known/openid-configuration
              OPENID_REDIRECT_URI: https://open-webui.${SECRET_DOMAIN}/oauth/oidc/callback
              OAUTH_SCOPES: "openid email profile groups"
              OAUTH_USERNAME_CLAIM: preferred_username
              OAUTH_EMAIL_CLAIM: email
              # First user becomes admin automatically; promote others via UI
              WEBUI_URL: https://open-webui.${SECRET_DOMAIN}
              # External tool servers — discovered + exposed as LLM tools
              TOOL_SERVER_CONNECTIONS: |-
                [
                  {
                    "url": "http://holmesgpt.observability.svc.cluster.local:8080/openapi.json",
                    "type": "openapi",
                    "auth_type": "none",
                    "config": {"enable": true},
                    "info": {
                      "id": "holmesgpt",
                      "name": "HolmesGPT",
                      "description": "Cluster diagnostics agent — answers questions about pod state, logs, events, and Flux resources"
                    }
                  },
                  {
                    "url": "http://mcp-gateway.mcp-system.svc.cluster.local:8080/mcp",
                    "type": "mcp",
                    "auth_type": "none",
                    "config": {"enable": true},
                    "info": {
                      "id": "lovenet-gateway",
                      "name": "Lovenet MCP Gateway",
                      "description": "Aggregated MCP tools: kubectl, grafana, ha, paperless, prometheus, frigate, omada, netbox, *arr, searxng, memory (knowledge-graph search across all agents)"
                    }
                  }
                ]
            envFrom:
              - secretRef:
                  name: open-webui-secret

            resources:
              requests:
                cpu: 15m
                memory: 1Gi
              limits:
                memory: 6Gi

    service:
      app:
        controller: open-webui
        ports:
          http:
            port: &httpPort 8080

    route:
      main:
        annotations:
          glance/name: "Open Web UI"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/open-webui.png"
          glance/id: "Collaboration"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *httpPort
    persistence:
      config:
        existingClaim: open-webui-data-pvc
        globalMounts:
          - path: /app/backend/data
