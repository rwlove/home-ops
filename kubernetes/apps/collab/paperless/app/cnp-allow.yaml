---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: paperless-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: paperless
  # Additive — default-deny is what triggers the lockdown; these rules
  # punch holes through it.
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # HTTPRoute on internal gateway → paperless:8000. paperless-ngx
    # handles OIDC natively (django-allauth).
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # Cross-ns: ai/paperless-ai enriches docs via paperless's REST API
    # (already declared on paperless-ai's egress side; this is the
    # ingress counterpart).
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: ai
            app.kubernetes.io/name: paperless-ai
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # Cross-ns: home/windmill-workers run the Spark-unblocks-RAG
    # ingest workflows (paperless-rag-ingest, paperless-rag-tombstone
    # — see PR #11774). The workers' egress side already permits
    # this connection; this is the symmetric ingress entry.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: home
            app.kubernetes.io/name: windmill-workers
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # Cross-ns: paperless-mcp's PAPERLESS_URL points at the external
    # FQDN which traverses envoy back to paperless. Internal callers
    # speaking directly to paperless:8000 (if any are added later)
    # would also land here.
  egress:
    # CNPG cluster postgres-paperless in databases ns (Pattern B).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            cnpg.io/cluster: postgres-paperless
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Redis broker via shared dragonfly (PAPERLESS_REDIS).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            app.kubernetes.io/name: dragonfly
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
    # OIDC discovery + token exchange against Authelia (allauth
    # openid_connect provider, server_url = auth.${SECRET_DOMAIN}).
    # paperless is configured with the external issuer URL, so every
    # OIDC request hits split-horizon DNS which returns the envoy LB
    # IP (10.45.0.13). Cilium's socket-lb rewrites the connect() to
    # the envoy pod IP + targetPort 10443 BEFORE policy evaluation
    # (per memory project_cilium_l4_port_targetport.md), so the policy
    # must allow the envoy pod on its container port, NOT world:443
    # (which doesn't match cluster LB IPs) and NOT authelia:9091
    # directly (which paperless never connects to because of how it's
    # configured). Mirrors pump-oauth2-proxy PR #11559.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "10443"
              protocol: TCP
