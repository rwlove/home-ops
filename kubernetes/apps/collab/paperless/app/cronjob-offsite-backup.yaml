---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: paperless-offsite-backup
spec:
  schedule: "0 4 * * 6"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 5
      template:
        metadata:
          labels:
            # Used by paperless-offsite-backup-allow CNP egress selector
            app.kubernetes.io/name: paperless-offsite-backup
        spec:
          restartPolicy: OnFailure
          # paperless-library-pvc is RWO Longhorn — multi-attach is single-node
          # only. Pin to whatever node the paperless statefulset is on.
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: paperless
                  topologyKey: kubernetes.io/hostname
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
          containers:
            - name: rclone
              image: rclone/rclone:1.74.3
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -euo pipefail
                  echo "===== Backup started: $(date -u) ====="
                  echo "----- /library/media/documents → crypt:media (excluding regenerable thumbnails) -----"
                  rclone sync /library/media/documents crypt:media \
                    --exclude "/thumbnails/**" \
                    --transfers=4 \
                    --checkers=8 \
                    --s3-storage-class=STANDARD \
                    --stats=2m \
                    --stats-one-line \
                    --log-level INFO
                  echo "----- garage:postgres-paperless-backup → crypt:db (CNPG/Barman snapshots + WAL) -----"
                  rclone sync garage:postgres-paperless-backup crypt:db \
                    --transfers=4 \
                    --checkers=8 \
                    --s3-storage-class=STANDARD \
                    --stats=2m \
                    --stats-one-line \
                    --log-level INFO
                  echo "===== Backup complete: $(date -u) ====="
              env:
                - name: RCLONE_CONFIG
                  value: /config/rclone.conf
                - name: TZ
                  value: America/New_York
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  memory: 1Gi
              volumeMounts:
                - name: rclone-config
                  mountPath: /config
                  readOnly: true
                - name: library
                  mountPath: /library
                  readOnly: true
          volumes:
            - name: rclone-config
              secret:
                secretName: paperless-offsite-backup-secret
                items:
                  - key: rclone.conf
                    path: rclone.conf
                    mode: 0400
            - name: library
              persistentVolumeClaim:
                claimName: paperless-library-pvc
                readOnly: true
