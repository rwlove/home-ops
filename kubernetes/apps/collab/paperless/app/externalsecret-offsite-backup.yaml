---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless-offsite-backup
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: paperless-offsite-backup-secret
    creationPolicy: Owner
    template:
      data:
        rclone.conf: |
          [s3]
          type = s3
          provider = AWS
          access_key_id = {{ .AWS_ACCESS_KEY_ID }}
          secret_access_key = {{ .AWS_SECRET_ACCESS_KEY }}
          region = us-east-1
          location_constraint = us-east-1
          acl = private
          server_side_encryption = AES256

          [crypt]
          type = crypt
          remote = s3:lovenet-paperless-offsite-backup
          filename_encryption = standard
          directory_name_encryption = true
          password = {{ .RCLONE_CRYPT_PASSWORD }}
          password2 = {{ .RCLONE_CRYPT_PASSWORD2 }}

          # Source for shipping CNPG/Barman backups offsite — Garage S3 endpoint
          # exposed in-cluster. Credentials read the postgres-paperless-backup
          # bucket that CNPG/barman-cloud writes to.
          [garage]
          type = s3
          provider = Other
          access_key_id = {{ .GARAGE_ACCESS_KEY_ID }}
          secret_access_key = {{ .GARAGE_SECRET_ACCESS_KEY }}
          endpoint = http://garage.storage.svc.cluster.local:3900
          region = garage
  dataFrom:
    - extract:
        key: paperless-offsite-backup
