---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pump-cv
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  install:
    disableWait: true
  upgrade:
    disableWait: true
  values:
    controllers:
      pump-cv:
        annotations:
          reloader.stakater.com/auto: "true"

        # Temporarily on CPU (P40 sm_61 incompatible with current PyTorch
        # wheel). When the image is rebuilt with sm_61 support, re-add:
        #   pod.nodeSelector.nvidia.com/gpu.present: "true"
        # and the nvidia.com/gpu: 1 resource req+limit below.

        initContainers:
          # pump-cv config.py does not interpolate env vars in YAML, so
          # the configmap stores ${REOLINK_*} placeholders and we render
          # them once at pod start into the shared emptyDir.
          config-render:
            image:
              repository: ghcr.io/dmfrey/bash
              tag: 5.2.26-alpine3.20
            command:
              - "/usr/local/bin/bash"
              - -c
              - |
                envsubst < /config-template/default.yaml > /config/default.yaml
                exit 0
            envFrom:
              - secretRef:
                  name: pump-cv-secret

        containers:
          pump-cv:
            image:
              repository: ghcr.io/rwlove/pump-cv
              tag: v0.3.0@sha256:7aa615bedd68257c359c9512a772a80be5a49e442798313cab195b955e7d01f6

            # Image's default ENTRYPOINT calls bare `python`, which doesn't
            # exist in PATH (only python3 is installed). Use the console-script
            # entry point that pyproject.toml declares: pump-cv → pump_cv.main:run.
            # The package isn't installed site-wide (only the egg-info exists),
            # so PYTHONPATH=/app makes pump_cv importable.
            #
            # cd /cache so ultralytics downloads/loads the model from the
            # persistent volume (avoids a 50 MB re-pull on every pod restart).
            command: ["sh", "-c", "cd /cache && exec pump-cv"]

            env:
              PYTHONPATH: /app
              PUMP_API_BASE_URL: http://pump-api:8851
              # Read the rendered config that the init container produced.
              PUMP_CV_CONFIG: /config/default.yaml
              # Ultralytics writes its settings.json here; default
              # /root/.config/Ultralytics isn't writable in this image.
              YOLO_CONFIG_DIR: /cache/.config/Ultralytics

            envFrom:
              - secretRef:
                  name: pump-cv-secret

            resources:
              requests:
                # Bumped from 100m for CPU-mode yolov8m inference; ~3-5 fps
                # on a 640×480 substream uses 2-3 cores when active.
                cpu: 2000m
                memory: 1Gi
              limits:
                memory: 2Gi

    persistence:
      config-template:
        type: configMap
        name: pump-cv-configmap
        advancedMounts:
          pump-cv:
            config-render:
              - path: /config-template/default.yaml
                subPath: default.yaml
                readOnly: true

      config:
        type: emptyDir
        medium: Memory
        advancedMounts:
          pump-cv:
            config-render:
              - path: /config
            pump-cv:
              - path: /config
                readOnly: true

      # Persistent cache for the yolov8m-pose.pt weights (~51 MB) + the
      # ultralytics settings.json. Survives pod restarts so we don't
      # re-download from github releases every time pump-cv reschedules.
      cache:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 2Gi
        storageClass: ceph-block
        advancedMounts:
          pump-cv:
            pump-cv:
              - path: /cache
