---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pump-cv
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      pump-cv:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          pump-cv:
            image:
              repository: ghcr.io/rwlove/pump-cv
              tag: v0.2.0@sha256:d0009b94d705ab202f5150b9881221e7955556afb54a7d31dde86df1433e8e69

            env:
              PUMP_API_BASE_URL: http://pump-api:8851
              PUMP_CV_CONFIG: /app/configs/default.yaml

            envFrom:
              - secretRef:
                  name: pump-cv-secret

            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 512Mi

    persistence:
      config-file:
        type: configMap
        name: pump-cv-configmap
        globalMounts:
          - path: /app/configs/default.yaml
            subPath: default.yaml
            readOnly: true
