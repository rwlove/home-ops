---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pump-cv
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  install:
    disableWait: true
  upgrade:
    disableWait: true
  values:
    controllers:
      pump-cv:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          pump-cv:
            image:
              repository: ghcr.io/rwlove/pump-cv
              tag: v0.3.0@sha256:7aa615bedd68257c359c9512a772a80be5a49e442798313cab195b955e7d01f6

            # Image's default ENTRYPOINT calls bare `python`, which doesn't
            # exist in PATH (only python3 is installed). Use the console-script
            # entry point that pyproject.toml declares: pump-cv → pump_cv.main:run.
            # The package isn't installed site-wide (only the egg-info exists),
            # so PYTHONPATH=/app makes pump_cv importable. (app-template chart
            # doesn't expose workingDir, so we use PYTHONPATH instead.)
            command: ["pump-cv"]

            env:
              PYTHONPATH: /app
              PUMP_API_BASE_URL: http://pump-api:8851
              PUMP_CV_CONFIG: /app/configs/default.yaml

            envFrom:
              - secretRef:
                  name: pump-cv-secret

            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 512Mi

    persistence:
      config-file:
        type: configMap
        name: pump-cv-configmap
        globalMounts:
          - path: /app/configs/default.yaml
            subPath: default.yaml
            readOnly: true
