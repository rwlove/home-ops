---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pump-cv
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  install:
    disableWait: true
  upgrade:
    disableWait: true
  values:
    controllers:
      pump-cv:
        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          # Pinned to Spark/GB10 (Blackwell, arm64) after the multi-arch
          # rebase (pump-cv v0.5.0 / pump-cv-base on nvcr.io/nvidia/pytorch).
          # Previously bound to worker8 (Pascal P40, amd64); the cu121
          # Pascal pin was dropped along with the base swap. One-way
          # cutover — the new image won't run on P40 (sm_61 isn't in
          # TORCH_CUDA_ARCH_LIST for the nvcr.io stack).
          nodeSelector:
            node-role.kubernetes.io/gpu: blackwell

          tolerations:
            # Spark is tainted kubernetes.io/arch=arm64:NoSchedule to
            # keep amd64-only workloads off it. pump-cv v0.5.0 is
            # multi-arch (linux/arm64 + linux/amd64) so tolerate
            # explicitly.
            - key: kubernetes.io/arch
              operator: Equal
              value: arm64
              effect: NoSchedule
            - key: nvidia.com/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule

        initContainers:
          # pump-cv config.py does not interpolate env vars in YAML, so
          # the configmap stores ${REOLINK_*} placeholders and we render
          # them once at pod start into the shared emptyDir.
          #
          # Image notes: prior `ghcr.io/dmfrey/bash:5.2.26-alpine3.20`
          # is amd64-only, which exec-format-errors on Spark/arm64.
          # Use the multi-arch official alpine image and `apk add
          # gettext` to get envsubst at init time. Adds ~3-5s on
          # first init for the apk fetch; not worth keeping a separate
          # baked image just for envsubst.
          config-render:
            image:
              repository: docker.io/library/alpine
              tag: "3.20"
            command:
              - sh
              - -c
              - |
                set -eu
                apk add --no-cache gettext
                envsubst < /config-template/default.yaml > /config/default.yaml
                # Ensure ultralytics' settings dir exists; it doesn't
                # auto-create parents so on a fresh PVC the first run
                # warns "is not writable" and falls back to /tmp.
                mkdir -p /cache/.config/Ultralytics
                # Calibration wizard writes captures + final .npz here;
                # pump-cv reads .npz files at startup to decide whether
                # to enter needs_calibration state. Pre-create so the
                # first capture doesn't race the parent dir into existence.
                mkdir -p /cache/calibration/captures
            envFrom:
              - secretRef:
                  name: pump-cv-secret

        containers:
          pump-cv:
            image:
              repository: ghcr.io/rwlove/pump-cv
              tag: v0.5.0@sha256:fed0360395bd65f86a7bde12183303a96fe2bbb6de0d388ce5d2ee21a6c03d38

            # Image's default ENTRYPOINT calls bare `python`, which doesn't
            # exist in PATH (only python3 is installed). Use the console-script
            # entry point that pyproject.toml declares: pump-cv → pump_cv.main:run.
            # The package isn't installed site-wide (only the egg-info exists),
            # so PYTHONPATH=/app makes pump_cv importable.
            #
            # cd /cache so ultralytics downloads/loads the model from the
            # persistent volume (avoids a 50 MB re-pull on every pod restart).
            command: ["sh", "-c", "cd /cache && exec pump-cv"]

            env:
              PYTHONPATH: /app
              PUMP_API_BASE_URL: http://pump-api:8851
              # Read the rendered config that the init container produced.
              PUMP_CV_CONFIG: /config/default.yaml
              # Per-set clip mp4s land here (shared with pump via the
              # pump-clips-pvc RWX volume; pump serves them at /clips/).
              PUMP_CV_CLIPS_DIR: /clips
              # Ultralytics writes its settings.json here; it appends an
              # 'Ultralytics' subdirectory to whatever is set, so giving
              # it /cache/.config (not /cache/.config/Ultralytics) lands
              # the file at /cache/.config/Ultralytics/settings.json.
              YOLO_CONFIG_DIR: /cache/.config
              # Force RTSP over TCP — UDP transport on the security VLAN
              # drops occasional packets and noisy h264 decode warnings
              # spam the log. OpenCV's FFmpeg backend reads this env var
              # at VideoCapture time; semicolon-separated key;value.
              OPENCV_FFMPEG_CAPTURE_OPTIONS: "rtsp_transport;tcp"

            envFrom:
              - secretRef:
                  name: pump-cv-secret

            resources:
              requests:
                cpu: 100m
                memory: 1Gi
                nvidia.com/gpu: 1
              limits:
                memory: 2Gi
                nvidia.com/gpu: 1

    # In-cluster Service so pump can proxy /api/cv/* (admin panel,
    # camera list, live snapshot polling) to pump-cv's healthd.
    service:
      app:
        controller: pump-cv
        ports:
          http:
            port: 8080

    persistence:
      config-template:
        type: configMap
        name: pump-cv-configmap
        advancedMounts:
          pump-cv:
            config-render:
              - path: /config-template/default.yaml
                subPath: default.yaml
                readOnly: true

      config:
        type: emptyDir
        medium: Memory
        advancedMounts:
          pump-cv:
            config-render:
              - path: /config
            pump-cv:
              - path: /config
                readOnly: true

      # Persistent cache for the yolov8m-pose.pt weights (~51 MB) + the
      # ultralytics settings.json. Survives pod restarts so we don't
      # re-download from github releases every time pump-cv reschedules.
      cache:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 2Gi
        storageClass: ceph-block
        advancedMounts:
          pump-cv:
            config-render:
              - path: /cache
            pump-cv:
              - path: /cache

      # Per-set clip mp4s. Shared with pump (which serves /clips/<...>);
      # PVC declared in clips-pvc.yaml so both apps can reference it by
      # name (existingClaim).
      clips:
        type: persistentVolumeClaim
        existingClaim: pump-clips-pvc
        advancedMounts:
          pump-cv:
            pump-cv:
              - path: /clips
