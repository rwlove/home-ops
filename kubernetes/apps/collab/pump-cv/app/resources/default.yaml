# pump-cv runtime config (mounted from configmap, then envsubst'd by the
# init container into /config/default.yaml — pump-cv reads from there).
# ${REOLINK_USER}/${REOLINK_PASSWORD} are sourced from pump-cv-secret.
cameras:
  # Multi-cam fusion: both cameras need .npz calibration files. pump-cv
  # boots into needs_calibration state when 2+ cameras are configured
  # and any path is missing — the wall page wizard captures pairs and
  # writes the .npz files. Files persist on the cache PVC so a pod
  # restart skips the wizard.
  - name: gym-front
    rtsp_url: rtsp://${REOLINK_USER}:${REOLINK_PASSWORD}@gym-front:554/h264Preview_01_sub
    calibration_path: /cache/calibration/gym-front.npz
  - name: gym-back
    rtsp_url: rtsp://${REOLINK_USER}:${REOLINK_PASSWORD}@gym-back:554/h264Preview_01_sub
    calibration_path: /cache/calibration/gym-back.npz

pose:
  backend: yolo
  model: yolov8m-pose.pt
  image_size: 640
  # pump-cv image v0.3.2+ pins torch to 2.5.1+cu121 specifically so the
  # cu121 wheel's sm_61 (Pascal) support stays in. Worker8's Tesla P40
  # is sm_61 — runs on cuda:0 with this image.
  device: cuda:0

rep:
  min_amplitude_deg: 25
  min_period_s: 0.6
  smoothing_window: 9

set_boundary:
  quiet_seconds: 25

pump:
  base_url: http://pump-api:8851
  request_timeout_s: 10

confidence_threshold: 0.75
