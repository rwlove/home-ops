# pump-cv runtime config (mounted from configmap, then envsubst'd by the
# init container into /config/default.yaml — pump-cv reads from there).
# ${REOLINK_USER}/${REOLINK_PASSWORD} are sourced from pump-cv-secret.
cameras:
  - name: gym-front
    rtsp_url: rtsp://${REOLINK_USER}:${REOLINK_PASSWORD}@gym-front:554/h264Preview_01_sub

pose:
  backend: yolo
  model: yolov8m-pose.pt
  image_size: 640
  # Tesla P40 on worker8 is sm_61 (Pascal); current PyTorch wheel in
  # pump-cv targets sm_75+ so cuda:0 errors with "GET was unable to find
  # an engine to execute this computation" on every inference.
  # Run on CPU until the image is rebuilt with a sm_61-compatible
  # PyTorch (cu121 or older); restore to cuda:0 after that.
  device: cpu

rep:
  min_amplitude_deg: 25
  min_period_s: 0.6
  smoothing_window: 9

set_boundary:
  quiet_seconds: 25

pump:
  base_url: http://pump-api:8851
  request_timeout_s: 10

confidence_threshold: 0.75
