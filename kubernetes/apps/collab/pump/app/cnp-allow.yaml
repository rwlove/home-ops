---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: pump-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: pump
  # Additive — default-deny is what triggers the lockdown; these rules
  # punch holes through it. Inbound rides via the internal gateway
  # (extAuth SecurityPolicy, #12767). pump-cv → pump-api:8851 is
  # same-ns (baseline allow-intra-namespace).
  enableDefaultDeny:
    egress: false
    ingress: false
  egress:
    # CNPG cluster postgres-pump in databases ns (Pattern B).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            cnpg.io/cluster: postgres-pump
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # EMQX broker in home ns — the treadmill cardio consumer subscribes to
    # the Z-Wave smart-plug wattage zwave-js-ui publishes here (1883).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: home
            app.kubernetes.io/name: emqx
      toPorts:
        - ports:
            - port: "1883"
              protocol: TCP
  # Intra-ns pump-cv:8080 (PUMP_CV_URL admin/preview proxy) is
  # covered by baseline allow-intra-namespace.
  ingress:
    # Internal Gateway → pump pod :8080, two paths:
    # - route.ingest (pump-ingest.${SECRET_DOMAIN}/api/weight): identity
    #   gating at the app layer via WEIGHT_INGEST_KEY.
    # - frontend UI (pump.${SECRET_DOMAIN}): admin-only extAuth
    #   SecurityPolicy at the gateway (#12767, oauth2-proxy retired).
    # The Gateway terminates TLS; source IP at the pod is the Gateway
    # pod, not the original client.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
