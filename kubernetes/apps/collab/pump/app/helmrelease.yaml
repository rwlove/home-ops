---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pump
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      pump:
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec

            envFrom: &envFrom
              - secretRef:
                  name: pump-secret
        # trigger renovate
        containers:
          pump:
            image:
              repository: ghcr.io/rwlove/pump
              tag: v0.0.102@sha256:2d38aa15db713fab72d8d614fd509ba22de41a66bd6522adf6f9ec1a25ec6c3b

            env:
              # Activates the /api/cv/* proxy in pump (see internal/web/exercise.go).
              # The wall page's live camera previews and the admin panel both
              # depend on this being reachable.
              PUMP_CV_URL: http://pump-cv:8080
              # Static-serve the per-set clip mp4s pump-cv writes here. Shared
              # RWX volume (pump-clips-pvc, declared in pump-cv/app/clips-pvc.yaml).
              PUMP_CLIPS_DIR: /clips
              # Treadmill cardio auto-capture. PUMP subscribes to the gym
              # treadmill's Z-Wave metering smart plug — its wattage is
              # published to EMQX by zwave-js-ui (no Home Assistant in the
              # path) — detects each workout, and logs it as a cardio session.
              # Credentials TREADMILL_MQTT_USERNAME/PASSWORD come from
              # pump-secret (1Password "emqx" item). Threshold matches HA's
              # binary_sensor.treadmill helper (threshold upper=100 W,
              # hysteresis 0 on sensor.treadmill_electric_w_value).
              TREADMILL_MQTT_ENABLED: "true"
              TREADMILL_MQTT_BROKER: tcp://emqx-headless.home.svc.cluster.local:1883
              TREADMILL_MQTT_TOPIC: zwave/Gym/Treadmill/50/0/value/66049
              TREADMILL_WATTS_THRESHOLD: "100"

            envFrom:
              - secretRef:
                  name: pump-secret

            resources:
              requests:
                cpu: 15m
                memory: 128M
              limits:
                memory: 128M

    service:
      frontend:
        ports:
          http:
            port: &httpPort 8080
      api:
        ports:
          http:
            port: &apiPort 8851
            targetPort: 8080

    route:
      frontend:
        annotations:
          glance/name: "PUMP"
          glance/show: "true"
          glance/id: "Collaboration"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          # Inbound auth is enforced at the gateway by the extAuth
          # SecurityPolicy (securitypolicy.yaml, admin-only via Authelia).
          # pump itself ships with no inbound APIKeyMiddleware as of
          # v0.0.83+ — this route must never lose its SecurityPolicy.
          - backendRefs:
              - kind: Service
                name: pump-frontend
                port: 8080

      # Off-cluster ingest path. Bypasses gateway extAuth and goes straight
      # to pump-api:8851. Scoped by path match to /api/weight and POST
      # /api/health — all other /api/* endpoints on this hostname 404.
      # App-side auth is WEIGHT_INGEST_KEY / HEALTH_INGEST_KEY (env from
      # pump-secret), enforced by the weightIngestAuth / healthIngestAuth
      # middleware on the respective POST routes (pump v0.0.91+ / v0.0.93+).
      # Callers: the bt-scale ESPHome device (weight) and the Android
      # Health Connect HC Webhook bridge on Rob's S26 (health).
      ingest:
        hostnames:
          - "pump-ingest.${SECRET_DOMAIN}"
        # Attached to BOTH http:80 and https:443 on the internal Gateway.
        # NOTE: the Gateway's http listener redirects to HTTPS (301), so in
        # practice only HTTPS is served. The bt-scale ESPHome firmware was
        # originally HTTP-only because MbedTLS crashed on the M5 Atom (320 KB
        # RAM / ~4 KB BLE task stack). The firmware was fixed in 2026-05-26:
        #   - sram1_as_iram: true (+40 KB IRAM headroom)
        #   - deferred post_weight_to_pump script (handshake runs on main loop)
        # The device now posts to https:// without crashing. Auth enforced at
        # the app layer via WEIGHT_INGEST_KEY.
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
          - name: internal
            namespace: network
            sectionName: http
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /api/weight
            backendRefs:
              - kind: Service
                name: pump-api
                port: 8851
          # Wearable metrics from Android Health Connect. Scoped to POST so
          # GET /api/health (unauthenticated health-record read) is NOT
          # reachable off-cluster — tighter than the weight rule above
          # because health data is more sensitive.
          - matches:
              - path:
                  type: PathPrefix
                  value: /api/health
                method: POST
            backendRefs:
              - kind: Service
                name: pump-api
                port: 8851

    persistence:
      # Per-set clip mp4s written by pump-cv. Same RWX volume on both
      # apps; declared in collab/pump-cv/app/clips-pvc.yaml.
      clips:
        type: persistentVolumeClaim
        existingClaim: pump-clips-pvc
        advancedMounts:
          pump:
            pump:
              - path: /clips
