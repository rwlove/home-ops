---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pump
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      api:
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3.0@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf

            envFrom: &envFrom
              - secretRef:
                  name: pump-secret

        containers:
          api:
            image:
              repository: ghcr.io/rwlove/pump-api
              tag: v0.8@sha256:be68088d5f78a342c804bfcbf4ef8df15a3d47469ccac018c6c753890ed6c117

            envFrom:
              - secretRef:
                  name: pump-secret

            resources:
              requests:
                cpu: 15m
                memory: 128M
              limits:
                memory: 128M

      frontend:
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        containers:
          frontend:
            image:
              repository: ghcr.io/rwlove/pump-frontend
              tag: v0.8@sha256:538241cc8cf72a0495f939e14be70ff8bd1a801240931bf7ecd1014b47128c1f

            env:
              API_URL: http://pump-api.collab:8851

            resources:
              requests:
                cpu: 15m
                memory: 128M
              limits:
                memory: 128M

    service:
      api:
        controller: api
        ports:
          http:
            port: &apiPort 8851
      frontend:
        controller: frontend
        ports:
          http:
            port: &httpPort 8080

    route:
      frontend:
        annotations:
          glance/name: "Workout Diary"
          glance/show: "true"
          glance/id: "Collaboration"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: frontend
                port: *httpPort
