---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pump
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      pump:
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7

            envFrom: &envFrom
              - secretRef:
                  name: pump-secret
        # trigger renovate
        containers:
          pump:
            image:
              repository: ghcr.io/rwlove/pump
              tag: v0.0.91@sha256:b48005b9825286e3d2dec80e9c27ecfdcaf0605dac7057e0ca328ac42f9de9cf

            env:
              # Activates the /api/cv/* proxy in pump (see internal/web/exercise.go).
              # The wall page's live camera previews and the admin panel both
              # depend on this being reachable.
              PUMP_CV_URL: http://pump-cv:8080
              # Static-serve the per-set clip mp4s pump-cv writes here. Shared
              # RWX volume (pump-clips-pvc, declared in pump-cv/app/clips-pvc.yaml).
              PUMP_CLIPS_DIR: /clips

            envFrom:
              - secretRef:
                  name: pump-secret

            resources:
              requests:
                cpu: 15m
                memory: 128M
              limits:
                memory: 128M

    service:
      frontend:
        ports:
          http:
            port: &httpPort 8080
      api:
        ports:
          http:
            port: &apiPort 8851
            targetPort: 8080

    route:
      frontend:
        annotations:
          glance/name: "PUMP"
          glance/show: "true"
          glance/id: "Collaboration"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          # Inbound auth lives on oauth2-proxy (Authelia OIDC). pump itself
          # ships with no inbound APIKeyMiddleware as of v0.0.83+; never
          # point this route at pump-frontend directly.
          - backendRefs:
              - kind: Service
                name: pump-oauth2-proxy
                port: 4180

      # Off-cluster ingest path. Bypasses oauth2-proxy and goes straight
      # to pump-api:8851. Scoped to /api/weight only via the path match —
      # all other /api/* endpoints on this hostname 404. App-side auth is
      # WEIGHT_INGEST_KEY (env from pump-secret), enforced by the
      # weightIngestAuth middleware on POST /api/weight in pump v0.0.91+.
      # Only intended caller today is the bt-scale ESPHome device.
      ingest:
        hostnames:
          - "pump-ingest.${SECRET_DOMAIN}"
        # Attached to BOTH http:80 and https:443 on the internal Gateway.
        # NOTE: the Gateway's http listener redirects to HTTPS (301), so in
        # practice only HTTPS is served. The bt-scale ESPHome firmware was
        # originally HTTP-only because MbedTLS crashed on the M5 Atom (320 KB
        # RAM / ~4 KB BLE task stack). The firmware was fixed in 2026-05-26:
        #   - sram1_as_iram: true (+40 KB IRAM headroom)
        #   - deferred post_weight_to_pump script (handshake runs on main loop)
        # The device now posts to https:// without crashing. Auth enforced at
        # the app layer via WEIGHT_INGEST_KEY.
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
          - name: internal
            namespace: network
            sectionName: http
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /api/weight
            backendRefs:
              - kind: Service
                name: pump-api
                port: 8851

    persistence:
      # Per-set clip mp4s written by pump-cv. Same RWX volume on both
      # apps; declared in collab/pump-cv/app/clips-pvc.yaml.
      clips:
        type: persistentVolumeClaim
        existingClaim: pump-clips-pvc
        advancedMounts:
          pump:
            pump:
              - path: /clips
