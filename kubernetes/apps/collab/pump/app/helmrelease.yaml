---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pump
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      pump:
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3.0@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf

            envFrom: &envFrom
              - secretRef:
                  name: pump-secret
        # trigger renovate
        containers:
          pump:
            image:
              repository: ghcr.io/rwlove/pump
              tag: v0.0.66@sha256:6e354874e1f364bee869847527153c2c6af7915d5b3887ee833731ccd0212d50

            envFrom:
              - secretRef:
                  name: pump-secret

            resources:
              requests:
                cpu: 15m
                memory: 128M
              limits:
                memory: 128M

    service:
      frontend:
        ports:
          http:
            port: &httpPort 8080
      api:
        ports:
          http:
            port: &apiPort 8851

    route:
      frontend:
        annotations:
          glance/name: "PUMP"
          glance/show: "true"
          glance/id: "Collaboration"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: frontend
                port: *httpPort
