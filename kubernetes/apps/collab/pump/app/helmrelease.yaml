---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pump
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      pump:
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7

            envFrom: &envFrom
              - secretRef:
                  name: pump-secret
        # trigger renovate
        containers:
          pump:
            image:
              repository: ghcr.io/rwlove/pump
              tag: v0.0.90@sha256:7abcaa3a85ae524ee19680f631d8c4234d7ef01adeb8dedc78b4c5f7a7a7562e

            env:
              # Activates the /api/cv/* proxy in pump (see internal/web/exercise.go).
              # The wall page's live camera previews and the admin panel both
              # depend on this being reachable.
              PUMP_CV_URL: http://pump-cv:8080
              # Static-serve the per-set clip mp4s pump-cv writes here. Shared
              # RWX volume (pump-clips-pvc, declared in pump-cv/app/clips-pvc.yaml).
              PUMP_CLIPS_DIR: /clips

            envFrom:
              - secretRef:
                  name: pump-secret

            resources:
              requests:
                cpu: 15m
                memory: 128M
              limits:
                memory: 128M

    service:
      frontend:
        ports:
          http:
            port: &httpPort 8080
      api:
        ports:
          http:
            port: &apiPort 8851
            targetPort: 8080

    route:
      frontend:
        annotations:
          glance/name: "PUMP"
          glance/show: "true"
          glance/id: "Collaboration"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          # Inbound auth lives on oauth2-proxy (Authelia OIDC). pump itself
          # ships with no inbound APIKeyMiddleware as of v0.0.83+; never
          # point this route at pump-frontend directly.
          - backendRefs:
              - kind: Service
                name: pump-oauth2-proxy
                port: 4180

    persistence:
      # Per-set clip mp4s written by pump-cv. Same RWX volume on both
      # apps; declared in collab/pump-cv/app/clips-pvc.yaml.
      clips:
        type: persistentVolumeClaim
        existingClaim: pump-clips-pvc
        advancedMounts:
          pump:
            pump:
              - path: /clips
