---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app sparkyfitness-server
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m

  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        type: statefulset

        initContainers:
          01-init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3.0@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
            envFrom:
              - secretRef:
                  name: sparkyfitness
          02-grant-createrole:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3.0@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
            args: ["export PGPASSWORD=$(INIT_POSTGRES_SUPER_PASS); psql -h $(INIT_POSTGRES_HOST) -d $(INIT_POSTGRES_DBNAME) -U postgres -c 'ALTER ROLE $(SPARKY_FITNESS_DB_USER) WITH CREATEROLE; GRANT EXECUTE ON ALL FUNCTIONS IN SCHEMA public TO $(SPARKY_FITNESS_DB_USER) WITH GRANT OPTION;'"]
            command: ["/bin/sh", "-c"]
            envFrom:
              - secretRef:
                  name: sparkyfitness

        containers:
          main:
            image:
              repository: ghcr.io/codewithcj/sparkyfitness-server
              tag: v0.16.5.9@sha256:c96d7c2a608aad618241c95e58fb09f4d886e772f366a7c45dd7e0bc2a0ae289

            env:
              SPARKY_FITNESS_LOG_LEVEL: debug
              SPARKY_FITNESS_FRONTEND_URL: "https://fitness.${SECRET_DOMAIN}"
              SPARKY_FITNESS_DISABLE_SIGNUP: false
              ALLOW_PRIVATE_NETWORK_CORS: false
              SPARKY_FITNESS_EXTRA_TRUSTED_ORIGINS: ""

              # SPARKY_FITNESS_ADMIN_EMAIL: ${SPARKY_FITNESS_ADMIN_EMAIL}  #User with this email can access the admin panel
              # GARMIN_MICROSERVICE_URL: http://sparkyfitness-garmin:8000 # Add Garmin microservice URL

            envFrom:
              - secretRef:
                  name: sparkyfitness

            resources:
              requests:
                cpu: 15m
                memory: 300M
              limits:
                memory: 300M

    service:
      main:
        controller: main
        ports:
          http:
            port: &port 3010

    persistence:
      tmpfs:
        type: emptyDir
        advancedMounts:
          main:
            app:
              - path: /app/SparkyFitnessServer/temp_uploads
                subPath: temp_uploads
