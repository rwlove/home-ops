---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: swiparr
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      swiparr:
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        containers:
          app:
            image:
              repository: ghcr.io/m3sserstudi0s/swiparr
              tag: 1.5.0@sha256:b2528a8eb7a21868ddb78c51705e11115d51b47b1e14e480bc96b83adadff920
            env:
              JELLYFIN_URL: "http://jellyfin.media:8096"
              JELLYFIN_USE_WATCHLIST: false
              USE_SECURE_COOKIES: true

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: &httpPort 4321
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup: *probes
            resources:
              requests:
                cpu: 15m
                memory: 300Mi
              limits:
                memory: 300Mi


    service:
      app:
        controller: swiparr
        ports:
          http:
            port: *httpPort

    route:
      app:
        annotations:
          glance/name: "Swiparr"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/swiparr.png"
          glance/id: "Collaboration"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *httpPort
    persistence:
      data:
        existingClaim: swiparr-data-pvc
        globalMounts:
          - path: /app/data
