---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app workoutdiary
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      api:
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3.0@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf

            envFrom: &envFrom
              - secretRef:
                  name: workoutdiary-secret

        containers:
          api:
            image:
              repository: ghcr.io/rwlove/workoutdiary-api
              tag: v0.7@sha256:8a0acece0cfca84a8564219210945e1ff597d4ec379e18e37724730bd6e94b2d

            envFrom:
              - secretRef:
                  name: workoutdiary-secret

            resources:
              requests:
                cpu: 15m
                memory: 128M
              limits:
                memory: 128M

      frontend:
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        containers:
          frontend:
            image:
              repository: ghcr.io/rwlove/workoutdiary-frontend
              tag: v0.7@sha256:2c0f7230bd9f579c102091f730921c3b36eaebe4a208c6e4fc0a69319d404e97

            env:
              API_URL: http://workoutdiary-api.collab:8851

            resources:
              requests:
                cpu: 15m
                memory: 128M
              limits:
                memory: 128M

    service:
      api:
        controller: api
        ports:
          http:
            port: &apiPort 8851
      frontend:
        controller: frontend
        ports:
          http:
            port: &httpPort 8080

    route:
      frontend:
        annotations:
          glance/name: "Workout Diary"
          glance/show: "true"
          glance/id: "Collaboration"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: frontend
                port: *httpPort

    persistence:
      data:
        existingClaim: workoutdiary-data-pvc
        advancedMounts:
          api:
            api:
              - path: /data/WorkoutDiary
