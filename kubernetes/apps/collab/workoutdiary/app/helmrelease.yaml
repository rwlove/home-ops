---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app workoutdiary
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      api:
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset
        containers:
          api:
            image:
              repository: ghcr.io/rwlove/workoutdiary-api
              tag: 0.3

            resources:
              requests:
                cpu: 15m
                memory: 128M
              limits:
                memory: 128M

      frontend:
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset
        containers:
          api:
            image:
              repository: ghcr.io/rwlove/workoutdiary-frontend
              tag: 0.3

            resources:
              requests:
                cpu: 15m
                memory: 128M
              limits:
                memory: 128M

    service:
      api:
        controller: api
        ports:
          http:
            port: &apiPort 8851
      frontend:
        controller: frontend
        ports:
          http:
            port: &httpPort 8080

    route:
      api:
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: api
                port: *apiPort
      frontend:
        annotations:
          glance/name: "Workout Diary"
          glance/show: "true"
          glance/id: "Collaboration"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: frontend
                port: *httpPort

    persistence:
      data:
        existingClaim: workoutdiary-data-pvc
        globalMounts:
          - path: /data/WorkoutDiary
