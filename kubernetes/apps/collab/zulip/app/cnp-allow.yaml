---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: zulip-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: zulip
      app.kubernetes.io/instance: zulip
  # Additive — default-deny is what triggers the lockdown; these rules
  # punch holes through it. Intra-ns to zulip-rabbitmq (5672) +
  # zulip-memcached (11211) is covered by baseline allow-intra-namespace.
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # HTTPRoute on external gateway (chat.${SECRET_DOMAIN} via
    # cloudflared) → zulip:80. Both external and internal envoy pods
    # carry app.kubernetes.io/name=envoy.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
    # ai/langgraph-agents posts to zulip's bot API on port 80 (see
    # langgraph-agents/cnp-allow.yaml's matching egress rule).
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: ai
            app.kubernetes.io/name: langgraph-agents
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
  egress:
    # CNPG cluster postgres-zulip in databases ns (Pattern B).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            cnpg.io/cluster: postgres-zulip
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Redis via shared dragonfly (externalRedis.host).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            app.kubernetes.io/name: dragonfly
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
    # SMTP via internal Maddy relay in home ns (Pattern E).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: home
            app.kubernetes.io/name: smtp-relay
      toPorts:
        - ports:
            - port: "2525"
              protocol: TCP
    # Outgoing-webhook bots (approval-receiver-bot) post to Windmill
    # on @-mention. Routes through smokescreen (127.0.0.1:4750) which
    # then dials windmill-app:8000 directly — smokescreen needs
    # --allow-range 10.42.0.0/16 + 10.43.0.0/16 to permit cluster
    # CIDRs (currently a manual edit; codify in HR initContainer).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: home
            app.kubernetes.io/name: windmill-app
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # Mobile push notifications via the Zulip-operated PNS at
    # push.zulipchat.com (SETTING_ZULIP_SERVICE_PUSH_NOTIFICATIONS=true).
    # Uncertain whether push.zulipchat.com has a CNAME chain or is
    # canonical; per project_cilium_matchpattern_fqdn_limits.md, when
    # uncertain default to toEntities:world+443 (broad allow is the
    # safe failure mode). Matches PRs #11498/#11512/#11517/#11533.
    - toEntities: [world]
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
