---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zulip
spec:
  chartRef:
    kind: OCIRepository
    name: zulip

  interval: 30m
  install:
    # Zulip first-boot runs schema bootstrap + migrations; the chart
    # startupProbe gives 5 minutes (failureThreshold 30 × periodSeconds 10),
    # which can still race helm-controller. See
    # project_helmrelease_disablewait.md.
    disableWait: true
  upgrade:
    disableWait: true

  # Patch the zulip container with a postStart lifecycle hook that
  # rewrites the supervisord smokescreen config with cluster-CIDR
  # `--allow-range` flags. Without this, smokescreen (Zulip's SSRF-
  # protection proxy on 127.0.0.1:4750) blocks every outgoing webhook
  # to a cluster-internal URL (RFC1918 default-deny), breaking the
  # langgraph-approval-receive Windmill flow.
  #
  # The chart doesn't expose a way to configure smokescreen, so we
  # rewrite the file in postStart + ask supervisord to reread/update.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: StatefulSet
              name: zulip
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/lifecycle
                value:
                  postStart:
                    exec:
                      command:
                        - /bin/sh
                        - -c
                        - |
                          set -eu
                          # IMPORTANT: docker-zulip's entrypoint regenerates
                          # /etc/supervisor/conf.d/zulip/*.conf during boot,
                          # which races postStart. Wait for supervisord to be
                          # fully alive (= entrypoint finished) BEFORE we
                          # write our smokescreen config, otherwise the
                          # entrypoint clobbers it.
                          for i in $(seq 1 300); do
                            supervisorctl status >/dev/null 2>&1 && break
                            sleep 1
                          done
                          cat > /etc/supervisor/conf.d/zulip/smokescreen.conf <<'EOF'
                          [program:smokescreen]
                          command=/usr/local/bin/smokescreen-464b1115f802cbd91ffee555a41e71546646d396-go-1.26.0 --listen-ip 127.0.0.1 --expose-prometheus-metrics --prometheus-port 4760 --allow-range 10.42.0.0/16 --allow-range 10.43.0.0/16
                          priority=15
                          autostart=true
                          autorestart=true
                          user=zulip
                          redirect_stderr=true
                          stdout_logfile=/var/log/zulip/smokescreen.log
                          stdout_logfile_maxbytes=0
                          stdout_logfile_backups=0
                          EOF
                          supervisorctl reread || true
                          supervisorctl update || true

  valuesFrom:
    - kind: Secret
      name: zulip-secret
      valuesKey: SECRET_KEY
      targetPath: zulip.environment.SECRETS_secret_key
    - kind: Secret
      name: zulip-secret
      valuesKey: ZULIP_ADMINISTRATOR
      targetPath: zulip.environment.SETTING_ZULIP_ADMINISTRATOR
    - kind: Secret
      name: zulip-secret
      valuesKey: ZULIP_ORG_ID
      targetPath: zulip.environment.SECRETS_zulip_org_id
    - kind: Secret
      name: zulip-secret
      valuesKey: ZULIP_ORG_KEY
      targetPath: zulip.environment.SECRETS_zulip_org_key
      # RabbitMQ password + erlang cookie come from `zulip-secret` via the
      # Bitnami `existingPasswordSecret` / `existingErlangSecret` features
      # (configured in spec.values.rabbitmq.auth below). The chart's
      # _helpers.tpl renders SECRETS_rabbitmq_password as a valueFrom
      # secretKeyRef when those values are set — so the env wiring is
      # native, no manual STS patches needed.
      #
      # We can't use Flux valuesFrom with `targetPath: rabbitmq.auth.password`
      # because the substitution silently drops to "" on Bitnami subchart
      # paths at install AND on subsequent upgrades (configDigest sticks
      # in-sync). See project_flux_valuesfrom_subchart_drop in memory.

  values:
    image:
      repository: ghcr.io/zulip/zulip-server
      tag: 12.1-0

    service:
      type: ClusterIP
      port: 80

    ingress:
      enabled: false  # using a sibling HTTPRoute on the external Gateway

    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        memory: 2Gi

    # docker-zulip / zulip-server runs supervisord as root and writes
    # to / at boot; can't honor cluster-default non-root + RO rootfs.
    podSecurityContext:
      fsGroup: 0
      runAsUser: 0
      runAsGroup: 0
    securityContext:
      runAsNonRoot: false
      runAsUser: 0
      readOnlyRootFilesystem: false

    zulip:
      environment:
        SETTING_EXTERNAL_HOST: chat.${SECRET_DOMAIN}
        # Route in-cluster traffic (Windmill workflows, langgraph-
        # agents pods) hitting http://zulip.collab.svc.cluster.local
        # to the Lovenet realm. Without this, Django's ALLOWED_HOSTS
        # rejects those requests with a generic 400.
        #
        # The dict format is REALM_HOSTS={subdomain: hostname}, NOT
        # the other way around — confirmed against the Zulip 11.x
        # `zproject/computed_settings.py` line:
        #     ALLOWED_HOSTS += REALM_HOSTS.values()
        # so the VALUES go into ALLOWED_HOSTS, not the keys. PR #11963
        # had this inverted and the 400s continued.
        #
        # Empty subdomain "" is the Lovenet realm (zerver_realm.id=2,
        # string_id=''); mapping it to the in-cluster Service hostname
        # adds that hostname to ALLOWED_HOSTS without creating a new
        # realm.
        SETTING_REALM_HOSTS: "{\"\": \"zulip.collab.svc.cluster.local\"}"
        # SETTING_ZULIP_ADMINISTRATOR + SECRETS_secret_key are populated by
        # spec.valuesFrom from the zulip-secret. Do NOT add inline placeholders
        # here — empirically they pinned SETTING_ZULIP_ADMINISTRATOR to the
        # placeholder value even after the Secret was correct, while
        # SECRETS_secret_key happened to render the real Secret value. Same
        # mechanism, inconsistent merge behavior — safest path is to omit
        # the inline keys entirely so valuesFrom is the sole source.
        TRUST_GATEWAY_IP: true
        # Trust the cilium pod CIDR (where envoy gateway pods live) and the
        # node CIDR (where kubelet HTTP probes originate). The chart's
        # TRUST_GATEWAY_IP autodetect picks ONE default-route IP which goes
        # stale on pod reschedule and breaks both X-Forwarded-For trust and
        # /health probes (zulip's nginx healthcheck.conf reuses the same
        # IP list as nginx real-ip trust).
        LOADBALANCER_IPS: 10.42.0.0/16,192.168.0.0/16
        # SMTP via internal Maddy relay (smtp-relay.home). Same pattern as
        # lldap/mealie/paperless. Internal listener: no auth, no TLS;
        # upstream auth + TLS handled by the relay itself.
        SETTING_EMAIL_HOST: smtp-relay.home.svc.cluster.local
        SETTING_EMAIL_PORT: 2525
        SETTING_EMAIL_USE_TLS: false
        SETTING_EMAIL_USE_SSL: false
        SETTING_EMAIL_HOST_USER: ""
        SETTING_DEFAULT_FROM_EMAIL: Zulip <zulip@${SECRET_DOMAIN}>
        SETTING_NOREPLY_EMAIL_ADDRESS: zulip@${SECRET_DOMAIN}
        # Disable Zulip's per-email token-on-noreply feature. Without this,
        # Zulip rewrites the noreply From to noreply-<token>@chat.${SECRET_DOMAIN},
        # which the upstream relay's SPF/DKIM doesn't cover → spam folder /
        # bounces. Tokens enable in-reply parsing (replying to a notification
        # posts back to Zulip); we don't use that flow.
        SETTING_ADD_TOKENS_TO_NOREPLY_ADDRESS: false
        # Mobile push notifications via the Zulip-operated PNS at
        # push.zulipchat.com. Requires `manage.py register_server` to run
        # once to generate ZULIP_ORG_ID + ZULIP_ORG_KEY (wired below via
        # SECRETS_zulip_org_id / SECRETS_zulip_org_key).
        SETTING_ZULIP_SERVICE_PUSH_NOTIFICATIONS: true
      persistence:
        enabled: true
        accessModes:
          - ReadWriteOnce
        size: 40Gi
        storageClass: ceph-block

    # External Postgres (CNPG). Credentials come from the CNPG-managed
    # postgres-zulip-app Secret, populated when CNPG's initdb runs with
    # owner=zulip, database=zulip.
    postgresql:
      enabled: false
    externalPostgresql:
      host: postgres-zulip-rw.databases.svc.cluster.local
      port: 5432
      user: zulip
      database: zulip
      password:
        valueFrom:
          secretKeyRef:
            name: postgres-zulip-app
            key: password

    # External Redis (shared dragonfly, no auth)
    redis:
      enabled: false
    externalRedis:
      host: dragonfly.databases.svc.cluster.local
      port: 6379
      password: ""

    # Bundled RabbitMQ (Bitnami subchart). Auth password + erlang cookie
    # come from the existing `zulip-secret` ExternalSecret-managed
    # Secret — both the Bitnami subchart and zulip's umbrella-chart
    # SECRETS_rabbitmq_password env render via these `existingSecret`
    # references. Single source of truth, no chart-managed secret to
    # drift / regenerate, no manual STS patches.
    # NOTE: chart pins bitnamilegacy/rabbitmq — upstream notes the image
    # is no longer updated; revisit if security flags it.
    rabbitmq:
      enabled: true
      persistence:
        enabled: true
        storageClass: ceph-block
        size: 4Gi
      auth:
        username: zulip
        existingPasswordSecret: zulip-secret
        existingSecretPasswordKey: RABBITMQ_PASS
        existingErlangSecret: zulip-secret
        existingSecretErlangKey: RABBITMQ_ERLANG_COOKIE

    # Bundled Memcached (Bitnami subchart). Ephemeral cache — no
    # persistence needed. NOTE: same bitnamilegacy concern as rabbitmq.
    #
    # Chart 2.0 changed the default to auth.enabled: true, which causes
    # Bitnami memcached to enforce SASL with a randomly-generated password
    # that Zulip has no way to retrieve. Explicitly disable auth here —
    # memcached is cluster-internal with no external exposure, SASL adds
    # no value. Setting auth.username: "" also blanks SETTING_MEMCACHED_USERNAME
    # in Zulip's env so bmemcached doesn't attempt SASL at all.
    memcached:
      enabled: true
      auth:
        enabled: false
        username: ""

    # Required by chart when bundled postgres is disabled (otherwise the
    # global.security.allowInsecureImages flag gates the bundled-postgres
    # image override; harmless when external).
    global:
      security:
        allowInsecureImages: true
