---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zulip
spec:
  chartRef:
    kind: OCIRepository
    name: zulip

  interval: 30m
  install:
    # Zulip first-boot runs schema bootstrap + migrations; the chart
    # startupProbe gives 5 minutes (failureThreshold 30 × periodSeconds 10),
    # which can still race helm-controller. See
    # project_helmrelease_disablewait.md.
    disableWait: true
  upgrade:
    disableWait: true

  valuesFrom:
    - kind: Secret
      name: zulip-secret
      valuesKey: SECRET_KEY
      targetPath: zulip.environment.SECRETS_secret_key
    - kind: Secret
      name: zulip-secret
      valuesKey: ZULIP_ADMINISTRATOR
      targetPath: zulip.environment.SETTING_ZULIP_ADMINISTRATOR
    # The zulip Django process reads the RabbitMQ password from the
    # SECRETS_rabbitmq_password env var, so feed it from zulip-secret
    # at the umbrella-chart path. (Subchart paths like
    # `rabbitmq.auth.password` silently fail at install time if the
    # source Secret isn't populated yet — see
    # project_flux_valuesfrom_subchart_drop in memory.)
    - kind: Secret
      name: zulip-secret
      valuesKey: RABBITMQ_PASS
      targetPath: zulip.environment.SECRETS_rabbitmq_password

  values:
    image:
      repository: ghcr.io/zulip/zulip-server
      tag: 12.0-0

    service:
      type: ClusterIP
      port: 80

    ingress:
      enabled: false  # using a sibling HTTPRoute on the external Gateway

    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        memory: 2Gi

    # docker-zulip / zulip-server runs supervisord as root and writes
    # to / at boot; can't honor cluster-default non-root + RO rootfs.
    podSecurityContext:
      fsGroup: 0
      runAsUser: 0
      runAsGroup: 0
    securityContext:
      runAsNonRoot: false
      runAsUser: 0
      readOnlyRootFilesystem: false

    zulip:
      environment:
        SETTING_EXTERNAL_HOST: chat.${SECRET_DOMAIN}
        # SETTING_ZULIP_ADMINISTRATOR + SECRETS_secret_key injected via valuesFrom
        SETTING_ZULIP_ADMINISTRATOR: placeholder@example.com
        SECRETS_secret_key: placeholder
        TRUST_GATEWAY_IP: true
        # Trust the cilium pod CIDR (where envoy gateway pods live) and the
        # node CIDR (where kubelet HTTP probes originate). The chart's
        # TRUST_GATEWAY_IP autodetect picks ONE default-route IP which goes
        # stale on pod reschedule and breaks both X-Forwarded-For trust and
        # /health probes (zulip's nginx healthcheck.conf reuses the same
        # IP list as nginx real-ip trust).
        LOADBALANCER_IPS: 10.42.0.0/16,192.168.0.0/16
      persistence:
        enabled: true
        accessMode: ReadWriteOnce
        size: 40Gi
        storageClass: ceph-block

    # External Postgres (CNPG). Credentials come from the CNPG-managed
    # postgres-zulip-app Secret, populated when CNPG's initdb runs with
    # owner=zulip, database=zulip.
    postgresql:
      enabled: false
    externalPostgresql:
      host: postgres-zulip-rw.databases.svc.cluster.local
      port: 5432
      user: zulip
      database: zulip
      password:
        valueFrom:
          secretKeyRef:
            name: postgres-zulip-app
            key: password

    # External Redis (shared dragonfly, no auth)
    redis:
      enabled: false
    externalRedis:
      host: dragonfly.databases.svc.cluster.local
      port: 6379
      password: ""

    # Bundled RabbitMQ (Bitnami subchart). Password is rendered by the
    # subchart's `lookup`-based template: on first install with empty
    # auth.password it auto-generates and writes the zulip-rabbitmq
    # Secret; on subsequent upgrades it preserves whatever's in the
    # existing Secret. The zulip Django side reads the password from
    # SECRETS_rabbitmq_password (umbrella-chart valuesFrom above) — the
    # two must agree. If they ever drift: `rabbitmqctl change_password
    # zulip <RABBITMQ_PASS>` + kubectl patch the zulip-rabbitmq Secret's
    # rabbitmq-password key to match.
    # NOTE: chart pins bitnamilegacy/rabbitmq — upstream notes the image
    # is no longer updated; revisit if security flags it.
    rabbitmq:
      enabled: true
      persistence:
        enabled: true
        storageClass: ceph-block
        size: 4Gi
      auth:
        username: zulip
        password: ""
        erlangCookie: ""

    # Bundled Memcached (Bitnami subchart). Ephemeral cache — no
    # persistence needed. NOTE: same bitnamilegacy concern as rabbitmq.
    memcached:
      enabled: true

    # Required by chart when bundled postgres is disabled (otherwise the
    # global.security.allowInsecureImages flag gates the bundled-postgres
    # image override; harmless when external).
    global:
      security:
        allowInsecureImages: true
