---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cloudnative-pg-rules
  labels:
    prometheus: k8s
    role: alert-rules
spec:
  groups:
    - name: cloudnative-pg.rules
      rules:
        - alert: LongRunningTransaction
          annotations:
            description: Pod {{ $labels.pod }} is taking more than 5 minutes (300 seconds) for a query.
            summary: A query is taking longer than 5 minutes.
          expr: |-
            cnpg_backends_max_tx_duration_seconds > 300
          for: 10m
          labels:
            severity: warning
        - alert: BackendsWaiting
          annotations:
            description: Pod {{ $labels.pod  }} has been waiting for longer than 5 minutes
            summary: If a backend is waiting for longer than 5 minutes
          expr: |-
            cnpg_backends_waiting_total > 300
          for: 10m
          labels:
            severity: warning
        - alert: PGDatabase
          annotations:
            description: Over 150,000,000 transactions from frozen xid on pod {{ $labels.pod  }}
            summary: Number of transactions from the frozen XID to the current one
          expr: |-
            cnpg_pg_database_xid_age > 150000000
          for: 1m
          labels:
            severity: warning
        - alert: PGReplication
          annotations:
            description: Standby is lagging behind by over 300 seconds (5 minutes)
            summary: The standby is lagging behind the primary
          expr: |-
            cnpg_pg_replication_lag > 300
          for: 10m
          labels:
            severity: warning
        - alert: LastFailedArchiveTime
          annotations:
            description: Archiving failed for {{ $labels.pod }}
            summary: Checks the last time archiving failed. Will be -1 when it has not failed.
          expr: |-
            delta(cnpg_pg_stat_archiver_last_failed_time[5m]) > 0
          for: 1m
          labels:
            severity: warning
        - alert: DatabaseDeadlockConflicts
          annotations:
            description: More than 10 deadlocks in the last hour on {{ $labels.pod }} ({{ $labels.datname }})
            summary: Active deadlock rate is elevated
          expr: |-
            increase(cnpg_pg_stat_database_deadlocks[1h]) > 10
          for: 5m
          labels:
            severity: warning
        # TODO: re-introduce BackupStale once a CustomResourceStateMetrics config
        # exposes Cluster.status.conditions[type=LastBackupSucceeded] as a metric.
        # cnpg_collector_last_available_backup_timestamp is unreliable for plugin-method
        # clusters — it freezes at the migration timestamp instead of advancing on each
        # successful backup (verified 2026-05-25, all 6 "stale" clusters are actually
        # healthy). Tracking: https://github.com/rwlove/home-ops/issues/12075
        # changes()[25h] false-fires when the gauge is re-emitted after a CNPG
        # pod restart, even when the last failure is weeks old (same gauge
        # re-emission problem documented for BackupStale above). Gate on the
        # failure timestamp being genuinely recent (<24h) instead.
        - alert: BackupFailed
          annotations:
            description: Cluster {{ $labels.job }} in {{ $labels.namespace }} has a recent backup failure.
            summary: CNPG cluster backup failed recently.
          expr: |-
            (cnpg_collector_last_failed_backup_timestamp > 0)
            and
            (time() - cnpg_collector_last_failed_backup_timestamp < 86400)
          for: 10m
          labels:
            severity: warning
