---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-home-assistant
spec:
  instances: 3

  imageName: ghcr.io/cloudnative-pg/postgresql:17.7

  primaryUpdateStrategy: unsupervised

  failoverDelay: 30

  replicationSlots:
    highAvailability:
      enabled: true

  postgresql:
    parameters:
      timezone: "America/New_York"
      # Auto-reap connections left idle-in-transaction (5min). Guards against
      # orphaned backends from ungracefully-killed HA pods holding an xid open
      # and blocking autovacuum (the client never sends a FIN, so the zombie
      # sits forever otherwise). 5min is well above HA's normal recorder churn.
      idle_in_transaction_session_timeout: "300000"
      max_slot_wal_keep_size: 10GB
      shared_buffers: 512MB
      min_wal_size: "1GB"
      max_wal_size: "4GB"

  storage:
    size: 120Gi
    storageClass: ceph-block

  walStorage:
    size: 32Gi
    storageClass: ceph-block

  resources:
    requests:
      cpu: 200m
      memory: 1536Mi
    limits:
      memory: 3Gi

  enableSuperuserAccess: true
  superuserSecret:
    name: cloudnative-pg

  monitoring:
    enablePodMonitor: true

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters: &params
        barmanObjectName: garage-home-assistant
        serverName: postgres-home-assistant-backup

  bootstrap:
    recovery:
      source: source

  externalClusters:
    - name: source
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters: *params
