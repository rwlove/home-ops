---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
components:
  - ../../../../../components/cnpg-app-database
resources:
  - ./cluster.yaml
# HA recorder writes constantly; 30d retention produces ~233 GiB of WALs
# against a 6 GiB DB and overruns the garage substrate. Cap at 7d.
patches:
  - target:
      group: barmancloud.cnpg.io
      version: v1
      kind: ObjectStore
    patch: |-
      - op: replace
        path: /spec/retentionPolicy
        value: 7d
