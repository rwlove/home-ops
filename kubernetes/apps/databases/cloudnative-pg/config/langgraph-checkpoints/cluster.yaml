---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-langgraph-checkpoints
spec:
  instances: 3

  imageName: ghcr.io/cloudnative-pg/postgresql:17.7

  primaryUpdateStrategy: unsupervised

  failoverDelay: 30

  replicationSlots:
    highAvailability:
      enabled: true

  postgresql:
    parameters:
      timezone: "America/New_York"
      # Loud failures over hangs. langgraph-agents' workload is small
      # fast queries (aget_tuple / aput / aput_writes); nothing here
      # legitimately runs close to 60s. If a future regression
      # reintroduces a hang shape, postgres aborts the offending txn
      # with a visible error in pod logs instead of letting the runtime
      # park forever. Paired with the AsyncConnectionPool fix in
      # langgraph-agents v0.2.12. MERGE ORDER: pool fix first, then
      # this — otherwise the CNPG rolling restart triggered by these
      # params would drop the live pod's stale conn and the (still
      # single-conn) pod would hang on reconnect.
      statement_timeout: "60s"
      idle_in_transaction_session_timeout: "60s"
      lock_timeout: "30s"

  storage:
    size: 8Gi
    storageClass: ceph-block

  walStorage:
    size: 4Gi
    storageClass: ceph-block

  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi

  enableSuperuserAccess: true
  superuserSecret:
    name: cloudnative-pg

  bootstrap:
    initdb:
      database: langgraph_checkpoints
      owner: langgraph

  # CNPG generates `postgres-langgraph-checkpoints-app` in this namespace.
  # langgraph-agents in `ai` ns consumes it today (via ad-hoc reflector
  # annotation on the live Secret, not declared in git — drift that
  # would silently break on cluster rebuild). Making it durable here.
  # Sibling of langgraph-memory cluster's inheritedMetadata.
  # Pattern: project_cnpg_cross_namespace_reflector.
  inheritedMetadata:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: ai
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: ai

  monitoring:
    enablePodMonitor: true

  plugins:
    - enabled: true
      isWALArchiver: true
      name: barman-cloud.cloudnative-pg.io
      parameters:
        barmanObjectName: garage-langgraph-checkpoints
        serverName: postgres-langgraph-checkpoints-backup

  externalClusters:
    - name: postgres-langgraph-checkpoints-backup
      plugin:
        enabled: true
        isWALArchiver: false
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: garage-langgraph-checkpoints
          serverName: postgres-langgraph-checkpoints-backup
