---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-nextcloud
spec:
  instances: 3

  imageName: ghcr.io/cloudnative-pg/postgresql:17.7

  primaryUpdateStrategy: unsupervised

  failoverDelay: 30

  replicationSlots:
    highAvailability:
      enabled: true

  postgresql:
    parameters:
      timezone: "America/New_York"

  storage:
    size: 10Gi
    storageClass: ceph-block

  resources:
    requests:
      cpu: 100m
      memory: 512Mi

  enableSuperuserAccess: true
  superuserSecret:
    name: cloudnative-pg

  monitoring:
    enablePodMonitor: true

  plugins:
    - enabled: true
      isWALArchiver: true
      name: barman-cloud.cloudnative-pg.io
      parameters:
        barmanObjectName: garage-nextcloud
        serverName: postgres-nextcloud-backup

  # bootstrap:
  #   recovery:
  #     source: postgres-nextcloud-backup
  #     recoveryTarget:
  #      # Time base target for the recovery
  #      targetTime: "2025-12-01 00:00:00.00000+00"
  externalClusters:
    - name: postgres-nextcloud-backup
      plugin:
        enabled: true
        isWALArchiver: false
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: garage-nextcloud
          serverName: postgres-nextcloud-backup
