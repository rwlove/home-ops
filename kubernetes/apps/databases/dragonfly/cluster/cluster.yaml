---
# yaml-language-server: $schema=https://lds-schemas.pages.dev/dragonflydb.io/dragonfly_v1alpha1.json
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: dragonfly
spec:
  labels:
    dragonflydb.io/cluster: dragonfly
  image: ghcr.io/dragonflydb/dragonfly:v1.39.0
  replicas: 3
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      memory: 1Gi
  networkPolicyEnabled: false
  # --maxmemory governs Dragonfly's data budget; RSS sits on top of it
  # (threads, network buffers, snapshot/replication). Keep it strictly
  # below cgroup limits.memory or background activity OOM-kills the pod.
  args:
    - "--maxmemory=768Mi"
    - "--proactor_threads=2"
    - "--cluster_mode=emulated"
    - "--default_lua_flags=allow-undeclared-keys"

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: "kubernetes.io/hostname"
      whenUnsatisfiable: "DoNotSchedule"
      labelSelector:
        matchLabels:
          app.kubernetes.io/part-of: dragonfly
