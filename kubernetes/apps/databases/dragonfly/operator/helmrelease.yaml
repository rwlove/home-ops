---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dragonfly-operator
spec:
  chartRef:
    kind: OCIRepository
    name: dragonfly-operator
  interval: 1h
  values:
    # Chart default manager image registry docker.dragonflydb.io no
    # longer resolves (DNS returns 0.0.0.0). Pin to ghcr.io mirror,
    # which the OCI chart itself is also hosted on. Chart's image
    # path for the operator is manager.image.repository.
    manager:
      image:
        repository: ghcr.io/dragonflydb/operator
    grafanaDashboard:
      annotations:
        name: grafana_folder
      enabled: true
      folder: Storage
    serviceMonitor:
      enabled: false
