---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pgadmin
spec:
  chart:
    spec:
      # renovate: registryUrl=https://helm.runix.net chart=pgadmin4
      chart: pgadmin4
      sourceRef:
        kind: HelmRepository
        name: runix
      version: 1.64.0
  interval: 30m

  values:
    env:
      MAX_LOGIN_ATTEMPTS: 1000
      PGADMIN_CONFIG_SERVER_MODE: "False"
      email: "${EMAIL}"

    envFrom:
      - secretRef:
          name: *app

    existingSecret: *app

    persistentVolume:
      accessModes:
        - ReadWriteOnce
      enabled: true
      size: 200Mi
      storageClass: ceph-block

    podAnnotations:
      secret.reloader.stakater.com/reload: *app

    resources:
      limits:
        memory: 420M
      requests:
        cpu: 15m
        memory: 420M

    # RWO ceph-block PVC: a RollingUpdate surges a second pod that cannot
    # multi-attach the volume from another node, so the rollout times out and
    # Flux rolls back. Recreate terminates the old pod first (brief downtime).
    strategy:
      type: Recreate
