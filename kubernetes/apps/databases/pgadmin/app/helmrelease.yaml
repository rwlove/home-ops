---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pgadmin
spec:
  chart:
    spec:
      # renovate: registryUrl=https://helm.runix.net chart=pgadmin4
      chart: pgadmin4
      sourceRef:
        kind: HelmRepository
        name: runix
      version: 1.62.0
  interval: 30m

  values:
    containerSecurityContext:
      capabilities:
        add:
          - NET_ADMIN
          - NET_RAW
      privileged: true

    env:
      MAX_LOGIN_ATTEMPTS: 1000
      PGADMIN_CONFIG_SERVER_MODE: "False"
      email: "${EMAIL}"
      password: "password"

    envFrom:
      - secretRef:
          name: *app

    existingSecret: *app

    persistentVolume:
      enabled: true
      accessModes:
        - ReadWriteOnce
      size: 200Mi
      storageClass: ceph-block

    podAnnotations:
      secret.reloader.stakater.com/reload: *app

    resources:
      limits:
        memory: 420M
      requests:
        cpu: 15m
        memory: 420M
