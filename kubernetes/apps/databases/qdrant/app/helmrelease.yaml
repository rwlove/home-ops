---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app qdrant
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      qdrant:
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
        containers:
          app:
            image:
              repository: docker.io/qdrant/qdrant
              tag: v1.18.2
            env:
              # Default snapshots path is ./snapshots (qdrant's WORKDIR
              # /qdrant), which the non-root user can't create. Redirect
              # to the existing PVC so snapshots are also durable.
              QDRANT__STORAGE__SNAPSHOTS_PATH: /qdrant/storage/snapshots
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                cpu: 50m
                # Sized for the initial Paperless ingest + Phase A
                # dual-collection benchmark (200 docs × 2 embedders).
                # Pre-Spark-unblocks-RAG sizing (256Mi/512Mi) was fine
                # for 0 collections but will OOM during ingest. Revisit
                # downward after the first full ingest measures resident
                # set in steady state.
                memory: 1Gi
              limits:
                memory: 4Gi
    service:
      app:
        controller: qdrant
        ports:
          grpc:
            port: 6334
          http:
            port: &httpPort 6333
    persistence:
      data:
        existingClaim: qdrant-data-pvc
        advancedMounts:
          qdrant:
            app:
              - path: /qdrant/storage
