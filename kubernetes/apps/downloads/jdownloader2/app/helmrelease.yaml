---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app jdownloader2
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m

  # disableWait — pod-gateway-routed pods need the gateway-init VPN
  # handshake before the app starts, which can outlast helm-controller's
  # 5-min default wait. Without this, the timed-out upgrade is marked
  # Failed and helm-controller rolls back; the rollback ALSO waits for
  # Ready and ALSO times out, leaving the release stuck and silently
  # reverting the spec that was just applied (without the configMap fix
  # this app needs). Recovery: suspend the HR, delete the failed/pending
  # sh.helm.release.v1.* secrets, resume.
  install:
    disableWait: true
    remediation:
      retries: -1
  upgrade:
    disableWait: true
    remediation:
      retries: -1

  values:
    controllers:
      jdownloader2:
        pod:
          securityContext:
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1001
            # runAsNonRoot: true
            # runAsUser: 100
        annotations:
          reloader.stakater.com/auto: "true"
        type: statefulset
        containers:
          app:
            image:
              repository: ghcr.io/jlesage/jdownloader-2
              tag: v26.03.1@sha256:3d6cb102bd9bacff12ab1ca5136a38cb8f93d6595a7ccf5bce60aac4df138ebd

            env:
              # jlesage's baseimage handles user creation/drop via these env vars.
              # Container starts as root, init scripts create user 1107:1001
              # and run jdownloader as that user.
              USER_ID: "1107"
              GROUP_ID: "1001"

            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 1G

    service:
      app:
        controller: jdownloader2
        ports:
          http:
            port: &httpPort 5800

    route:
      app:
        annotations:
          glance/name: "JDownloader"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/jdownloader2.png"
          glance/id: "Downloads"
        hostnames:
          - "downloader.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - kind: Service
                name: jdownloader2
                port: 5800
    persistence:
      config:
        existingClaim: jdownloader-config-pvc
        globalMounts:
          - path: /config

      downloads:
        existingClaim: jdownloader-downloads-pvc
        globalMounts:
          - path: /output

      # The image's /etc/cont-init.d/10-init-users.sh runs `rm -f /etc/passwd
      # /etc/group /etc/shadow` to reset them before recreation. With runAsGroup
      # 1001 (which doesn't exist in the image), CRI-O auto-mounts /etc/group
      # and /etc/passwd from /containers/storage/.../userdata/, making them
      # mount points that rm can't delete (EBUSY). The script aborts via set -e.
      # Override with a copy that uses `: > FILE` (truncate) instead of rm+touch.
      # Chart v4.6.2 doesn't accept `type: configMap`; use custom + volumeSpec.
      init-users-fix:
        type: custom
        volumeSpec:
          configMap:
            name: jdownloader2-init-users-fix
            defaultMode: 0755
        advancedMounts:
          jdownloader2:
            app:
              - path: /etc/cont-init.d/10-init-users.sh
                subPath: 10-init-users.sh
