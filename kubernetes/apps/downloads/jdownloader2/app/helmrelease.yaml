---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app jdownloader2
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m

  # Don't wait for the StatefulSet to be Ready — pod-gateway-routed pods take
  # time to come up, and the failure during wait causes Helm to roll back to
  # an earlier spec (without the configMap fix), creating a permanent loop.
  install:
    disableWait: true
    remediation:
      retries: -1
  upgrade:
    disableWait: true
    remediation:
      retries: -1

  values:
    controllers:
      main:
        pod:
          securityContext:
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1001
            # runAsNonRoot: true
            # runAsUser: 100
        annotations:
          reloader.stakater.com/auto: "true"
        type: statefulset
        containers:
          main:
            image:
              repository: ghcr.io/jlesage/jdownloader-2
              tag: v26.03.1@sha256:3d6cb102bd9bacff12ab1ca5136a38cb8f93d6595a7ccf5bce60aac4df138ebd

            resources:
              requests:
                cpu: 100m
                memory: 1G
              limits:
                memory: 1G

    service:
      main:
        controller: main
        ports:
          http:
            port: &httpPort 5800

    route:
      main:
        annotations:
          glance/name: "JDownloader"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/jdownloader2.png"
          glance/id: "Downloads"
        hostnames:
          - "downloader.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *httpPort
    persistence:
      config:
        existingClaim: jdownloader-config-pvc
        globalMounts:
          - path: /config

      downloads:
        existingClaim: jdownloader-downloads-pvc
        globalMounts:
          - path: /output

      # The image's /etc/cont-init.d/10-init-users.sh runs `rm -f /etc/passwd
      # /etc/group /etc/shadow` to reset them before recreation. With runAsGroup
      # 1001 (which doesn't exist in the image), CRI-O auto-mounts /etc/group
      # and /etc/passwd from /containers/storage/.../userdata/, making them
      # mount points that rm can't delete (EBUSY). The script aborts via set -e.
      # Override with a copy that uses `: > FILE` (truncate) instead of rm+touch.
      # Chart v4.6.2 doesn't accept `type: configMap`; use custom + volumeSpec.
      init-users-fix:
        type: custom
        volumeSpec:
          configMap:
            name: jdownloader2-init-users-fix
            defaultMode: 0755
        advancedMounts:
          main:
            main:
              - path: /etc/cont-init.d/10-init-users.sh
                subPath: 10-init-users.sh
