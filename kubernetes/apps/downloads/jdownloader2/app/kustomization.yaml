---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
components:
  - ../../../../components/repos/app-template
configMapGenerator:
  - name: jdownloader2-init-users-fix
    files:
      - 10-init-users.sh=./resources/10-init-users.sh
    options:
      disableNameSuffixHash: true
      annotations:
        # Flux postBuild.substitute would blank out the ${var} shell expansions
        # in the script otherwise. Opt this resource out of substitution.
        kustomize.toolkit.fluxcd.io/substitute: disabled

resources:
  - ./cnp-allow.yaml
  - ./helmrelease.yaml
  - ./longhorn-pvc.yaml
  - ./nfs-pvc.yaml
  - ./securitypolicy.yaml
