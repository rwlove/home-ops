---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/persistentvolume-v1.json
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jdownloader-downloads-pv
  labels:
    type: nfs
spec:
  storageClassName: jdownloader-downloads-storage-class
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteOnce
  mountOptions: ["nfsvers=4.2", "nconnect=8", "hard", "noatime"]
  nfs:
    server: "${NFS_HOST_0}"
    path: /mnt/downloads-nvme/jdownloader

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jdownloader-downloads-pvc
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 500Gi
  volumeName: jdownloader-downloads-pv
  storageClassName: jdownloader-downloads-storage-class
