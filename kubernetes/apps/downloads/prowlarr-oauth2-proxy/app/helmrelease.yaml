---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app prowlarr-oauth2-proxy
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      prowlarr-oauth2-proxy:
        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          # Opt out of the downloads-namespace VPN sidecar injection — this
          # proxy needs direct cluster access to reach Authelia.
          labels:
            routed-gateway: "false"

        containers:
          app:
            image:
              repository: quay.io/oauth2-proxy/oauth2-proxy
              tag: v7.15.2

            args:
              - --provider=oidc
              - --oidc-issuer-url=https://auth.${SECRET_DOMAIN}
              - --client-id=prowlarr-oauth2-proxy
              - --redirect-url=https://prowlarr.${SECRET_DOMAIN}/oauth2/callback
              - --upstream=http://prowlarr.downloads.svc.cluster.local:9696
              - --http-address=0.0.0.0:4180
              - --cookie-domain=.${SECRET_DOMAIN}
              - --cookie-name=_oauth2_proxy_prowlarr
              - --cookie-secure=true
              - --cookie-samesite=lax
              - --email-domain=*
              - --whitelist-domain=.${SECRET_DOMAIN}
              - --reverse-proxy=true
              - --pass-user-headers=true
              - --set-xauthrequest=true
              - --skip-provider-button=true
              - --scope=openid email profile groups
              - --code-challenge-method=S256

            envFrom:
              - secretRef:
                  name: prowlarr-oauth2-proxy-secret

            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi

    service:
      app:
        controller: prowlarr-oauth2-proxy
        ports:
          http:
            port: 4180
