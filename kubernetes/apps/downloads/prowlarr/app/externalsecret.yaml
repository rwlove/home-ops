---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: prowlarr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: prowlarr
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        PROWLARR__API_KEY: "{{ .PROWLARR__API_KEY }}"
        PROWLARR__POSTGRES__HOST: postgres-prowlarr-rw.databases.svc.cluster.local
        PROWLARR__POSTGRES__PORT: "5432"
        PROWLARR__POSTGRES__USER: "{{ .POSTGRES_USER }}"
        PROWLARR__POSTGRES__PASSWORD: "{{ .POSTGRES_PASS }}"
        PROWLARR__POSTGRES__MAINDB: prowlarr-main
        # Garage S3 creds for the cnpg-app-database backup ObjectStore
        # (consumed by prowlarr-secret in databases namespace, kept here too
        # so a single 1P item drives both)
        GARAGE_AWS_ACCESS_KEY_ID: "{{ .GARAGE_AWS_ACCESS_KEY_ID }}"
        GARAGE_AWS_SECRET_ACCESS_KEY: "{{ .GARAGE_AWS_SECRET_ACCESS_KEY }}"
  dataFrom:
    - extract:
        key: prowlarr
