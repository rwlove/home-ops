---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app prowlarr
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m

  # disableWait — pod-gateway-routed pods need the gateway-init VPN
  # handshake before the app starts, which can outlast helm-controller's
  # 5-min default wait. Without this, the timed-out upgrade is marked
  # Failed and helm-controller rolls back; the rollback ALSO waits for
  # Ready and ALSO times out, leaving the release stuck and silently
  # reverting the spec that was just applied. Recovery: suspend the HR,
  # delete the failed/pending sh.helm.release.v1.* secrets, resume.
  install:
    disableWait: true
    remediation:
      retries: -1
  upgrade:
    disableWait: true
    remediation:
      retries: -1

  values:
    controllers:
      prowlarr:
        pod:
          securityContext:
            fsGroup: 1104
            fsGroupChangePolicy: "OnRootMismatch"

            runAsGroup: 1104
            runAsUser: 1104
        annotations:
          reloader.stakater.com/auto: "true"
        type: statefulset
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/prowlarr
              tag: rolling@sha256:9c89ef21672a20f4cd4a766b5a085ae5a61de54a79e0841e136330a711b85447

            env:
              PROWLARR__INSTANCE_NAME: Prowlarr
              PROWLARR__LOG__DBENABLED: "False"
              PROWLARR__LOG_LEVEL: info
              PROWLARR__SERVER__PORT: &port 9696

            envFrom:
              - secretRef:
                  name: *app

            resources:
              requests:
                cpu: 15m
                memory: 300M
              limits:
                memory: 300M

    service:
      app:
        ports:
          http:
            port: *port

    route:
      app:
        annotations:
          glance/name: "Prowlarr"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/prowlarr.png"
          glance/id: "Downloads"
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - kind: Service
                name: prowlarr-oauth2-proxy
                port: 4180

    persistence:
      config:
        existingClaim: prowlarr-config-pvc
