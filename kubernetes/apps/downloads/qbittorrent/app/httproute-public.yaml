---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/gateway.networking.k8s.io/httproute_v1.json
#
# /api bypasses gateway extAuth — qbittorrent API clients authenticate
# with qbittorrent's own WebUI credentials (was
# --skip-auth-route=^/api/ on the retired oauth2-proxy, #12767).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qbittorrent-public
spec:
  hostnames:
    - bt.${SECRET_DOMAIN}
  parentRefs:
    - name: internal
      namespace: network
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: qbittorrent
          port: 8080
