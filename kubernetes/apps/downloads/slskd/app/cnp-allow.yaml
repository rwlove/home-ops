---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: slskd-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: slskd
  # Additive — default-deny is what triggers the lockdown; these rules
  # punch holes through it.
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # Internal gateway (envoy) → slskd:5030. Auth is enforced at the
    # gateway by the extAuth SecurityPolicy (#12767); the oauth2-proxy
    # hop is retired.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "5030"
              protocol: TCP
    # Cross-ns: soularr in media ns polls the slskd API to orchestrate
    # Lidarr → Soulseek searches. Env in soularr config.ini:
    #   host_url = http://slskd.downloads.svc.cluster.local:5030
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: media
            app.kubernetes.io/name: soularr
      toPorts:
        - ports:
            - port: "5030"
              protocol: TCP
  egress:
    # VPN egress. ALL Soulseek P2P traffic (peer connections to the
    # Soulseek network on port 50300) routes through the VXLAN tunnel
    # to the gateway pod, then out via WireGuard.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: vpn
            app.kubernetes.io/instance: downloads-gateway
            app.kubernetes.io/name: pod-gateway
            app.kubernetes.io/controller: main
      toPorts:
        - ports:
            - port: "4789"
              protocol: UDP
    # workaround: https://github.com/angelnu/helm-charts/issues/414 — drop this ICMP-echo allow when pod-gateway liveness mechanic changes or pod-gateway is replaced
    # Tracking: home-ops#11829
    # The gateway-sidecar init container (angelnu/pod-gateway
    # client_init.sh v7+) runs an ICMP liveness check against the
    # gateway pod IP before declaring the tunnel up. Without this,
    # init fails → CrashLoopBackOff under default-deny.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: vpn
            app.kubernetes.io/instance: downloads-gateway
            app.kubernetes.io/name: pod-gateway
            app.kubernetes.io/controller: main
      icmps:
        - fields:
            - type: 8  # echo request
              family: IPv4
