---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app slskd
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  install:
    disableWait: true
  upgrade:
    disableWait: true

  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        # seccompProfile: {type: RuntimeDefault}

    controllers:
      slskd:
        annotations:
          reloader.stakater.com/auto: "true"
        type: statefulset
        containers:
          app:
            image:
              repository: ghcr.io/slskd/slskd
              tag: 0.25.1@sha256:ab9ed50e028b524cefdb7c1dd8ebca368a076e18441ee8ac2326473eb850b4c3

            env:
              DOTNET_BUNDLE_EXTRACT_BASE_DIR: /tmp/.net
              PUID: "1108"
              PGID: "1001"
              SLSKD_APP_DIR: /config
              SLSKD_HTTP_PORT: &httpPort 5030
              SLSKD_NO_AUTH: true
              SLSKD_NO_HTTPS: true
              SLSKD_NO_VERSION_CHECK: true
              SLSKD_SLSK_LISTEN_PORT: &soulseekPort 50300

            envFrom:
              - secretRef:
                  name: *app

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *httpPort
                  failureThreshold: 3
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
              readiness: *probes

            resources:
              requests:
                cpu: 25m
                memory: 2G
              limits:
                memory: 2G

            securityContext:
              # slskd's entrypoint starts as root to groupmod/usermod/chown /app
              # and drop to PUID:PGID via gosu. SLSKD_APP_DIR=/config means
              # /app is unused for data; we just need to clear the writability
              # check. Caps cover the entrypoint's setup; after gosu drops to
              # non-root they reset and slskd runs unprivileged.
              # Container-level so the k8tz init container keeps its non-root.
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID"]
              readOnlyRootFilesystem: false
              runAsNonRoot: false
              runAsUser: 0

    service:
      app:
        ports:
          http:
            port: *httpPort
    route:
      main:
        annotations:
          glance/name: "Soulseek"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/soulseek.png"
          glance/id: "Downloads"
        hostnames:
          - "soulseek.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - kind: Service
                name: slskd-oauth2-proxy
                port: 4180

    persistence:
      config:
        existingClaim: slskd-config-pvc

      config-file:
        type: configMap
        name: slskd-configmap
        globalMounts:
          - path: /config/slskd.yml
            subPath: slskd.yml
            readOnly: true

      media:
        existingClaim: slskd-downloads-pvc

      tmp:
        type: emptyDir


    serviceMonitor:
      app:
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s
        serviceName: slskd
