---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app slskd
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  install:
    disableWait: true
  upgrade:
    disableWait: true

  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1001
        runAsNonRoot: true
        runAsUser: 1108
        # seccompProfile: {type: RuntimeDefault}

    controllers:
      slskd:
        annotations:
          reloader.stakater.com/auto: "true"
        type: statefulset
        containers:
          app:
            image:
              repository: ghcr.io/slskd/slskd
              tag: 0.25.1@sha256:ab9ed50e028b524cefdb7c1dd8ebca368a076e18441ee8ac2326473eb850b4c3

            env:
              DOTNET_BUNDLE_EXTRACT_BASE_DIR: /tmp/.net
              SLSKD_APP_DIR: /config
              SLSKD_HTTP_PORT: &httpPort 5030
              SLSKD_NO_AUTH: true
              SLSKD_NO_HTTPS: true
              SLSKD_NO_VERSION_CHECK: true
              SLSKD_SLSK_LISTEN_PORT: &soulseekPort 50300
              # Without group-write, soularr can't rename slskd's
              # downloads into Lidarr's expected artist-album layout;
              # downloads strand in /complete and the NVMe fills.
              SLSKD_UMASK: "0002"

            envFrom:
              - secretRef:
                  name: *app

            probes:
              # slskd 0.25 doesn't bind its HTTP listener until the initial share
              # scan completes — for our 3Ti music library that's ~15-20 min on
              # the first scan after a chart change. A startupProbe defers both
              # liveness and readiness during that window so the pod isn't
              # killed mid-scan, then liveness/readiness take over for steady
              # state. failureThreshold: 180 * periodSeconds: 10 = 30 min grace.
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *httpPort
                  failureThreshold: 180
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 3
              # Liveness goes beyond /health (which only checks slskd's API) and asserts
              # that slskd's Soulseek server connection is making forward progress.
              # When the downloads-gateway VXLAN tunnel flaps, slskd loses its server
              # session and — without VPN integration — sits in "Disconnecting" forever
              # because connectionWatchdog never engages. The exec probe catches that
              # state and restarts the pod after 10×30s = 5 min of stuck Disconnecting,
              # which is the only path back to a logged-in state until upstream slskd
              # exposes a real watchdog config.
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - |
                        wget -qO- http://localhost:5030/health >/dev/null || exit 1
                        wget -qO- http://localhost:5030/api/v0/application \
                          | jq -e '.server.isLoggedIn or .server.isConnecting or .server.isLoggingIn or .connectionWatchdog.isAwaitingVpn' >/dev/null
                  failureThreshold: 10
                  initialDelaySeconds: 0
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *httpPort
                  failureThreshold: 3
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1

            resources:
              requests:
                cpu: 25m
                memory: 1Gi
              limits:
                memory: 2Gi

            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
              readOnlyRootFilesystem: false

    service:
      app:
        ports:
          http:
            port: *httpPort
    route:
      main:
        annotations:
          glance/name: "Soulseek"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/soulseek.png"
          glance/id: "Downloads"
        hostnames:
          - "soulseek.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - kind: Service
                name: slskd
                port: 5030

    persistence:
      config:
        existingClaim: slskd-config-pvc

      config-file:
        type: configMap
        name: slskd-configmap
        globalMounts:
          - path: /config/slskd.yml
            subPath: slskd.yml
            readOnly: true

      media:
        existingClaim: slskd-downloads-pvc

      # Soulseek peers deprioritize zero-share users → every transfer parks
      # in "Queued, Remotely" indefinitely. Mount the music NFS read-only at
      # /media/shared (the path slskd.yml's `shares.directories` lists) so
      # slskd has something to share back and gets normal peer reciprocity.
      shares:
        existingClaim: slskd-shares-pvc
        globalMounts:
          - path: /media/shared
            readOnly: true

      tmp:
        type: emptyDir

      # /app is image-internal scratch. Backing it with an emptyDir lets fsGroup
      # make it group-writable so slskd's entrypoint passes its r+w check at /app.
      # SLSKD_APP_DIR=/config keeps real data on the PVC.
      app:
        type: emptyDir


    serviceMonitor:
      app:
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s
        serviceName: slskd
