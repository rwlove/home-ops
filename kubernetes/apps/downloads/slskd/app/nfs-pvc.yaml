---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/persistentvolume-v1.json
apiVersion: v1
kind: PersistentVolume
metadata:
  name: slskd-downloads-pv
  labels:
    type: nfs
spec:
  storageClassName: slskd-downloads-storage-class
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  mountOptions: ["nfsvers=4.2", "nconnect=8", "hard", "noatime"]
  nfs:
    server: "${NFS_HOST_0}"
    path: /mnt/downloads-nvme/soulseek

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: slskd-downloads-pvc
  labels:
    type: nfs
spec:
  accessModes:
    - ReadWriteMany
  volumeMode: Filesystem
  resources:
    requests:
      storage: 5Gi
  volumeName: slskd-downloads-pv
  storageClassName: slskd-downloads-storage-class

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/persistentvolume-v1.json
apiVersion: v1
kind: PersistentVolume
metadata:
  name: slskd-shares-pv
  labels:
    type: nfs
spec:
  storageClassName: slskd-shares-storage-class
  capacity:
    storage: 3Ti
  accessModes:
    - ReadOnlyMany
  mountOptions: ["nfsvers=4.2", "nconnect=8", "hard", "noatime"]
  nfs:
    server: "${NFS_HOST_2}"
    path: /mnt/mass_storage/storage/MP3s/

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: slskd-shares-pvc
  labels:
    type: nfs
spec:
  accessModes:
    - ReadOnlyMany
  volumeMode: Filesystem
  resources:
    requests:
      storage: 3Ti
  volumeName: slskd-shares-pv
  storageClassName: slskd-shares-storage-class
