---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/namespace-v1.json
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
  labels:
    # PSA: audit-only restricted (see docs/src/pod_security_audit.md).
    # ESO controller + cert-controller + webhook are upstream-clean.
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
