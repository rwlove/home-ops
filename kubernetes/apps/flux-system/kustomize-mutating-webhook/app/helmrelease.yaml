---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.jsonapiVersion: helm.toolkit.fluxcd.io/v2
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kustomize-mutating-webhook
spec:
  chart:
    spec:
      chart: kustomize-mutating-webhook
      interval: 5m
      sourceRef:
        kind: HelmRepository
        name: fluxcd-kustomize-mutating-webhook
      version: 0.11.0
  driftDetection:
    mode: enabled
  install:
    crds: CreateReplace
    createNamespace: true
    replace: true
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
    timeout: 10m
  interval: 5m
  maxHistory: 3
  rollback:
    cleanupOnFail: true
    force: true
    recreate: true
  test:
    enable: true
  uninstall:
    keepHistory: false
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      remediateLastFailure: true
      retries: 3
      strategy: rollback
  valuesFrom:
    - kind: ConfigMap
      name: kustomization-mutating-webhook-values
