---
# ConfigMap holds the aquapured.conf template. The entrypoint script
# in the container image (see containers/aquapured/entrypoint.sh)
# uses envsubst to write the final conf to /run/aquapured/aquapured.conf
# before launching the daemon, substituting ${MQTT_USER} and
# ${MQTT_PASSWD} from the aquapured Secret.
apiVersion: v1
kind: ConfigMap
metadata:
  name: aquapured-config
data:
  aquapured.conf.tmpl: |
    [AQUACONTROLD]

    # Jandy AquaPure standalone salt cell.
    # 0x50 = Jandy AquaPure; 0xB0 = Zodiac Tri SWG with Chem (Ph/ORP).
    SWG_DEVICE_ID = 0x50

    # Use DEBUG_SERIAL for first bring-up; INFO for steady-state.
    log_level = INFO

    WEB_DIRECTORY = /usr/share/aquapured/web/
    WEB_PORT = 80

    # pty created by socat; see container entrypoint.
    SERIAL_PORT = /dev/aquapure

    # Connect to the local mosquitto bridge sidecar (127.0.0.1:1883), NOT EMQX
    # directly: AquapureD's vendored Mongoose sends a CONNECT that EMQX 5's
    # parser silently drops. Mosquitto is lenient, accepts it, and bridges
    # aquapured/# to EMQX. (Address still kept short for the [20] buffer.)
    MQTT_ADDRESS = 127.0.0.1:1883
    # $$ escapes Flux post-build substitution so the literal ${MQTT_USER}
    # placeholder survives into the cluster for the container's envsubst to fill.
    MQTT_USER = $${MQTT_USER}
    MQTT_PASSWD = $${MQTT_PASSWD}
    MQTT_TOPIC = aquapured

    # Disable Domoticz integration (no DZIDX_SWG_STATUS_ALERT_SENSOR needed).

    [RS485_DEVICES]
    [RS485_DEVICE:1]
    # AquapureD emulates the bus master; RS485_ID is the address it presents.
    RS485_TYPE = SWG
    RS485_ID = 0x60

    [ONEWIREDEVICES]

    [GPIOS]
---
# Mosquitto bridge sidecar config. AquapureD's old Mongoose MQTT client is
# rejected by EMQX 5.8.9; mosquitto (lenient) fronts it locally and bridges
# the aquapured/# tree to EMQX. EMQX 5 has no enforced authn, so the bridge
# connects anonymously. Local listener is bound to loopback so it is never
# exposed on the IoT VLAN (net1).
apiVersion: v1
kind: ConfigMap
metadata:
  name: aquapured-mosquitto
data:
  mosquitto.conf: |
    listener 1883 127.0.0.1
    allow_anonymous true
    persistence false
    log_dest stdout
    log_type error
    log_type warning
    log_type notice

    connection emqx
    address emqx.home.svc.cluster.local:1883
    bridge_protocol_version mqttv311
    try_private false
    cleansession true
    notifications false
    restart_timeout 5
    topic aquapured/# both 0
