---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app birdcam-youtube
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 30m
  dependsOn:
    - name: frigate
      namespace: home
  values:
    controllers:
      main:
        pod:
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"
        annotations:
          reloader.stakater.com/auto: "true"

        replicas: 1

        type: statefulset
        containers:
          main:
            image:
              repository: ghcr.io/jrottenberg/ffmpeg
              tag: 8.1-vaapi@sha256:5ce104de6e77ec692d3c03af8bd3c5db78355aa49d8d2a75141c2ecdab280e88


            args:
              - "-re"         # Read input at native frame rate. This is equivalent to setting
              - "-i"          # input (url next line)
              - "rtsp://frigate.home:8554/birdcam" # input URL
              - "-vcodec"     # video codec
              - "copy"
              - "-preset"
              - "ultrafast"
              - "-acodec"     # audio codec
              - "copy"        #
              - "-f"          # output format
              - "flv"         # format
              - "rtmp://a.rtmp.youtube.com/live2/$(YOUTUBE_KEY)"
              - "-v"
              - "verbose"

            env:
              LIBVA_DRIVER_NAME: iHD

            envFrom:
              - secretRef:
                  name: *app

            probes:
              liveness:
                enabled: false
                custom: true
                spec:
                  failureThreshold: 30
                  httpGet:
                    host: frigate.home
                    path: /api/version
                    port: &unsecurePort 5000
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 7
              readiness:
                enabled: false
                custom: true
                spec:
                  failureThreshold: 30
                  httpGet:
                    host: frigate.home
                    path: /api/version
                    port: *unsecurePort
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 7
              startup:
                enabled: false
                custom: true
                spec:
                  failureThreshold: 30
                  httpGet:
                    host: frigate.home
                    path: /api/version
                    port: *unsecurePort
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 7
            resources:
              requests:
                cpu: 800m
                gpu.intel.com/i915: "1"
                memory: 2Gi
              limits:
                gpu.intel.com/i915: "1"
                memory: 2Gi

            securityContext:
              privileged: true
