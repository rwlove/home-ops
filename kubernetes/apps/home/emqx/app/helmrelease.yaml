---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: emqx
spec:
  chart:
    spec:
      chart: emqx
      # renovate: registryUrl=https://repos.emqx.io/charts
      sourceRef:
        kind: HelmRepository
        name: emqx-charts

      version: 5.8.9
  interval: 30m
  values:
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values: ["emqx"]
              topologyKey: kubernetes.io/hostname

            weight: 100
    emqxConfig:
      EMQX_ALLOW_ANONYMOUS: "false"
      EMQX_AUTH__MNESIA__PASSWORD_HASH: plain
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin

    image:
      repository: public.ecr.aws/emqx/emqx

    metrics:
      enabled: false

    persistence:
      enabled: true
      size: 1Gi

      storageClassName: ceph-block
    priorityClassName: home-cluster-critical

    probles:
      liveness:
        enabled: false

      readiness:
        enabled: false
      startup:
        enabled: false
    recreatePods: true

    replicaCount: 3
    resources:
      limits:
        memory: 700M

      requests:
        cpu: 30m
        memory: 700M
    securityContext:
      capabilities:
        add:
          - NET_ADMIN
          - NET_RAW

      privileged: true
    service:
      annotations:
        lbipam.cilium.io/ips: ${SVC_EMQX_ADDR}
      externalTrafficPolicy: Cluster

      type: LoadBalancer
  valuesFrom:
    - kind: Secret
      name: emqx
      targetPath: emqxConfig.EMQX_DASHBOARD__DEFAULT_PASSWORD
      valuesKey: admin_password
    - kind: Secret
      name: emqx
      targetPath: emqxConfig.EMQX_AUTH__USER__1__USERNAME
      valuesKey: user_1_username
    - kind: Secret
      name: emqx
      targetPath: emqxConfig.EMQX_AUTH__USER__1__PASSWORD
      valuesKey: user_1_password
