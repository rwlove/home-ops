---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: esphome-code
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  dependsOn:
    - name: esphome
      namespace: home

  values:
    controllers:
      esphome-code:
        pod:
          securityContext:
            fsGroup: 0
            fsGroupChangePolicy: OnRootMismatch

            runAsGroup: 0
            runAsUser: 0
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        containers:
          app:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.121.0@sha256:ea5f42d99998e2ba44297eca9b8a38a101e718ef54caaa41d649f6c6f1c8c71e

            args:
              - --auth
              - none
              - --user-data-dir
              - /config/.vscode
              - --extensions-dir
              - /config/.vscode
              - --port
              - "8080"
              - /config

            resources:
              requests:
                cpu: 15m
                memory: 120M
              limits:
                memory: 120M

    service:
      app:
        controller: esphome-code
        ports:
          http:
            port: &httpPort 8080

    route:
      app:
        annotations:
          glance/name: "ESPHome Code"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/vscode.png"
          glance/id: "Home Automation"

        hostnames:
          - "esphome-code.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *httpPort
    persistence:
      config:
        existingClaim: esphome-config
        globalMounts:
          - path: /config
