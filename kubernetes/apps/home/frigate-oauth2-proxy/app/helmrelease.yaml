---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app frigate-oauth2-proxy
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      frigate-oauth2-proxy:
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 2000
            runAsGroup: 2000
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch

        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: quay.io/oauth2-proxy/oauth2-proxy
              tag: v7.15.2

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault

            args:
              - --provider=oidc
              - --oidc-issuer-url=https://auth.${SECRET_DOMAIN}
              - --client-id=frigate-oauth2-proxy
              - --redirect-url=https://frigate.${SECRET_DOMAIN}/oauth2/callback
              - --upstream=http://frigate.home.svc.cluster.local:5000
              - --http-address=0.0.0.0:4180
              - --cookie-name=_oauth2_proxy_frigate
              - --cookie-secure=true
              - --cookie-samesite=lax
              - --email-domain=*
              - --whitelist-domain=.${SECRET_DOMAIN}
              - --reverse-proxy=true
              - --pass-user-headers=true
              - --set-xauthrequest=true
              - --skip-provider-button=true
              - --scope=openid email profile groups
              - --code-challenge-method=S256

            envFrom:
              - secretRef:
                  name: frigate-oauth2-proxy-secret

            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi

    service:
      app:
        controller: frigate-oauth2-proxy
        ports:
          http:
            port: 4180
