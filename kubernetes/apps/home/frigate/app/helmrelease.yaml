---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frigate
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      frigate:
        pod:
          annotations:
            k8s.v1.cni.cncf.io/networks: frigate-security-static

          # Lower ndots from the cluster default (5) to 2 so a 2-label
          # external name like api.frigate.video is queried directly
          # instead of being search-domain-expanded first. Under ndots:5
          # the resolver tried api.frigate.video.home.svc.cluster.local
          # first, which resolved to the real ELB IPs; Cilium's DNS proxy
          # then bound those IPs to the search-suffixed name, which does
          # NOT match the `*.frigate.video` toFQDNs selector in
          # cnp-allow.yaml — so Frigate+ egress was POLICY_DENIED and
          # FrigateUnauthorizedEgressAttempt false-fired. ndots:2 keeps
          # 1-label in-cluster short names (e.g. emqx) expanding normally.
          dnsConfig:
            options:
              - name: ndots
                value: "2"

          nodeSelector:
            google.feature.node.kubernetes.io/coral-usb: "true"
            intel.feature.node.kubernetes.io/gpu: "true"
            node.network/vlan-security: "true"

          priorityClassName: home-cluster-critical

        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        initContainers:
          # Native sidecar (restartPolicy: Always). Snapshots config.yml to git
          # on every pod startup so version-bump auto-migrations are captured
          # the moment they happen. The daily CronJob handles ongoing UI edits.
          snapshot:
            image:
              repository: docker.io/library/alpine
              tag: "3.24"
            command: ["/bin/sh", "/opt/snapshot/snapshot.sh"]
            env:
              # Wait for Frigate to finish auto-migration before snapshotting.
              WAIT_BEFORE: "120"
              # Any positive value puts the script in sidecar mode (sleep
              # forever after the attempt so the pod stays Ready, even if the
              # snapshot itself failed — the daily CronJob will retry).
              SLEEP_AFTER: "1"
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
            restartPolicy: Always

        containers:
          app:
            image:
              repository: ghcr.io/blakeblackshear/frigate
              tag: 0.17.2@sha256:d4351369984d4a9e2a49ac59736f6490856a7ea11f7790040746d21496967010

            env:
              # Semantic Search's jina-clip-v1 model is fully cached on the
              # config PVC (/config/model_cache/jinaai/jina-clip-v1). Offline
              # mode makes huggingface_hub skip the startup HEAD to
              # huggingface.co — that egress is denied by the frigate CNP and
              # was firing FrigateUnauthorizedEgressAttempt for ~4 min on every
              # restart (5x retry then fall back to cache anyway). Search keeps
              # working from cache. Flip to "0" if a model_size change or
              # reindex needs to pull a new model.
              HF_HUB_OFFLINE: "1"
              # Memory-leak experiment (issue #12327): testing the legacy
              # i965 VAAPI driver in place of iHD. The upstream ffmpeg leak
              # rides the HW-decode path; both drivers ship in the 0.17.1
              # image and all cameras are H.264, which i965 decodes fine on
              # this Kaby Lake (i7-7700) node. Revert to iHD if decode
              # regresses or the 14d working-set trend is unchanged.
              LIBVA_DRIVER_NAME: i965
              # LIBVA_DRIVER_NAME: iHD
              # surpress error message documented here: https://github.com/blakeblackshear/frigate/discussions/15362
              OPENCV_LOG_LEVEL: FATAL

            envFrom:
              - secretRef:
                  name: frigate

            probes:
              liveness: &probes
                enabled: false
                custom: true
                spec:
                  httpGet:
                    path: /api/version
                    port: &unsecurePort 5000
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 7
                  failureThreshold: 30
              readiness: *probes
              startup:
                enabled: false
                custom: true
                spec:
                  httpGet:
                    path: /api/version
                    port: *unsecurePort
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 30

            resources:
              requests:
                gpu.intel.com/i915: "1"
                cpu: 3
                memory: 7Gi
              limits:
                gpu.intel.com/i915: "1"
                memory: 14Gi

            securityContext:
              privileged: true
              capabilities: {drop: ["ALL"]}

    service:
      app:
        controller: frigate
        ports:
          http:
            port: &securePort 8971
          rtsp:
            port: 8554
          go2rtc-tcp:
            enabled: true
            primary: false
            port: 1984
            protocol: TCP
            targetPort: 1984
          go2rtc-udp:
            enabled: true
            primary: false
            port: 1984
            protocol: UDP
            targetPort: 1984
          unsecure:
            port: *unsecurePort


    route:
      app:
        annotations:
          glance/name: "Frigate"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/frigate.png"
          glance/id: "Security"
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - kind: Service
                name: frigate-oauth2-proxy
                port: 4180
    persistence:
      cache:
        type: emptyDir
        medium: Memory
        sizeLimit: 2Gi
        globalMounts:
          - path: /dev/shm

      clips:
        existingClaim: frigate-clips-pvc
        globalMounts:
          - path: /media/frigate/clips

      config:
        enabled: true
        existingClaim: frigate-config-pvc
        globalMounts:
          - path: /config

      exports:
        existingClaim: frigate-exports-pvc
        globalMounts:
          - path: /media/frigate/exports

      recordings:
        existingClaim: frigate-recordings-pvc
        globalMounts:
          - path: /media/frigate/recordings

      snapshot-script:
        type: configMap
        name: frigate-snapshot-script
        defaultMode: 0555
        advancedMounts:
          frigate:
            snapshot:
              - path: /opt/snapshot
                readOnly: true

      snapshot-ssh:
        type: secret
        name: frigate-snapshot
        defaultMode: 0400
        advancedMounts:
          frigate:
            snapshot:
              - path: /ssh
                readOnly: true

      usb:
        type: hostPath
        hostPath: /dev/bus/usb
        hostPathType: Directory
        advancedMounts:
          frigate:
            app:
              - path: /dev/bus/usb
