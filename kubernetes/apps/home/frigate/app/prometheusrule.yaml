---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: frigate-memory-rules
spec:
  groups:
    - name: frigate.memory
      rules:
        # Upstream ffmpeg memory leak (discussions #19646, #19925) is unfixed
        # in 0.17.1. Working-set climbs steadily until the 14Gi limit OOM-kills
        # the pod. These alerts give a heads-up before that happens.
        - alert: FrigateMemoryHigh
          annotations:
            summary: Frigate working-set above 12 GiB ({{ $value | humanize1024 }}B) — leak approaching the 14Gi cap
            description: |
              Frigate's ffmpeg memory leak appears to be progressing. Pod {{ $labels.pod }}
              has been above 12 GiB for 30 minutes. Expect an OOM kill within hours if the
              trend continues. See project_frigate_memory_leak.md.
          expr: |
            max by (namespace, pod, container) (
              container_memory_working_set_bytes{namespace="home",pod=~"frigate-.*",container="main"}
            ) > 12 * 1024 * 1024 * 1024
          for: 30m
          labels:
            severity: warning
        - alert: FrigateMemoryCritical
          annotations:
            summary: Frigate working-set above 13 GiB ({{ $value | humanize1024 }}B) — OOM kill imminent
            description: |
              Pod {{ $labels.pod }} is within 1 GiB of its 14Gi cap. Restart the pod to
              reset the leak before kubelet OOM-kills it mid-recording.
          expr: |
            max by (namespace, pod, container) (
              container_memory_working_set_bytes{namespace="home",pod=~"frigate-.*",container="main"}
            ) > 13 * 1024 * 1024 * 1024
          for: 5m
          labels:
            severity: critical
    - name: frigate.snapshot
      rules:
        # The snapshot pipeline writes config.yml to git so PVC loss / version
        # bump auto-migrations are recoverable. Silent failures defeat the
        # point: this fires when either the daily CronJob fails or the
        # in-pod sidecar can't reach Running (which usually means it's
        # CrashLoopBackOff because of a literal-credential check or
        # auth/network failure).
        - alert: FrigateSnapshotJobFailed
          annotations:
            summary: Frigate snapshot Job failed ({{ $labels.job_name }})
            description: |
              The frigate-snapshot CronJob's last run failed. Common causes: literal
              credential introduced in config.yml (check the Job logs for
              "literal credentials"), GitHub deploy key revoked, or repo push
              rejected. Inspect with `kubectl -n home logs job/{{ $labels.job_name }}`.
          expr: kube_job_failed{namespace="home",job_name=~"frigate-snapshot.*"} > 0
          for: 5m
          labels:
            severity: warning
        - alert: FrigateSnapshotSidecarDown
          annotations:
            summary: Frigate snapshot sidecar not Running on {{ $labels.pod }}
            description: |
              The in-pod snapshot sidecar isn't Running (likely CrashLoopBackOff).
              Startup-time snapshots aren't being captured. The daily CronJob
              still runs, but version-bump migrations may be lost if the pod
              restarts during the gap. Inspect with `kubectl -n home logs
              {{ $labels.pod }} -c snapshot`.
          expr: |
            kube_pod_init_container_status_running{namespace="home",pod=~"frigate-.*",container="snapshot"} == 0
          for: 15m
          labels:
            severity: warning
    - name: frigate.network
      rules:
        # Forensic catcher for the unidentified 2026-05-21 burst where
        # frigate-0 attempted TCP SYNs to wled-bush (10.10.20.41) on :80
        # and :21324. Static config, db, env, logs all checked clean; the
        # trigger went to an API endpoint that doesn't show in the nginx
        # access log. Burst was one-shot but we haven't pinned the cause.
        #
        # This alert fires on any policy-denied egress from a home-ns pod
        # on worker4 to a `world` destination over TCP. worker4 is where
        # frigate-0 lives; the only other home-ns pods there
        # (emqx-1 / smtp-relay-0 / ntfy / windmill-oauth2-proxy) don't
        # have policy-denied egress paths in steady state. When this
        # fires, grab Hubble flows on cilium-8nxm5 within the next ~30s
        # before the ring buffer ages out:
        #   kubectl -n kube-system exec ds/cilium -c cilium-agent -- \
        #     hubble observe --since 5m --from-pod home/frigate-0 --verdict DROPPED
        - alert: FrigateUnauthorizedEgressAttempt
          annotations:
            summary: home-ns pod on worker4 attempted policy-denied TCP egress to world
            description: |
              Frigate (or another home-ns pod on worker4) tried a TCP connection
              that Cilium denied at the egress policy. Most likely candidate is
              frigate-0 probing an unauthorized destination — this is the same
              shape as the 2026-05-21 22:10 UTC burst to wled-bush. Pull Hubble
              flows on cilium-8nxm5 within ~30s to capture the destination
              before the ring buffer rotates: `kubectl -n kube-system exec ds/cilium
              -c cilium-agent -- hubble observe --since 5m --from-pod home/frigate-0
              --verdict DROPPED`. Save the output before responding.
          expr: |
            sum by (node) (
              rate(hubble_drop_total{
                source_namespace="home",
                destination_namespace="",
                node="worker4.thesteamedcrab.com",
                protocol="TCP",
                reason="POLICY_DENIED"
              }[5m])
            ) > 0
          for: 1m
          labels:
            severity: warning
