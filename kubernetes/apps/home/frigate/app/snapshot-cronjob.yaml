---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/cronjob-batch-v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: frigate-snapshot
spec:
  # k8tz transparently injects timeZone: America/New_York on this cluster, so
  # the schedule below is local time.
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          # Label is the endpointSelector key for the dedicated
          # frigate-snapshot-allow CNP (egress to world:22 for git push).
          labels:
            app.kubernetes.io/name: frigate-snapshot
        spec:
          serviceAccountName: frigate-snapshot
          restartPolicy: OnFailure
          # An init container does kubectl exec to dump config.yml from the
          # running Frigate pod (PVC is RWO, so we can't co-mount it). The main
          # container then commits and pushes via the shared script.
          initContainers:
            - name: dump-config
              image: docker.io/alpine/k8s:1.36.2@sha256:44ef4942e171939b9c665a4a84beb80e2dcdb9a24330d4651cfdfd2e9deecc47
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  kubectl -n home exec frigate-0 -c app -- cat /config/config.yml > /shared/config.yml
                  chmod 644 /shared/config.yml
                  echo "Dumped $(wc -l < /shared/config.yml) lines from frigate-0:/config/config.yml"
              volumeMounts:
                - name: shared
                  mountPath: /shared
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 128Mi
          containers:
            - name: snapshot
              # Pre-baked git + openssh image — avoids the alpine:3.23
              # `apk add git openssh-client` at runtime, which fails
              # under home-ns default-deny (no egress to dl-cdn.alpine
              # linux.org). Same pattern as ha-config-sync (PR #11710).
              image: docker.io/alpine/git:v2.52.0
              command: ["/bin/sh", "/opt/snapshot/snapshot.sh"]
              env:
                - name: CONFIG_FILE
                  value: /shared/config.yml
              volumeMounts:
                - name: shared
                  mountPath: /shared
                - name: ssh
                  mountPath: /ssh
                  readOnly: true
                - name: script
                  mountPath: /opt/snapshot
                  readOnly: true
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  memory: 256Mi
          volumes:
            - name: shared
              emptyDir: {}
            - name: ssh
              secret:
                secretName: frigate-snapshot
                defaultMode: 0400
                items:
                  - key: id_ed25519
                    path: id_ed25519
            - name: script
              configMap:
                name: frigate-snapshot-script
                defaultMode: 0555
                items:
                  - key: snapshot.sh
                    path: snapshot.sh
