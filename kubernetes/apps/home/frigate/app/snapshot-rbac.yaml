---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frigate-snapshot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: frigate-snapshot
rules:
  - apiGroups: [""]
    resources: ["pods"]
    resourceNames: ["frigate-0"]
    verbs: ["get"]
  # pods/exec subresource doesn't honor resourceNames; namespace-scoped is the
  # tightest k8s RBAC allows here.
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: frigate-snapshot
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: frigate-snapshot
subjects:
  - kind: ServiceAccount
    name: frigate-snapshot
