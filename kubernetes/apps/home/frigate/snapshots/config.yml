# yamllint disable
# This file is a snapshot of Frigate's live /config/config.yml,
# written by Frigate itself via the UI / API config setter.
# Not hand-authored YAML; not Flux-reconciled. Lint rules around
# quoted-strings / comment-spacing don't apply.
mqtt:
  host: emqx.home.svc.cluster.local
  topic_prefix: frigate
  user: '{FRIGATE_MQTT_USERNAME}'
  password: '{FRIGATE_MQTT_PASSWORD}'

ffmpeg:
  global_args: [-hide_banner, -loglevel, info]
  # ➜  ~ cat /proc/cpuinfo  | grep "model name" | head -1
  # model name	: Intel(R) Core(TM) i7-7700 CPU @ 3.60GHz (Lenovo M910x)
  # https://www.intel.com/content/www/us/en/products/sku/97128/intel-core-i77700-processor-8m-cache-up-to-4-20-ghz/specifications.html
  #hwaccel_args: preset-intel-qsv-h264
  # (no QSV on Lenovo M910x) <-- delete above if working
  # https://github.com/blakeblackshear/frigate/discussions/6405#discussioncomment-5821707
  hwaccel_args: preset-vaapi

detectors:
  coral:
    type: edgetpu
    device: usb

ui:
  # can be "metric" or "imperial", default is metric
  unit_system: imperial

model:
  path: plus://3e711036dc2003b0afdbfd8fa61de75e
  #c68fb5900938a9cccddfbc637ce535f2
  #18258fc4c00729ee12287b1adc2ed763
  #a316bbbf0da5b12c0548bf475f534bde
  #46287cf8d9e18ad374ab2d1acdaa8de8
  #63e775900371c6f8d7b55d6d42facea8
  #182461734fdb111413d4c7e83a3e3034
  #6edeacefa958d51e89a961ed5b418b8f
  #b5abb723a0db7a6bb581b71552774e81
  #a9fc8d0fdc35df282fd3911f9b2a6f5b
  #6514830311b1b8f1fb45cbc2702ef369
  #path: plus://'{FRIGATE_PLUS_MODEL}'

auth:
  enabled: false
  #reset_admin_password: true

tls:
  enabled: false

logger:
  default: info
  #logs:
  #  frigate.record: debug

#logger:
#  logs:
#    frigate.record: debug

database:
  path: /config/frigate.db

genai:
  provider: ollama
  base_url: http://ollama-spark.ai.svc.cluster.local:11434
  model: llama3.2-vision:11b
objects:
  track:
    - person
    - dog
    - car
    - deer
    - raccoon
    - fox
    - rabbit
    - face
    - license_plate
    - amazon
    - ups
    - usps
    - fedex
    - package
    - waste_bin
    - bird
    - motorcycle
    - groundhog
    - garbage_truck

  genai:
    enabled: true
    prompt: Analyze the {label} in these images from the {camera} security 
      camera. Focus on the actions, behavior, and potential intent of the 
      {label}, rather than just describing its appearance.
    object_prompts:
      person: You are reviewing images from a security camera. Your task is to 
        give a short but complete description of the person or persons closest 
        to the camera, without describing the surroundings. Your response will 
        be announced so it needs to be short and clear. If the image appears to 
        be taken at night do not describe the color or brightness. Do not 
        describe the image or when you think it was taken. Do not describe where
        the person is. If the person is holding an item that you can clearly see
        in detail, provide a short visual description.
      car: You are reviewing images from a security camera. Your task is to give
        a short but complete physical description of the car and what it is 
        doing. Your response will be announced so it needs to be short and 
        clear.
  #model: deepseek-r1:8b
  #model: llava:13b

record:
  enabled: true
  alerts:
    pre_capture: 10
    post_capture: 10
    retain:
      days: 30
      mode: active_objects
  detections:
    retain:
      days: 60
      mode: motion
  continuous:
    days: 4
snapshots:
  enabled: true
  timestamp: true
  bounding_box: true
  crop: false

go2rtc:
  api:
    origin: '*'
  webrtc:
    candidates:
      - 10.10.40.102:1984
      - stun:1984
  #log:
