---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: home-assistant-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: home-assistant
  # Additive — default-deny is what triggers the lockdown; these rules
  # punch holes through it.
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # HTTPRoute on EXTERNAL gateway (via cloudflared tunnel) →
    # home-assistant:8123. Also reached directly on LAN via the
    # LoadBalancer VIP (SVC_HOME_ASSISTANT_ADDR).
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "8123"
              protocol: TCP
    # LAN clients hitting the LoadBalancer VIP for the HA UI / native
    # app, and the in-cluster prometheus scrape config that uses the
    # HA REST API (not the standard /metrics endpoint, so the baseline
    # allow-monitoring-scrape may not match — explicit here).
    - fromEntities:
        - world
        - host
        - remote-node
        - cluster
      toPorts:
        - ports:
            - port: "8123"
              protocol: TCP
    # home-assistant-config-sync CronJob (same ns) calls
    # /api/services/homeassistant/reload_all after a successful `git
    # pull`. Sync pod's egress to HA is the matching half of this hole.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: home
            app.kubernetes.io/name: home-assistant-config-sync
      toPorts:
        - ports:
            - port: "8123"
              protocol: TCP
  egress:
    # Postgres recorder backend (Pattern B — CNPG cluster in databases).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            cnpg.io/cluster: postgres-home-assistant
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # smtp-relay in same ns for HA notifications. Intra-namespace, but
    # listed for grep-ability.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: home
            app.kubernetes.io/name: smtp-relay
      toPorts:
        - ports:
            - port: "2525"
              protocol: TCP
    # Media integrations (Pattern E — cross-ns to specific apps):
    # HA's `media_player.jellyfin` integration and the Music Assistant
    # integration both initiate connections from HA → media ns.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: media
            app.kubernetes.io/name: jellyfin
      toPorts:
        - ports:
            - port: "8096"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: media
            app.kubernetes.io/name: music-assistant
      toPorts:
        - ports:
            - port: "8095"
              protocol: TCP
    # Prometheus consumer integration (Pattern E — cross-ns to specific
    # app). HA scrapes kube-prometheus-stack Prometheus for in-cluster
    # metrics (GPU utilization, UPS, Ceph health, etc.) and surfaces
    # them on Lovelace dashboards. Selector matches the Prometheus
    # StatefulSet pod exclusively (not alertmanager, not the operator).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
    # Home Assistant integrations call out to an unbounded set of cloud
    # APIs (weather, Pushover, OpenAI, voice cloud services, Frigate
    # MQTT/HTTP, calendar, etc.) plus arbitrary user-installed HACS
    # integrations. The set is user-driven and changes per-config;
    # toEntities:world is the only practical option. Documented as
    # intentional per the rollout-plan design decisions.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "80"
              protocol: TCP
            - port: "8883"
              protocol: TCP # external MQTT-TLS brokers
            - port: "1883"
              protocol: TCP # external MQTT plain (Mosquitto.org test broker, etc)
    # LAN device polling — these reach physical hosts on the main home
    # subnet via eth0 (Cilium-governed), not via the multus secondary
    # NICs. The IoT/security-VLAN NICs handle discovery/polling on
    # 10.10.20.x / 10.10.40.x and bypass Cilium.
    #
    # TCP 9090 — Kodi JSON-RPC. Five `kodi` integrations are configured
    # in HA (kodi-bedroom .5, kodi-? .6, kodi-? .7, kodi-familyroom .11,
    # kodi-? .14), all polling Kodi's EventServer/JSON-RPC on 9090.
    - toCIDR:
        - 192.168.1.0/24
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
    # SNMP polling — UPSes on the management subnet (.5.36 = UPS-3000,
    # .5.65 = UPS-1500, SmartConnect cards) and the Dell R730xd iDRAC
    # on the main LAN. Both via SNMP v2c, community `public`.
    # See [[reference_rack_ups_topology]] + [[reference_beast_idrac_power_probes]].
    - toCIDR:
        - 192.168.1.22/32
        - 192.168.5.0/24
      toPorts:
        - ports:
            - port: "161"
              protocol: UDP
    # IPP printer (Brother MFC-J895DW) on the management subnet. The
    # `ipp` integration is currently in setup_retry without this rule.
    - toCIDR:
        - 192.168.5.29/32
      toPorts:
        - ports:
            - port: "631"
              protocol: TCP
    # LAN integrations that poll over various TCP ports on the main
    # home subnet (192.168.1.0/24):
    #   * 23    — Denon AVR Telnet control protocol (.1.12)
    #   * 8080  — Denon AVR HTTP (denon.thesteamedcrab.com / .1.12)
    #   * 60006 — Denon HEOS protocol (same host as 8080)
    #   * 8043  — Omada Controller HTTPS UI on brain (.1.1)
    #   * 19444 — Hyperion JSON-RPC on kodi-familyroom (.1.11)
    #   * 61208 — Glances on brain (.1.1) + beast (.1.27)
    - toCIDR:
        - 192.168.1.0/24
      toPorts:
        - ports:
            - port: "23"
              protocol: TCP
            - port: "8080"
              protocol: TCP
            - port: "60006"
              protocol: TCP
            - port: "8043"
              protocol: TCP
            - port: "19444"
              protocol: TCP
            - port: "61208"
              protocol: TCP
    # LG webOS TVs on the management subnet expose the WebSocket API
    # on TCP 3000. lg-familyroom (.5.44) + lg-bedroom (.5.26).
    - toCIDR:
        - 192.168.5.0/24
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    # In-cluster Ollama (ai/ollama-0:11434). HA's `ollama` custom
    # integration / template REST sensor calls the API for LLM-driven
    # automations and sensor enrichment.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: ai
            app.kubernetes.io/name: ollama
      toPorts:
        - ports:
            - port: "11434"
              protocol: TCP
    # mDNS multicast discovery over eth0. HA's zeroconf integration
    # sends queries to 224.0.0.251:5353; Cilium classifies the multicast
    # destination as `world`. The multus IoT/SECURITY VLAN secondary
    # NICs (hass-iot-static, hass-security-static) handle the bulk of
    # LAN discovery and bypass Cilium entirely — only eth0 (apiserver,
    # DNS, cross-ns, external) is governed here, including this mDNS
    # path through default-deny.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "5353"
              protocol: UDP
