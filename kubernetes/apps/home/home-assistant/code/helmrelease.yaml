---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant-code
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  dependsOn:
    - name: home-assistant
      namespace: home

  values:
    controllers:
      home-assistant-code:
        pod:
          securityContext:
            fsGroup: 0
            fsGroupChangePolicy: OnRootMismatch

            runAsGroup: 0
            runAsUser: 0
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        containers:
          app:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.126.0@sha256:e1f03b5faaefd63ba6c7173a5290c6ec0526ac907f23acfe6bc949dd965279e4

            args:
              - --auth
              - none
              - --user-data-dir
              - /config/.vscode
              - --extensions-dir
              - /config/.vscode
              - --port
              - "8080"
              - /config

            resources:
              requests:
                cpu: 10m
                memory: 640M
              limits:
                memory: 640M

    service:
      app:
        controller: home-assistant-code
        ports:
          http:
            port: &httpPort 8080

    route:
      app:
        annotations:
          glance/name: "Home Assistant Code"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/vscode.png"
          glance/id: "Home Automation"

        hostnames:
          - "hass-code.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *httpPort
    persistence:
      config:
        existingClaim: home-assistant-config-pvc
        globalMounts:
          - path: /config
