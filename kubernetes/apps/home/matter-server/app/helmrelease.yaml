---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app matter-server
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  interval: 30m
  dependsOn: []

  install:
    remediation:
      retries: -1

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  values:
    controllers:
      *app :
        pod:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node.network/vlan-iot
                        operator: In
                        values:
                          - "true"

          annotations:
            k8s.v1.cni.cncf.io/networks: matter-server-iot-static

          # IOT VLAN (20)
          priorityClassName: home-cluster-critical

          securityContext:
            fsGroup: 0
            fsGroupChangePolicy: "OnRootMismatch"
            runAsGroup: 0
            runAsNonRoot: false               # Must be run as root user
            runAsUser: 0                      # Must be run as root user
            supplementalGroups:
              - 34

        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          *app :
            image:
              pullPolicy: IfNotPresent

              repository: ghcr.io/home-assistant-libs/python-matter-server
              tag: 8.1.0@sha256:170aa093ce91c76cde4cc390918307590f0f5558fcec93f913af3cb019e6562a
            args:
              - --storage-path=/data
              - --primary-interface=net1
              - --log-level=debug
              - --log-level-sdk=info

            env:
              MATTER_SERVER__APPLICATION_URL: &host "{{ .Release.Name }}.${SECRET_DOMAIN}"
              MATTER_SERVER__INSTANCE_NAME: *app
              MATTER_SERVER__LOG_LEVEL: info

              MATTER_SERVER__PORT: &httpPort 5580
            resources:
              requests:
                cpu: 50m
                memory: 100M
              limits:
                memory: 100M

    service:
      *app :
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: ${SVC_MATTER_ADDR}
        controller: *app
        externalTrafficPolicy: Local
        ports:
          http:
            port: *httpPort

    route:
      main:
        annotations:
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/matter.png"
          glance/id: "Home Automation"

          glance/name: "Matter Server"
          glance/show: "true"
        hostnames:
          - "matter.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: *app
                port: *httpPort
    persistence:
      data:
        existingClaim: matter-server-data-pvc

      tmp:
        type: emptyDir
        medium: Memory
