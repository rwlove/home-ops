---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: n8n-secret
    creationPolicy: Owner
    template:
      data:
        N8N_ENCRYPTION_KEY: "{{ .ENCRYPTION_KEY }}"
        # n8n postgres connection
        DB_POSTGRESDB_HOST: "postgres-n8n-rw.databases.svc.cluster.local"
        DB_POSTGRESDB_PORT: "5432"
        DB_POSTGRESDB_DATABASE: "n8n"
        DB_POSTGRESDB_USER: "{{ .POSTGRES_USER }}"
        DB_POSTGRESDB_PASSWORD: "{{ .POSTGRES_PASSWORD }}"
        # postgres-init initContainer (creates db + user via superuser)
        INIT_POSTGRES_HOST: "postgres-n8n-rw.databases.svc.cluster.local"
        INIT_POSTGRES_DBNAME: "n8n"
        INIT_POSTGRES_USER: "{{ .POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .POSTGRES_PASSWORD }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
        # HMAC key for langgraph-agents /approval requests. Same value as
        # the langgraph-agents Deployment sees — sourced from the same
        # 1Password item to make rotation a single op.
        LANGGRAPH_APPROVAL_SIGNING_KEY: "{{ .LANGGRAPH_APPROVAL_SIGNING_KEY }}"
  dataFrom:
    - extract:
        key: cloudnative-pg
    - extract:
        key: n8n
    - extract:
        key: langgraph-agents
