---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: netbox-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: netbox
  # Additive — default-deny is what triggers the lockdown; these rules
  # punch holes through it.
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # Internal HTTPRoute (envoy → netbox via svc:80 → pod:8080). Cilium
    # L4 policy is evaluated against the target port on the pod, not
    # the service port, so this allows :8080 (the actual pod listener).
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # netbox-mcp in mcp-system queries the netbox REST API via the same
    # service:80 → pod:8080 path.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: mcp-system
            app.kubernetes.io/name: netbox-mcp
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Prometheus metrics port 9090 — baseline allow-monitoring-scrape
    # already covers prometheus → any-port for endpoints in this ns.
  egress:
    # Postgres backend (Pattern B — CNPG cluster in databases).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            cnpg.io/cluster: postgres-netbox
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Dragonfly (Redis-compatible) caching + tasks DB (Pattern E).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            app.kubernetes.io/name: dragonfly
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
    # smtp-relay in same ns for netbox email notifications. Intra-
    # namespace, listed for grep-ability.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: home
            app.kubernetes.io/name: smtp-relay
      toPorts:
        - ports:
            - port: "2525"
              protocol: TCP
    # Garage S3 backend for netbox file storage (Pattern E —
    # garage.storage.svc.cluster.local:3900).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: storage
            app.kubernetes.io/name: garage
      toPorts:
        - ports:
            - port: "3900"
              protocol: TCP
    # OIDC token exchange — direct to authelia in-cluster Service
    # (Pattern E). netbox uses python-social-auth's OpenID Connect
    # backend (configured via the oidc.yaml extra config) to do
    # server-side token exchange against Authelia after the user
    # login redirect. toEntities:[world]:443 and
    # matchPattern:auth.${SECRET_DOMAIN} DO NOT work for the
    # in-cluster path: split-horizon DNS returns the LB IP and
    # Cilium socket-lb rewrites the connect() to the envoy pod IP +
    # targetPort 10443 BEFORE policy check, so neither rule matches
    # the rewritten destination. Authelia's CNP already permits
    # fromEntities:cluster on 9091. Mirrors paperless PR #11525.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: auth
            app.kubernetes.io/name: authelia
      toPorts:
        - ports:
            - port: "9091"
              protocol: TCP
