---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: netbox-secret
    template:
      data:
        # S3
        AWS_ACCESS_KEY_ID: "{{ .GARAGE_AWS_ACCESS_KEY_ID }}"
        AWS_SECRET_ACCESS_KEY: "{{ .GARAGE_AWS_SECRET_ACCESS_KEY }}"
        # App
        email_password: ""
        napalm_password: ""
        REDIS_PASSWORD: "" # "{{ .DRAGONFLY_PASSWORD }}"
        secret_key: "{{ .SECRET_KEY }}"
        api_token_peppers: '{"1": "{{ .API_TOKEN_PEPPER_1 }}"}'
        # Superuser
        username: "admin"
        email: "admin@${SECRET_DOMAIN}"
        password: "{{ .SUPERUSER_PASSWORD }}"
        api_token: "{{ .SUPERUSER_API_TOKEN }}"
        # OIDC SSO via Authelia. The chart's configuration.py loads any
        # /run/config/extra/*/*.yaml file via _load_yaml(); this secret key
        # ends up mounted as /run/config/extra/0/oidc.yaml and gets merged
        # into globals(). admin_only is enforced at the Authelia client.
        oidc.yaml: |
          REMOTE_AUTH_ENABLED: true
          REMOTE_AUTH_BACKEND: social_core.backends.open_id_connect.OpenIdConnectAuth
          REMOTE_AUTH_AUTO_CREATE_USER: true
          SOCIAL_AUTH_OIDC_OIDC_ENDPOINT: https://auth.${SECRET_DOMAIN}
          SOCIAL_AUTH_OIDC_KEY: netbox
          SOCIAL_AUTH_OIDC_SECRET: '{{ .OAUTH_CLIENT_SECRET }}'
          SOCIAL_AUTH_OIDC_USE_PKCE: true
          LOGIN_REQUIRED: true
        # Database
        NETBOX_PG_PASS: &dbpass "{{ .POSTGRES_PASSWORD }}"
        # Postgres Init
        INIT_POSTGRES_DBNAME: "netbox"
        INIT_POSTGRES_HOST: "postgres-netbox-rw.databases.svc.cluster.local"
        INIT_POSTGRES_USER: "{{ .POSTGRES_USER }}"
        INIT_POSTGRES_PASS: *dbpass
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: cloudnative-pg
    # - extract:
    #     key: garage
    - extract:
        key: netbox
