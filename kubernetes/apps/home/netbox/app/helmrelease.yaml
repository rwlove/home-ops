---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app netbox
spec:
  chartRef:
    kind: OCIRepository
    name: netbox
  interval: 1h
  values:
    admins:
      - ["rwlove", "server.netbox@${SECRET_DOMAIN}"]
    cachingDatabase:
      database: 4
      # existingSecretName: "netbox-secret"
      # existingSecretKey: "REDIS_PASSWORD"
      host: dragonfly.databases.svc.cluster.local
    commonAnnotations:
      reloader.stakater.com/auto: "true"
    commonLabels:
      postgres: "true"
      teleport: enabled
    csrf:
      trustedOrigins: ["https://netbox.${SECRET_DOMAIN}"]
    dateFormat: "j. F, Y"
    dateTimeFormat: "j. F, Y g:i a"
    email:
      from: netbox@${SECRET_DOMAIN}
      port: 2525
      server: smtp-relay.home.svc.cluster.local
    existingSecret: &secret netbox-secret
    externalDatabase:
      database: netbox
      existingSecretKey: "NETBOX_PG_PASS"
      existingSecretName: "netbox-secret"
      host: postgres-netbox-rw.databases.svc.cluster.local
      port: 5432
      username: netbox
    extraConfig:
      - secret:
          secretName: *secret
    housekeeping:
      enabled: false
    httpRoute:
      enabled: true
      hostnames:
        - "netbox.${SECRET_DOMAIN}"
      parentRefs:
        - name: internal
          namespace: network
    initContainers:
      - envFrom:
          - secretRef:
              name: *secret
        image: ghcr.io/home-operations/postgres-init:18
        name: init-db
    livenessProbe:
      enabled: false
    loginRequired: false
    metricsEnabled: true
    persistence:
      enabled: false
    postgresql:
      enabled: false
    readinessProbe:
      enabled: false
    service:
      annotations:
        teleport.dev/name: *app
    shortDateFormat: "j.m.Y"
    shortDateTimeFormat: "j.m.Y H:i"
    shortTimeFormat: "H:i:s"
    storages:
      default:
        BACKEND: "storages.backends.s3.S3Storage"
        OPTIONS:
          bucket_name: "netbox"
          endpoint_url: "http://garage.storage.svc.cluster.local:3900"
          region_name: "us-east-1"
    superuser:
      existingSecret: *secret
    tasksDatabase:
      database: 3
      # existingSecretName: "netbox-secret"
      # existingSecretKey: "REDIS_PASSWORD"
      host: dragonfly.databases.svc.cluster.local
    timeFormat: "G:i"
    timeZone: ${TIMEZONE}
    valkey:
      enabled: false
    worker:
      enabled: false
  valuesFrom:
    - kind: Secret
      name: *secret
      targetPath: storages.default.OPTIONS.access_key
      valuesKey: AWS_ACCESS_KEY_ID
    - kind: Secret
      name: *secret
      targetPath: storages.default.OPTIONS.secret_key
      valuesKey: AWS_SECRET_ACCESS_KEY
