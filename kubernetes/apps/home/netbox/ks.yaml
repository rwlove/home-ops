---
# TODO: add schema
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app netbox
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  targetNamespace: &namespace home
  path: ./kubernetes/apps/home/netbox/app
  interval: 1h
  timeout: 5m
  prune: true
  wait: false
  sourceRef:
    kind: GitRepository
    name: home-ops-kubernetes
    namespace: flux-system
  dependsOn:
    - name: netbox
      namespace: databases
    - name: dragonfly-operator
      namespace: databases
  postBuild:
    substitute:
      APP: *app
  retryInterval: 2m
