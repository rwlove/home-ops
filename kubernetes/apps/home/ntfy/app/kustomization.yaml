---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
components:
  - ../../../../components/repos/app-template
resources:
  - ./cnp-allow.yaml
  - ./helmrelease.yaml
  - ./pvc.yaml
  - ./route.yaml
configMapGenerator:
  - name: ntfy-configmap
    files:
      - server.yml=./resources/server.yml
generatorOptions:
  disableNameSuffixHash: true
