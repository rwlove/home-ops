---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app smtp-relay
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      smtp-relay:

        pod:
          securityContext:
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch

            runAsGroup: 568
            runAsUser: 568
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: *app

        annotations:
          reloader.stakater.com/auto: "true"

        replicas: 1

        type: statefulset
        containers:
          app:
            image:
              repository: ghcr.io/foxcpp/maddy
              tag: 0.9.5@sha256:de42151adff6388edb5e4ee88f60334fa1ab85e309485193ecb1c2db20203315

            env:
              DEBUG: "true"
              SMTP_DOMAIN: "${SECRET_DOMAIN}"
              SMTP_SERVER: "smtp.mailgun.org"
              SMTP_USERNAME: "postmaster@${SECRET_DOMAIN}"
              SMTP_PORT: "465"
              SMTP_RELAY_SMTP_PORT: &port 2525
              SMTP_RELAY_METRICS_PORT: &metricsPort 8080

            envFrom:
              - secretRef:
                  name: *app

            resources:
              requests:
                cpu: 15m
                memory: 64M
              limits:
                memory: 64M

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: ${SVC_SMTP_RELAY_ADDR}
        externalTrafficPolicy: Local
        ports:
          metrics:
            port: *metricsPort
          smtp:
            port: *port
    persistence:
      cache:
        type: emptyDir
        medium: Memory
      config:
        type: configMap
        name: *app
        globalMounts:
          - path: /data/maddy.conf
            subPath: maddy.conf
            readOnly: true


    serviceMonitor:
      app:
        serviceName: *app
        endpoints:
          - port: metrics
