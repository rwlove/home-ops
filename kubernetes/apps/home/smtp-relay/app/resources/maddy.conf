state_dir /cache/state
runtime_dir /cache/run

openmetrics tcp://0.0.0.0:{env:SMTP_RELAY_METRICS_PORT} { }

tls off
hostname {env:SMTP_DOMAIN}

smtp tcp://0.0.0.0:{env:SMTP_RELAY_SMTP_PORT} {
    debug {env:DEBUG}
    default_source {
        deliver_to &remote_queue
    }
}

target.queue remote_queue {
    debug {env:DEBUG}
    target &remote_smtp
}

target.smtp remote_smtp {
    debug {env:DEBUG}
    # Mailgun port 465 = SMTPS (implicit TLS from byte 1); use tls:// scheme.
    # Earlier config used tcp:// + `starttls yes` which expects plain TCP →
    # STARTTLS upgrade (port 587 semantics) and hung on port 465 because both
    # sides waited for the other to speak. Symptom: "read tcp ... :465: i/o
    # timeout" with no mail ever leaving the queue.
    auth plain {env:SMTP_USERNAME} {env:SMTP_PASSWORD}
    targets tls://{env:SMTP_SERVER}:{env:SMTP_PORT}
}
