---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: windmill-oauth2-proxy-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: windmill-oauth2-proxy
  # Additive — default-deny is what triggers the lockdown; these rules
  # punch holes through it.
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # HTTPRoute on internal gateway → windmill-oauth2-proxy:4180
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "4180"
              protocol: TCP
  egress:
    # OIDC discovery + token exchange against Authelia at
    # auth.${SECRET_DOMAIN}. Split-horizon DNS resolves the external
    # URL to the internal envoy LB IP (10.45.0.12); Cilium's socket-lb
    # rewrites connect() to the envoy pod IP + targetPort 10443 BEFORE
    # policy evaluation (per memory project_cilium_l4_port_targetport),
    # so the policy allows the envoy pod on its container port. Same
    # pattern as khoj-oauth2-proxy.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "10443"
              protocol: TCP
    # Upstream → windmill-app.home.svc.cluster.local:8000 is
    # intra-namespace, covered by baseline allow-intra-namespace.
