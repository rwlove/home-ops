---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app windmill-oauth2-proxy
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      windmill-oauth2-proxy:
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 2000
            runAsGroup: 2000
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: quay.io/oauth2-proxy/oauth2-proxy
              tag: v7.15.3
            args:
              - --provider=oidc
              - --oidc-issuer-url=https://auth.${SECRET_DOMAIN}
              - --client-id=windmill-oauth2-proxy
              - --redirect-url=https://windmill.${SECRET_DOMAIN}/oauth2/callback
              - --upstream=http://windmill-app.home.svc.cluster.local:8000
              - --http-address=0.0.0.0:4180
              - --cookie-name=_oauth2_proxy_windmill
              - --cookie-secure=true
              - --cookie-samesite=lax
              - --email-domain=*
              - --whitelist-domain=.${SECRET_DOMAIN}
              - --reverse-proxy=true
              - --pass-user-headers=true
              - --set-xauthrequest=true
              - --skip-provider-button=true
              - --scope=openid email profile groups
              - --code-challenge-method=S256
              # Windmill workers + langgraph-agents + AlertManager call
              # /api/* on windmill-app from inside the cluster. Those
              # paths bypass the user-facing route entirely (they hit
              # the windmill-app Service directly), so no skip-auth-route
              # carveouts are needed here — oauth2-proxy only gates the
              # browser-facing windmill.${SECRET_DOMAIN} traffic.
            envFrom:
              - secretRef:
                  name: windmill-oauth2-proxy-secret
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
              seccompProfile:
                type: RuntimeDefault
    service:
      app:
        controller: windmill-oauth2-proxy
        ports:
          http:
            port: 4180
    route:
      app:
        annotations:
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/windmill.png"
          glance/id: "Automation"
          glance/name: "Windmill"
          glance/show: "true"
        hostnames:
          - windmill.${SECRET_DOMAIN}
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 4180
