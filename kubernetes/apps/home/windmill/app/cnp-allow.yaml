---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: windmill-allow
spec:
  # The chart labels are inconsistent: app + workers carry
  # `release=windmill`, but `windmill-lsp` does NOT. Cover all three
  # via matchExpressions across the chart-set
  # `app.kubernetes.io/name` field.
  endpointSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - windmill-app
          - windmill-lsp
          - windmill-workers
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # Internal Envoy gateway → windmill-app:8000.
    # Cluster-local Service consumers (langgraph-agents, alertmanager
    # → /webhook/*) also hit port 8000.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
        - matchLabels:
            io.kubernetes.pod.namespace: ai
            app.kubernetes.io/name: langgraph-agents
        - matchLabels:
            io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: alertmanager
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # Prometheus → windmill-app-metrics:8001.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "8001"
              protocol: TCP
    # windmill-app → windmill-lsp:3001 (in-browser code-completion LSP).
    - fromEndpoints:
        - matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - windmill-app
                - windmill-lsp
                - windmill-workers
      toPorts:
        - ports:
            - port: "3001"
              protocol: TCP
  egress:
    # Kube DNS — every pod needs this; default-deny namespace.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # CNPG postgres-windmill cluster in `databases` ns.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            cnpg.io/cluster: postgres-windmill
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Workers → app (job pickup is via Postgres but workers also call
    # /api/* on the app server for token refresh, log shipping, etc).
    - toEndpoints:
        - matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - windmill-app
                - windmill-lsp
                - windmill-workers
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
            - port: "3001"
              protocol: TCP
    # In-cluster Services Windmill workflows POST to:
    # langgraph-agents (replaces n8n's role in the LangGraph flows)
    # HolmesGPT (replaces n8n's role for the AlertManager flow)
    # Zulip (chat notifications + approval reactions)
    # MCP gateway (future flows may call MCP backends)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: ai
            app.kubernetes.io/name: langgraph-agents
      toPorts:
        - ports:
            - port: "8765"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: holmesgpt
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: collab
            app.kubernetes.io/name: zulip
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: mcp-system
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # External APIs Windmill workflows hit: Pushover + Anthropic + GitHub.
    # Canonical FQDNs via toEntities:world+443 per memory
    # project_cilium_matchpattern_fqdn_limits (matchPattern silently
    # fails for canonical FQDNs queried via K8s DNS search-domain
    # augmentation).
    - toEntities: [world]
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
