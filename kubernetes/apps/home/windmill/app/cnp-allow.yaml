---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: windmill-allow
spec:
  # Chart label coverage (v4): app + workers carry
  # `release=windmill`, but `windmill-extra` does NOT. Cover all three
  # via matchExpressions across the chart-set
  # `app.kubernetes.io/name` field.
  endpointSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - windmill-app
          - windmill-extra
          - windmill-workers
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # Internal gateway (envoy) → windmill-app:8000 (browser traffic;
    # extAuth SecurityPolicy at the gateway, #12767). Cluster-local
    # Service consumers (langgraph-agents, alertmanager → /webhook/*)
    # hit port 8000 directly, bypassing the gateway.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
        - matchLabels:
            io.kubernetes.pod.namespace: ai
            app.kubernetes.io/name: langgraph-agents
        - matchLabels:
            io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: alertmanager
        # Zulip outgoing-webhook (approval-receiver-bot) calls
        # /api/w/lovenet/jobs/run/p/f/lovenet/langgraph-approval-receive
        # when Rob @-mentions the bot in the #approvals stream.
        - matchLabels:
            io.kubernetes.pod.namespace: collab
            app.kubernetes.io/name: zulip
        # windmill-mcp (mcp-system) reverse-proxies /api/mcp/w/lovenet/mcp
        # with a Bearer token injected from windmill-mcp-secret.
        - matchLabels:
            io.kubernetes.pod.namespace: mcp-system
            app.kubernetes.io/name: windmill-mcp
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # Prometheus → windmill-app-metrics:8001.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "8001"
              protocol: TCP
    # windmill-app → windmill-extra:3001 (in-browser code-completion LSP).
    - fromEndpoints:
        - matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - windmill-app
                - windmill-extra
                - windmill-workers
      toPorts:
        - ports:
            - port: "3001"
              protocol: TCP
  egress:
    # Kube DNS — every pod needs this; default-deny namespace.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # CNPG postgres-windmill cluster in `databases` ns.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            cnpg.io/cluster: postgres-windmill
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Workers → app (job pickup is via Postgres but workers also call
    # /api/* on the app server for token refresh, log shipping, etc).
    - toEndpoints:
        - matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - windmill-app
                - windmill-extra
                - windmill-workers
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
            - port: "3001"
              protocol: TCP
    # In-cluster Services Windmill workflows POST to:
    # langgraph-agents (the fleet's /inbox + /approval surface)
    # HolmesGPT (AlertManager → HolmesGPT path)
    # Zulip (chat notifications + approval reactions)
    # MCP gateway (future flows may call MCP backends)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: ai
            app.kubernetes.io/name: langgraph-agents
      toPorts:
        - ports:
            - port: "8765"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: holmesgpt
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Prometheus query API — used by operator weekly drift crons
    # (storage-weekly, ml-weekly, observability-weekly) to pre-fetch
    # cluster state and pass it as content to the agent. This is
    # "Path 2" of the tool-binding gap workaround
    # ([[reference_agent_fleet_tool_binding_gap]] in memory) — the
    # cron does the data gathering; the agent reasons over real data
    # instead of empty fields from a contentless prompt.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: collab
            app.kubernetes.io/name: zulip
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
    # ntfy (in-cluster Service) — Windmill workflows publish pushes
    # here. External URL https://ntfy.${SECRET_DOMAIN} doesn't work
    # from inside the cluster (Cilium FQDN egress doesn't match the
    # split-horizon internal LB IP), so we use the cluster-internal
    # Service URL set in the windmill-workflows-secret NTFY_URL.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: home
            app.kubernetes.io/name: ntfy
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: mcp-system
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Paperless RAG ingest workflows
    # (paperless-rag-ingest, paperless-rag-tombstone):
    # - paperless (collab ns) for doc list + content
    # - ollama-spark (ai ns) for bge-m3 embeddings
    # - qdrant (databases ns) for point upsert + scroll
    # Each scoped to its specific Service rather than ns-wide.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: collab
            app.kubernetes.io/name: paperless
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: ai
            app.kubernetes.io/name: ollama-spark
      toPorts:
        - ports:
            - port: "11434"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            app.kubernetes.io/name: qdrant
      toPorts:
        - ports:
            - port: "6333"
              protocol: TCP
    # LightRAG graph-RAG ingest (lightrag-rag-ingest / -tombstone) →
    # lightrag (ai ns) REST API. The lightrag CNP already allows the
    # symmetric ingress from windmill-workers.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: ai
            app.kubernetes.io/name: lightrag
      toPorts:
        - ports:
            - port: "9621"
              protocol: TCP
    # External APIs Windmill workflows hit: Pushover + Anthropic + GitHub.
    # Canonical FQDNs via toEntities:world+443 per memory
    # project_cilium_matchpattern_fqdn_limits (matchPattern silently
    # fails for canonical FQDNs queried via K8s DNS search-domain
    # augmentation).
    - toEntities: [world]
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
