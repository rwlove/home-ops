---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: windmill-workflows
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: windmill-workflows-secret
    creationPolicy: Owner
    template:
      data:
        # HMAC key for signing approval tokens sent to langgraph-agents.
        # Single source of truth: the langgraph-agents 1P item.
        LANGGRAPH_APPROVAL_SIGNING_KEY: "{{ .LANGGRAPH_APPROVAL_SIGNING_KEY }}"
        # ntfy push backend — used by the new ntfy-shape workflow
        # scripts (approval-post + inbox with action buttons,
        # awaiting-user-sweep, cost-cap-watcher, alertmanager-HolmesGPT).
        # In-cluster Service URL; the external URL
        # (https://ntfy.${SECRET_DOMAIN}) times out from inside the
        # cluster because Cilium FQDN egress doesn't match split-horizon
        # internal LB IPs.
        NTFY_URL: "http://ntfy.home.svc.cluster.local:8080"
        NTFY_WRITE_TOKEN: "{{ .NTFY_WRITE_TOKEN }}"
        # Pushover creds remain through the overlap window between
        # Flux applying this manifest and the new workflows being
        # synced to the Windmill DB. Removed in a follow-up PR once
        # sync + verification is complete.
        PUSHOVER_APP_TOKEN: "{{ .PUSHOVER_APP_TOKEN }}"
        PUSHOVER_USER_KEY: "{{ .PUSHOVER_USER_KEY }}"
        # Zulip bot creds — used by approval-post + inbox (pause-forward
        # audit card), approval-receive (@-mention fallback path), and
        # daily-digest.
        # ZULIP_API_URL is the in-cluster Service URL — the external
        # https://chat.${SECRET_DOMAIN} times out from inside the cluster
        # for the same Cilium FQDN/world egress reason as NTFY_URL above.
        # The phone-facing click target (chat.${SECRET_DOMAIN}) is
        # hardcoded in the workflow source since the phone needs the
        # external URL.
        ZULIP_API_URL: "http://zulip.collab.svc.cluster.local"
        ZULIP_BOT_EMAIL: "{{ .ZULIP_BOT_EMAIL }}"
        ZULIP_BOT_API_KEY: "{{ .ZULIP_BOT_API_KEY }}"
        ROB_ZULIP_USER_ID: "{{ .ROB_ZULIP_USER_ID }}"
  dataFrom:
    # LANGGRAPH_APPROVAL_SIGNING_KEY + PUSHOVER_*
    - extract:
        key: langgraph-agents
    # NTFY_WRITE_TOKEN
    - extract:
        key: ntfy
    # ZULIP_BOT_* + ROB_ZULIP_USER_ID
    - extract:
        key: zulip-n8n-bot
