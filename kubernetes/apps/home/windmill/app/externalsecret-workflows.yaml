---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: windmill-workflows
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: windmill-workflows-secret
    creationPolicy: Owner
    template:
      data:
        # HMAC key for signing approval tokens sent to langgraph-agents.
        # Single source of truth: the langgraph-agents 1P item.
        LANGGRAPH_APPROVAL_SIGNING_KEY: "{{ .LANGGRAPH_APPROVAL_SIGNING_KEY }}"
        # ntfy push backend — used by the new ntfy-shape workflow
        # scripts (approval-post + inbox with action buttons,
        # awaiting-user-sweep, cost-cap-watcher, alertmanager-HolmesGPT).
        # In-cluster Service URL; the external URL
        # (https://ntfy.${SECRET_DOMAIN}) times out from inside the
        # cluster because Cilium FQDN egress doesn't match split-horizon
        # internal LB IPs.
        NTFY_URL: "http://ntfy.home.svc.cluster.local:8080"
        NTFY_WRITE_TOKEN: "{{ .NTFY_WRITE_TOKEN }}"
        # Zulip bot creds — used by approval-post + inbox (pause-forward
        # audit card), approval-receive (@-mention fallback path), and
        # daily-digest.
        # ZULIP_API_URL is the in-cluster Service URL — the external
        # https://chat.${SECRET_DOMAIN} times out from inside the cluster
        # for the same Cilium FQDN/world egress reason as NTFY_URL above.
        # The phone-facing click target (chat.${SECRET_DOMAIN}) is
        # hardcoded in the workflow source since the phone needs the
        # external URL.
        ZULIP_API_URL: "http://zulip.collab.svc.cluster.local"
        ZULIP_BOT_EMAIL: "{{ .ZULIP_BOT_EMAIL }}"
        ZULIP_BOT_API_KEY: "{{ .ZULIP_BOT_API_KEY }}"
        ROB_ZULIP_USER_ID: "{{ .ROB_ZULIP_USER_ID }}"
        # Paperless RAG ingest / tombstone workflows. Same 1P item
        # (`paperless` / field `mcp_token`) that mcp-system/paperless-mcp
        # already uses — keeping a single token-rotation surface.
        PAPERLESS_TOKEN: "{{ .paperless_mcp_token }}"
        # HAI CLI Bearer token. Required for any Windmill workflow that calls
        # langgraph-agents /admin/* or /inbox endpoints (cost-cap-watcher,
        # awaiting-user-sweep, daily-digest, dlq-watcher). Sourced from the
        # same `hai-cli` 1P item langgraph-agents-secret reads.
        HAI_CLI_TOKEN: "{{ .TOKEN }}"
        # Windmill API token used by the windmill-failure-watcher
        # workflow to query its own /api/w/lovenet/jobs/list_completed.
        # Mint via /api/users/tokens/create as admin@windmill.dev and
        # save into the `windmill` 1P item as field `windmill_api_token`.
        # If the field is missing or empty, the watcher fails fast with
        # "WINDMILL_TOKEN env not set" — other workflows are unaffected.
        WINDMILL_TOKEN: "{{ .windmill_api_token }}"
        # Admin's display name — used ONLY by user-facing DM/notification
        # templates (langgraph-completion-post.ts, etc.). Per the user-
        # class architecture, repo files use the literal token `ADMIN`
        # at the runtime config layer; the actual name is interpolated
        # here at the wrapper/render boundary only. Sourced from the
        # `langgraph-agents.admin_name` 1P field.
        ADMIN_NAME: "{{ .admin_name }}"
  dataFrom:
    # LANGGRAPH_APPROVAL_SIGNING_KEY + admin_name
    # (admin_name lives on the langgraph-agents 1P item — single source
    # of truth, same item already extracted here. Restricted-tier PII;
    # used ONLY by render-layer templates, never injected into agent
    # system prompts.)
    - extract:
        key: langgraph-agents
    # NTFY_WRITE_TOKEN
    - extract:
        key: ntfy
    # ZULIP_BOT_* + ROB_ZULIP_USER_ID
    - extract:
        key: zulip-n8n-bot
    # PAPERLESS_TOKEN (field=mcp_token, prefixed to avoid colliding
    # with other items extracted above).
    - extract:
        key: paperless
      rewrite:
        - regexp:
            source: "(.*)"
            target: "paperless_$1"
    # windmill_api_token — for self-introspection (see WINDMILL_TOKEN
    # comment above).
    - extract:
        key: windmill
    # HAI_CLI_TOKEN (field `TOKEN` on the `hai-cli` 1P item, shared with
    # langgraph-agents-secret — single rotation surface).
    - extract:
        key: hai-cli
