---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: windmill
spec:
  chart:
    spec:
      chart: windmill
      sourceRef:
        kind: HelmRepository
        name: windmill
      # Pinned to 4.0.158 — first deploy on chart v4 line. Chart appVersion
      # 1.704.1. Re-pin when bumping; let Renovate manage the suffix.
      version: 4.0.194
  install:
    disableWait: true
  interval: 30m
  upgrade:
    disableWait: true
  values:
    # No bundled postgres — we use the CNPG cluster `postgres-windmill`.
    postgresql:
      enabled: false
    # No bundled minio either.
    minio:
      enabled: false
    enterprise:
      enabled: false
    hub:
      enabled: false

    windmill:
      baseDomain: "windmill.${SECRET_DOMAIN}"
      baseProtocol: https

      # CNPG provisions a per-app `<cluster>-app` Secret with full DB
      # credentials. The Secret has fields: username, password, host,
      # port, dbname, and a ready-to-use `uri`. Point Windmill at that
      # secret's uri field.
      databaseUrlSecretName: postgres-windmill-app
      databaseUrlSecretKey: uri

      # Replica count — single instance is fine for a homelab.
      appReplicas: 1

      # Chart v4 defaults `privileged: true` on workers (chart 4.0+ flips
      # this to enable the OOM-killer + PID-namespace-isolation flow on
      # k8s 1.32+). We're trusted-script-only here, so prefer
      # least-privilege: turn off privileged AND turn off unshare-pid.
      # Net effect: identical to chart 2.x's posture.
      disableUnsharePid: true

      # Default worker group.
      workerGroups:
        - name: default
          replicas: 1
          tolerations: []
          nodeSelector: {}
          privileged: false
          disableUnsharePid: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          # Workflow secrets — single 1P source materialized by the
          # windmill-workflows ExternalSecret. WHITELIST_ENVS tells the
          # Windmill worker which pod-env keys to pass through to the
          # spawned Deno/Python/Bash subprocesses (default is none for
          # nsjail-style isolation; Windmill strips parent env without
          # an explicit allowlist).
          extraEnv: &workflow_secrets
            - name: WHITELIST_ENVS
              value: LANGGRAPH_APPROVAL_SIGNING_KEY,NTFY_URL,NTFY_WRITE_TOKEN,ZULIP_API_URL,ZULIP_BOT_EMAIL,ZULIP_BOT_API_KEY,ROB_ZULIP_USER_ID,PAPERLESS_TOKEN,LIGHTRAG_API_KEY,WINDMILL_TOKEN,HAI_CLI_TOKEN,ADMIN_NAME
            - name: LANGGRAPH_APPROVAL_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: windmill-workflows-secret
                  key: LANGGRAPH_APPROVAL_SIGNING_KEY
            - name: NTFY_URL
              valueFrom:
                secretKeyRef:
                  name: windmill-workflows-secret
                  key: NTFY_URL
            - name: NTFY_WRITE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: windmill-workflows-secret
                  key: NTFY_WRITE_TOKEN
            - name: ZULIP_API_URL
              valueFrom:
                secretKeyRef:
                  name: windmill-workflows-secret
                  key: ZULIP_API_URL
            - name: ZULIP_BOT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: windmill-workflows-secret
                  key: ZULIP_BOT_EMAIL
            - name: ZULIP_BOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: windmill-workflows-secret
                  key: ZULIP_BOT_API_KEY
            - name: PAPERLESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: windmill-workflows-secret
                  key: PAPERLESS_TOKEN
            # LIGHTRAG_API_KEY: used by lightrag-rag-ingest / -tombstone to
            # POST/DELETE LightRAG's /documents API (X-API-Key). Sourced
            # from the `lightrag.api_key` 1P field.
            - name: LIGHTRAG_API_KEY
              valueFrom:
                secretKeyRef:
                  name: windmill-workflows-secret
                  key: LIGHTRAG_API_KEY
            # WINDMILL_TOKEN: used by `windmill-failure-watcher` to query
            # its own /api/w/.../jobs/list_completed. Sourced from the
            # `windmill.windmill_api_token` 1P field (PR #11953).
            - name: WINDMILL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: windmill-workflows-secret
                  key: WINDMILL_TOKEN
            # HAI_CLI_TOKEN: used by workflows that call langgraph-agents
            # /admin/* or /inbox (cost-cap-watcher, awaiting-user-sweep,
            # daily-digest, dlq-watcher, zulip-triager-webhook). Sourced
            # from the `hai-cli.TOKEN` 1P field — same value
            # `langgraph-agents-secret` consumes (PR #11964).
            - name: HAI_CLI_TOKEN
              valueFrom:
                secretKeyRef:
                  name: windmill-workflows-secret
                  key: HAI_CLI_TOKEN
            - name: ROB_ZULIP_USER_ID
              valueFrom:
                secretKeyRef:
                  name: windmill-workflows-secret
                  key: ROB_ZULIP_USER_ID
            # Admin's display name — used ONLY by user-facing DM/notification
            # templates at the render boundary. NOT injected into agent
            # system prompts (per the user-class architecture in
            # langgraph-agents/agents/_shared/USER.md).
            - name: ADMIN_NAME
              valueFrom:
                secretKeyRef:
                  name: windmill-workflows-secret
                  key: ADMIN_NAME
        # Native worker — runs Bash/PowerShell/etc. without nsjail.
        - name: native
          replicas: 1
          privileged: false
          disableUnsharePid: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          extraEnv: *workflow_secrets

      # app pod — also receives workflow secrets so scripts triggered
      # via `/api/w/.../run_wait_result` from inside the app pod see
      # the same env (Windmill execs scripts inline for short flows).
      app:
        extraEnv: *workflow_secrets
        # App pod resources. The chart keys these under
        # `windmill.app.resources`; a top-level `windmill.resources`
        # block is a no-op (verified against chart 4.0.175 — the app
        # pod was silently running on the chart default of 2Gi req=limit).
        resources:
          requests:
            cpu: 100m
            memory: 768Mi
          limits:
            memory: 1536Mi

      # Tell Windmill it's behind a TLS-terminating proxy (Envoy).
      proxy:
        # Forward the actual client IP via the headers Envoy sets.
        enabled: true

        # NOTE: Windmill's bootstrap admin is hardcoded by the binary to
        # `admin@windmill.dev` with default password `changeme`. The
        # chart does NOT expose an admin-password override (the
        # `windmill.extraEnv` block has no analog in the chart). Operators
        # must rotate the password immediately after first deploy via:
        #   curl -X POST https://windmill.${SECRET_DOMAIN}/api/users/setpassword
        # See ../README.md for the full bootstrap recipe.

    indexer:
      enabled: true

    "windmill-extra":
      lsp:
        enabled: true
      multiplayer:
        enabled: false  # Enterprise-only

    # Disable the chart's bundled ingress — we use Gateway API HTTPRoute
    # (see route.yaml in the same dir).
    ingress:
      enabled: false
    httproute:
      enabled: false
