---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: windmill
spec:
  chart:
    spec:
      chart: windmill
      sourceRef:
        kind: HelmRepository
        name: windmill
      version: 2.x  # TODO: pin to a concrete version after first install
  install:
    disableWait: true
  interval: 30m
  upgrade:
    disableWait: true
  values:
    # No bundled postgres — we use the CNPG cluster `postgres-windmill`.
    postgresql:
      enabled: false
    # No bundled minio either.
    minio:
      enabled: false
    enterprise:
      enabled: false
    hub:
      enabled: false

    windmill:
      baseDomain: "windmill.${SECRET_DOMAIN}"
      baseProtocol: https

      # CNPG provisions a per-app `<cluster>-app` Secret with full DB
      # credentials. The Secret has fields: username, password, host,
      # port, dbname, and a ready-to-use `uri`. Point Windmill at that
      # secret's uri field.
      databaseUrlSecretName: postgres-windmill-app
      databaseUrlSecretKey: uri

      # Replica count — single instance is fine for a homelab.
      appReplicas: 1

      # Default worker group.
      workerGroups:
        - name: default
          replicas: 1
          tolerations: []
          nodeSelector: {}
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          # Workflow secrets — single 1P source materialized by the
          # windmill-workflows ExternalSecret. WHITELIST_ENVS tells the
          # Windmill worker which pod-env keys to pass through to the
          # spawned Deno/Python/Bash subprocesses (default is none for
          # nsjail-style isolation; Windmill strips parent env without
          # an explicit allowlist).
          extraEnv: &workflow_secrets
            - name: WHITELIST_ENVS
              value: LANGGRAPH_APPROVAL_SIGNING_KEY,PUSHOVER_APP_TOKEN,PUSHOVER_USER_KEY,ZULIP_BOT_EMAIL,ZULIP_BOT_API_KEY,ROB_ZULIP_USER_ID
            - name: LANGGRAPH_APPROVAL_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: windmill-workflows-secret
                  key: LANGGRAPH_APPROVAL_SIGNING_KEY
            - name: PUSHOVER_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: windmill-workflows-secret
                  key: PUSHOVER_APP_TOKEN
            - name: PUSHOVER_USER_KEY
              valueFrom:
                secretKeyRef:
                  name: windmill-workflows-secret
                  key: PUSHOVER_USER_KEY
            - name: ZULIP_BOT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: windmill-workflows-secret
                  key: ZULIP_BOT_EMAIL
            - name: ZULIP_BOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: windmill-workflows-secret
                  key: ZULIP_BOT_API_KEY
            - name: ROB_ZULIP_USER_ID
              valueFrom:
                secretKeyRef:
                  name: windmill-workflows-secret
                  key: ROB_ZULIP_USER_ID
        # Native worker — runs Bash/PowerShell/etc. without nsjail.
        - name: native
          replicas: 1
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          extraEnv: *workflow_secrets

      # app pod — also receives workflow secrets so scripts triggered
      # via `/api/w/.../run_wait_result` from inside the app pod see
      # the same env (Windmill execs scripts inline for short flows).
      app:
        extraEnv: *workflow_secrets

      # App pod resources.
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi

      # Tell Windmill it's behind a TLS-terminating proxy (Envoy).
      proxy:
        # Forward the actual client IP via the headers Envoy sets.
        enabled: true

      # NOTE: Windmill's bootstrap admin is hardcoded by the binary to
      # `admin@windmill.dev` with default password `changeme`. The
      # chart does NOT expose an admin-password override (the
      # `windmill.extraEnv` block has no analog in the chart). Operators
      # must rotate the password immediately after first deploy via:
      #   curl -X POST https://windmill.${SECRET_DOMAIN}/api/users/setpassword
      # See ../README.md for the full bootstrap recipe.

    indexer:
      enabled: true

    "windmill-extra":
      lsp:
        enabled: true
      multiplayer:
        enabled: false  # Enterprise-only

    # Disable the chart's bundled ingress — we use Gateway API HTTPRoute
    # (see route.yaml in the same dir).
    ingress:
      enabled: false
    httproute:
      enabled: false
