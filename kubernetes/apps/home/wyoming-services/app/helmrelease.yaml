---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wyoming-services
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      kokoro:
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        containers:
          main:
            image:
              repository: ghcr.io/nordwestt/kokoro-wyoming
              tag: 1.0.1
            args:
              - --uri
              - tcp://0.0.0.0:10200
              - --voice
              - af_sky

            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                memory: 2Gi

      openwakeword:
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        containers:
          main:
            image:
              repository: docker.io/rhasspy/wyoming-openwakeword
              tag: 2.1.0
            args:
              - --preload-model
              - "ok_nabu"
              - --custom-model-dir
              - /custom

      whisper:
        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          nodeSelector:
            nvidia.com/gpu.present: "true"
          runtimeClassName: nvidia

        statefulset:
          volumeClaimTemplates:
            - name: data
              accessMode: ReadWriteOnce
              size: 5Gi
              storageClass: ceph-block
              globalMounts:
                - path: /config

        type: statefulset

        containers:
          main:
            image:
              repository: ghcr.io/linuxserver/faster-whisper
              tag: gpu-legacy-v3.1.0-ls40
            env:
              PUID: "1000"
              PGID: "1000"
              TZ: America/Chicago
              WHISPER_MODEL: large-v3-turbo
              WHISPER_BEAM: "1"
              WHISPER_LANG: en

            resources:
              requests:
                cpu: 500m
                memory: 4G
                nvidia.com/gpu: 1
              limits:
                memory: 4G
                nvidia.com/gpu: 1

    service:
      kokoro:
        # ClusterIP: HA reaches kokoro via cluster DNS
        # (wyoming-services-kokoro.home), so no LB IP is needed.
        type: ClusterIP
        controller: kokoro
        ports:
          http:
            port: 10200
            protocol: TCP

      openwakeword:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: ${SVC_WYOMING_WAKEWORD_ADDR}
        controller: openwakeword
        ports:
          http:
            port: 10400

      whisper:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: ${SVC_WYOMING_WHISPER_ADDR}
        controller: whisper
        ports:
          http:
            port: 10300
            protocol: TCP

    persistence:
      openwakeword-config:
        type: configMap
        enabled: true
        name: openwakeword-config
        advancedMounts:
          openwakeword:
            main:
              - path: /custom
                readOnly: true
