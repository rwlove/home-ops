---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app zwave-js-ui
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      main:
        pod:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: nabu.feature.node.kubernetes.io/zwa2
                        operator: In
                        values:
                          - "true"

          nodeSelector:
            nabu.feature.node.kubernetes.io/zwa2: "true"

          priorityClassName: home-cluster-critical

        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset
        containers:
          main:
            image:
              repository: ghcr.io/zwave-js/zwave-js-ui
              tag: 11.16.1

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  failureThreshold: 3
                  httpGet:
                    path: /health
                    port: &httpPort 8091
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
              readiness:
                enabled: true
                custom: true
                spec:
                  failureThreshold: 3
                  httpGet:
                    path: /health
                    port: *httpPort
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
              startup:
                enabled: false

            resources:
              requests:
                cpu: 50m
                memory: 746M
              limits:
                memory: 746M

            securityContext:
              privileged: true

    service:
      main:
        controller: main
        ports:
          http:
            port: *httpPort
          websocket:
            port: 3000

    route:
      main:
        annotations:
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/z-wave-js-ui.png"

          glance/id: "Home Automation"
          glance/name: "ZWave JS UI"
          glance/show: "true"
        hostnames:
          - "zwave.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *httpPort
    persistence:
      config:
        existingClaim: zwavejs2mqtt-config-pvc
        globalMounts:
          - path: /usr/src/app/store

      usb:
        type: hostPath
        hostPath: /dev/zwa2
        hostPathType: CharDevice
        globalMounts:
          - path: /dev/zwa2
