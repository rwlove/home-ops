---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio
spec:
  chart:
    spec:
      chart: ambient
      version: 1.25.1
      sourceRef:
        kind: HelmRepository
        name: istio
  interval: 30m
  values:
    global:
      istioNamespace: istio-system
    base:
      istioNamespace: istio-system
    ztunnel:
      istioNamespace: istio-system
