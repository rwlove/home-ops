---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istiod
spec:
  chart:
    spec:
      chart: istiod
      sourceRef:
        kind: HelmRepository
        name: istio
      # 1.30.1 was never published to the istio chart repo
      # (https://istio-release.storage.googleapis.com/charts has 1.30.0
      # as latest stable); Renovate #12315 bumped to it and wedged the HR,
      # cascading to block all mcp-system reconciliation. Held at 1.30.0
      # (the running, healthy release) until a real >1.30.0 chart exists.
      version: 1.30.2
  interval: 5m
  dependsOn:
    - name: istio-base
      namespace: istio-system
  values:
    # https://artifacthub.io/packages/helm/istio-official/istiod
    # https://github.com/istio/istio/blob/master/manifests/charts/istio-control/istio-discovery/values.yaml
    pilot:
      autoscaleMin: 2
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 512Mi
