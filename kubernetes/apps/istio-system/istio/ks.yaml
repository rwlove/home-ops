---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: istio-base
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: istio-base
  interval: 1h
  path: "./kubernetes/apps/istio-system/istio/app/base"
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-ops-kubernetes
    namespace: flux-system
  targetNamespace: istio-system
  timeout: 5m
  wait: true
  dependsOn:
    - name: envoy-gateway-config
      namespace: network

---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: istiod
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: istiod
  interval: 1h
  path: "./kubernetes/apps/istio-system/istio/app/istiod"
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-ops-kubernetes
    namespace: flux-system
  targetNamespace: istio-system
  timeout: 5m
  wait: true
  dependsOn:
    - name: istio-base
      namespace: istio-system
