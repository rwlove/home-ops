---
# yaml-language-server: $schema=https://github.com/datreeio/CRDs-catalog/raw/refs/heads/main/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kiali
  annotations:
    glance/name: "Kiali"
    glance/show: "true"
    # glance/icon: "https://cdn.jsdelivr.net" TODO
    glance/id: "Observability"
spec:
  hostnames:
    - "kiali.${SECRET_DOMAIN}"
  parentRefs:
    - name: internal
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: kiali
          port: 20001
      matches:
        - path:
            type: PathPrefix
            value: /
