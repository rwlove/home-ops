---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
spec:
  chart:
    spec:
      chart: cilium
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: cilium-charts
      version: 1.19.5

  interval: 1h

  values:
    dashboards:
      annotations:
        grafana_folder: Cilium
      enabled: true

    hubble:
      dashboards:
        annotations:
          grafana_folder: Cilium
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        namespace: observability

      relay:
        prometheus:
          serviceMonitor:
            enabled: true

      serviceMonitor:
        enabled: true

      ui:
        enabled: true
        rollOutPods: true

    operator:
      # Prefer workers, still allow masters as a cold-boot fallback — keeps the
      # operator's (memory-heavy) leader replica off the tight control-plane VMs
      # (master2/master3). Setting affinity replaces the chart-default operator
      # affinity wholesale, so the default podAntiAffinity (replica spread across
      # hosts) is restated here.
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  io.cilium/app: operator
              topologyKey: kubernetes.io/hostname
      dashboards:
        annotations:
          grafana_folder: Cilium
        enabled: true
      prometheus:
        serviceMonitor:
          enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 640Mi

    # prometheus.enabled exposes the agent metrics port (9962); without
    # it the chart skips the cilium-agent Service + ServiceMonitor even
    # when serviceMonitor.enabled is true.
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
        trustCRDsExist: true

    # Request-only (no memory limit): cilium-agent is the CNI dataplane;
    # a tight limit risks OOM-killing node networking. Sized to 14d peak
    # working-set ~1.5Gi.
    resources:
      requests:
        cpu: 100m
        memory: 1Gi

  valuesFrom:
    - kind: ConfigMap
      name: cilium-values
