---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
spec:
  chart:
    spec:
      chart: cilium
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: cilium-charts
      version: 1.19.3

  interval: 1h

  values:
    dashboards:
      annotations:
        grafana_folder: Cilium
      enabled: true

    hubble:
      dashboards:
        annotations:
          grafana_folder: Cilium
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        namespace: observability

      relay:
        prometheus:
          serviceMonitor:
            enabled: true

      serviceMonitor:
        enabled: true

      ui:
        enabled: true
        rollOutPods: true

    operator:
      dashboards:
        annotations:
          grafana_folder: Cilium
        enabled: true
      prometheus:
        serviceMonitor:
          enabled: true

    prometheus:
      serviceMonitor:
        enabled: true
        trustCRDsExist: true

  valuesFrom:
    - kind: ConfigMap
      name: cilium-values
