---
cni:
  exclusive: false # Needed to allow Cillium to work properly with Multus

bgp:
  enabled: false
  announce:
    loadbalancerIP: true
    podCIDR: false

bgpControlPlane:
  enabled: true

k8sServiceHost: 192.168.6.1
k8sServicePort: 6443

rollOutCiliumPods: true
localRedirectPolicies:
  enabled: true

kubeProxyReplacement: true
kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256

l2announcements:
  enabled: false

loadBalancer:
  algorithm: maglev
  mode: dsr

bandwidthManager:
  enabled: true
  bbr: true
bpf:
  masquerade: true
  preallocateMaps: true

bpfClockProbe: true

l7Proxy: true

ipam:
  mode: "kubernetes"

ingressController:
  enabled: false
  loadbalancerMode: shared

operator:
  rollOutPods: true

autoDirectNodeRoutes: true
ipv4NativeRoutingCIDR: 10.42.0.0/16
routingMode: native

endpointRoutes:
  enabled: true

envoy:
  enabled: false

gatewayAPI:
  enabled: false

hubble:
  enabled: true
  eventBufferCapacity: "65535"
  serviceMonitor:
    enabled: false

  metrics:
    enabled:
      # `labelsContext=source_namespace,source_pod` attributes each DNS
      # query to the pod that asked. Without this the `query` label is
      # there but unattributable (the only pod label is the cilium-agent
      # observing pod). Drives the per-app egress-FQDN baselining +
      # novel-destination alerting from
      # docs/src/egress_restriction_design.md (approach E).
      - dns:query;ignoreAAAA;labelsContext=source_namespace,source_pod
      # source_pod lets a drop burst be attributed to the offending pod
      # without live `hubble observe` (drops are bursty and rarely caught
      # live). Bounded cardinality — only pods that actually get denied
      # appear. Pairs with the dns metric's source_pod label above.
      - drop:labelsContext=source_namespace,source_pod,destination_namespace
      - tcp
      - flow
      - port-distribution
      - icmp
      - http
    # ServiceMonitor for the hubble-metrics service (port 9965).
    # Without this the metrics are exposed by the agent but never
    # scraped. Drives the network-policy drop alerts.
    serviceMonitor:
      enabled: true

  relay:
    enabled: true
    rollOutPods: true

  ui:
    enabled: true
    ingress:
      enabled: false
    rollOutPods: true

pmtuDiscovery:
  enabled: true

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - PERFMON
      - BPF
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

socketLB:
  enabled: true
  hostNamespaceOnly: true

cgroup:
  autoMount:
    enabled: true
