---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gpu-operator
spec:
  chart:
    spec:
      chart: gpu-operator
      sourceRef:
        kind: HelmRepository
        name: nvidia-gpu-operator
      version: v26.3.3
  interval: 30m
  install:
    crds: CreateReplace
    disableWait: true
  upgrade:
    crds: CreateReplace
    disableWait: true
  values:
    operator:
      cleanupCRD: false
      upgradeCRD: true
    # Tolerations applied to every operand DaemonSet (toolkit,
    # device-plugin, dcgmExporter, gfd, nodeStatusExporter, validator).
    # The chart default tolerates `nvidia.com/gpu` only; appending
    # `kubernetes.io/arch=arm64` lets the NVIDIA stack run on Spark
    # (arm64, NVIDIA Grace-Blackwell) which is tainted to keep generic
    # workloads off but still needs the GPU operands for ollama-spark.
    daemonsets:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: kubernetes.io/arch
          operator: Equal
          value: arm64
          effect: NoSchedule
    driver:
      enabled: false
    toolkit:
      enabled: true
      installDir: /usr/local/nvidia
    devicePlugin:
      enabled: true
      config:
        name: gpu-operator-time-slicing-config
        default: any
    dcgmExporter:
      enabled: true
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
      serviceMonitor:
        enabled: true
    gfd:
      enabled: true
    nfd:
      enabled: false
    mig:
      strategy: none
    migManager:
      enabled: false
    nodeStatusExporter:
      enabled: true
    validator:
      driver:
        env:
          - name: DISABLE_DEV_CHAR_SYMLINK_CREATION
            value: "true"
