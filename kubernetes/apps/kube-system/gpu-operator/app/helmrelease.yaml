---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gpu-operator
spec:
  chart:
    spec:
      chart: gpu-operator
      sourceRef:
        kind: HelmRepository
        name: nvidia-gpu-operator
      version: v26.3.1
  interval: 30m
  install:
    crds: CreateReplace
    disableWait: true
  upgrade:
    crds: CreateReplace
    disableWait: true
  values:
    operator:
      cleanupCRD: false
      upgradeCRD: true
    driver:
      enabled: false
    toolkit:
      enabled: true
      installDir: /usr/local/nvidia
    devicePlugin:
      enabled: true
      config:
        name: gpu-operator-time-slicing-config
        default: any
    dcgmExporter:
      enabled: false
    gfd:
      enabled: true
    nfd:
      enabled: false
    mig:
      strategy: none
    migManager:
      enabled: false
    nodeStatusExporter:
      enabled: true
    validator:
      driver:
        env:
          - name: DISABLE_DEV_CHAR_SYMLINK_CREATION
            value: "true"
