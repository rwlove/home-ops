---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/ocirepository-source-v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: node-feature-discovery
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.18.0
  url: oci://ghcr.io/home-operations/charts-mirror/node-feature-discovery
  verify:
    provider: cosign
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-feature-discovery
spec:
  chartRef:
    kind: OCIRepository
    name: node-feature-discovery
  install:
    crds: CreateReplace
  interval: 1h
  uninstall:
    keepHistory: false
  upgrade:
    crds: CreateReplace
  values:
    gc:
      resources:
        limits:
          memory: 128Mi

        requests:
          cpu: 10m
          memory: 128Mi
    prometheus:
      enable: true

    worker:
      config:
        core:
          sources:
            - pci
            - system
            - usb

      resources:
        limits:
          memory: 86M
        requests:
          cpu: 20m
          memory: 86M
