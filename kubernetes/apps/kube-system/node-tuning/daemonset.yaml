---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/daemonset-apps-v1.json
# Persists node-level sysctl tunings that can't be set per-pod.
#
# Currently:
#   fs.inotify.max_user_instances=8192   # default 128 is too low for clusters
#                                        # with many file-watching apps (slskd,
#                                        # prowlarr, etc.). Hitting it shows up
#                                        # as "configured user limit (128) on
#                                        # the number of inotify instances has
#                                        # been reached".
#
# Implementation: a privileged DaemonSet whose initContainer applies the sysctl
# at pod start (i.e. node boot, since the DaemonSet pod restarts with the
# node). The main container is a no-op `pause` so kubelet keeps the pod
# scheduled and re-runs the initContainer if the kubelet restarts.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-tuning
  labels:
    app.kubernetes.io/name: node-tuning
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: node-tuning
  template:
    metadata:
      labels:
        app.kubernetes.io/name: node-tuning
    spec:
      containers:
        - image: registry.k8s.io/pause:3.10
          name: pause
          resources:
            limits:
              memory: 16Mi
            requests:
              cpu: 1m
              memory: 8Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65535
            seccompProfile: { type: RuntimeDefault }
      hostPID: true
      initContainers:
        - command:
            - /bin/sh
            - -c
            - |
              set -eux
              sysctl -w fs.inotify.max_user_instances=8192
              sysctl -w fs.inotify.max_user_watches=524288
          image: ghcr.io/home-operations/busybox:1.38@sha256:7e2c04dd50ede647bf4a7a4c8dbd629dd4971cd139b9b88fb22bfc3c7a6c13df
          name: apply-sysctls
          resources:
            requests:
              cpu: 1m
              memory: 8Mi
          securityContext:
            privileged: true
      tolerations:
        - operator: Exists
