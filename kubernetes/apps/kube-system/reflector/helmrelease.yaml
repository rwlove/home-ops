---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/ocirepository-source-v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: reflector
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 10.0.52
  url: oci://ghcr.io/emberstack/helm-charts/reflector
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/ocirepository-source-v1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reflector
spec:
  chartRef:
    kind: OCIRepository
    name: reflector
  install:
    remediation:
      retries: -1
  interval: 1h
  postRenderers:
    # Pin the verb list on the reflector ClusterRole's secrets/configmaps
    # rule to the explicit set it actually needs (vs the chart-shipped
    # `verbs: ["*"]`). Drops `deletecollection` + any future verbs that
    # Kubernetes adds. See docs/src/rbac_audit.md §3.1.
    - kustomize:
        patches:
          - patch: |-
              - op: replace
                path: /rules/0/verbs
                value: ["get", "list", "watch", "create", "update", "patch", "delete"]
            target:
              kind: ClusterRole
              name: reflector
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    configuration:
      logging:
        minimumLevel: Information
    resources:
      requests:
        cpu: 10m
        memory: 512Mi
      limits:
        memory: 768Mi
