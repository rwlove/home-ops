---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zot
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m

  install:
    disableWait: true
  upgrade:
    disableWait: true

  values:
    controllers:
      zot:
        pod:
          securityContext:
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 568
            runAsUser: 568
            supplementalGroups:
              - 65542 # gladius:external-services

        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        containers:
          app:
            image:
              repository: ghcr.io/project-zot/zot-linux-amd64
              tag: v2.1.18
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v2/
                    port: &httpPort 5000
                  initialDelaySeconds: 5
              readiness: *probe
              startup:
                enabled: false
            resources:
              requests:
                cpu: 50m
                memory: 2Gi
              limits:
                memory: 5Gi

    service:
      app:
        controller: zot
        ports:
          http:
            port: *httpPort

    route:
      app:
        annotations:
          glance/name: "ZOT Registry"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/zot-registry.png"
          glance/id: "System"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *httpPort
    persistence:
      config-file:
        type: configMap
        name: zot-configmap
        globalMounts:
          - path: /etc/zot/config.json
            subPath: config.json
            readOnly: true

      htpasswd:
        type: secret
        name: zot-secret
        globalMounts:
          - path: /etc/zot/htpasswd
            subPath: htpasswd
            readOnly: true

      data:
        existingClaim: zot-data-ceph
        globalMounts:
          - path: /var/lib/registry
