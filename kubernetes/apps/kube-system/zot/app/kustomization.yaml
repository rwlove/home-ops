---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
components:
  - ../../../../components/repos/app-template
resources:
  - ./externalsecret.yaml
  - ./helmrelease.yaml
  - ./pvc.yaml
configMapGenerator:
  - files:
      - config.json=./resources/config.json
    name: zot-configmap
generatorOptions:
  # NOTE: substitution is intentionally enabled here. config.json
  # contains exactly one ${SECRET_DOMAIN} reference (the LAN-only
  # lovenet-registry sync target). With substitute:disabled the literal
  # ${...} reaches Go's url.Parse, which rejects "{" and aborts the
  # whole sync extension — including ghcr.io / quay.io / etc.
  # pull-through. If you add app-syntax ${...} payloads here later,
  # split them into a separate generator with substitute:disabled.
  disableNameSuffixHash: true
