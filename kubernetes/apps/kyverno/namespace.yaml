---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/namespace-v1.json
apiVersion: v1
kind: Namespace
metadata:
  name: kyverno
  labels:
    goldilocks.fairwinds.com/enabled: "true"
    # PSA audit-only restricted: surface pod-security gaps for the
    # admission controllers without breaking them. Tighten to
    # `enforce: restricted` once the chart's defaults are confirmed
    # compliant (kyverno 1.13+ runs non-root + drops capabilities by
    # default, but verify before flipping).
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
