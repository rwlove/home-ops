---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
spec:
  chart:
    spec:
      # renovate: registryUrl=https://charts.longhorn.io
      chart: longhorn
      sourceRef:
        kind: HelmRepository
        name: longhorn-charts
      version: 1.12.0
  interval: 30m
  values:
    # workaround: https://github.com/longhorn/longhorn/issues/12573 — image pins removed (1.12.0 ships the fixed manager/instanceManager images natively). preUpgradeChecker disables retained for now; re-enable as a follow-up once 1.12.0 is confirmed stable.
    # Tracking: home-ops#11828
    defaultSettings:
      backupTarget: "nfs://beast:/mnt/mass_storage/longhorn-backups"
      createDefaultDiskLabeledNodes: true
      defaultDataLocality: best-effort
      defaultReplicaCount: 2
      kubernetesClusterAutoscalerEnabled: true

      replicaAutoBalance: best-effort
      storageMinimalAvailablePercentage: 10
    global:
      imageRegistry: docker.io

    longhornManager:
      securityContext:
        privileged: true
    persistence:
      defaultClass: false
      defaultClassReplicaCount: 1
      reclaimPolicy: Retain

    preUpgradeChecker:
      jobEnabled: false
      upgradeVersionCheck: false
  # Scope the chart-shipped `longhorn-support-bundle` ClusterRoleBinding
  # from `cluster-admin` down to `view`. The chart hardcodes the binding
  # with no values knob to disable it (clusterrolebinding.yaml lines
  # 15-27 in longhorn-1.11.2), so we patch it post-render. The SA is
  # only consumed when a support bundle is being collected; if a bundle
  # fails because of insufficient permissions, drop this patch and file
  # an upstream issue.
  # See docs/src/rbac_audit.md §2.1.
  postRenderers:
    - kustomize:
        patches:
          - patch: |-
              - op: replace
                path: /roleRef/name
                value: view
            target:
              kind: ClusterRoleBinding
              name: longhorn-support-bundle
