---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn
  annotations:
    glance/name: "Longhorn"
    glance/show: "true"
    glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/longhorn.png"
    glance/id: "Storage"
spec:
  parentRefs:
    - name: internal
      namespace: network
      sectionName: https
  hostnames: ["longhorn.${SECRET_DOMAIN}"]
  rules:
    - backendRefs:
        - name: longhorn-frontend
          port: 80
