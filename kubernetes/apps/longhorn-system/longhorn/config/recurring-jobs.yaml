---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/longhorn.io/recurringjob_v1beta2.json
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: weekly-backups
spec:
  cron: "0 0 * * 6"
  task: "backup"
  groups:
    - default
  retain: 4
  concurrency: 4

---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: daily-snapshots
spec:
  cron: "0 0 * * *"
  task: "snapshot"
  groups:
    - default
  retain: 7
  concurrency: 4

---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: monthly-backups
spec:
  cron: "0 0 1 * *"
  task: "backup"
  groups:
    - default
  retain: 6
  concurrency: 4

---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: weekly-filesystem-trim
spec:
  cron: "0 3 * * 0"
  task: "filesystem-trim"
  groups:
    - default
  retain: 0
  concurrency: 2
