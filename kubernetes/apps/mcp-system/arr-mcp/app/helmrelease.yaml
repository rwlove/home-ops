---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arr-mcp
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
    controllers:
      arr-mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          annotations:
            sidecar.istio.io/inject: "true"
        containers:
          app:
            image:
              repository: ghcr.io/rwlove/arr-mcp
              tag: v0.1.2@sha256:8c97068b61b5758cbf8546841bbdec10b5bd5ff17780ddf55e5505464fc92344
            env:
              SONARR_URL: http://sonarr.media.svc.cluster.local:8989
              RADARR_URL: http://radarr.media.svc.cluster.local:7878
              LIDARR_URL: http://lidarr.media.svc.cluster.local:8686
              PROWLARR_URL: http://prowlarr.downloads.svc.cluster.local:9696
            envFrom:
              - secretRef:
                  name: arr-mcp-secret
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    service:
      app:
        controller: arr-mcp
        ports:
          http:
            port: 3000
    route:
      app:
        hostnames:
          - "arr-mcp.mcp.local"
        parentRefs:
          - name: mcp-gateway
            namespace: mcp-system
            sectionName: mcps
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /mcp
            backendRefs:
              - identifier: app
                port: 3000
