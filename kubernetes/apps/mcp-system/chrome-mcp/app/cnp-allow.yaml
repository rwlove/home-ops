---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: chrome-mcp-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: chrome-mcp
  # Additive — default-deny is what triggers the lockdown.
  enableDefaultDeny:
    egress: false
    ingress: false
  egress:
    # True-external HTTPS — Chromium hits public sites (example.com)
    # AND traverses the Cloudflared tunnel back to the cluster for
    # apps whose public DNS doesn't resolve to a LAN address.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Internal apps via their public hostname. Split-horizon bind9
    # resolves them to the Cilium LB pool (10.45.0.0/24), but Cilium's
    # L4LB NATs to the backend pod identity AND its containerPort
    # before policy evaluation. envoy-gateway listens on 10443 inside
    # the pod (mapped to LB :443), so the rule has to allow 10443.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "10443"
              protocol: TCP
            # HTTP/3 is enabled on the gateway (envoy.yaml: http3 {}), so
            # envoy advertises Alt-Svc on :10443 and clients retry over QUIC
            # (UDP). chrome-mcp runs a real browser and does this; without the
            # UDP sibling the attempt is default-denied (it falls back to TCP,
            # but the drop flaps the CiliumPolicyDrop alerts).
            - port: "10443"
              protocol: UDP
