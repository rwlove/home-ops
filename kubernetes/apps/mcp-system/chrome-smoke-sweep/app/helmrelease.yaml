---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: chrome-smoke-sweep
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      chrome-smoke-sweep:
        type: cronjob
        cronjob:
          schedule: "10 5 * * *"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 3
          # Keep only the most recent failure — every retained failed
          # Job fires KubeJobFailed in KSM until rotated out. 7 was an
          # iteration-era retention while the sweep was being built;
          # the CronJob has stabilized and there's no need to keep
          # debug history at that depth.
          failedJobsHistory: 1
          backoffLimit: 1
          ttlSecondsAfterFinished: 86400
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          annotations:
            sidecar.istio.io/inject: "true"
          restartPolicy: OnFailure
        containers:
          app:
            image:
              repository: docker.io/alpine/k8s
              tag: "1.36.1"
            command:
              - /bin/sh
              - /config/sweep.sh
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
              seccompProfile:
                type: RuntimeDefault
    persistence:
      config:
        type: configMap
        name: chrome-smoke-sweep
        defaultMode: 0o555
        globalMounts:
          - path: /config
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
