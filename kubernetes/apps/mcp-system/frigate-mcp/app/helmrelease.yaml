---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frigate-mcp
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
    controllers:
      frigate-mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          annotations:
            sidecar.istio.io/inject: "true"
        containers:
          app:
            # TODO: dedsxc/mcp-frigate has no published OCI image (alpha, v0.0.1).
            # Build from https://github.com/dedsxc/mcp-frigate (containers/frigate-mcp)
            # and push to your ZOT cache, then update this reference.
            image:
              repository: ghcr.io/dedsxc/mcp-frigate
              tag: v0.0.1
            env:
              FRIGATE_FRIGATE_URL: http://frigate.home.svc.cluster.local:5000
              FRIGATE_TRANSPORT: http
              FRIGATE_HOST: 0.0.0.0
              FRIGATE_PORT: "8000"
            envFrom:
              - secretRef:
                  name: frigate-mcp-secret
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    service:
      app:
        controller: frigate-mcp
        ports:
          http:
            port: 8000
    route:
      app:
        hostnames:
          - "frigate-mcp.mcp.local"
        parentRefs:
          - name: mcp-gateway
            namespace: mcp-system
            sectionName: mcps
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /mcp
            backendRefs:
              - identifier: app
                port: 8000
