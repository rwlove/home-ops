---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ha-mcp-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: ha-mcp
  # Additive — default-deny is what triggers the lockdown.
  enableDefaultDeny:
    egress: false
    ingress: false
  egress:
    # ha-mcp talks to Home Assistant via HOMEASSISTANT_URL =
    # https://hass.${SECRET_DOMAIN} — which resolves to the external
    # envoy gateway LoadBalancer (10.45.0.13) and inside the cluster
    # actually hits envoy pods on container port 10443. Observed in
    # Hubble: ha-mcp → network/external-* on :10443.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "10443"
              protocol: TCP
            # HTTP/3: envoy advertises Alt-Svc on :10443; allow the QUIC (UDP)
            # sibling so a client upgrade isn't default-denied (would flap the
            # CiliumPolicyDrop alerts even though QUIC falls back to TCP).
            - port: "10443"
              protocol: UDP
            - port: "443"
              protocol: TCP
