---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ha-mcp
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  values:
    controllers:
      ha-mcp:
        pod:
          annotations:
            sidecar.istio.io/inject: "true"
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/homeassistant-ai/ha-mcp
              tag: 7.5.0
            command:
              - ha-mcp-web
            env:
              HOMEASSISTANT_URL: https://hass.${SECRET_DOMAIN}
            envFrom:
              - secretRef:
                  name: ha-mcp-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    persistence:
      # ha-mcp's data-path resolver scans /tmp, /var/tmp, /usr/tmp, /app
      # and crashes if none are writable. With readOnlyRootFilesystem
      # true, give it an emptyDir at /tmp.
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp

    service:
      app:
        controller: ha-mcp
        ports:
          http:
            port: 8086

    route:
      app:
        hostnames:
          - "ha-mcp.mcp.local"
        parentRefs:
          - name: mcp-gateway
            namespace: mcp-system
            sectionName: mcps
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /mcp
            filters:
              # Strip inbound Authorization before forwarding to the
              # backend MCP server. The Kuadrant mcp-gateway forwards
              # all client headers; the broker-side Bearer (used to
              # authenticate to mcp.thesteamedcrab.com) can take
              # precedence over the backend's own credential env in
              # any upstream MCP client that honors `Authorization`,
              # causing 401s against the real target service. Backend
              # MCP servers each carry their own env-loaded creds —
              # stripping the broker Bearer at this hop lets those
              # take effect uniformly across the fleet.
              - type: RequestHeaderModifier
                requestHeaderModifier:
                  remove:
                    - Authorization
            backendRefs:
              - identifier: app
                port: 8086
