---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: immich-mcp-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: immich-mcp
  # Additive — default-deny is what triggers the lockdown.
  enableDefaultDeny:
    egress: false
    ingress: false
  egress:
    # immich-server in media ns. Env: IMMICH_BASE_URL =
    # http://immich-server.media.svc.cluster.local:2283
    # NOTE: the immich-server pod label is `app.kubernetes.io/name: server`
    # (the chart sets the suffix-less form), NOT `immich-server`. Pair
    # with `app.kubernetes.io/instance: immich` for disambiguation.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: media
            app.kubernetes.io/instance: immich
            app.kubernetes.io/name: server
      toPorts:
        - ports:
            - port: "2283"
              protocol: TCP
    # Startup `uv build claw2immich` fetches the claw2immich source +
    # wheel deps from PyPI. Without this the container crashloops
    # before it can serve MCP traffic. Was a toFQDNs allow-list
    # (pypi.org, files.pythonhosted.org). Cilium 1.19 matchName
    # doesn't match through Kubernetes pod DNS search-domain
    # augmentation (pod queries
    # `pypi.org.mcp-system.svc.cluster.local.`; FQDN cache stores
    # the augmented name; matchName doesn't match). Broadened to
    # toEntities:world:443 so it actually works. Tighten when FQDN
    # matching is fixed.
    - toEntities: [world]
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
