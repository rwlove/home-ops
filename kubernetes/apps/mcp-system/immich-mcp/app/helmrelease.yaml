---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-mcp
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
    controllers:
      immich-mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          annotations:
            sidecar.istio.io/inject: "true"
          # claw2immich's image runs as root (uid 0) and owns /app as root.
          # uv run at startup needs to write into /app, so override the
          # bjw-s default of runAsUser:1000. Capability drops still apply.
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
        containers:
          app:
            image:
              repository: ghcr.io/joeru/claw2immich
              # Upstream publishes digest-only (no semver tags survive
              # rolls; current digest has tags=[] on GHCR). Pin the
              # digest currently running (verified via `kubectl describe
              # pod` on 2026-05-20); the `latest` tag portion is
              # decorative — the @sha256 enforces.
              tag: latest@sha256:716fac23f99634b0c260ffe692ee4714a8c4b375936a746b7077a377e0dc7d66
            env:
              IMMICH_BASE_URL: http://immich-server.media.svc.cluster.local:2283
              IMMICH_PROFILE: read_only
              MCP_TRANSPORT: streamable-http
              MCP_HOST: 0.0.0.0
              MCP_PORT: "8000"
              MCP_LOG_LEVEL: INFO
            envFrom:
              - secretRef:
                  name: immich-mcp-secret
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
              # readOnlyRootFilesystem omitted: the claw2immich image runs `uv run`
              # at startup and needs to write claw2immich.egg-info under /app.
    persistence:
      cache:
        type: emptyDir
        advancedMounts:
          immich-mcp:
            app:
              - path: /.cache
      tmp:
        type: emptyDir
        advancedMounts:
          immich-mcp:
            app:
              - path: /tmp
    service:
      app:
        controller: immich-mcp
        ports:
          http:
            port: 8000
    route:
      app:
        hostnames:
          - "immich-mcp.mcp.local"
        parentRefs:
          - name: mcp-gateway
            namespace: mcp-system
            sectionName: mcps
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /mcp
            filters:
              # Strip inbound Authorization before forwarding to the
              # backend MCP server. The Kuadrant mcp-gateway forwards
              # all client headers; the broker-side Bearer (used to
              # authenticate to mcp.thesteamedcrab.com) can take
              # precedence over the backend's own credential env in
              # any upstream MCP client that honors `Authorization`,
              # causing 401s against the real target service. Backend
              # MCP servers each carry their own env-loaded creds —
              # stripping the broker Bearer at this hop lets those
              # take effect uniformly across the fleet.
              - type: RequestHeaderModifier
                requestHeaderModifier:
                  remove:
                    - Authorization
            backendRefs:
              - identifier: app
                port: 8000
