---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin-mcp
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
    controllers:
      jellyfin-mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          annotations:
            sidecar.istio.io/inject: "true"
        containers:
          app:
            # Single-maintainer community image (knuckles-team). Pin by tag
            # for now; consider digest-pinning once a watched version is
            # selected (see image-registry-allowlist.txt).
            image:
              repository: docker.io/knucklessg1/jellyfin-mcp
              tag: v0.11.0
            # The image's Dockerfile CMD points at `gitlab-mcp` (upstream bug);
            # we must specify the right binary explicitly via command.
            command:
              - jellyfin-mcp
            args:
              - --transport
              - streamable-http
              - --host
              - 0.0.0.0
              - --port
              - "8000"
            env:
              JELLYFIN_BASE_URL: http://jellyfin.media.svc.cluster.local:8096
            envFrom:
              - secretRef:
                  name: jellyfin-mcp-secret
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
              seccompProfile:
                type: RuntimeDefault
    service:
      app:
        controller: jellyfin-mcp
        ports:
          http:
            port: 8000
    route:
      app:
        hostnames:
          - "jellyfin-mcp.mcp.local"
        parentRefs:
          - name: mcp-gateway
            namespace: mcp-system
            sectionName: mcps
        # FastMCP's streamable-http mounts at `/mcp/` (with trailing slash);
        # clients hitting `/mcp` exactly get a 307. PathPrefix `/mcp` matches
        # both, and the kuadrant broker handles the redirect transparently.
        # `/a2a` + `/ag-ui` in the upstream repo belong to a DIFFERENT binary
        # (`jellyfin-agent`); the MCP image only serves `/mcp/` + `/health`.
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /mcp
            backendRefs:
              - identifier: app
                port: 8000
