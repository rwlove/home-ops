---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/gateway.networking.k8s.io/gateway_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: mcp-gateway
  annotations:
    external-dns.alpha.kubernetes.io/target: &hostname mcp-gateway.${SECRET_DOMAIN}
spec:
  gatewayClassName: istio
  infrastructure:
    annotations:
      external-dns.alpha.kubernetes.io/hostname: *hostname
      lbipam.cilium.io/ips: "${SVC_MCPGATEWAY_ADDR}"
      #istio: ingressgateway
      gateway.io/name: mcp-gateway
      sidecar.istio.io/inject: "true"
  listeners:
    - name: mcp
      hostname: "*.mcp.local"
      protocol: HTTP
      port: 8080
      allowedRoutes:
        namespaces:
          from: All # TODO? Same like internal/external?
    - name: mcps
      hostname: "*.mcp.local"
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: All
      tls:
        certificateRefs:
          - kind: Secret
            name: "${SECRET_DOMAIN/./-}-tls"
