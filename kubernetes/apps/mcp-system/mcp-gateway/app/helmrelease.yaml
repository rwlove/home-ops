---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mcp-gateway
spec:
  chartRef:
    kind: OCIRepository
    name: mcp-gateway
  interval: 30m

  values:
    # Default values for mcp-gateway.
    # This is a YAML-formatted file.

    # Image configuration for mcp-gateway broker-router (deployed by controller)
    # image:
    #   repository: ghcr.io/kuadrant/mcp-gateway
    #   # tag defaults to Chart.appVersion if empty
    #   tag: ""

    # Image configuration for mcp-controller
    # imageController:
    #   repository: ghcr.io/kuadrant/mcp-controller
    #   # tag defaults to Chart.appVersion if empty
    #   tag: ""
    #   pullPolicy: IfNotPresent

    # Controller configuration
    broker:
      # How often (in seconds) the broker pings upstream MCP servers
      pollInterval: 60

    # Gateway configuration
    controller:
      # Enable/disable controller deployment
      enabled: true

    # Broker configuration (applied to broker-router deployed by controller)
    gateway:
      create: false
      # used by chart to compute MCPGatewayExtension.privateHost
      # as "<gateway.name>-<gateway.gatewayClassName>.<gateway.namespace>.svc.cluster.local:<gateway.port>"
      namespace: mcp-system
      publicHost: "mcp.${SECRET_DOMAIN}" # required for MCPGatewayExtension

    # MCPGatewayExtension configuration
    mcpGatewayExtension:
      # Manage MCPGatewayExtension out-of-band (see mcpgatewayextension.yaml)
      # so we can set httpRouteManagement: Disabled, which the chart does
      # not expose. We then own the broker HTTPRoute (httproute-broker.yaml)
      # and add external-dns.alpha.kubernetes.io/controller: none on it.
      create: false
