---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-gateway-broker
  annotations:
    # Internal-only route on the istio gateway; external-dns must not
    # publish a record pointing at the istio LB IP for this hostname.
    external-dns.alpha.kubernetes.io/controller: none
spec:
  hostnames:
    - mcp.${SECRET_DOMAIN}
  parentRefs:
    - name: mcp-gateway
      sectionName: mcp
  rules:
    - backendRefs:
        - name: mcp-gateway
          port: 8080
      matches:
        - path:
            type: PathPrefix
            value: /mcp
