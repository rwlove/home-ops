---
# TODO: apply schema
apiVersion: mcp.kuadrant.io/v1alpha1
kind: MCPGatewayExtension
metadata:
  name: mcp-gateway-extension
  labels:
    app.kubernetes.io/name: kuadrant-mcp-gateway
spec:
  backendPingIntervalSeconds: 60
  # Disabled so the controller does not create the broker HTTPRoute;
  # we own it (httproute-broker.yaml) to add an external-dns opt-out.
  httpRouteManagement: Disabled
  privateHost: mcp-gateway-istio.mcp-system.svc.cluster.local:8080
  publicHost: mcp.${SECRET_DOMAIN}
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: mcp-gateway
    namespace: mcp-system
    sectionName: mcp
