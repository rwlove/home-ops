---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/monitoring.coreos.com/podmonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: mcp-gateway-istio
spec:
  jobLabel: mcp-gateway-istio
  namespaceSelector:
    matchNames:
      - mcp-system
  podMetricsEndpoints:
    - port: metrics
      path: /stats/prometheus
      interval: 30s
      scrapeTimeout: 10s
  selector:
    matchLabels:
      gateway.istio.io/managed: istio.io-gateway-controller
      gateway.networking.k8s.io/gateway-name: mcp-gateway
