---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-gateway-jwt-rotator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mcp-gateway-jwt-rotator
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["mcp-gateway-jwt-current"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mcp-gateway-jwt-rotator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mcp-gateway-jwt-rotator
subjects:
  - kind: ServiceAccount
    name: mcp-gateway-jwt-rotator
