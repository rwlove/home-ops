---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: mcp-gateway-jwt
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: mcp-gateway-internal
  jwt:
    providers:
      - name: authelia
        issuer: "https://auth.${SECRET_DOMAIN}"
        audiences:
          - mcp-gateway
        remoteJWKS:
          uri: "https://auth.${SECRET_DOMAIN}/jwks.json"
