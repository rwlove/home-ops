---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie-mcp
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        runAsGroup: 999
        runAsNonRoot: true
        runAsUser: 999
    controllers:
      mealie-mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          annotations:
            sidecar.istio.io/inject: "true"
        containers:
          app:
            image:
              repository: ghcr.io/danielpalstra/mealie-mcp-server-docker
              tag: sha-6a758ca
            command:
              - fastmcp
              - run
              - /app/src/server.py
              - --host
              - 0.0.0.0
              - --with
              - httpx
              - --transport
              - http
            env:
              MEALIE_BASE_URL: http://mealie.collab.svc.cluster.local:9000
              UV_CACHE_DIR: /tmp/uv-cache
              HOME: /tmp
            envFrom:
              - secretRef:
                  name: mealie-mcp-secret
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
              readOnlyRootFilesystem: true
            workingDir: /tmp
    service:
      app:
        controller: mealie-mcp
        ports:
          http:
            port: 8000
    route:
      app:
        hostnames:
          - "mealie-mcp.mcp.local"
        parentRefs:
          - name: mcp-gateway
            namespace: mcp-system
            sectionName: mcps
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /mcp
            backendRefs:
              - identifier: app
                port: 8000
    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
