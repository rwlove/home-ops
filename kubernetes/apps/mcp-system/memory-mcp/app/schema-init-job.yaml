---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/job-batch-v1.json
apiVersion: batch/v1
kind: Job
metadata:
  name: memory-mcp-migrate
  annotations:
    # The schema DDL now ships inside the memory-mcp image (package
    # data) and is applied by its `memory-mcp-migrate` entry point — no
    # vendored schema.sql / ConfigMap. Job spec is immutable, so to
    # re-run on a new image just bump the image tag (a new digest =>
    # Flux recreates the Job). Bump this when you want to force a re-run
    # without an image change.
    home-ops/schema-version: "2"
spec:
  backoffLimit: 5
  template:
    metadata:
      annotations:
        # Sidecar would prevent Job completion (stays running). Skip.
        sidecar.istio.io/inject: "false"
      # CNP selects on this label — Job pods need to match the
      # memory-mcp-allow policy so they can reach postgres.
      labels:
        app.kubernetes.io/name: memory-mcp
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: ghcr.io/rwlove/memory-mcp:v0.2.1@sha256:bc78855b3fa8342b6ba31bfaec2fae44edabd63eee70609de689db4f7ae5c613
          command:
            - memory-mcp-migrate
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-langgraph-memory-app
                  key: uri
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /tmp
              name: tmp
      volumes:
        - emptyDir: {}
          name: tmp
