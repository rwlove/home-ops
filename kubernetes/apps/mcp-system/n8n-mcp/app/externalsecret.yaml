---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-mcp
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: n8n-mcp-secret
    creationPolicy: Owner
    template:
      metadata:
        labels:
          # Required by mcp-broker to consume this secret as a credentialRef.
          mcp.kuadrant.io/secret: "true"
      data:
        # Raw token used by the n8n-mcp pod's AUTH_TOKEN env to validate
        # incoming Bearer headers.
        AUTH_TOKEN: "{{ .AUTH_TOKEN }}"
        # The mcp-broker sends the credentialRef value verbatim as the
        # Authorization header. n8n-mcp requires "Bearer " prefix, so we
        # derive a separate key the credentialRef points at.
        AUTH_TOKEN_BEARER: "Bearer {{ .AUTH_TOKEN }}"
        N8N_API_KEY: "{{ .N8N_API_KEY }}"
  dataFrom:
    - extract:
        key: n8n-mcp
