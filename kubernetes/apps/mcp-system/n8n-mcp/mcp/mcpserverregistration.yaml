---
# TODO: apply schema
apiVersion: mcp.kuadrant.io/v1alpha1
kind: MCPServerRegistration
metadata:
  name: n8n-tools
  labels:
    mcp.kuadrant.io/managed: "true"
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: n8n-mcp
  toolPrefix: n8n_
  # n8n-mcp's HTTP mode requires `Authorization: Bearer <token>` exactly.
  # The broker forwards this secret value verbatim as the Authorization
  # header — so we point at the AUTH_TOKEN_BEARER key (the externalsecret
  # template prefixes "Bearer " to the raw token for this purpose).
  credentialRef:
    name: n8n-mcp-secret
    key: AUTH_TOKEN_BEARER
