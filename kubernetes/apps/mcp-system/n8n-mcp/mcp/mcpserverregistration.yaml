---
# TODO: apply schema
apiVersion: mcp.kuadrant.io/v1alpha1
kind: MCPServerRegistration
metadata:
  name: n8n-tools
  labels:
    mcp.kuadrant.io/managed: "true"
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: n8n-mcp
  toolPrefix: n8n_
  # n8n-mcp's HTTP mode requires Bearer token auth on every request;
  # the broker reads this secret and forwards as Authorization: Bearer <token>.
  credentialRef:
    name: n8n-mcp-secret
    key: AUTH_TOKEN
