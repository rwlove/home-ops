---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-mcp
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
    controllers:
      paperless-mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          annotations:
            sidecar.istio.io/inject: "true"
        containers:
          app:
            image:
              repository: ghcr.io/baruchiro/paperless-mcp
              # Upstream uses sha-prefixed tags + floating `latest`. No
              # semver. Pin the digest currently running (verified via
              # `kubectl describe pod` on 2026-05-20); the `latest` tag
              # portion is decorative — the @sha256 enforces.
              tag: latest@sha256:283d0b1e0202e617bf602085cc369582bca9aba4898932a238735fad8c66a4f4
            env:
              PAPERLESS_URL: https://paperless.${SECRET_DOMAIN}
            envFrom:
              - secretRef:
                  name: paperless-mcp-secret
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    service:
      app:
        controller: paperless-mcp
        ports:
          http:
            port: 3000
    route:
      app:
        hostnames:
          - "paperless-mcp.mcp.local"
        parentRefs:
          - name: mcp-gateway
            namespace: mcp-system
            sectionName: mcps
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /mcp
            filters:
              # Strip the broker-side Authorization header before
              # forwarding to paperless-mcp. The Kuadrant mcp-gateway
              # passes inbound headers through; paperless-mcp's HTTP
              # client honors the inbound `Authorization: Bearer …`
              # (the token used by clients to authenticate to
              # mcp.thesteamedcrab.com) instead of its own
              # PAPERLESS_API_KEY env, and Paperless-ngx rejects the
              # broker Bearer as "Invalid token" (401).
              # Removing Authorization lets paperless-mcp fall back to
              # its env-loaded API key, which is the correct credential
              # for Paperless-ngx.
              - type: RequestHeaderModifier
                requestHeaderModifier:
                  remove:
                    - Authorization
            backendRefs:
              - identifier: app
                port: 3000
