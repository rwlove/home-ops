---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-mcp
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        runAsGroup: 1000

        runAsNonRoot: true
        runAsUser: 1000
    controllers:
      prometheus-mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/pab1it0/prometheus-mcp-server
              tag: 1.6.0@sha256:06259d8cc17469edd79989fd4b9de57cec7afb028e1469c02ebada6a952de5e1
            env:
              PROMETHEUS_DISABLE_LINKS: true
              PROMETHEUS_MCP_BIND_HOST: 0.0.0.0
              PROMETHEUS_MCP_BIND_PORT: "8080"
              PROMETHEUS_MCP_SERVER_TRANSPORT: http
              PROMETHEUS_URL: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              readOnlyRootFilesystem: true
    service:
      app:
        controller: prometheus-mcp
        ports:
          http:
            port: 8080

    route:
      app:
        hostnames:
          - "prometheus-mcp.mcp.${SECRET_DOMAIN}"
        parentRefs:
          - name: mcp-gateway
            namespace: mcp-system
            sectionName: mcp
        rules:
          - backendRefs:
              - identifier: app
                port: 8080
