---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-mcp
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        runAsGroup: 1000

        runAsNonRoot: true
        runAsUser: 1000
    controllers:
      prometheus-mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/pab1it0/prometheus-mcp-server
              tag: 1.6.1@sha256:ed91f3f9e4f6fb92c5b8fd48a29f3382c11498de405f59da5eac16398d47d43b
            env:
              PROMETHEUS_URL: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
              PROMETHEUS_MCP_SERVER_TRANSPORT: http
              PROMETHEUS_MCP_BIND_HOST: 0.0.0.0
              PROMETHEUS_MCP_BIND_PORT: "8080"
              PROMETHEUS_DISABLE_LINKS: true
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    service:
      app:
        controller: prometheus-mcp
        ports:
          http:
            port: 8080

    route:
      app:
        hostnames:
          - "prometheus-mcp.mcp.${SECRET_DOMAIN}"
        parentRefs:
          - name: mcp-gateway
            namespace: mcp-system
            sectionName: mcp
        rules:
          - backendRefs:
              - identifier: app
                port: 8080
