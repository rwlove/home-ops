---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app prometheus-mcp
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  targetNamespace: mcp-system
  path: ./kubernetes/apps/mcp-system/prometheus-mcp/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-ops-kubernetes
    namespace: flux-system
  wait: false
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  dependsOn:
    - name: kuadrant-mcp-gateway
      namespace: mcp-system
