---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app whoami
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      main:
        pod:
          annotations:
            sidecar.istio.io/inject: "true"

        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        containers:
          main:
            image:
              repository: docker.io/traefik/whoami
              tag: v1.11.0
            args: ["--port=8080"]
            resources:
              requests:
                cpu: 20m
                memory: 80M
              limits:
                memory: 80M

    service:
      main:
        controller: main
        ports:
          http:
            port: &httpPort 8080

    route:
      main:
        annotations:
          glance/name: "Who Am I?"
          glance/show: "true"
          #glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/cilium.png"
          glance/id: "Network"
        hostnames:
          - "{{ .Release.Name }}.app.${SECRET_DOMAIN}"
        parentRefs:
          - name: istio
            namespace: istio-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *httpPort
