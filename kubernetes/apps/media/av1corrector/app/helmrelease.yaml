---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app av1corrector
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        # Intel iGPU is only present on a subset of nodes. The hevc_vaapi
        # encoder needs gpu.intel.com/i915 (provided by intel-device-plugin
        # on those nodes); requesting it implicitly schedules here.
        pod:
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3.0@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf

            envFrom: &envFrom
              - secretRef:
                  name: av1corrector-secret

        containers:
          main:
            image:
              repository: ghcr.io/rwlove/av1corrector
              tag: v0.6.0

            env:
              AV1CORRECTOR_LIBRARY_PATH: /library
              AV1CORRECTOR_LISTEN_ADDR: ":8000"
              AV1CORRECTOR_LOG_FORMAT: json

              # Use the Intel iGPU's HEVC encoder for 8-bit AV1 sources.
              # 10-bit sources (most modern AV1) will silently fall back to
              # libx265 — HD630 / gen9.5 only encodes 8-bit HEVC.
              AV1CORRECTOR_ENCODER: vaapi_hevc

              # When the libx265 fallback path runs, use a faster preset.
              # ~3× the throughput of "slow" for the 10-bit files that can't
              # use the iGPU. Quality drop at CRF 18 is imperceptible.
              AV1CORRECTOR_X265_PRESET: medium

            envFrom: *envFrom

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &httpPort 8000
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: false

            resources:
              requests:
                cpu: 500m
                memory: 512Mi
                gpu.intel.com/i915: 1
              limits:
                memory: 4Gi
                gpu.intel.com/i915: 1

    service:
      main:
        controller: main
        ports:
          http:
            port: *httpPort

    route:
      main:
        annotations:
          glance/name: "AV1 Corrector"
          glance/show: "true"
          glance/id: "Media"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - kind: Service
                name: av1corrector-oauth2-proxy
                port: 4180

    persistence:
      library:
        type: persistentVolumeClaim
        existingClaim: av1corrector-library-pvc
        globalMounts:
          - path: /library
