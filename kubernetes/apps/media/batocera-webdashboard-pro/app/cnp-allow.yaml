---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: batocera-webdashboard-pro-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: batocera-webdashboard-pro
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # Internal gateway (envoy) → batocera-webdashboard-pro:8080. Auth
    # is enforced at the gateway by the extAuth SecurityPolicy (#12767);
    # the app previously relied on its same-ns oauth2-proxy via
    # allow-intra-namespace and had no CNP of its own.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
