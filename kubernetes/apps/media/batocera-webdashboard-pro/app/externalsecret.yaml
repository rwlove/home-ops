---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: batocera-webdashboard-pro
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: batocera-webdashboard-pro-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        BATOCERA_HOST: "{{ .BATOCERA_HOST }}"
        BATOCERA_PORT: "{{ .BATOCERA_PORT }}"
        BATOCERA_USER: "{{ .BATOCERA_USER }}"
        BATOCERA_PASS: "{{ .BATOCERA_PASS }}"
  dataFrom:
    - extract:
        key: batocera-webdashboard-pro
