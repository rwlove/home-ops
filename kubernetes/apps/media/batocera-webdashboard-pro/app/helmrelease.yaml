---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app batocera-webdashboard-pro
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      batocera-webdashboard-pro:
        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

        containers:
          app:
            image:
              repository: ghcr.io/rwlove/batocera-webdashboard-pro
              tag: v2.0.0

            env:
              MODE: remote
              PORT: &httpPort 8080

            envFrom:
              - secretRef:
                  name: batocera-webdashboard-pro-secret

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *httpPort
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: false

            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault

    service:
      app:
        controller: batocera-webdashboard-pro
        ports:
          http:
            port: *httpPort

    route:
      app:
        annotations:
          glance/name: "Batocera"
          glance/show: "true"
          glance/id: "Media"

        hostnames:
          - "batocera.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - kind: Service
                name: batocera-webdashboard-pro
                port: 8080

    persistence:
      tmp:
        type: emptyDir
        advancedMounts:
          batocera-webdashboard-pro:
            app:
              - path: /tmp
