---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app beets
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      main:
        pod:
          automountServiceAccountToken: false
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1001
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
        cronjob:
          schedule: "0 */6 * * *"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 3
          failedJobsHistory: 3
          backoffLimit: 1
          activeDeadlineSeconds: 21300
          ttlSecondsAfterFinished: 86400
        type: cronjob
        initContainers:
          config-setup:
            image:
              repository: ghcr.io/dmfrey/bash
              tag: 5.2.26-alpine3.20
            command:
              - "/usr/local/bin/bash"
              - -c
              - |
                envsubst < /tmptmp/config.yaml > /tmp/config.yaml
                exit 0
            envFrom:
              - secretRef:
                  name: beets-secret
        containers:
          main:
            image:
              repository: ghcr.io/linuxserver/beets
              tag: 2.10.0@sha256:1503dfbae2379b90db821de202ead77a269736f8cedde0b27f73e43c16f06801
            command:
              - /bin/bash
              - -c
              - |
                set -e
                export PATH="/lsiopy/bin:$PATH"
                echo "[$(date)] Starting beets incremental import on /media library..."
                beet -c /tmp/config.yaml import -q /media

                echo "[$(date)] Bridge: re-tagging soularr's failed_imports with beets, then re-triggering Lidarr scan"
                FAILED_DIR="/slskd/complete/failed_imports"
                if [ -d "$FAILED_DIR" ]; then
                  for src in "$FAILED_DIR"/*/; do
                    [ -d "$src" ] || continue
                    base=$(basename "$src")
                    target="/slskd/$base"
                    echo "  -> $base"
                    # beets pre-tag (MB match — more permissive than Lidarr's 80% threshold)
                    beet -c /tmp/config.yaml import -q "$src" || echo "     beet import nonzero exit (continuing)"
                    # Move out of failed_imports so the next Lidarr scan path makes sense
                    mv "$src" "$target" || { echo "     mv failed; skipping"; continue; }
                    # Trigger Lidarr DownloadedAlbumsScan on the now-tagged dir
                    if [ -n "${LIDARR__API_KEY:-}" ]; then
                      curl -sS -X POST \
                        -H "X-Api-Key: ${LIDARR__API_KEY}" \
                        -H "Content-Type: application/json" \
                        "http://lidarr.media.svc.cluster.local:8686/api/v1/command" \
                        --data "{\"name\":\"DownloadedAlbumsScan\",\"path\":\"$target\"}" \
                        > /dev/null && echo "     Lidarr scan triggered" \
                        || echo "     Lidarr scan trigger failed"
                    else
                      echo "     LIDARR__API_KEY missing, skipping Lidarr trigger"
                    fi
                  done
                fi
                echo "[$(date)] Beets cron + bridge complete."
            envFrom:
              - secretRef:
                  name: lidarr
            resources:
              requests:
                cpu: 100m
                memory: 3G
              limits:
                memory: 3G

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"]}
    service:
      main:
        controller: main
        ports:
          http:
            port: &httpPort 8337

    route:
      main:
        annotations:
          glance/name: "Beets"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/beets.png"
          glance/id: "Media"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *httpPort

    persistence:
      config:
        existingClaim: beets-config-pvc

      config-source:
        type: configMap
        name: beets-config
        globalMounts:
          - path: /tmptmp/config.yaml
            subPath: config.yaml
            readOnly: true

      media:
        existingClaim: beets-media-pvc

      slskd:
        existingClaim: soularr-slskd-downloads-pvc
        globalMounts:
          - path: /slskd

      tmp:
        type: emptyDir
        medium: Memory

      tmptmp:
        type: emptyDir
        medium: Memory
