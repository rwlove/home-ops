---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app beets
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      main:
        pod:
          automountServiceAccountToken: false
          restartPolicy: Never
          securityContext:
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1000
        cronjob:
          activeDeadlineSeconds: 18000
          backoffLimit: 1
          concurrencyPolicy: Forbid
          failedJobsHistory: 3
          schedule: "0 */6 * * *"
          successfulJobsHistory: 3
          ttlSecondsAfterFinished: 86400
        type: cronjob
        initContainers:
          config-setup:
            image:
              repository: ghcr.io/dmfrey/bash
              tag: 5.2.26-alpine3.20
            command:
              - "/usr/local/bin/bash"
              - -c
              - |
                envsubst < /tmptmp/config.yaml > /tmp/config.yaml
                exit 0
            envFrom:
              - secretRef:
                  name: beets-secret
        containers:
          main:
            image:
              repository: lscr.io/linuxserver/beets
              tag: 2.10.0
            command:
              - /bin/bash
              - -c
              - |
                set -e
                export PATH="/lsiopy/bin:$PATH"
                echo "[$(date)] Starting beets incremental import..."
                beet -c /tmp/config.yaml import -q /media
                echo "[$(date)] Beets import complete."
            resources:
              requests:
                cpu: 100m
                memory: 3G
              limits:
                memory: 3G

            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              readOnlyRootFilesystem: false
    service:
      main:
        controller: main
        ports:
          http:
            port: &httpPort 8337

    route:
      main:
        annotations:
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/beets.png"
          glance/id: "Media"

          glance/name: "Beets"
          glance/show: "true"
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *httpPort

    persistence:
      config:
        existingClaim: beets-config-pvc

      config-source:
        type: configMap
        name: beets-config
        globalMounts:
          - path: /tmptmp/config.yaml
            subPath: config.yaml
            readOnly: true

      media:
        existingClaim: beets-media-pvc

      tmp:
        type: emptyDir
        medium: Memory

      tmptmp:
        type: emptyDir
        medium: Memory
