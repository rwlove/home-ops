---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app beets
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      beets:
        pod:
          automountServiceAccountToken: false
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1109
            runAsGroup: 1001
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
        cronjob:
          schedule: "0 */12 * * *"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 3
          failedJobsHistory: 3
          backoffLimit: 1
          activeDeadlineSeconds: 39600
          ttlSecondsAfterFinished: 86400
        type: cronjob
        initContainers:
          config-setup:
            image:
              repository: ghcr.io/dmfrey/bash
              tag: 5.2.26-alpine3.20
            command:
              - "/usr/local/bin/bash"
              - -c
              - |
                envsubst < /tmptmp/config.yaml > /tmp/config.yaml
                exit 0
            envFrom:
              - secretRef:
                  name: beets-secret
        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/beets
              tag: 2.12.0@sha256:9d7953d6afc7469e6314c25d9952374338de792171857dc5ff6dc482d488c658
            command:
              - /bin/bash
              - -c
              - |
                export PATH="/lsiopy/bin:$PATH"
                echo "[$(date)] Starting beets incremental import on /media..."
                # Lidarr concurrent file moves cause ENOENT mid-import; the
                # chroma plugin's fingerprint_file aborts the whole session.
                # Retry — beets incremental mode skips already-imported albums.
                attempts=0
                max_attempts=5
                while :; do
                  if beet -c /tmp/config.yaml import -q /media; then
                    echo "[$(date)] Beets import complete."
                    # as-is imports preserve bad Discogs MBIDs in the file tags,
                    # which break Music Assistant's OpenSubsonic track-sync.
                    # Blank any non-UUID mb_* (DB + file). Non-fatal.
                    echo "[$(date)] Scrubbing non-UUID MusicBrainz IDs..."
                    python3 /scripts/mbid-scrub.py /media \
                      || echo "[$(date)] WARN: mbid-scrub failed (non-fatal)"
                    exit 0
                  fi
                  attempts=$((attempts+1))
                  if [ "$attempts" -ge "$max_attempts" ]; then
                    echo "[$(date)] Beets failed $attempts times, giving up."
                    exit 1
                  fi
                  echo "[$(date)] Beets failed (attempt $attempts/$max_attempts), retrying in 30s..."
                  sleep 30
                done
            resources:
              requests:
                cpu: 100m
                memory: 6G
              limits:
                memory: 6G

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"]}
    service:
      app:
        controller: beets
        ports:
          http:
            port: &httpPort 8337

    route:
      app:
        annotations:
          glance/name: "Beets"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/beets.png"
          glance/id: "Media"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *httpPort

    persistence:
      config:
        existingClaim: beets-config-pvc

      config-source:
        type: configMap
        name: beets-config
        globalMounts:
          - path: /tmptmp/config.yaml
            subPath: config.yaml
            readOnly: true

      scripts:
        type: configMap
        name: beets-scripts
        globalMounts:
          - path: /scripts/mbid-scrub.py
            subPath: mbid-scrub.py
            readOnly: true

      media:
        existingClaim: beets-media-pvc

      tmp:
        type: emptyDir
        medium: Memory

      tmptmp:
        type: emptyDir
        medium: Memory
