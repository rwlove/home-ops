directory: /media
library: /config/library.db

import:
  incremental: yes
  incremental_skip_later: yes
  quiet: yes
  quiet_fallback: asis # was: skip — import unmatched as-is so nothing slips past beets' DB
  write: yes
  copy: no
  move: no
  log: /config/import.log

plugins:
  - chroma # https://beets.readthedocs.io/en/stable/plugins/chroma.html — AcoustID fingerprint matching
  - duplicates # https://beets.readthedocs.io/en/stable/plugins/duplicates.html — `beet duplicates` command
  - embedart # https://beets.readthedocs.io/en/stable/plugins/embedart.html
  - fetchart # https://beets.readthedocs.io/en/stable/plugins/fetchart.html
  - mbsync # https://beets.readthedocs.io/en/stable/plugins/mbsync.html — `beet mbsync` for full-library MB refresh
  - missing # https://beets.readthedocs.io/en/stable/plugins/missing.html — `beet missing` command
  - musicbrainz # https://beets.readthedocs.io/en/stable/plugins/musicbrainz.html
  - replaygain # https://beets.readthedocs.io/en/stable/plugins/replaygain.html

chroma:
  auto: yes

fetchart:
  auto: yes
  minwidth: 500
  maxwidth: 1200
  sources:
    - filesystem
    - coverart # was: coverartarchive (invalid name; whole sources line was rejected)
    - itunes
    - amazon
    - albumart
    - wikipedia

embedart:
  auto: yes
  ifempty: yes
  maxwidth: 500
  remove_art_file: yes # embed cover into files, then drop the loose folder.jpg

replaygain:
  auto: no # heavy CPU per file; run `beet replaygain` manually when desired
  backend: ffmpeg
  overwrite: no
