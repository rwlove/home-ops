---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app cutvideo
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      cutvideo:
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7

            envFrom: &envFrom
              - secretRef:
                  name: cutvideo-secret

        containers:
          app:
            image:
              repository: ghcr.io/rwlove/cutvideo
              tag: v0.8

            envFrom: *envFrom

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &httpPort 8000
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: false

            resources:
              requests:
                cpu: 25m
                memory: 128M
              limits:
                memory: 1Gi

    service:
      app:
        controller: cutvideo
        ports:
          http:
            port: *httpPort

    route:
      app:
        annotations:
          glance/name: "cutVideo"
          glance/show: "true"
          glance/id: "Media"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *httpPort
