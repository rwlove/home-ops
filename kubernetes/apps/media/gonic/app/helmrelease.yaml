---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gonic
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m

  install:
    disableWait: true
  upgrade:
    disableWait: true

  values:
    controllers:
      gonic:
        pod:
          securityContext:
            # Tier 2 reader — gonic reads media via the world-readable bit on
            # 2775 dirs / 664 files. NOT a member of the media group; runs
            # under its own UID/GID so it cannot modify media.
            fsGroup: 1112
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1112
            runAsNonRoot: true
            runAsUser: 1112

        annotations:
          reloader.stakater.com/auto: "true"
        type: statefulset

        initContainers:
          # gonic writes playlists as m3u files under GONIC_PLAYLISTS_PATH and
          # touches them via os.Chtimes() with an explicit mtime, which the
          # kernel only permits to the file owner. The pre-existing playlist
          # tree was created root-owned (uid 0) before this controller pinned
          # runAsUser 1112, so the non-root gonic process gets EPERM on every
          # playlist edit ("touch m3u: ... operation not permitted") and clients
          # like Music Assistant fail to add tracks. fsGroup fixes the GID but
          # never the UID. Reclaim ownership on startup; idempotent + self-heals.
          init-perms:
            image:
              repository: ghcr.io/sentriz/gonic
              tag: v0.21.0@sha256:a6b7abf599cdfdf079a18df16ec2b8067cf85d60d056b439e3096b6a157e4dd9
            command:
              - chown
              - -R
              - 1112:1112
              - /data/playlists
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

        containers:
          app:
            image:
              repository: ghcr.io/sentriz/gonic
              tag: v0.22.0@sha256:516fd9645614ba3a596d86174216c3e944808b9ec970c581678713be4c8b1d49

            env:
              # GONIC_MUSIC_PATH: "/media-serenity/Library/Music"
              # GONIC_PODCAST_PATH: "/media-serenity/Library/Podcasts"
              # GONIC_CACHE_PATH: "/data/cache"
              GONIC_LISTEN_ADDR: ":4747"
              GONIC_PLAYLISTS_PATH: "/data/playlists"
              GONIC_SCAN_INTERVAL: "120"

            resources:
              requests:
                cpu: 15m
                memory: 800M
              limits:
                memory: 800M

    service:
      app:
        controller: gonic
        ports:
          http:
            port: &httpPort 80
            targetPort: 4747

    route:
      app:
        annotations:
          glance/name: "Gonic"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/gonic.png"
          glance/id: "Media"
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *httpPort
    persistence:
      data:
        existingClaim: gonic-data-pvc

      music:
        existingClaim: gonic-music-pvc

      playlist:
        type: emptyDir

      podcasts:
        existingClaim: gonic-podcasts-pvc
