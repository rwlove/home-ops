---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gonic
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m

  values:
    controllers:
      main:
        pod:
          securityContext:
            supplementalGroups:
              - 1001

        annotations:
          reloader.stakater.com/auto: "true"
        type: statefulset

        containers:
          main:
            image:
              repository: ghcr.io/sentriz/gonic
              tag: v0.20.1@sha256:6b2ce6ee00937fe36caecd4acfea899fdd5c0998df6539071563a712fb873517

            env:
              # GONIC_MUSIC_PATH: "/media-serenity/Library/Music"
              # GONIC_PODCAST_PATH: "/media-serenity/Library/Podcasts"
              # GONIC_CACHE_PATH: "/data/cache"
              GONIC_SCAN_INTERVAL: "120"
              GONIC_PLAYLISTS_PATH: "/data/playlists"

            resources:
              requests:
                cpu: 15m
                memory: 800M
              limits:
                memory: 800M

    persistence:
      data:
        existingClaim: gonic-data-pvc

      music:
        existingClaim: gonic-music-pvc

      playlist:
        type: emptyDir

      podcasts:
        existingClaim: gonic-podcasts-pvc

    route:
      main:
        annotations:
          glance/name: "Gonic"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/gonic.png"
          glance/id: "Media"
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *httpPort

    service:
      main:
        controller: main
        ports:
          http:
            port: &httpPort 80
