---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app immich-pet-tagger
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  dependsOn:
    - name: immich
      namespace: media
  values:
    controllers:
      immich-pet-tagger:
        annotations:
          reloader.stakater.com/auto: "true"

        type: deployment

        pod:
          nodeSelector:
            nvidia.com/gpu.present: "true"
          runtimeClassName: nvidia
          # upstream image runs as root and writes yolov8n.pt to /app at
          # runtime; runAsNonRoot would block the YOLO model download.
          # Revert once upstream bundles the model (see tedornitier/immich-pet-tagger#?).
          securityContext:
            fsGroup: 1000
            # Always (vs OnRootMismatch) so kubelet chmods existing
            # appuser-owned files in /data to group-writable on mount.
            # Container runs as root with capabilities.drop:[ALL], so
            # it lacks CAP_DAC_OVERRIDE/CAP_FOWNER and can't write
            # group-readonly files left over from the prior non-root pod.
            fsGroupChangePolicy: Always

        containers:
          app:
            image:
              # P40 (Pascal/sm_61): upstream's default cuda image uses torch
              # cu128, which dropped sm_61. Upstream's `cuda-legacy` variant
              # pins cu126 (keeps Maxwell–Hopper) and runs on the P40, so we
              # run upstream directly. Migrated off the rwlove fork (now
              # retired) — upstream absorbed the Pascal pin, the multi-variant
              # build, and the no-animal skip behavior (v1.3.0). Tracking:
              # home-ops#11853. Note: upstream runs yolov8n (vs the fork's
              # yolov8m); watch first-backfill detection quality.
              repository: ghcr.io/tedornitier/immich-pet-tagger
              tag: v1.5.0-cuda-legacy@sha256:57dabca9fceb014d25fe80d21ff30b78b326eb0e0896e4cd48f1d6fac1841451
            env:
              IMMICH_URL: http://immich-server.media.svc.cluster.local:2283
              POLL_INTERVAL: "300"
              THRESHOLD: "0.8"
              GPU_WORKERS: "2"
              DATA_DIR: /data
            envFrom:
              - secretRef:
                  name: *app
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  periodSeconds: 30
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  periodSeconds: 15
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  periodSeconds: 10
                  failureThreshold: 60
            resources:
              requests:
                cpu: 200m
                memory: 2Gi
                nvidia.com/gpu: 1
              limits:
                # Bumped 4Gi→8Gi 2026-05-16: 64 SCAN_WORKERS (GPU_WORKERS=2 × 32)
                # OOMKilled during 209-asset backfill. Lower SCAN_WORKERS env if
                # this still isn't enough at larger backfill sizes.
                memory: 8Gi
                nvidia.com/gpu: 1
            securityContext:
              allowPrivilegeEscalation: false
              # ultralytics downloads yolov8n.pt to cwd (/app) on first
              # poll; can't honor a read-only rootfs. Long-term fix is to
              # bundle the model in rwlove/containers/immich-pet-tagger
              # (see project_immich_pet_tagger_yolo_weights.md).
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault

    service:
      app:
        controller: immich-pet-tagger
        ports:
          http:
            port: &httpPort 8000

    route:
      app:
        annotations:
          glance/name: "Immich Pet Tagger"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/immich.png"
          glance/id: "Media"
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *httpPort

    persistence:
      data:
        existingClaim: immich-pet-tagger-data-pvc
        globalMounts:
          - path: /data
      home:
        type: emptyDir
        globalMounts:
          - path: /home/appuser
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
