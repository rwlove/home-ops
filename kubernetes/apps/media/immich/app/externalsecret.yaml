---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: immich-secret
    creationPolicy: Owner
    template:
      data:
        # Immich v2.x reads system config from a JSON file pointed at by
        # IMMICH_CONFIG_FILE. OAuth settings declared here are locked in the
        # UI and survive Immich restarts/db rebuilds. Plaintext client_secret
        # comes from 1P; matches the Argon2 hash in Authelia config.
        system.json: |
          {
            "oauth": {
              "enabled": true,
              "issuerUrl": "https://auth.thesteamedcrab.com",
              "clientId": "immich",
              "clientSecret": "{{ .OAUTH_CLIENT_SECRET }}",
              "scope": "openid email profile",
              "signingAlgorithm": "RS256",
              "profileSigningAlgorithm": "none",
              "tokenEndpointAuthMethod": "client_secret_post",
              "storageLabelClaim": "preferred_username",
              "storageQuotaClaim": "immich_quota",
              "roleClaim": "immich_role",
              "timeout": 30000,
              "autoRegister": true,
              "autoLaunch": false,
              "buttonText": "Login with Authelia",
              "mobileOverrideEnabled": false,
              "mobileRedirectUri": "",
              "defaultStorageQuota": 0
            },
            "newVersionCheck": {
              "enabled": false
            }
          }
  dataFrom:
    - extract:
        key: immich
