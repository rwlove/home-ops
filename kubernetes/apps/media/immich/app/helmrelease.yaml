---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  chart:
    spec:
      # renovate: registryUrl=https://immich-app.github.io/immich-charts
      chart: immich
      sourceRef:
        kind: HelmRepository
        name: immich-charts
      version: 0.11.1
  interval: 30m

  # disableWait — immich-machine-learning's CLIP+SigLIP2 preload blocks
  # /ping past helm-controller's 5-min default wait. Without this, the
  # timed-out upgrade is marked Failed and helm-controller rolls back;
  # the rollback ALSO waits for Ready and ALSO times out, leaving the
  # release stuck and silently reverting the spec just applied (this is
  # how a probe-tuning edit on 2026-05-04 was lost the first time).
  # Recovery: suspend the HR, delete the failed/pending
  # sh.helm.release.v1.* secrets, resume.
  install:
    disableWait: true
    remediation:
      retries: -1
  upgrade:
    disableWait: true
    remediation:
      retries: -1

  values:
    controllers:
      immich:
        containers:
          app:
            env:
              DB_DATABASE_NAME: immich

              DB_HOSTNAME: postgres-immich-rw.databases.svc.cluster.local
              DB_PASSWORD: immich
              DB_USERNAME: immich
              DISABLE_REVERSE_GEOCODING: "false"
              EXTERNAL_PATH: "/external"
              IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning.media:3003
              # IMMICH_WEB_URL: http://immich-web.media.svc.cluster.local:3000
              IMMICH_SERVER_URL: http://immich-server.media.svc.cluster.local:3001
              LOG_LEVEL: verbose
              IMMICH_CONFIG_FILE: /config/system.json
              PUBLIC_IMMICH_SERVER_URL: https://photos.${SECRET_DOMAIN}
              REDIS_DBINDEX: "1"
              REDIS_HOSTNAME: dragonfly.databases.svc.cluster.local
              REDIS_PORT: "6379"
              REVERSE_GEOCODING_PRECISION: "2"
            envFrom:
              - secretRef:
                  name: immich-secret
    image:
      # renovate: datasource=github-releases depName=immich-app/immich
      tag: "v2.7.5@sha256:c15bff75068effb03f4355997d03dc7e0fc58720c2b54ad6f7f10d1bc57efaa5"

    immich:
      concurrency:
        backgroundTask: 10
        faceDetection: 5
        library: 5
        metadataExtraction: 10
        migration: 5
        search: 5
        sidecar: 5
        smartSearch: 5
        thumbnailGeneration: 10
        videoConversion: 1
      enablePasswordLogin: true
      logLevel: "log"
      machineLearning:
        clipModelName: ViT-SO400M-16-SigLIP2-384__webli
        facialRecognitionModelName: antelopev2
      metrics:
        enabled: true
      oauth:
        clientId: immich

        issuerUrl: https://auth.${SECRET_DOMAIN}
      persistence:
        library:
          existingClaim: immich-managed-library-pvc

    machine-learning:
      controllers:
        main:
          containers:
            main:
              env:
                # Nvidia
                MACHINE_LEARNING_PRELOAD__CLIP: "ViT-SO400M-16-SigLIP2-384__webli"

                NVIDIA_DRIVER_CAPABILITIES: "all"
                NVIDIA_VISIBLE_DEVICES: "all"
              image:
                repository: ghcr.io/immich-app/immich-machine-learning
                tag: v2.7.5-cuda@sha256:304142175e345f0155d7642f637cfdceae60e89075ff03938cb2886d52c65a62

              # GPU inference can briefly block the HTTP server; the chart
              # default timeout=1s causes spurious liveness restarts mid-job.
              probes:
                liveness:
                  spec:
                    failureThreshold: 3
                    periodSeconds: 30
                    timeoutSeconds: 10
                readiness:
                  spec:
                    failureThreshold: 3
                    periodSeconds: 10
                    timeoutSeconds: 10
                startup:
                  spec:
                    failureThreshold: 60
                    periodSeconds: 10
                    timeoutSeconds: 10

              resources:
                limits:
                  memory: 8G
                  nvidia.com/gpu: 1

                requests:
                  cpu: 100m
                  memory: 8G
                  nvidia.com/gpu: 1

          pod:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: nvidia.com/gpu.present
                          operator: In
                          values:
                            - "true"

            nodeSelector:
              nvidia.com/gpu.present: "true"

            priorityClassName: ai-gpu-critical

          replicas: 2
          strategy: RollingUpdate
          type: statefulset

      persistence:
        cache:
          enabled: true
          size: 40G

          storageClassName: ceph-block
    server:
      controllers:
        main:
          containers:
            main:
              resources:
                limits:
                  memory: 3Gi

                requests:
                  cpu: 15m
                  memory: 3Gi
          replicas: 1
          strategy: RollingUpdate
          type: statefulset

      persistence:
        external:
          enabled: true
          existingClaim: immich-external-library-pvc
          # readOnly: true
        config:
          type: secret
          name: immich-secret
          globalMounts:
            - path: /config/system.json
              subPath: system.json
