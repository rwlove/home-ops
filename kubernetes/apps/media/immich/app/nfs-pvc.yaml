---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/persistentvolume-v1.json
apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-managed-library-pv
spec:
  storageClassName: immich-managed-library-storage-class
  capacity:
    storage: 200Gi
  accessModes: ["ReadWriteMany"]
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: "${NFS_HOST_2}"
    path: /mnt/mass_storage/storage/pictures/immich
  # Note: The first two options are strictly for NFSv4.2
  mountOptions: ["nfsvers=4.2", "nconnect=8", "hard", "noatime"]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-managed-library-pvc
spec:
  accessModes: ["ReadWriteMany"]
  storageClassName: immich-managed-library-storage-class
  resources:
    requests:
      storage: 200Gi

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-external-library-pv
spec:
  storageClassName: immich-external-library-storage-class
  capacity:
    storage: 500Gi
  accessModes: ["ReadWriteMany"]
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: "${NFS_HOST_2}"
    path: /mnt/mass_storage/storage/pictures/Public
  # Note: The first two options are strictly for NFSv4.2
  mountOptions: ["nfsvers=4.2", "nconnect=8", "hard", "noatime"]

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-external-library-pvc
spec:
  accessModes: ["ReadWriteMany"]
  storageClassName: immich-external-library-storage-class
  resources:
    requests:
      storage: 500Gi
