---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app kiosk-party-curator
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  dependsOn:
    - name: immich
      namespace: media

  values:
    controllers:
      kiosk-party-curator:
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000

        containers:
          app:
            image:
              repository: ghcr.io/rwlove/kiosk-party-curator
              tag: v0.2.0@sha256:637c4b0dc7458cd3def02dbe31bb629d17d5d8ee20415846b578ebcfe6f2cb00

            env:
              IMMICH_URL: "http://immich-server.media.svc.cluster.local:2283"
              PARTY_ALBUM_ID: "59526fba-9726-4976-a6da-b7f71ebd16cd"
              PLAYED_TAG_ID: "68c361ce-6c2c-49de-9b54-e72c66802757"
              LOG_LEVEL: INFO

            envFrom:
              - secretRef:
                  name: *app

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 5
                  periodSeconds: 10

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault

            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi

    service:
      app:
        controller: kiosk-party-curator
        ports:
          http:
            port: &httpPort 8080
