---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app janitorr
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  install:
    disableWait: true
  upgrade:
    disableWait: true
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1001
        runAsNonRoot: true
        runAsUser: 1000

    controllers:
      janitorr:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: ghcr.io/schaka/janitorr
              tag: jvm-stable@sha256:270e9113c71182d30929f253ff6ff49c63078f4556487a668602c4114c7d665a

            envFrom:
              - secretRef:
                  name: janitorr

            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 1Gi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    persistence:
      config:
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: ceph-block
        advancedMounts:
          janitorr:
            app:
              - path: /config

      config-file:
        type: configMap
        name: janitorr
        globalMounts:
          - path: /config/application.yml
            subPath: application.yml
            readOnly: true

      data:
        existingClaim: radarr-media
        globalMounts:
          - path: /data
            readOnly: true

      leaving-soon:
        type: emptyDir
        globalMounts:
          - path: /leaving-soon

      logs:
        type: emptyDir
        globalMounts:
          - path: /logs

      tmp:
        type: emptyDir
