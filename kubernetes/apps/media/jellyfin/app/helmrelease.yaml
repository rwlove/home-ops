---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m

  values:
    controllers:
      jellyfin:
        pod:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: intel.feature.node.kubernetes.io/gpu
                        operator: In
                        values:
                          - "true"

          enableServiceLinks: false

          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"

          priorityClassName: media-cluster-critical

          securityContext:
            fsGroup: 1001
            fsGroupChangePolicy: "OnRootMismatch"
            runAsGroup: 1001
            runAsUser: 1111

        annotations:
          reloader.stakater.com/auto: "true"
        type: statefulset

        containers:
          app:
            image:
              repository: ghcr.io/jellyfin/jellyfin
              tag: 10.11.11@sha256:45f648c382a0c8b552582fcea40e95cb17c5d475473a891cba0eb7523fb92112

            resources:
              requests:
                cpu: 15m
                gpu.intel.com/i915: 1
                memory: 5Gi
              limits:
                gpu.intel.com/i915: 1
                memory: 10G

    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.45.0.11 # SVC_JELLYFIN_ADDR
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: &httpPort 8096

    route:
      app:
        annotations:
          glance/name: "Jellyfin"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/jellyfin.png"
          glance/id: "Media"
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *httpPort
    persistence:
      config:
        existingClaim: jellyfin-config-pvc

      movies:
        existingClaim: jellyfin-movies-pvc

      music:
        existingClaim: jellyfin-music-pvc

      television:
        existingClaim: jellyfin-television-pvc

      transcode:
        type: emptyDir
