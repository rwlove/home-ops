---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/persistentvolume-v1.json
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-music-pv
  labels:
    type: nfs
spec:
  storageClassName: jellyfin-music-storage-class
  capacity:
    storage: 10Ti
  accessModes:
    - ReadWriteOnce
  mountOptions: ["nfsvers=4.2", "nconnect=8", "hard", "noatime", "actimeo=600"]
  nfs:
    server: "${NFS_HOST_2}"
    path: /mnt/mass_storage/storage/MP3s/

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-music-pvc
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 10Ti
  volumeName: jellyfin-music-pv
  storageClassName: jellyfin-music-storage-class

