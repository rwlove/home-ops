---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kodi-playback-watcher-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: kodi-playback-watcher
  # Additive — default-deny is what triggers the lockdown. Egress to
  # av1corrector (same ns, :8000) is covered by baseline
  # allow-intra-namespace.
  enableDefaultDeny:
    egress: false
    ingress: false
  egress:
    # External: kodi-familyroom is a LAN host (192.168.1.11).
    # KPW reaches it via:
    #   :9090 — Kodi JSON-RPC WebSocket (live playback events)
    #   :22   — SSH for /storage/.kodi/temp/kodi.log tail fallback
    # Target FQDN `kodi-familyroom.${SECRET_DOMAIN}` is a canonical
    # local DNS A record (no CNAME chain). Per memory
    # project_cilium_matchpattern_fqdn_limits.md, Cilium 1.19
    # matchPattern silently fails for canonical FQDNs through K8s DNS
    # search-domain augmentation. Use toEntities:world + the same
    # ports, matches the precedent in PRs #11498/#11512/#11517/#11533.
    - toEntities: [world]
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
            - port: "22"
              protocol: TCP
