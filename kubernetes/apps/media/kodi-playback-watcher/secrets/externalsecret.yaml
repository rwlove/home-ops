---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kodi-playback-watcher
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: kodi-playback-watcher-ssh
    template:
      engineVersion: v2
      data:
        # Private key the watcher uses to SSH into kodi-familyroom and tail
        # the Kodi log. Pulled from 1Password item "kodi-playback-watcher",
        # field "ssh_private_key". Public counterpart must be installed in
        # ~/.ssh/authorized_keys on the SSH target.
        ssh_private_key: "{{ .ssh_private_key }}"
  dataFrom:
    - extract:
        key: kodi-playback-watcher
