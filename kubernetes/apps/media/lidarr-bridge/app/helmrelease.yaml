---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app lidarr-bridge
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      lidarr-bridge:
        pod:
          automountServiceAccountToken: false
          restartPolicy: Never
          securityContext:
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1103 # match lidarr — bridge creates album dirs lidarr will then own
        cronjob:
          schedule: "*/5 * * * *"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 0
          backoffLimit: 0
          activeDeadlineSeconds: 600
          ttlSecondsAfterFinished: 86400
        type: cronjob
        containers:
          app:
            image:
              repository: python
              tag: 3.14-alpine

            # umask 0002 so created dirs are group-writable for shared-GID
            # writers (beets). See per-app-UIDs commit 152c67ef3a.
            command:
              - /bin/sh
              - -c
              - "umask 0002 && exec python3 /script/bridge.py"

            env:
              LIDARR_URL: http://lidarr.media.svc.cluster.local:8686
              FAILED_IMPORTS_DIR: /slskd/complete/failed_imports
              MEDIA_ROOT: /media

            envFrom:
              - secretRef:
                  name: lidarr

            resources:
              requests:
                cpu: 10m
                memory: 64M
              limits:
                memory: 128M

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

    persistence:
      slskd:
        existingClaim: lidarr-bridge-slskd-pvc
        globalMounts:
          - path: /slskd

      media:
        existingClaim: lidarr-bridge-music-pvc
        globalMounts:
          - path: /media

      script:
        type: configMap
        name: lidarr-bridge-script
        defaultMode: 0555
        globalMounts:
          - path: /script/bridge.py
            subPath: bridge.py
            readOnly: true

      tmp:
        type: emptyDir
