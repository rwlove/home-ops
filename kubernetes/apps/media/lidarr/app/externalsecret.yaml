---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: lidarr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: lidarr
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        LIDARR__API_KEY: "{{ .LIDARR__API_KEY }}"
        LIDARR__POSTGRES__HOST: postgres-lidarr-rw.databases.svc.cluster.local
        LIDARR__POSTGRES__PORT: "5432"
        LIDARR__POSTGRES__USER: "{{ .POSTGRES_USER }}"
        LIDARR__POSTGRES__PASSWORD: "{{ .POSTGRES_PASS }}"
        LIDARR__POSTGRES__MAINDB: lidarr-main
        # Garage S3 creds for the cnpg-app-database backup ObjectStore
        # (consumed by lidarr-secret in databases namespace, kept here too
        # so a single 1P item drives both)
        GARAGE_AWS_ACCESS_KEY_ID: "{{ .GARAGE_AWS_ACCESS_KEY_ID }}"
        GARAGE_AWS_SECRET_ACCESS_KEY: "{{ .GARAGE_AWS_SECRET_ACCESS_KEY }}"
  dataFrom:
    - extract:
        key: lidarr
