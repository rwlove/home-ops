---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app lidarr
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      lidarr:
        pod:
          securityContext:
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1103

        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/lidarr
              tag: 3.1.3@sha256:b1e206e02bcacf1b540a813be74afb4f788114bbb540830478e5eb0e469c2162

            # umask 0002 so new album dirs are group-writable for shared-GID
            # writers (beets, soularr). See per-app-UIDs commit 152c67ef3a.
            command:
              - /usr/bin/catatonit
              - --
              - /bin/bash
              - -c
              - "umask 0002 && exec /entrypoint.sh"

            env:
              LIDARR__APP__INSTANCENAME: Lidarr
              LIDARR__AUTH__METHOD: External
              LIDARR__AUTH__REQUIRED: DisabledForLocalAddresses
              LIDARR__LOG__DBENABLED: "False"
              LIDARR__LOG__LEVEL: info
              LIDARR__SERVER__PORT: &httpPort 8686

            envFrom:
              - secretRef:
                  name: *app


            resources:
              requests:
                cpu: 100m
                memory: 10G
              limits:
                memory: 10G

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    service:
      app:
        controller: lidarr
        ports:
          http:
            port: *httpPort

    route:
      app:
        annotations:
          glance/name: "Lidarr"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/lidarr.png"
          glance/id: "Media"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - kind: Service
                name: lidarr-oauth2-proxy
                port: 4180

    persistence:
      config:
        existingClaim: lidarr-config-pvc

      downloads:
        existingClaim: lidarr-downloads

      media:
        existingClaim: lidarr-media

      sabnzbd:
        existingClaim: lidarr-sabnzbd-downloads

      slskd:
        existingClaim: lidarr-slskd-downloads-pvc

      tmp:
        type: emptyDir
        medium: Memory
