---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app lidarr
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      lidarr:
        pod:
          securityContext:
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1103

        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        # The config PVC was populated when this controller ran as uid 1000;
        # runAsUser is now 1103 and fsGroupChangePolicy:OnRootMismatch skips the
        # recursive fsGroup chown (the PVC root already matches gid 1001), so the
        # stale 0644 uid-1000 files (logs/lidarr.txt, MediaCover/**) aren't
        # writable by 1103. NLog's file target then silently dies — no log file
        # written since the uid switch — and cover-art writes throw
        # "Permission denied". Reclaim /config ownership on startup; idempotent +
        # self-heals. Scoped to /config only — the media/downloads NFS mounts are
        # owned correctly and must not be touched.
        initContainers:
          init-perms:
            image:
              repository: ghcr.io/home-operations/lidarr
              tag: 3.1.3@sha256:eb3db00c3219b93a433036e393e49d4233cdd992cfe42a7c02e6114a22491b1b
            command:
              - chown
              - -R
              - 1103:1001
              - /config
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false

        containers:
          app:
            image:
              repository: ghcr.io/home-operations/lidarr
              tag: 3.1.3@sha256:eb3db00c3219b93a433036e393e49d4233cdd992cfe42a7c02e6114a22491b1b

            # umask 0002 so new album dirs are group-writable for shared-GID
            # writers (beets, soularr). See per-app-UIDs commit 152c67ef3a.
            command:
              - /usr/bin/catatonit
              - --
              - /bin/bash
              - -c
              - "umask 0002 && exec /entrypoint.sh"

            env:
              LIDARR__APP__INSTANCENAME: Lidarr
              LIDARR__AUTH__METHOD: External
              LIDARR__AUTH__REQUIRED: DisabledForLocalAddresses
              LIDARR__LOG__DBENABLED: "False"
              LIDARR__LOG__LEVEL: info
              LIDARR__SERVER__PORT: &httpPort 8686

            envFrom:
              - secretRef:
                  name: *app


            resources:
              requests:
                cpu: 100m
                memory: 1280Mi
              limits:
                memory: 3Gi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    service:
      app:
        controller: lidarr
        ports:
          http:
            port: *httpPort

    route:
      app:
        annotations:
          glance/name: "Lidarr"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/lidarr.png"
          glance/id: "Media"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - kind: Service
                name: lidarr
                port: 8686

    persistence:
      config:
        existingClaim: lidarr-config-pvc

      downloads:
        existingClaim: lidarr-downloads

      media:
        existingClaim: lidarr-media

      sabnzbd:
        existingClaim: lidarr-sabnzbd-downloads

      slskd:
        existingClaim: lidarr-slskd-downloads-pvc

      tmp:
        type: emptyDir
        medium: Memory
