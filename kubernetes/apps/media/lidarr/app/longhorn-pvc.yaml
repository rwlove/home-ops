---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/persistentvolumeclaim-v1.json
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lidarr-config-pvc
  labels:
    type: longhorn
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 80Gi
  volumeName: lidarr-config-pv
  storageClassName: lidarr-config-storage-class

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: lidarr-config-pv
  labels:
    type: longhorn
    recurring-job-group.longhorn.io/weekly-backup: enabled
    recurring-job-group.longhorn.io/daily-snapshot: enabled
spec:
  capacity:
    storage: 80Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: lidarr-config-storage-class
  csi:
    driver: driver.longhorn.io
    fsType: xfs
    volumeAttributes:
      numberOfReplicas: "2"
      staleReplicaTimeout: "2880"
    # 2026-06-02 XFS-corruption recovery: original volume lidarr-config-xfs
    # suffered a bad-superblock crash (unclean detach 2026-05-31). Data
    # restored from weekly backup backup-5f9fb53d2ec54d09 into a new Longhorn
    # volume lidarr-config-recovery (xfs_repair -L log-replay, verified
    # config.xml + asp/ keys intact). Old volume retained as fallback.
    volumeHandle: lidarr-config-recovery
