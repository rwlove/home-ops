---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/persistentvolume-v1.json
apiVersion: v1
kind: PersistentVolume
metadata:
  name: medialyze-movies-pv
  labels:
    type: nfs
spec:
  storageClassName: medialyze-movies-storage-class
  capacity:
    storage: 20Ti
  accessModes:
    - ReadWriteOnce
  nfs:
    server: "${NFS_HOST_2}"
    path: /mnt/mass_storage/storage/video/Movies/

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: medialyze-movies-pvc
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 20Ti
  volumeName: medialyze-movies-pv
  storageClassName: medialyze-movies-storage-class

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: medialyze-television-pv
  labels:
    type: nfs
spec:
  storageClassName: medialyze-television-storage-class
  capacity:
    storage: 20Ti
  accessModes:
    - ReadWriteOnce
  nfs:
    server: "${NFS_HOST_0}"
    path: /mnt/mass_storage/storage/video/Television/

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: medialyze-television-pvc
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 20Ti
  volumeName: medialyze-television-pv
  storageClassName: medialyze-television-storage-class
