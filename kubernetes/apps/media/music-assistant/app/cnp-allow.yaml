---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: music-assistant-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: music-assistant
  # Additive — default-deny is what triggers the lockdown.
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # HTTPRoute on internal envoy gateway → music-assistant:8095 (web UI).
    # oauth2-proxy was removed 2026-06-06; the gateway now proxies the
    # same-origin wss://.../ws upgrade straight to MA. The envoy pod is a
    # distinct Cilium identity (not `world`), so the world rule below does
    # not cover it.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "8095"
              protocol: TCP
    # LoadBalancer Service at 10.45.0.20 exposes :1780 (HTTP2 streaming),
    # :3483 (SlimProto), and :8097 (stream server / audio pull) directly
    # to LAN and IoT clients. :8097 is the MA stream server that WiiM and
    # other SlimProto players pull audio from — required alongside :3483
    # (control). These arrive from `reserved:world`. Brain's iot-policy
    # firewall must also allow 10.10.20.{26,30,31} → 10.45.0.20 tcp
    # 3483+8097 (see lovenet-network-configuration iot-policy.xml).
    - fromEntities:
        - world
      toPorts:
        - ports:
            - port: "1780"
              protocol: TCP
            - port: "3483"
              protocol: TCP
            - port: "8095"
              protocol: TCP
            - port: "8097"
              protocol: TCP
    # Home Assistant integration: HA music_assistant integration polls
    # + sends commands via the local music-assistant Service:8095.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: home
            app.kubernetes.io/name: home-assistant
      toPorts:
        - ports:
            - port: "8095"
              protocol: TCP
  egress:
    # External: Spotify, Tidal, Apple Music, Sonos cloud APIs, plus
    # mDNS-style LAN discovery to local devices (Sonos, Chromecast,
    # AirPlay). Provider set + LAN device set both rotate; world keeps
    # the policy maintenance-free.
    # UDP/1900 covers SSDP / UPnP discovery — Sonos, DLNA renderers,
    # and Chromecast announce themselves via 239.255.255.250:1900.
    # Cilium classifies the multicast destination as `world`.
    # (IGMP membership reports to 224.0.0.22 also drop with
    # CT_UNKNOWN_L4_PROTOCOL — that's a Cilium datapath limitation,
    # no CNP knob; accepted as a known cost.)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "80"
              protocol: TCP
            - port: "1900"
              protocol: UDP
            # AirPlay/zeroconf binds all interfaces, so mDNS also leaks out
            # eth0 toward 224.0.0.251. The real WiiM discovery + RAOP push
            # happen on the macvlan net1 (Cilium-blind); this allow only
            # suppresses POLICY_DENIED drop-burst noise on eth0. Mirrors the
            # HA mDNS-egress fix. (IGMP proto-2 reports still drop —
            # CT_UNKNOWN_L4_PROTOCOL, no CNP knob; accepted.)
            - port: "5353"
              protocol: UDP
    # Music-assistant calls back into Home Assistant (callback events,
    # entity-state subscriptions) — HA REST + WebSocket on :8123.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: home
            app.kubernetes.io/name: home-assistant
      toPorts:
        - ports:
            - port: "8123"
              protocol: TCP
