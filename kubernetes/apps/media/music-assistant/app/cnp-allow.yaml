---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: music-assistant-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: music-assistant
  # Additive — default-deny is what triggers the lockdown. Ingress from
  # music-assistant-oauth2-proxy (same ns, :8095 upstream) is covered by
  # baseline allow-intra-namespace.
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # LoadBalancer Service at 10.45.0.20 exposes :1780 (HTTP2 streaming)
    # and :1704 (Snapserver) directly to LAN clients (sonos, snapcast,
    # HA media_player, etc.). These arrive from `reserved:world`.
    - fromEntities:
        - world
      toPorts:
        - ports:
            - port: "1780"
              protocol: TCP
            - port: "1704"
              protocol: TCP
            - port: "8095"
              protocol: TCP
    # Home Assistant integration: HA music_assistant integration polls
    # + sends commands via the local music-assistant Service:8095.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: home
            app.kubernetes.io/name: home-assistant
      toPorts:
        - ports:
            - port: "8095"
              protocol: TCP
  egress:
    # External: Spotify, Tidal, Apple Music, Sonos cloud APIs, plus
    # mDNS-style LAN discovery to local devices (Sonos, Chromecast,
    # AirPlay). Provider set + LAN device set both rotate; world keeps
    # the policy maintenance-free.
    # UDP/1900 covers SSDP / UPnP discovery — Sonos, DLNA renderers,
    # and Chromecast announce themselves via 239.255.255.250:1900.
    # Cilium classifies the multicast destination as `world`.
    # (IGMP membership reports to 224.0.0.22 also drop with
    # CT_UNKNOWN_L4_PROTOCOL — that's a Cilium datapath limitation,
    # no CNP knob; accepted as a known cost.)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "80"
              protocol: TCP
            - port: "1900"
              protocol: UDP
    # Music-assistant calls back into Home Assistant (callback events,
    # entity-state subscriptions) — HA REST + WebSocket on :8123.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: home
            app.kubernetes.io/name: home-assistant
      toPorts:
        - ports:
            - port: "8123"
              protocol: TCP
