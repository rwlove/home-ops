---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app music-assistant
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      music-assistant:
        pod:
          securityContext:
            # Tier 2 reader — reads media via the world-readable bit on
            # 2775 dirs / 664 files. NOT a member of the media group; runs
            # under its own UID/GID so it cannot modify media.
            fsGroup: 1113
            fsGroupChangePolicy: "OnRootMismatch"
            runAsGroup: 1113
            runAsNonRoot: true
            runAsUser: 1113

        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        initContainers:
          # Startup-race guard. MA's music library is the OpenSubsonic
          # provider pointed at gonic.media, and its provider loader is
          # one-shot: if gonic isn't answering when MA first pings it on
          # boot — e.g. both pods restart together after a power event and
          # gonic is still initializing — MA marks the provider failed and
          # never auto-retries, so every track is unresolvable ("no
          # playable items found") until someone reloads the provider by
          # hand. Block MA's start until gonic's Subsonic API returns 200.
          # Intra-namespace egress is allowed by the allow-intra-namespace
          # CNP; alpine is multi-arch (MA may land on an arm64 node).
          wait-for-gonic:
            image:
              repository: docker.io/library/alpine
              tag: "3.24"
            command:
              - sh
              - -c
              - |
                until wget -q -T 5 -O /dev/null http://gonic.media/rest/ping.view; do
                  echo "waiting for gonic to serve its API..."
                  sleep 3
                done
                echo "gonic is up"

        containers:
          app:
            image:
              repository: ghcr.io/music-assistant/server
              tag: 2.9.0b16

            resources:
              requests:
                cpu: 15m
                memory: 1536Mi
              limits:
                memory: 3Gi

    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: ${SVC_MUSIC_ASSISTANT_ADDR}
        controller: music-assistant
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: &httpPort 8095
          http2:
            port: 1780
          slimproto:
            port: 3483
          # Streamserver — serves the audio flow to SlimProto/squeezelite
          # players. Exposed on the ClusterIP so in-cluster players can fetch
          # the stream URL (publish_ip=ClusterIP:8097); intra-namespace only,
          # not in the world ingress allow-list.
          streamserver:
            port: 8097

    route:
      app:
        annotations:
          glance/name: "Music Assistant"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/music-assistant.png"
          glance/id: "Media"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              # Route straight to MA: the frontend builds its API WebSocket
              # same-origin (wss://<host>/ws), so the gateway must proxy the
              # /ws upgrade directly. oauth2-proxy removed 2026-06-06 — it
              # broke the wss upgrade and forced the "Server Address"
              # discover screen. MA is already LAN-reachable unauthenticated
              # via the LB VIP :8095; this route is internal-gateway only.
              - identifier: app
                port: *httpPort
    persistence:
      data:
        existingClaim: music-assistant-data-pvc

      media:
        existingClaim: music-assistant-music-pvc

      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /.audio
            subPath: .audio
