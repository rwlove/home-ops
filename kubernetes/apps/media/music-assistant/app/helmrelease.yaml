---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app music-assistant
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      music-assistant:
        pod:
          securityContext:
            # Tier 2 reader — reads media via the world-readable bit on
            # 2775 dirs / 664 files. NOT a member of the media group; runs
            # under its own UID/GID so it cannot modify media.
            fsGroup: 1113
            fsGroupChangePolicy: "OnRootMismatch"
            runAsGroup: 1113
            runAsNonRoot: true
            runAsUser: 1113

        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset
        containers:
          app:
            image:
              repository: ghcr.io/music-assistant/server
              tag: 2.9.0b10

            resources:
              requests:
                cpu: 15m
                memory: 1.4Gi
              limits:
                memory: 1.4Gi

    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: ${SVC_MUSIC_ASSISTANT_ADDR}
        controller: music-assistant
        externalTrafficPolicy: Cluster
        ports:
          http:
            port: &httpPort 8095
          http2:
            port: 1780
          snapserver:
            port: 1704

    route:
      app:
        annotations:
          startpunkt.ullberg.us/enable: "true"
          startpunkt.ullberg.us/name: "Music Assistant"
          startpunkt.ullberg.us/icon: "mdi:headphones"
          startpunkt.ullberg.us/group: "media"
          startpunkt.ullberg.us/instance: "user"
          glance/name: "Music Assistant"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/music-assistant.png"
          glance/id: "Media"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - kind: Service
                name: music-assistant-oauth2-proxy
                port: 4180
    persistence:
      data:
        existingClaim: music-assistant-data-pvc

      media:
        existingClaim: music-assistant-music-pvc

      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /.audio
            subPath: .audio
