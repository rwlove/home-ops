---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
components:
  - ../../../../components/repos/app-template
resources:
  - ./cnp-allow.yaml
  - ./helmrelease.yaml
  - ./longhorn-pvc.yaml
  - ./nfs-pvc.yaml
commonLabels:
  app.kubernetes.io/instance: music-assistant
  app.kubernetes.io/name: music-assistant
# workaround: patched WiiM provider overlay — see helmrelease.yaml + PR #4434.
# Stable name (no hash suffix) so the HelmRelease subPath mount can reference it;
# stakater/reloader rolls the pod when the patched file content changes.
configMapGenerator:
  - name: music-assistant-wiim-provider-patch
    files:
      - provider.py=files/wiim-provider.py
    options:
      disableNameSuffixHash: true
