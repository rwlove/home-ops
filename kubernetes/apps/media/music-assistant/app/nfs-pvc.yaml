---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/persistentvolume-v1.json
apiVersion: v1
kind: PersistentVolume
metadata:
  name: music-assistant-music-pv
  labels:
    type: nfs
spec:
  storageClassName: music-assistant-music-storage-class
  capacity:
    storage: 3Ti
  accessModes:
    - ReadWriteMany
  mountOptions: ["nfsvers=4.2", "nconnect=8", "hard", "noatime", "actimeo=600"]
  nfs:
    server: "${NFS_HOST_2}"
    path: /mnt/mass_storage/storage/MP3s/

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: music-assistant-music-pvc
  labels:
    type: nfs
spec:
  accessModes:
    - ReadWriteMany
  volumeMode: Filesystem
  resources:
    requests:
      storage: 3Ti
  volumeName: music-assistant-music-pv
  storageClassName: music-assistant-music-storage-class
