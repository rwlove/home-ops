---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: radarr-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: radarr
  # Additive — default-deny is what triggers the lockdown.
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # Internal gateway (envoy) → radarr:7878. Auth is enforced at the
    # gateway by the extAuth SecurityPolicy (#12767); the oauth2-proxy
    # hop is retired.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "7878"
              protocol: TCP
    # Cross-ns: prowlarr sync-app pushes indexer config; janitorr +
    # seerr + suggestarr call radarr API to add/list/remove movies.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: downloads
            app.kubernetes.io/name: prowlarr
      toPorts:
        - ports:
            - port: "7878"
              protocol: TCP
  egress:
    # CNPG: postgres-radarr in databases ns (Pattern B).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            cnpg.io/cluster: postgres-radarr
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Cross-ns: download-client APIs in downloads ns (Pattern E).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: downloads
            app.kubernetes.io/name: sabnzbd
        - matchLabels:
            io.kubernetes.pod.namespace: downloads
            app.kubernetes.io/name: qbittorrent
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Cross-ns: prowlarr indexer API in downloads ns.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: downloads
            app.kubernetes.io/name: prowlarr
      toPorts:
        - ports:
            - port: "9696"
              protocol: TCP
    # External metadata + indexer probes (TMDb, IMDb, trakt, indexer
    # surface). Indexer set rotates; world on 443/80.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "80"
              protocol: TCP
