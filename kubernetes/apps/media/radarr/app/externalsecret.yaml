---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: radarr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: radarr
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        RADARR__API_KEY: "{{ .RADARR__API_KEY }}"
        RADARR__POSTGRES__HOST: postgres-radarr-rw.databases.svc.cluster.local
        RADARR__POSTGRES__PORT: "5432"
        RADARR__POSTGRES__USER: "{{ .POSTGRES_USER }}"
        RADARR__POSTGRES__PASSWORD: "{{ .POSTGRES_PASS }}"
        RADARR__POSTGRES__MAINDB: radarr-main
        # Garage S3 creds for the cnpg-app-database backup ObjectStore
        # (consumed by radarr-secret in databases namespace, kept here too
        # so a single 1P item drives both)
        GARAGE_AWS_ACCESS_KEY_ID: "{{ .GARAGE_AWS_ACCESS_KEY_ID }}"
        GARAGE_AWS_SECRET_ACCESS_KEY: "{{ .GARAGE_AWS_SECRET_ACCESS_KEY }}"
  dataFrom:
    - extract:
        key: radarr
