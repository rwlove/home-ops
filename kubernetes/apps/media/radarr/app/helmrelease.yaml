---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app radarr
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      radarr:
        pod:
          securityContext:
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1102

        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/radarr
              tag: rolling@sha256:a566e7d364b96ce8ffb1b582266e656c69f3a12dec289d72bb0daa647ed4725e

            env:
              RADARR__APP__INSTANCENAME: Radarr
              RADARR__AUTH__METHOD: External
              RADARR__AUTH__REQUIRED: DisabledForLocalAddresses
              RADARR__LOG__DBENABLED: "False"
              RADARR__LOG__LEVEL: info
              RADARR__SERVER__PORT: &httpPort 7878
              RADARR__UPDATE__BRANCH: develop

            envFrom:
              - secretRef:
                  name: *app


            resources:
              requests:
                cpu: 15m
                memory: 800M
              limits:
                memory: 800M

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    service:
      app:
        controller: radarr
        ports:
          http:
            port: *httpPort

    route:
      app:
        annotations:
          glance/name: "Radarr"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/radarr.png"
          glance/id: "Media"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - kind: Service
                name: radarr
                port: 7878
    persistence:
      config:
        existingClaim: radarr-config-pvc

      downloads:
        existingClaim: radarr-downloads

      media:
        existingClaim: radarr-media

      sabnzbd:
        existingClaim: sonarr-sabnzbd-downloads
