---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: romm-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: romm
  # Additive — default-deny is what triggers the lockdown.
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # HTTPRoute on internal envoy gateway → romm:8080.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    # CNPG: postgres-romm in databases ns (Pattern B). The init-db
    # postgres-init initContainer also needs this on cold start.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            cnpg.io/cluster: postgres-romm
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Dragonfly (Redis) in databases ns — used as romm's task/cache
    # broker.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            app.kubernetes.io/name: dragonfly
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
    # External: 7+ ROM metadata providers (IGDB, TheGamesDB, Flashpoint,
    # HLTB, Hasheous, Launchbox, PlayMatch, etc.), Switch titleDB
    # updates, MAME XML feed. Provider set rotates; world keeps the
    # policy maintenance-free.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "80"
              protocol: TCP
    # OIDC token exchange — direct to authelia in-cluster Service
    # (Pattern E). RomM uses Authlib server-side OIDC
    # (OIDC_SERVER_METADATA_URL points at auth.${SECRET_DOMAIN}) to
    # do the code exchange after user login redirect.
    # toEntities:[world]:443 and matchPattern:auth.${SECRET_DOMAIN}
    # DO NOT work for this in-cluster path: split-horizon DNS
    # returns the LB IP and Cilium socket-lb rewrites the connect()
    # to the envoy pod IP + targetPort 10443 BEFORE policy check, so
    # neither rule matches the rewritten destination. Authelia's CNP
    # already permits fromEntities:cluster on 9091. Mirrors
    # paperless PR #11525.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: auth
            app.kubernetes.io/name: authelia
      toPorts:
        - ports:
            - port: "9091"
              protocol: TCP
