---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: romm
spec:
  refreshInterval: 15m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: romm-secret
    template:
      engineVersion: v2
      data:
        # App
        ROMM_AUTH_SECRET_KEY: "{{ .ROMM_AUTH_SECRET_KEY }}"

        # OIDC (Authelia)
        OIDC_ENABLED: "true"
        OIDC_PROVIDER: authelia
        OIDC_CLIENT_ID: romm
        OIDC_CLIENT_SECRET: "{{ .ROMM_OIDC_CLIENT_SECRET }}"
        OIDC_REDIRECT_URI: https://romm.${SECRET_DOMAIN}/api/oauth/openid
        OIDC_SERVER_APPLICATION_URL: https://auth.${SECRET_DOMAIN}
        OIDC_SERVER_METADATA_URL: https://auth.${SECRET_DOMAIN}/.well-known/openid-configuration

        # Database
        DB_HOST: postgres-romm-rw.databases.svc.cluster.local
        DB_PORT: "5432"
        DB_NAME: romm
        DB_USER: "{{ .POSTGRES_USER }}"
        DB_PASSWD: "{{ .POSTGRES_PASS }}"

        # Postgres init
        INIT_POSTGRES_DBNAME: romm
        INIT_POSTGRES_HOST: postgres-romm-rw.databases.svc.cluster.local
        INIT_POSTGRES_USER: "{{ .POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .POSTGRES_PASS }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"

        # Metadata providers (RomM enables each only when creds are non-empty)
        IGDB_CLIENT_ID: "{{ .IGDB_CLIENT_ID }}"
        IGDB_CLIENT_SECRET: "{{ .IGDB_CLIENT_SECRET }}"
        STEAMGRIDDB_API_KEY: "{{ .STEAMGRIDDB_API_KEY }}"
        RETROACHIEVEMENTS_API_KEY: "{{ .RETROACHIEVEMENTS_API_KEY }}"
        SCREENSCRAPER_USER: "{{ .SCREENSCRAPER_USER }}"
        SCREENSCRAPER_PASSWORD: "{{ .SCREENSCRAPER_PASSWORD }}"
  dataFrom:
    - extract:
        key: cloudnative-pg
    - extract:
        key: romm
