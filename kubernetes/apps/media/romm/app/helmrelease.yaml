---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app romm
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      romm:
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7

            envFrom: &envFrom
              - secretRef:
                  name: romm-secret

        containers:
          app:
            image:
              repository: ghcr.io/rommapp/romm
              tag: 4.8.1@sha256:2b7a1714b287f69b081ad2a63bb8c2fa673666a17b2f21322b580b0cd51cb266

            env:
              # Runtime
              ROMM_PORT: &port 8080
              ROMM_DB_DRIVER: postgresql

              # Scrapers / scheduled jobs
              ENABLE_SCHEDULED_RESCAN: "true"
              SCHEDULED_RESCAN_CRON: "0 3 * * *"
              ENABLE_SCHEDULED_UPDATE_SWITCH_TITLEDB: "false"
              ENABLE_SCHEDULED_UPDATE_MAME_XML: "false"
              ENABLE_RESCAN_ON_FILESYSTEM_CHANGE: "true"
              RESCAN_ON_FILESYSTEM_CHANGE_DELAY: 5
              FLASHPOINT_API_ENABLED: true
              HLTB_API_ENABLED: true
              HASHEOUS_API_ENABLED: true
              LAUNCHBOX_API_ENABLED: true
              ENABLE_SCHEDULED_UPDATE_LAUNCHBOX_METADATA: true
              PLAYMATCH_API_ENABLED: true
              # TheGamesDB: keyless public API, capped 1000 req/month for unregistered.
              # Plenty for periodic library scans on a personal collection.
              TGDB_API_ENABLED: true

              # Bump from default 14400 (4h) so a full COMPLETE scan of
              # ~10k ROMs through 10 metadata sources fits in one job
              # without RQ JobTimeoutException.
              SCAN_TIMEOUT: 28800

            envFrom: *envFrom

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/heartbeat
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10

            resources:
              requests:
                cpu: 25m
                memory: 1Gi
              limits:
                memory: 5Gi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault

    service:
      app:
        controller: romm
        ports:
          http:
            port: *port

    route:
      app:
        annotations:
          glance/name: "RomM"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/romm.svg"
          glance/id: "Media"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      config-file:
        type: configMap
        name: romm-config
        advancedMounts:
          romm:
            app:
              - path: /romm/config/config.yml
                subPath: config.yml
                readOnly: true

      romm:
        existingClaim: romm-config-pvc
        advancedMounts:
          romm:
            app:
              - path: /romm/resources
                subPath: resources
              - path: /romm/assets
                subPath: assets
              - path: /romm/config
                subPath: config

      games:
        existingClaim: romm-games-pvc
        advancedMounts:
          romm:
            app:
              - path: /romm/library

      tmp:
        type: emptyDir
        medium: Memory
        advancedMounts:
          romm:
            app:
              - path: /tmp
