---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: romm
spec:
  chartRef:
    kind: OCIRepository
    name: app-templace
  interval: 1h
  values:
    controllers:
      romm:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
            envFrom: &envFrom
              - secretRef:
                  name: romm-secret
        containers:
          app:
            image:
              repository: ghcr.io/rommapp/romm
              tag: 4.8.1@sha256:2b7a1714b287f69b081ad2a63bb8c2fa673666a17b2f21322b580b0cd51cb266
            env:
              ENABLE_SCHEDULED_RESCAN: "true"
              SCHEDULED_RESCAN_CRON: "0 3 * * *"
              ENABLE_SCHEDULED_UPDATE_SWITCH_TITLEDB: "false"
              ENABLE_SCHEDULED_UPDATE_MAME_XML: "false"
              ENABLE_RESCAN_ON_FILESYSTEM_CHANGE: "true"
              RESCAN_ON_FILESYSTEM_CHANGE_DELAY: 5
              FLASHPOINT_API_ENABLED: true
              HLTB_API_ENABLED: true
              HASHEOUS_API_ENABLED: true
              LAUNCHBOX_API_ENABLED: true
              ENABLE_SCHEDULED_UPDATE_LAUNCHBOX_METADATA: true
              PLAYMATCH_API_ENABLED: true
              ROMM_PORT: &port 8080
              ROMM_DB_DRIVER: postgresql
              REDIS_HOST: dragonfly.databases.svc.cluster.local
              REDIS_PORT: 6379
              #OIDC_ENABLED: true
              #OIDC_PROVIDER: authentik
              #OIDC_CLIENT_ID:
              #  valueFrom:
              #    secretKeyRef:
              #      name: romm-secret
              #      key: ROMM_CLIENT_ID
              #OIDC_CLIENT_SECRET:
              #  valueFrom:
              #    secretKeyRef:
              #      name: romm-secret
              #      key: ROMM_CLIENT_SECRET
              #OIDC_REDIRECT_URI: https://romm.dmfrey.com/api/oauth/openid
              #OIDC_SERVER_APPLICATION_URL: https://auth.dmfrey.com/application/o/romm
            envFrom: *envFrom
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/heartbeat
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 25m
                memory: 2G
              limits:
                memory: 2G
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          glance/name: "RomM"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/romm.svg"
          glance/id: "Media"
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
    persistence:
      romm:
        existingClaim: romm-config-pvc

      games:
        existingClaim: romm-games-pvc

      tmp:
        type: emptyDir
        medium: Memory
