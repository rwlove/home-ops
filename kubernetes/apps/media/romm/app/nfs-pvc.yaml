---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: romm-games-pv
  labels:
    type: nfs
spec:
  storageClassName: romm-games-storage-class
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteOnce
  nfs:
    server: "${NFS_HOST_2}"
    path: /mnt/mass_storage/storage/games/

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: romm-games-pvc
  labels:
    type: nfs
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 3Ti
  volumeName: romm-games-pv
  storageClassName: romm-games-storage-class
