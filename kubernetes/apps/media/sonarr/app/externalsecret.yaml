---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sonarr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: sonarr
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        SONARR__API_KEY: "{{ .SONARR__API_KEY }}"
        SONARR__POSTGRES__HOST: postgres-sonarr-rw.databases.svc.cluster.local
        SONARR__POSTGRES__PORT: "5432"
        SONARR__POSTGRES__USER: "{{ .POSTGRES_USER }}"
        SONARR__POSTGRES__PASSWORD: "{{ .POSTGRES_PASS }}"
        SONARR__POSTGRES__MAINDB: sonarr-main
        # Garage S3 creds for the cnpg-app-database backup ObjectStore
        # (consumed by sonarr-secret in databases namespace, kept here too
        # so a single 1P item drives both)
        GARAGE_AWS_ACCESS_KEY_ID: "{{ .GARAGE_AWS_ACCESS_KEY_ID }}"
        GARAGE_AWS_SECRET_ACCESS_KEY: "{{ .GARAGE_AWS_SECRET_ACCESS_KEY }}"
  dataFrom:
    - extract:
        key: sonarr
