  volumeName: sonarr-sabnzbd-downloads-pv
  storageClassName: sonarr-sabnzbd-downloads-storage-class

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: television-pv
  labels:
    type: nfs
spec:
  storageClassName: television-storage-class
  capacity:
    storage: 20Ti
  accessModes:
    - ReadWriteMany
  mountOptions: ["nfsvers=4.2", "nconnect=8", "hard", "noatime"]
  nfs:
    server: "${NFS_HOST_0}"
    path: /mnt/mass_storage/storage/video/Television/

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sonarr-media
spec:
  accessModes:
    - ReadWriteMany
  volumeMode: Filesystem
  resources:
    requests:
      storage: 20Ti
  volumeName: television-pv
  storageClassName: television-storage-class
