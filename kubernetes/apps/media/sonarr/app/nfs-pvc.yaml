---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/persistentvolume-v1.json
apiVersion: v1
kind: PersistentVolume
metadata:
  name: sonarr-qbittorrent-downloads-pv
  labels:
    type: nfs
spec:
  storageClassName: sonarr-qbittorrent-downloads-storage-class
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteMany
  mountOptions: ["nfsvers=4.2", "nconnect=8", "hard", "noatime"]
  nfs:
    server: "${NFS_HOST_0}"
    path: /mnt/downloads/media/Download

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sonarr-downloads
spec:
  accessModes:
    - ReadWriteMany
  volumeMode: Filesystem
  resources:
    requests:
      storage: 500Gi
  volumeName: sonarr-qbittorrent-downloads-pv
  storageClassName: sonarr-qbittorrent-downloads-storage-class

---
apiVersion: v1
kind: PersistentVolume
metadata:
