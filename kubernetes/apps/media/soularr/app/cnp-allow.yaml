---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: soularr-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: soularr
  # Additive — default-deny is what triggers the lockdown. Egress to lidarr in
  # this ns is covered by baseline allow-intra-namespace.
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # Internal gateway (envoy) → soularr:8265. Auth is enforced at the
    # gateway by the extAuth SecurityPolicy (#12767); the oauth2-proxy
    # hop is retired.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "8265"
              protocol: TCP
  egress:
    # Cross-ns: slskd API in downloads ns (Pattern E). Soularr orchestrates
    # Lidarr → Soulseek searches by calling the slskd HTTP API.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: downloads
            app.kubernetes.io/name: slskd
      toPorts:
        - ports:
            - port: "5030"
              protocol: TCP
