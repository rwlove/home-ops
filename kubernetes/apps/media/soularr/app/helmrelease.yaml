---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app soularr
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  values:
    controllers:
      main:
        pod:
          securityContext:
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1000

        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        initContainers:
          config-setup:
            image:
              repository: ghcr.io/dmfrey/bash
              tag: 5.2.26-alpine3.20
            command:
              - "/usr/local/bin/bash"
              - -c
              - |
                envsubst < /tmp/config.ini > /data/config.ini
                exit 0
            envFrom:
              - secretRef:
                  name: soularr-secret

        containers:
          main:
            image:
              repository: ghcr.io/mrusse/soularr
              tag: 1.2.0@sha256:9b16c143b5933d69562f8c3a60a410c4192130829cb330902bbc80fb4e4986a7

            resources:
              requests:
                cpu: 10m
                memory: 400M
              limits:
                memory: 400M

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    service:
      main:
        controller: main
        ports:
          http:
            port: 1000

    route:
      main:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: 1000

    persistence:
      data:
        existingClaim: soularr-data-pvc

      media:
        existingClaim: soularr-music-pvc

      downloads:
        existingClaim: soularr-slskd-downloads-pvc

      config-file:
        type: configMap
        defaultMode: 0775
        name: soularr-configmap
        advancedMounts:
          main:
            config-setup:
              - path: /tmp/config.ini
                subPath: config.ini
                readOnly: true

      tmp:
        type: emptyDir
        medium: Memory
