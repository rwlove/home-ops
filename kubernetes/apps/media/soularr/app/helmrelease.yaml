---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app soularr
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  values:
    controllers:
      soularr:
        pod:
          securityContext:
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1110

        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        initContainers:
          config-setup:
            image:
              repository: ghcr.io/dmfrey/bash
              tag: 5.2.26-alpine3.20
            command:
              - "/usr/local/bin/bash"
              - -c
              - |
                envsubst < /tmp/config.ini > /data/config.ini
                exit 0
            envFrom:
              - secretRef:
                  name: soularr-secret

        containers:
          app:
            image:
              repository: ghcr.io/mrusse/soularr
              tag: 1.2.2@sha256:c4f97924fabfce4e0de539d821ea7d20519b95c4815a707bacfc9d7212597f20

            env:
              # Soularr v1.2.0+ ships a Web UI on port 8265, off by default.
              # Pair with log_to_file=True in config.ini — the UI reads the
              # rotated log file to render activity.
              WEBUI_ENABLED: "true"

            resources:
              requests:
                cpu: 10m
                memory: 512Mi
              limits:
                memory: 768Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    service:
      app:
        controller: soularr
        ports:
          http:
            # Soularr's Web UI listens on 8265 (mrusse/soularr v1.2.0+).
            # Override via WEBUI_PORT env if you ever change it.
            port: 8265

    route:
      app:
        annotations:
          glance/name: "Soularr"
          glance/show: "true"
          glance/id: "Media"
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - kind: Service
                name: soularr
                port: 8265

    persistence:
      data:
        existingClaim: soularr-config-pvc

      slskd:
        existingClaim: soularr-slskd-downloads-pvc
        globalMounts:
          - path: /slskd

      config-file:
        type: configMap
        defaultMode: 0775
        name: soularr-configmap
        advancedMounts:
          soularr:
            config-setup:
              - path: /tmp/config.ini
                subPath: config.ini
                readOnly: true

      tmp:
        type: emptyDir
