---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app soularr
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  values:
    controllers:
      main:
        pod:
          securityContext:
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 568
            runAsUser: 568

        type: statefulset

        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          config-setup:
            image:
              repository: ghcr.io/dmfrey/bash
              tag: 5.2.26-alpine3.20
            command:
              - "/usr/local/bin/bash"
              - -c
              - |
                envsubst < /tmp/config.ini > /data/config.ini
                exit 0
            envFrom:
              - secretRef:
                  name: soularr-secret

        containers:
          main:
            image:
              repository: mrusse08/soularr
              tag: 1.1.0@sha256:06e4829433b5c6f4cc08fef10c70d90973b48c4c3dc0207679b7e80e63f574aa

            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 128Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    service:
      main:
        controller: main
        ports:
          http:
            port: 1000

    route:
      main:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: 1000

    persistence:
      data:
        existingClaim: soularr-data-pvc

      downloads:
        existingClaim: slskd-downloads-pvc

      config-file:
        type: configMap
        name: soularr-configmap
        defaultMode: 0775
        advancedMounts:
          *app :
            config-setup:
              - path: /tmp/config.ini
                subPath: config.ini
                readOnly: true

      tmp:
        type: emptyDir
        medium: Memory
