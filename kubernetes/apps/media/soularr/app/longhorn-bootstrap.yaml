---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: soularr-longhorn-bootstrap

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: soularr-longhorn-bootstrap
rules:
  - apiGroups:
      - longhorn.io
    resources:
      - volumes
    verbs:
      - get
      - patch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: soularr-longhorn-bootstrap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: soularr-longhorn-bootstrap
subjects:
  - kind: ServiceAccount
    name: soularr-longhorn-bootstrap
    namespace: media

---
# Bootstrap the Longhorn Volume CR for soularr-config-xfs.
# Bare `kubectl apply` of a Volume CR doesn't initialize replicas
# (see feedback_longhorn_volume_cr_create memory) — must POST to the
# Longhorn frontend API. This Job is idempotent: if the Volume CR
# already exists it just reapplies the trim-friendly patch and exits.
apiVersion: batch/v1
kind: Job
metadata:
  name: soularr-longhorn-bootstrap
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: soularr-longhorn-bootstrap
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: bootstrap
          image: docker.io/alpine/k8s:1.33.11@sha256:829736ec633e58b18b3ea91567a738429540d1112b9e0e58edd295ba476dad8d
          env:
            - name: HOME
              value: /tmp
          command:
            - sh
            - -c
            - |
              set -eu
              NAME=soularr-config-xfs
              LH=http://longhorn-frontend.longhorn-system.svc.cluster.local:80
              if kubectl get volume.longhorn.io -n longhorn-system "$NAME" >/dev/null 2>&1; then
                echo "volume $NAME already exists, skipping create"
              else
                echo "creating volume $NAME via longhorn API"
                curl -fsS -X POST "$LH/v1/volumes" \
                  -H "Content-Type: application/json" \
                  -d '{"name":"soularr-config-xfs","size":"5368709120","numberOfReplicas":2,"frontend":"blockdev","accessMode":"rwo","dataLocality":"best-effort","staleReplicaTimeout":2880,"encrypted":false}' \
                  | head -c 200
                echo
              fi
              echo "ensuring unmapMarkSnapChainRemoved=enabled (trim/space-reclaim)"
              kubectl patch volume.longhorn.io -n longhorn-system "$NAME" \
                --type=merge -p '{"spec":{"unmapMarkSnapChainRemoved":"enabled"}}'
              echo "done"
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
