---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: soularr-slskd-downloads-pv
  labels:
    type: nfs
spec:
  storageClassName: soularr-slskd-downloads-storage-class
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteMany
  nfs:
    server: "${NFS_HOST_0}"
    path: /mnt/downloads-nvme/soulseek

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: soularr-slskd-downloads-pvc
  labels:
    type: nfs
spec:
  accessModes:
    - ReadWriteMany
  volumeMode: Filesystem
  resources:
    requests:
      storage: 5Gi
  volumeName: soularr-slskd-downloads-pv
  storageClassName: soularr-slskd-downloads-storage-class

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: soularr-music-pv
  labels:
    type: nfs
spec:
  storageClassName: soularr-music-storage-class
  capacity:
    storage: 3Ti
  accessModes:
    - ReadWriteMany
  nfs:
    server: "${NFS_HOST_2}"
    path: /mnt/mass_storage/storage/MP3s/

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: soularr-music-pvc
  labels:
    type: nfs
spec:
  accessModes:
    - ReadWriteMany
  volumeMode: Filesystem
  resources:
    requests:
      storage: 3Ti
  volumeName: soularr-music-pv
  storageClassName: soularr-music-storage-class
