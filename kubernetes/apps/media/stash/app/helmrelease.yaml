---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app stash
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  # disableWait so Helm doesn't gate "release succeeded" on the StatefulSet
  # being Ready. We hit a rollback-loop (commit 39b579df13 documents it) when
  # the pod was crashlooping on a permission issue, with Helm rolling back to
  # the same broken state. The init container fixes the perms; this guards
  # against a future cold-start tarpit.
  install:
    disableWait: true
  upgrade:
    disableWait: true
  values:
    controllers:
      stash:
        pod:
          securityContext:
            fsGroup: 1001
            # Always recurse so files written when Stash ran as root
            # (older deploys, before the runAsUser:1114 switch) get chgrp'd
            # to 1001 — Stash 1114:1001 can otherwise hit Permission denied
            # opening its SQLite DB. Switch back to OnRootMismatch later.
            fsGroupChangePolicy: Always
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1114

        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        initContainers:
          # Legacy data was written when Stash ran as root with mode 600.
          # fsGroup chgrp's to 1001 but doesn't relax the file mode, so the
          # non-root Stash (1114) still can't read the SQLite DB. Recurse
          # the config dir once to fix ownership + group-readable mode.
          fix-stash-perms:
            image:
              repository: docker.io/library/alpine
              tag: "3.24"
            command:
              - sh
              - -c
              - |
                set -ex
                # Ownership/perms: legacy data was written by root mode 600.
                chown -R 1114:1001 /.stash
                chmod -R u=rwX,g=rwX,o= /.stash
                # Path migration: config.yml from when the PVC mounted at
                # /root/.stash still references that path. The PVC now
                # mounts at /.stash, so rewrite the paths in-place. Idempotent.
                sed -i 's|/root/\.stash|/.stash|g' /.stash/config.yml
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "FOWNER", "DAC_OVERRIDE"]

        containers:
          app:
            image:
              repository: ghcr.io/home-operations/stash
              tag: 0.31.1@sha256:869f910b26e7605676531e8823fa8c8ea66a329dd1b737e342a1a77ba7b77f22

            env:
              TZ: "America/New_York"
              STASH_STASH: /media/
              STASH_GENERATED: /data/generated/
              STASH_METADATA: /data/metadata/
              STASH_CACHE: /data/cache/
              # OIDC SSO via Authelia (Stash uses Viper AutomaticEnv with the
              # STASH_ prefix; STASH_OIDC_FOO maps to oidc.foo in config.yml).
              # STASH_OIDC_CLIENT_SECRET comes from the externalsecret below.
              STASH_OIDC_ENABLED: "true"
              STASH_OIDC_ISSUER: "https://auth.${SECRET_DOMAIN}"
              STASH_OIDC_CLIENT_ID: "stash"
              STASH_OIDC_EXTERNAL_URL: "https://stash.${SECRET_DOMAIN}"
              STASH_OIDC_ALLOW_USER_CREATE: "true"

            envFrom:
              - secretRef:
                  name: stash-secret

    service:
      app:
        controller: stash
        ports:
          http:
            port: &httpPort 9999

    route:
      app:
        annotations:
          glance/name: "Stash"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/stash.png"
          glance/id: "Private"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *httpPort
    persistence:
      config:
        existingClaim: stash-config-pvc
        globalMounts:
          # Stash searches $HOME/.stash for config.yml; the home-operations
          # image runs as a non-root user with HOME=/, so the mount point
          # has to be /.stash (not /root/.stash). Same PVC contents either
          # way — only the mount path changes.
          - path: /.stash

      data:
        existingClaim: stash-data-pvc

      media:
        existingClaim: stash-media-pvc
