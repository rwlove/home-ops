---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app stash
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      main:
        pod:
          securityContext:
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1114

        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        containers:
          main:
            image:
              repository: ghcr.io/home-operations/stash
              tag: 0.31.1@sha256:12c4ee1424a211888f4e4253ef70b95a639b3d5475ea3d85e88989754569537d

            env:
              TZ: "America/New_York"
              STASH_STASH: /media/
              STASH_GENERATED: /data/generated/
              STASH_METADATA: /data/metadata/
              STASH_CACHE: /data/cache/
              # OIDC SSO via Authelia (Stash uses Viper AutomaticEnv with the
              # STASH_ prefix; STASH_OIDC_FOO maps to oidc.foo in config.yml).
              # STASH_OIDC_CLIENT_SECRET comes from the externalsecret below.
              STASH_OIDC_ENABLED: "true"
              STASH_OIDC_ISSUER: "https://auth.thesteamedcrab.com"
              STASH_OIDC_CLIENT_ID: "stash"
              STASH_OIDC_EXTERNAL_URL: "https://stash.${SECRET_DOMAIN}"
              STASH_OIDC_ALLOW_USER_CREATE: "true"

            envFrom:
              - secretRef:
                  name: stash-secret

    service:
      main:
        controller: main
        ports:
          http:
            port: &httpPort 9999

    route:
      main:
        annotations:
          glance/name: "Stash"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/stash.png"
          glance/id: "Private"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *httpPort
    persistence:
      config:
        existingClaim: stash-config-pvc
        globalMounts:
          - path: /root/.stash

      data:
        existingClaim: stash-data-pvc

      media:
        existingClaim: stash-media-pvc
