---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app stash
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        containers:
          main:
            image:
              repository: ghcr.io/home-operations/stash
              tag: 0.31.1@sha256:12c4ee1424a211888f4e4253ef70b95a639b3d5475ea3d85e88989754569537d

            env:
              TZ: "America/New_York"
              STASH_STASH: /media/
              STASH_GENERATED: /data/generated/
              STASH_METADATA: /data/metadata/
              STASH_CACHE: /data/cache/

    service:
      main:
        controller: main
        ports:
          http:
            port: &httpPort 9999

    route:
      main:
        annotations:
          glance/name: "Stash"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/stash.png"
          glance/id: "Private"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *httpPort
    persistence:
      config:
        existingClaim: stash-config-pvc
        globalMounts:
          - path: /root/.stash

      data:
        existingClaim: stash-data-pvc

      media:
        existingClaim: stash-media-pvc
