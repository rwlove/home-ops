---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone-strict/persistentvolumeclaim-v1.json
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stash-media-pvc
  labels:
    type: nfs
spec:
  accessModes:
    - ReadWriteMany
  volumeMode: Filesystem
  resources:
    requests:
      storage: 6Ti
  volumeName: stash-media-pv
  storageClassName: stash-media-storage-class

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: stash-media-pv
  labels:
    type: nfs
spec:
  storageClassName: stash-media-storage-class
  capacity:
    storage: 6Ti
  accessModes:
    - ReadWriteMany
  nfs:
    server: "${NFS_HOST_2}"
    path: "/mnt/mass_storage/Adult/Favorites/"
