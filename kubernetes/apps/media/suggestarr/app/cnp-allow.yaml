---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: suggestarr-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: suggestarr
  # Additive — default-deny is what triggers the lockdown. Egress to intra-ns
  # sonarr/radarr/seerr is covered by baseline allow-intra-namespace.
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # Internal gateway (envoy) → suggestarr:5000. Auth is enforced at the
    # gateway by the extAuth SecurityPolicy (#12767); the oauth2-proxy
    # hop is retired.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "5000"
              protocol: TCP
  egress:
    # Cross-ns: suggestarr's AI-suggestions feature calls ollama in the
    # ai namespace for LLM-based recommendation reasoning.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: ai
            app.kubernetes.io/name: ollama
      toPorts:
        - ports:
            - port: "11434"
              protocol: TCP
    # External metadata APIs (TMDb, Trakt, etc.) — surface too broad to
    # enumerate per-FQDN.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "80"
              protocol: TCP
