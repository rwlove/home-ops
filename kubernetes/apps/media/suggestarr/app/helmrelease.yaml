---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app suggestarr
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      suggestarr:
        pod:
          securityContext:
            fsGroup: 1001
            fsGroupChangePolicy: "OnRootMismatch"
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1000

        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset
        containers:
          app:
            image:
              repository: docker.io/ciuse99/suggestarr
              tag: v2.9.1@sha256:cfa4fb77862f6cea57f164bf44204c958fb96842815d601e09c92c17dd75d173


            resources:
              requests:
                cpu: 15m
                memory: 384Mi
              limits:
                memory: 512Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    service:
      app:
        controller: suggestarr
        ports:
          http:
            port: &port 5000

    route:
      app:
        annotations:
          glance/name: "Suggestarr"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/suggest-arr.png"
          glance/id: "Media"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - kind: Service
                name: suggestarr
                port: 5000
    persistence:
      config:
        existingClaim: suggestarr-config-pvc
        globalMounts:
          - path: /app/config/config_files
      tmpfs:
        type: emptyDir
        advancedMounts:
          suggestarr:
            app:
              - path: /tmp
