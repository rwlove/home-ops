---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app suggestarr
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      main:
        pod:
          securityContext:
            fsGroup: 1001
            fsGroupChangePolicy: "OnRootMismatch"
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1000

        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset
        containers:
          main:
            image:
              repository: docker.io/ciuse99/suggestarr
              tag: v2.7.1@sha256:9c0a871e91a6b7797364918345a96e3c47866ce3cd39277dfed9eb376021ee42


            resources:
              requests:
                cpu: 15m
                memory: 1G
              limits:
                memory: 1G

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    service:
      main:
        controller: main
        ports:
          http:
            port: &port 5000

    route:
      main:
        annotations:
          glance/name: "Suggestarr"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/suggest-arr.png"
          glance/id: "Media"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *port
    persistence:
      config:
        existingClaim: suggestarr-config-pvc
        globalMounts:
          - path: /app/config/config_files
      tmpfs:
        type: emptyDir
        advancedMounts:
          main:
            main:
              - path: /tmp
