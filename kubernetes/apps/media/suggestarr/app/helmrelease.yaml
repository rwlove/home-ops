---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app suggestarr
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template

  values:
    controllers:
      main:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1001
            fsGroup: 1001
            fsGroupChangePolicy: "OnRootMismatch"
            supplementalGroups:
              - 100

        containers:
          main:
            image:
              repository: docker.io/ciuse99/suggestarr
              tag: v2.4.3@sha256:79a9ec281a5486c28b59b807be8ec8e0be7f1943534eecc59adf9945fce8dd0e

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

            resources:
              requests:
                cpu: 15m
                memory: 1G
              limits:
                memory: 1G

    service:
      main:
        controller: main
        ports:
          http:
            port: &port 5000

    route:
      main:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *port
        annotations:
          glance/name: "Suggestarr"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/suggest-arr.png"
          glance/id: "Media"

    persistence:
      config:
        existingClaim: suggestarr-config-pvc
        globalMounts:
          - path: /app/config/config_files
      tmpfs:
        type: emptyDir
        advancedMounts:
          main:
            main:
              - path: /tmp
