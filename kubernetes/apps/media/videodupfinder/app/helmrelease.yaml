---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app videodupfinder
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      videodupfinder:
        annotations:
          reloader.stakater.com/auto: "true"

        type: statefulset

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7

            envFrom: &envFrom
              - secretRef:
                  name: videodupfinder-secret

        containers:
          app:
            image:
              repository: ghcr.io/rwlove/videodupfinder
              tag: v0.3

            env:
              VIDEODUPFINDER_BIN_DIR: /mnt/scan/.videodupfinder-bin
              VIDEODUPFINDER_LOG_FORMAT: json
              VIDEODUPFINDER_LISTEN_ADDR: ":8000"

            envFrom: *envFrom

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &httpPort 8000
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: false

            resources:
              requests:
                cpu: 500m
                memory: 512Mi
              limits:
                memory: 2Gi

    service:
      app:
        controller: videodupfinder
        ports:
          http:
            port: *httpPort

    route:
      app:
        annotations:
          glance/name: "Video Dup Finder"
          glance/show: "true"
          glance/id: "Media"

        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *httpPort

    persistence:
      scan:
        type: persistentVolumeClaim
        existingClaim: videodupfinder-scan-pvc
        globalMounts:
          # Read-only enforces "no changes on disk unless approved by the user".
          # Flip to false (or remove this line) when you're ready to act on
          # findings — bin/restore won't work until you do.
          - path: /mnt/scan
            readOnly: true
