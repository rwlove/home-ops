---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: videodupfinder
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: videodupfinder-secret
    template:
      engineVersion: v2
      metadata:
        annotations:
          # Mirror this secret into flux-system so Flux can substituteFrom it
          # (postBuild.substituteFrom requires same-namespace source).
          reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
          reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "flux-system"
          reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
          reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "flux-system"
      data:
        # App
        VIDEODUPFINDER_DATABASE_URL: postgres://{{ .POSTGRES_USER }}:{{ .POSTGRES_PASS }}@postgres-videodupfinder-rw.databases.svc.cluster.local:5432/videodupfinder
        VIDEODUPFINDER_SCAN_DIRS: "{{ .SCAN_DIRS }}"

        # NFS source for the scan PV (consumed by Flux postBuild.substituteFrom)
        NFS_HOST: "{{ .NFS_HOST }}"
        NFS_PATH: "{{ .NFS_PATH }}"

        # Postgres Init
        INIT_POSTGRES_DBNAME: videodupfinder
        INIT_POSTGRES_HOST: postgres-videodupfinder-rw.databases.svc.cluster.local
        INIT_POSTGRES_USER: "{{ .POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .POSTGRES_PASS }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: cloudnative-pg
    - extract:
        key: videodupfinder
