---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app cloudflare-ddns
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    controllers:
      cloudflare-ddns:
        pod:
          securityContext:
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532

        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          app:
            image:
              repository: docker.io/favonia/cloudflare-ddns
              tag: 1.15.1

            env:
              DOMAINS: vpn.${SECRET_DOMAIN}
              IP4_PROVIDER: cloudflare.trace
              IP6_PROVIDER: none
              PROXIED: "false"
              TZ: ${TIMEZONE}
              UPDATE_CRON: "@every 5m"

            envFrom:
              - secretRef:
                  name: cloudflare-ddns-secret

            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

            resources:
              requests:
                cpu: 5m
                memory: 16Mi
              limits:
                memory: 64Mi

            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
              readOnlyRootFilesystem: true
