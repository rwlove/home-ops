---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
spec:
  chartRef:
    kind: OCIRepository
    name: envoy-gateway
  interval: 30m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    config:
      envoyGateway:
        extensionApis:
          enableEnvoyPatchPolicy: true
        provider:
          kubernetes:
            deploy:
              type: GatewayNamespace
          type: Kubernetes
    deployment:
      envoyGateway:
        resources:
          requests:
            cpu: 100m
            memory: 768Mi
          limits:
            memory: 1024Mi
    global:
      imageRegistry: mirror.gcr.io
