---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app external-dns-bind
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m

  install:
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3

  values:
    defaultPodOptions:
      automountServiceAccountToken: true
    controllers:
      external-dns-bind:
        pod:
          priorityClassName: system-cluster-critical

          securityContext:
            runAsUser: 568
            runAsGroup: 568
            runAsNonRoot: true

        annotations:
          reloader.stakater.com/auto: "true"

        serviceAccount:
          identifier: *app

        strategy: Recreate

        containers:
          app:
            image:
              repository: registry.k8s.io/external-dns/external-dns
              tag: v0.21.0@sha256:f53faaf71cb270d1ca9dce6ea0c94bfebf1a18696263487f0fbc74b9bf2bd7ff
            args:
              - --domain-filter=${SECRET_DOMAIN}
              - --interval=1m
              - --rfc2136-min-ttl=60s
              - --log-format=text
              - --log-level=debug
              - --metrics-address=:7979
              - --policy=sync
              - --provider=rfc2136
              - --registry=txt
              - --source=crd
              - --crd-source-apiversion=externaldns.k8s.io/v1alpha1
              - --crd-source-kind=DNSEndpoint
              - --source=service
              - --source=gateway-httproute
              # - --source=gateway-tlsroute
              - --txt-owner-id=homelab
              - --txt-prefix=k8s.
            env:
              EXTERNAL_DNS_RFC2136_HOST: 192.168.1.1
              EXTERNAL_DNS_RFC2136_PORT: "53"
              EXTERNAL_DNS_RFC2136_TSIG_AXFR: "true"
              EXTERNAL_DNS_RFC2136_TSIG_KEYNAME: externaldns-key
              EXTERNAL_DNS_RFC2136_TSIG_SECRET_ALG: hmac-sha256
              EXTERNAL_DNS_RFC2136_ZONE: ${SECRET_DOMAIN}
            envFrom:
              - secretRef:
                  name: external-dns-bind-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &port 7979
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: false
            resources:
              # Bumped 140M → 256M after observed peak hit 135M (96%
              # of the previous limit). Memory pressure was stalling
              # the Go GC enough that RFC2136 calls to brain:53 dialed
              # tcp-timeout, external-dns treats that as fatal and
              # exits → kubelet restart → on the next sync the orphan
              # ownership TXT makes external-dns skip republishing the
              # actual CNAME. The langfuse half-state on 2026-05-20
              # was a symptom of this loop.
              requests:
                cpu: 10m
                memory: 256M
              limits:
                memory: 256M
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
              readOnlyRootFilesystem: true

    serviceAccount:
      external-dns-bind: {}

    service:
      app:
        controller: external-dns-bind
        ports:
          http:
            port: *port

    serviceMonitor:
      app:
        serviceName: *app
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s

  uninstall:
    keepHistory: false
