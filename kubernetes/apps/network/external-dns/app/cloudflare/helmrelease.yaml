---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/ocirepository-source-v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cloudflare-dns
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 1.21.1
  url: oci://ghcr.io/home-operations/charts-mirror/external-dns
  verify:
    provider: cosign
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns-cloudflare
spec:
  chartRef:
    kind: OCIRepository
    name: cloudflare-dns

  interval: 1h
  install:
    crds: CreateReplace
    disableSchemaValidation: true # Ref: https://github.com/kubernetes-sigs/external-dns/issues/5206
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    disableSchemaValidation: true # Ref: https://github.com/kubernetes-sigs/external-dns/issues/5206
    remediation:
      retries: 3

      strategy: rollback
  values:
    domainFilters:
      - "${SECRET_DOMAIN}"
    env:
      - name: &name CF_API_EMAIL
        valueFrom:
          secretKeyRef:
            key: *name
            name: &secret external-dns-cloudflare-secret
      - name: &name CF_API_KEY
        valueFrom:
          secretKeyRef:
            key: *name
            name: *secret

    extraArgs:
      - --cloudflare-dns-records-per-page=1000
      - --cloudflare-proxied
      - --crd-source-apiversion=externaldns.k8s.io/v1alpha1
      - --crd-source-kind=DNSEndpoint
      - --events
      - --ignore-ingress-tls-spec
      - --gateway-label-filter=type=external
      # - --annotation-filter=external-dns.alpha.kubernetes.io/target
      # - --gateway-name=external
      # - --gateway-name=tcp

    fullnameOverride: &app externaldns-cloudflare

    podAnnotations:
      secret.reloader.stakater.com/reload: *secret
    policy: sync
    provider:
      name: cloudflare

    serviceMonitor:
      enabled: true

    sources: ["crd", "gateway-httproute", "gateway-tlsroute", "gateway-tcproute"]
    txtOwnerId: default
    txtPrefix: k8s.
