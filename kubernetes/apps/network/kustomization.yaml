---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: network
components:
  - ../../components/alerts
  - ../../components/network-policy/baseline
  # default-deny re-enabled 2026-05-18 (Phase 3, LAST user-facing ns).
  # Pre-flight audit confirmed envoy-proxy-allow + envoy-gateway-allow +
  # wg-easy-allow + whoami-allow all in place. The envoy targetPort is
  # 10443 (per memory project_cilium_l4_port_targetport.md), which is
  # what all cross-ns ingress to envoy must match. If anything breaks,
  # rollback URL is via wg-easy (the OOB path) — but it's also in this
  # ns, so a true failure here is unrecoverable without LAN access.
  # Hubble alerting (PR #11574) active for fast detection.
  - ../../components/network-policy/default-deny
resources:
  - ./namespace.yaml
  - ./cloudflare-ddns/ks.yaml
  - ./cloudflared/ks.yaml
  - ./envoy-gateway/ks.yaml
  - ./external-dns/ks.yaml
  - ./multus/ks.yaml
  - ./wg-easy/ks.yaml
  - ./whoami/ks.yaml
