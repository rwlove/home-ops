---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app blackbox-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: blackbox-exporter

  interval: 30m
  values:
    allowIcmp: true

    config:
      modules:
        http_2xx:
          http:
            follow_redirects: true
            preferred_ip_protocol: "ip4"
            valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
          prober: http
          timeout: 5s
        icmp:
          icmp:
            preferred_ip_protocol: "ip4"
          prober: icmp
          timeout: 30s
        # Synthetic embed prober for ollama-spark. POSTs a small input
        # against bge-m3 and validates a 200 with an "embeddings" key
        # in the body. 30 s timeout accommodates cold model load (bge-m3
        # eviction is possible under OLLAMA_MAX_LOADED_MODELS=3). Probe
        # CR at probes.yaml; replaces the DCGM power-draw heuristic in
        # ollama-spark's SparkOllamaWedged rule.
        ollama_embed:
          http:
            body: |-
              {"model":"bge-m3","input":"prober heartbeat"}
            fail_if_body_not_matches_regexp:
              - "\"embeddings\""
            headers:
              Content-Type: application/json
            method: POST
            preferred_ip_protocol: "ip4"
            valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
            valid_status_codes: [200]
          prober: http
          timeout: 30s
        tcp_connect:
          prober: tcp
          tcp:
            preferred_ip_protocol: ipv4
          timeout: 5s
    fullnameOverride: blackbox-exporter
    image:
      registry: quay.io

    podAnnotations:
      reloader.stakater.com/auto: "true"

    podSecurityContext:
      sysctls:
        - name: net.ipv4.ping_group_range
          value: "0 2147483647"

    prometheusRule:
      additionalLabels:
        app: prometheus-operator
        release: prometheus
      enabled: true
      rules:
        - alert: BlackboxSslCertificateWillExpireSoon
          annotations:
            description: |-
              The SSL certificate for {{ $labels.instance }} will expire in less than 3 days
          expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 3
          for: 5m
          labels:
            severity: critical
        - alert: BlackboxSslCertificateExpired
          annotations:
            description: |-
              The SSL certificate for {{ $labels.instance }} has expired
          expr: probe_ssl_earliest_cert_expiry - time() <= 0
          for: 5m
          labels:
            severity: critical
        - alert: BlackboxProbeFailed
          annotations:
            description: |-
              The host {{ $labels.instance }} is currently unreachable
          expr: probe_success == 0
          for: 5m
          labels:
            severity: critical
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        add:
          - NET_RAW

      readOnlyRootFilesystem: true
    serviceMonitor:
      defaults:
        interval: 1m
        scrapeTimeout: 10s

      enabled: true
