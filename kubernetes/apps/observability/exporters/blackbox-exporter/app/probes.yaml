---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/probe_v1.json
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: ollama-spark-embed
spec:
  # 5-min interval keeps GPU heartbeat cost trivial (12 probes/hour;
  # each warm probe ~100ms, cold load up to ~10s). The probe itself
  # functions as the heartbeat that prevents bge-m3 from being evicted
  # under OLLAMA_MAX_LOADED_MODELS=3 during quiet stretches. 30 s
  # scrapeTimeout tolerates cold load.
  interval: 5m
  scrapeTimeout: 30s
  module: ollama_embed
  prober:
    url: blackbox-exporter.observability.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - http://ollama-spark.ai.svc.cluster.local:11434/api/embed

---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/probe_v1.json
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: ollama-embed
spec:
  # Sister of ollama-spark-embed. Same module, different target —
  # this probes the P40 ollama on worker8 (serves ≤8b inference +
  # bge-m3 fallback per .agents/instructions/gpu-routing.md). Same
  # heartbeat side benefit: keeps bge-m3 warm during quiet windows.
  interval: 5m
  scrapeTimeout: 30s
  module: ollama_embed
  prober:
    url: blackbox-exporter.observability.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - http://ollama.ai.svc.cluster.local:11434/api/embed
