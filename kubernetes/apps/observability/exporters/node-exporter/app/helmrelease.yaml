---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-exporter
spec:
  chart:
    spec:
      chart: prometheus-node-exporter
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: prometheus-community-charts
      version: 4.55.0
  interval: 30m
  values:
    fullnameOverride: node-exporter

    # The node-exporter binary's built-in default for mount-points-exclude
    # is narrow (dev|proc|run/credentials/.+|sys|var/lib/docker/.+|var/lib/containers/storage/.+).
    # It does NOT cover /var/lib/kubelet/pods/.+, so every pod's bind-mounts
    # (k8tz /etc/localtime subpath, local-volume bind-mounts) appear as
    # separate filesystems with the host's fill rate, triggering false
    # CephNodeDiskspaceWarning + HostOutOfDiskSpace alerts per pod.
    # Match the kube-prometheus-stack upstream default to suppress those.
    extraArgs:
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|run/credentials/.+|sys|var/lib/docker/.+|var/lib/containers/storage/.+|var/lib/kubelet/pods/.+)($|/)
      - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|erofs|sysfs|tracefs)$

    hostNetwork: false
    image:
      registry: quay.io
      repository: prometheus/node-exporter

    # RAPL collector needs to read /sys/class/powercap/intel-rapl:*/energy_uj,
    # mode 400 root-only on recent kernels (Platypus side-channel mitigation).
    # CAP_DAC_READ_SEARCH alone is insufficient: on a non-root UID the cap
    # lands in the bounding set but effective/permitted/ambient stay empty
    # (Linux capability model — needs file caps on the binary or the kernel
    # ambient set, neither of which the chart provides). Simplest fix is
    # runAsUser: 0. node-exporter mounts /proc, /sys, /root read-only so
    # root inside the container isn't a meaningful trust escalation.
    securityContext:
      runAsUser: 0
      runAsNonRoot: false
    containerSecurityContext:
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL

    prometheus:
      monitor:
        enabled: true
        jobLabel: app.kubernetes.io/instance

        relabelings:
          - action: replace
            regex: (.*)
            replacement: $1
            sourceLabels:
              - __meta_kubernetes_pod_node_name
            targetLabel: kubernetes_node
          - action: replace
            regex: (.*)
            replacement: $1
            sourceLabels:
              - __meta_kubernetes_pod_node_name
            targetLabel: nodename
          - action: replace
            regex: (.*)
            replacement: $1:9100
            sourceLabels:
              - kubernetes_node
            targetLabel: instance

    resources:
      limits:
        memory: 100M

      requests:
        cpu: 23m
        memory: 100M
