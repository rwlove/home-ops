---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-exporter
spec:
  chart:
    spec:
      chart: prometheus-node-exporter
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: prometheus-community-charts
      version: 4.55.0
  interval: 30m
  values:
    fullnameOverride: node-exporter

    hostNetwork: false
    image:
      registry: quay.io
      repository: prometheus/node-exporter

    # RAPL collector needs to read /sys/class/powercap/intel-rapl:*/energy_uj
    # which on recent kernels is mode 400 root-only (Platypus side-channel
    # mitigation). DAC_READ_SEARCH lets a non-root container bypass the
    # file read permission check without escalating to full root. See
    # https://github.com/prometheus/node_exporter/issues/2151
    containerSecurityContext:
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
        add:
          - DAC_READ_SEARCH

    prometheus:
      monitor:
        enabled: true
        jobLabel: app.kubernetes.io/instance

        relabelings:
          - action: replace
            regex: (.*)
            replacement: $1
            sourceLabels:
              - __meta_kubernetes_pod_node_name
            targetLabel: kubernetes_node
          - action: replace
            regex: (.*)
            replacement: $1
            sourceLabels:
              - __meta_kubernetes_pod_node_name
            targetLabel: nodename
          - action: replace
            regex: (.*)
            replacement: $1:9100
            sourceLabels:
              - kubernetes_node
            targetLabel: instance

    resources:
      limits:
        memory: 100M

      requests:
        cpu: 23m
        memory: 100M
