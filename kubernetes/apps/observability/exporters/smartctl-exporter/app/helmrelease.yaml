---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app smartctl-exporter
spec:
  chart:
    spec:
      chart: prometheus-smartctl-exporter
      sourceRef:
        kind: HelmRepository
        name: prometheus-community-charts
      version: 0.16.1
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    config:
      devices:
        - /dev/sda
        - /dev/sdb
        - /dev/sdc
        - /dev/sdd
        - /dev/sde
        - /dev/sdf
        - /dev/sdg
        - /dev/nvme0n1
        - /dev/nvme1n1
        - /dev/nvme2n1
    fullnameOverride: *app
    image:
      repository: ghcr.io/joryirving/smartctl_exporter
      tag: 0.14.0@sha256:04bf03f15e28330f0fc5ce561e97c3cb3cd0fce22e51a141eccee160c6e736f5
    prometheusRules:
      enabled: false
    serviceMonitor:
      enabled: true
      relabelings:
        - action: labeldrop
          regex: (pod)
        # - action: replace
        #   separator: ':'
        #   # regex: \b((?:sd[a-z]+|nvme\d+n\d+))\b|\b((?:cp\d+|work\d+|n\d{3}-\d{2}))\b
        #   # replacement: "$1: $2"
        #   sourceLabels:
        #   - device
        #   - __meta_kubernetes_endpoint_node_name
        #   targetLabel: device
        - action: replace
          regex: (.*)
          replacement: $1.${SECRET_DOMAIN}
          sourceLabels:
            - __meta_kubernetes_endpoint_node_name
          targetLabel: instance
  uninstall:
    keepHistory: false
