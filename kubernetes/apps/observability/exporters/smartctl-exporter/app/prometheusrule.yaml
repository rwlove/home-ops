---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: smartctl-exporter-rules
spec:
  groups:
    - name: smartctl-exporter.rules
      rules:
        - alert: SmartDeviceHighTemperature
          annotations:
            summary:
              Mounted drive {{ $labels.device }} on device {{ $labels.instance }}
              has a temperature higher than 65°C.
          expr: smartctl_device_temperature > 65
          for: 15m
          labels:
            severity: critical
        - alert: SmartDeviceTestFailed
          annotations:
            summary:
              Mounted drive {{ $labels.device }} on device {{ $labels.instance }}
              did not pass its SMART test.
          expr: |
            (
              smartctl_device_smart_status != 1
            or
              smartctl_device_status != 1
            )
          for: 15m
          labels:
            severity: critical
        - alert: SmartDeviceCriticalWarning
          annotations:
            summary:
              Mounted drive {{ $labels.device }} on device {{ $labels.instance }}
              is in a critical state.
          expr: smartctl_device_critical_warning != 0
          for: 15m
          labels:
            severity: critical
        #
        # https://github.com/prometheus-community/helm-charts/blob/main/charts/prometheus-smartctl-exporter/rules/rules.txt
        #
        - alert: SmartDeviceMediaErrors
          annotations:
            summary:
              Mounted drive {{ $labels.device }} on device {{ $labels.instance }}
              has media errors.
          expr: smartctl_device_media_errors != 0
          for: 15m
          labels:
            severity: critical
        - alert: SmartDeviceAvailableSpareUnderThreadhold
          annotations:
            summary:
              Device {{ $labels.device }} on instance {{ $labels.instance }}
              is under available spare threashold.
          expr: smartctl_device_available_spare_threshold > smartctl_device_available_spare
          for: 15m
          labels:
            severity: critical
        # Scoped to NVMe only — the R730xd SAS/SATA backplane routinely
        # negotiates SATA links below max (6.0 Gb/s vs 12.0 Gb/s); on
        # those, "current != max" is normal and fires Pushover-grade
        # critical noise. NVMe drives negotiate at PCIe link speed and
        # any drop there is a real signal.
        - alert: SmartDeviceInterfaceSlow
          annotations:
            summary:
              Device {{ $labels.device }} on instance {{ $labels.instance }}
              interface is slower then it should be.
          expr: |
            smartctl_device_interface_speed{speed_type="current",device=~"nvme.*"} != on(device, instance, namespace, pod) smartctl_device_interface_speed{speed_type="max",device=~"nvme.*"}
          for: 15m
          labels:
            severity: critical
        # Wear / endurance leading indicator. available_spare catches
        # end-of-life; percentage_used warns while there's still runway
        # to plan a replacement. warning -> Pushover only (no HolmesGPT),
        # which is right for a "schedule a swap" signal, not an incident.
        - alert: SmartDeviceEnduranceHigh
          annotations:
            summary:
              Device {{ $labels.device }} on instance {{ $labels.instance }}
              has used {{ $value }}% of its rated write endurance.
          expr: smartctl_device_percentage_used >= 80
          for: 1h
          labels:
            severity: warning
