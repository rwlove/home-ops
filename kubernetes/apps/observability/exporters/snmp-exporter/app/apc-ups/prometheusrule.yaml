---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: snmp-exporter-apc-ups-rules
spec:
  groups:
    - name: snmp-exporter-apc-ups.rules
      rules:
        - alert: SnmpExporterApcUpsAbsent
          annotations:
            description: APC UPS SNMP exporter has disappeared from Prometheus target discovery.
            summary: APC UPS SNMP exporter is down.
          expr: absent(up{job=~".*snmp-exporter-apc-ups.*"} == 1)
          for: 5m
          labels:
            severity: critical
        - alert: UPSOnBattery
          annotations:
            description: UPS {{ $labels.target }} has lost power and is running on battery.
            summary: UPS is running on battery.
          # upsBasicOutputStatus: 2=onLine, 3=onBattery
          expr: upsBasicOutputStatus == 3
          # SNMP poll jitter can briefly read onBattery; the UPS carries
          # the load, so a 1m debounce avoids false pages on a real outage.
          for: 1m
          labels:
            severity: critical
        - alert: UPSLowRuntime
          annotations:
            description: UPS {{ $labels.target }} is on battery and has less than 10 minutes of runtime remaining.
            summary: UPS battery runtime is low.
          # upsAdvBatteryRunTimeRemaining is in TimeTicks (1/100s); 60000 = 10 min.
          expr: (upsBasicOutputStatus == 3) and (upsAdvBatteryRunTimeRemaining < 60000)
          for: 1m
          labels:
            severity: critical
        - alert: UPSLowBattery
          annotations:
            description: UPS {{ $labels.target }} battery charge is {{ $value }}%, below 50%.
            summary: UPS battery charge low.
          expr: upsAdvBatteryCapacity < 50
          for: 1m
          labels:
            severity: warning
        - alert: UPSBatteryReplace
          annotations:
            description: UPS {{ $labels.target }} battery needs to be replaced.
            summary: Replace UPS battery.
          # upsAdvBatteryReplaceIndicator: 1=noBatteryNeedsReplacing, 2=batteryNeedsReplacing
          expr: upsAdvBatteryReplaceIndicator == 2
          # Non-urgent advisory; 5m debounce kills SNMP-jitter false pages.
          for: 5m
          labels:
            severity: critical
    # Derived/aggregated power metrics. Single source of truth for the
    # Grafana Power dashboard, the HA SNMP-derived sensors, and the
    # power-anomaly alerts below.
    - name: power.recording-rules
      interval: 30s
      rules:
        - record: power:beast:watts
          expr: amperageProbeReading{job="snmp-exporter-dell-idrac", amperageProbeIndex="3"}
        - record: power:ups_1500:watts
          expr: upsAdvOutputActivePower{target="apc-ups-1500"}
        - record: power:ups_3000:watts
          expr: upsAdvOutputActivePower{target="apc-ups-3000"}
        - record: power:ups_total:watts
          expr: sum(upsAdvOutputActivePower)
        # UPS-3000 draw minus measured devices (currently just beast)
        - record: power:ups_3000_other:watts
          expr: |
            scalar(upsAdvOutputActivePower{target="apc-ups-3000"})
            - scalar(amperageProbeReading{job="snmp-exporter-dell-idrac", amperageProbeIndex="3"})
        # Whole-house from EM16 (sum of all measured circuits)
        - record: power:house_em16:watts
          expr: sum(hass_sensor_power_w{entity=~"sensor.em16_.+_power"})
        # PoE delivered per Omada switch
        - record: power:omada_poe:watts
          expr: sum by (device_name) (omada_port_power_watts)
        # CPU package power across the 4 physical cluster nodes. Per the
        # 2026-05-17 rack walk (reference_rack_ups_topology.md):
        #   - UPS-3000 powers: master1, worker3, worker4
        #   - UPS-1500 powers: worker2
        # Split into per-UPS rules so Energy Dashboard included_in_stat
        # attribution slots under the correct UPS parent. Rollup retained
        # for the existing Workers (CPU) Individual Device.
        - record: power:workers_cpu:watts
          expr: sum(rate(node_rapl_package_joules_total{kubernetes_node!=""}[2m]))
        - record: power:workers_ups_3000_cpu:watts
          expr: sum(rate(node_rapl_package_joules_total{kubernetes_node=~"(master1|worker3|worker4)\\.thesteamedcrab\\.com"}[2m]))
        - record: power:workers_ups_1500_cpu:watts
          expr: rate(node_rapl_package_joules_total{kubernetes_node="worker2.thesteamedcrab.com"}[2m])
        # brain CPU package power. brain runs as systemd node-exporter
        # with a User=root drop-in to read RAPL (mode 400 root-only since
        # Platypus mitigation). Captured in lovenet-network-configuration
        # repo systemd/ dir.
        - record: power:brain_cpu:watts
          expr: rate(node_rapl_package_joules_total{instance="brain.thesteamedcrab.com:9100"}[2m])
        # GPU power (NVIDIA P40, passed through to worker8 VM on beast).
        # Captured by dcgm-exporter. Total across all GPUs in the cluster
        # in case more are added later.
        - record: power:gpu:watts
          expr: sum(DCGM_FI_DEV_POWER_USAGE)
    # Anomaly alerts on the recording rules above.
    - name: power.alerts
      rules:
        - alert: BeastPowerSustainedHigh
          annotations:
            summary: Beast power draw sustained above 500W
            description: |
              Beast (R730xd) has been pulling >{{ $value }}W for 10+ minutes.
              Check for runaway workloads (Frigate model inference loop, ML jobs)
              or a hot-running disk array.
          expr: power:beast:watts > 500
          for: 10m
          labels:
            severity: warning
        - alert: UPS1500LoadHigh
          annotations:
            summary: UPS 1500 load above 80%
            description: |
              UPS 1500 has been at {{ $value }}% of nominal load for 10+ minutes.
              Reduce load or move equipment to UPS 3000.
          expr: upsAdvOutputLoad{target="apc-ups-1500"} > 80
          for: 10m
          labels:
            severity: warning
        - alert: UPS3000LoadHigh
          annotations:
            summary: UPS 3000 load above 80%
            description: |
              UPS 3000 has been at {{ $value }}% of nominal load for 10+ minutes.
              Consider load balancing or investigating new draw.
          expr: upsAdvOutputLoad{target="apc-ups-3000"} > 80
          for: 10m
          labels:
            severity: warning
        # BGE bill forecast tripped >20% above typical month.
        # hass_sensor_monetary_usd is the HA prometheus exporter's
        # form of sensor.elec_account_*_*_cost.
        - alert: BGEForecastOverTypical
          annotations:
            summary: BGE forecast bill is {{ $value | humanizePercentage }} of typical
            description: |
              This billing cycle is on track above your typical month.
              Forecast/typical ratio: {{ $value | humanize }}.
              Check the Power Overview Grafana dashboard for which loads
              are running heavier than usual.
          expr: |
            (
              hass_sensor_monetary_usd{entity="sensor.elec_account_4632757682_current_bill_electric_forecasted_cost"}
              /
              hass_sensor_monetary_usd{entity="sensor.elec_account_4632757682_typical_monthly_electric_cost"}
            ) > 1.20
          for: 6h
          labels:
            severity: warning
        # GPU power sustained high — runaway ollama / immich-pet-tagger /
        # other GPU workload. P40 max TDP is 250W; 200W sustained is
        # heavy active load.
        - alert: GPUPowerSustainedHigh
          annotations:
            summary: GPU power sustained above 200W
            description: |
              GPU (P40) has been pulling {{ $value }}W for 30+ minutes.
              Likely an active ollama inference or immich-pet-tagger run.
              If unexpected, check workloads on worker8.
          expr: power:gpu:watts > 200
          for: 30m
          labels:
            severity: info
