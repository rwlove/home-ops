---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: goldilocks
spec:
  chart:
    spec:
      # renovate: registryUrl=https://charts.fairwinds.com/stable
      chart: goldilocks
      sourceRef:
        kind: HelmRepository
        name: fairwinds-charts

      version: 10.3.0
  interval: 30m
  values:
    controller:
      # Argo Rollouts is not installed in this cluster; disabling drops
      # the argoproj.io rollouts rule from the controller ClusterRole.
      # See docs/src/rbac_audit.md §4.
      rbac:
        enableArgoproj: false
      resources:
        limits:
          memory: 200Mi

        requests:
          cpu: 25m
          memory: 200Mi
    dashboard:
      # Same rationale as controller above.
      rbac:
        enableArgoproj: false
      replicaCount: 1

      resources:
        limits:
          memory: 200Mi
        requests:
          cpu: 25m
          memory: 200Mi
