---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: grafana-allow
spec:
  # Grafana Deployment pods carry `app.kubernetes.io/name: grafana`.
  # The image-renderer Deployment carries `app.kubernetes.io/name:
  # grafana-image-renderer` — fronted via grafana intra-ns, so no
  # separate ingress rule needed for it.
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # HTTPRoute on internal gateway → grafana:3000 (web UI).
    # Anonymous-admin is enabled; gateway terminates TLS.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    # grafana-mcp in mcp-system queries Grafana for HolmesGPT alert
    # root-cause analysis and operator evidence pre-pass.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: mcp-system
            app.kubernetes.io/name: grafana-mcp
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
  egress:
    # Postgres datasource: home_assistant DB via CNPG cluster
    # `postgres-home-assistant` in databases ns (Pattern B).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            cnpg.io/cluster: postgres-home-assistant
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Postgres datasource: langgraph_checkpoints DB via CNPG cluster
    # `postgres-langgraph-checkpoints` in databases ns. Backs the
    # "Recent completions" table panel on the HomeAIOps State
    # dashboard (queries task_queue WHERE status='done').
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            cnpg.io/cluster: postgres-langgraph-checkpoints
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Dashboard provisioning from external URLs at startup +
    # provisioner reconcile (cert-manager, cnpg, flux, dcgm, repo's
    # own raw.githubusercontent.com home_assistant + power JSONs).
    # Also covers grafana.com plugin downloads, grafana.com gnetId
    # dashboard fetches, and grafana.com news feed (disabled in
    # values but the client still ranges over default URLs at boot).
    # Intended endpoints:
    #   raw.githubusercontent.com (CNAME-fronted via Fastly)
    #   grafana.com, *.grafana.com, grafana.net (uncertain CNAME)
    #   storage.googleapis.com (CNAME-fronted via Google)
    #
    # The grafana.* family CNAME status is uncertain; per memory
    # project_cilium_matchpattern_fqdn_limits.md, when uncertain default
    # to toEntities:world+443 (broad allow is the safe failure mode).
    # That subsumes the CNAME-fronted hosts above so the whole rule
    # collapses to world:443. Matches the precedent in PRs
    # #11498/#11512/#11517/#11533.
    - toEntities: [world]
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
