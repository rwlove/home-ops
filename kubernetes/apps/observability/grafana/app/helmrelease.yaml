---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app grafana
spec:
  chart:
    spec:
      chart: grafana
      sourceRef:
        kind: HelmRepository
        name: grafana-charts

      version: 10.5.15
  interval: 30m
  values:
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values: ["grafana"]
              topologyKey: kubernetes.io/hostname
            weight: 100
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - disableDeletion: false
            editable: true
            folder: ""
            name: "default"
            options:
              path: /var/lib/grafana/dashboards/default
            orgId: 1
            type: file
          - disableDeletion: false
            editable: true
            folder: kubernetes
            name: Kubernetes
            options:
              path: /var/lib/grafana/dashboards/kubernetes
            orgId: 1
            type: file
          - disableDeletion: false
            editable: true
            folder: cert-manager
            name: cert-manager
            options:
              path: /var/lib/grafana/dashboards/cert-manager
            orgId: 1
            type: file
          - disableDeletion: false
            editable: true
            folder: ethereum
            name: Ethereum
            options:
              path: /var/lib/grafana/dashboards/ethereum
            orgId: 1
            type: file
          - disableDeletion: false
            editable: true
            folder: flux
            name: Flux
            options:
              path: /var/lib/grafana/dashboards/flux
            orgId: 1
            type: file
          - disableDeletion: false
            editable: true
            folder: databases
            name: Databases
            options:
              path: /var/lib/grafana/dashboards/databases
            orgId: 1
            type: file
          - disableDeletion: false
            editable: true
            folder: home
            name: Home
            options:
              path: /var/lib/grafana/dashboards/home
            orgId: 1
            type: file
          - disableDeletion: false
            editable: true
            folder: power
            name: Power
            options:
              path: /var/lib/grafana/dashboards/power
            orgId: 1
            type: file
          - disableDeletion: false
            editable: true
            folder: network
            name: Network
            options:
              path: /var/lib/grafana/dashboards/network
            orgId: 1
            type: file
          - disableDeletion: false
            editable: true
            folder: Hardware
            name: Hardware
            options:
              path: /var/lib/grafana/dashboards/hardware
            orgId: 1
            type: file
    dashboards:
      cert-manager:
        overview:
          url: https://raw.githubusercontent.com/monitoring-mixins/website/refs/heads/master/assets/cert-manager/dashboards/cert-manager-overview.json
      databases:
        cnpg:
          url: https://raw.githubusercontent.com/cloudnative-pg/grafana-dashboards/refs/heads/main/charts/cluster/grafana-dashboard.json
      ethereum:
        geth-server:
          datasource: Prometheus
          gnetId: 6976
          revision: 3
        metrics-exporter:
          datasource:
            - {name: DS_PROMETHEUS, value: Prometheus}
          gnetId: 16277
          revision: 15
        staking:
          datasource: Prometheus
          gnetId: 17846
          revision: 3
      flux:
        flux-cluster:
          datasource: Prometheus
          url: https://raw.githubusercontent.com/fluxcd/flux2-monitoring-example/main/monitoring/configs/dashboards/cluster.json
        flux-control-plane:
          datasource: Prometheus
          url: https://raw.githubusercontent.com/fluxcd/flux2-monitoring-example/main/monitoring/configs/dashboards/control-plane.json
        flux-logs:
          datasource: Loki
          url: https://raw.githubusercontent.com/fluxcd/flux2-monitoring-example/main/monitoring/configs/dashboards/logs.json
      hardware:
        idrac:
          datasource: Prometheus
          gnetId: 12106
          revision: 4
        nvidia-dcgm:
          datasource: Prometheus
          url: https://raw.githubusercontent.com/NVIDIA/dcgm-exporter/main/grafana/dcgm-exporter-dashboard.json
      home:
        home-assistant:
          datasource: home_assistant
          url: https://raw.githubusercontent.com/rwlove/home-ops/main/kubernetes/apps/observability/grafana/dashboards/home_assistant.json
      kubernetes:
        k8s-system-api-server:
          # renovate: dashboardName="Kubernetes / System / API Server"
          datasource: Prometheus
          gnetId: 15761
          revision: 17
        k8s-views-global:
          # renovate: dashboardName="Kubernetes / Views / Global"
          datasource: Prometheus
          gnetId: 15757
          revision: 42
        k8s-views-namespaces:
          # renovate: dashboardName="Kubernetes / Views / Namespaces"
          datasource: Prometheus
          gnetId: 15758
          revision: 41
        k8s-views-nodes:
          # renovate: dashboardName="Kubernetes / Views / Nodes"
          datasource: Prometheus
          gnetId: 15759
          revision: 32
        k8s-views-pods:
          # renovate: dashboardName="Kubernetes / Views / Pods"
          datasource: Prometheus
          gnetId: 15760
          revision: 34
        k8s-volumes:
          # renovate: dashboardName="K8s / Storage / Volumes / Cluster"
          datasource: Prometheus
          gnetId: 11454
          revision: 14
      network:
        cloudflared:
          # renovate: depName="Cloudflare Tunnels (cloudflared)"
          datasource:
            - {name: DS_PROMETHEUS, value: Prometheus}
          gnetId: 17457
          revision: 6
        external-dns:
          # renovate: depName="External-dns"
          datasource: Prometheus
          gnetId: 15038
          revision: 3
        netdata:
          datasource: Prometheus
          gnetId: 7107
          revision: 1
        speed_test:
          datasource: Prometheus
          # Ref: https://grafana.com/grafana/dashboards/7845
          gnetId: 13665
          revision: 4
      power:
        ups:
          datasource: Prometheus
          gnetId: 12340
          revision: 1
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - access: proxy
            isDefault: true
            jsonData:
              prometheusType: Prometheus
            name: Prometheus
            type: prometheus
            url: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
          - access: proxy
            jsonData:
              maxLines: 1000
            name: Loki
            type: loki
            url: http://loki-gateway.observability.svc.cluster.local:80
          - access: proxy
            jsonData:
              implementation: prometheus
            name: Alertmanager
            type: alertmanager
            uid: alertmanager
            url: http://kube-prometheus-stack-alertmanager.observability.svc.cluster.local:9093
          - access: proxy
            basicAuth: false
            database: home_assistant
            jsonData:
              postgresVersion: 1000
              sslmode: disable
            name: home_assistant
            secureJsonData:
              password: "home-assistant"
            type: postgres
            url: postgres-home-assistant-ro.databases.svc.cluster.local:5432
            user: "home-assistant"
            version: 1

            withCredentials: false
        deleteDatasources:
          - {name: Alertmanager, orgId: 1}
          - {name: Loki, orgId: 1}
          - {name: Prometheus, orgId: 1}
          - {name: home_assistant, orgId: 1}
    env:
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: false
      GF_ANALYTICS_CHECK_FOR_UPDATES: false
      GF_ANALYTICS_REPORTING_ENABLED: false
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_DATE_FORMATS_USE_BROWSER_LOCALE: true
      GF_EXPLORE_ENABLED: true
      GF_FEATURE_TOGGLES_ENABLE: publicDashboards
      GF_LOG_MODE: console
      GF_NEWS_NEWS_FEED_ENABLED: false

      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: natel-discrete-panel,pr0ps-trackmap-panel,panodata-map-panel
      GF_SECURITY_ALLOW_EMBEDDING: true
      GF_SECURITY_COOKIE_SAMESITE: grafana
      GF_SERVER_ROOT_URL: https://grafana.${SECRET_DOMAIN}
    envFromSecrets:
      - name: &secret grafana-secret

    grafana.ini:
      analytics:
        check_for_plugin_updates: false
        check_for_updates: false
        reporting_enabled: false
      auth:
        disable_login_form: true
      auth.anonymous:
        enabled: true
        org_role: Admin
      news:
        news_feed_enabled: false
    imageRenderer:
      enabled: true
      env:
        RENDERING_MODE: clustered
    persistence:
      enabled: false

    plugins:
      - natel-discrete-panel
      - pr0ps-trackmap-panel
      - grafana-piechart-panel
      - vonage-status-panel
      - grafana-polystat-panel
      - grafana-worldmap-panel
      - grafana-clock-panel
      - grafana-singlestat-panel
      - mxswat-separator-panel
      - farski-blendstat-panel
      - speakyourcode-button-panel
      - snuids-trafficlights-panel
    podAnnotations:
      configmap.reloader.stakater.com/reload: grafana-config-dashboards,grafana-dashboards-default,*app

      secret.reloader.stakater.com/reload: *secret
    replicas: 1

    route:
      main:
        annotations:
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/grafana.png"
          glance/id: "Observability"

          glance/name: "Grafana"
          glance/show: "true"
        enabled: true
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
    serviceMonitor:
      enabled: true

    sidecar:
      dashboards:
        enabled: true
        searchNamespace: ALL
      datasources:
        enabled: true
        labelValue: ""
        searchNamespace: ALL
    testFramework:
      enabled: false
