---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: holmesgpt-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: holmesgpt
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # Windmill workflow `alertmanager-holmesgpt-notify` POSTs directly
    # to /api/chat from the home ns. n8n previously reached HolmesGPT
    # through its oauth2-proxy + gateway; Windmill skips that hop and
    # talks to the in-cluster Service for lower latency.
    - fromEndpoints:
        - matchExpressions:
            - key: io.kubernetes.pod.namespace
              operator: In
              values: [home]
            - key: app.kubernetes.io/name
              operator: In
              values:
                - windmill-app
                - windmill-workers
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    # LLM backend — ollama (P40) + ollama-spark (Blackwell) in ai ns
    # (Pattern E). Both endpoints selected for parallel-routing readiness;
    # current MODEL/OLLAMA_API_BASE target ollama-spark, but the rollback
    # path is a one-env-flip back to ollama — keep both reachable.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: ai
            app.kubernetes.io/name: ollama
        - matchLabels:
            io.kubernetes.pod.namespace: ai
            app.kubernetes.io/name: ollama-spark
      toPorts:
        - ports:
            - port: "11434"
              protocol: TCP
    # HolmesGPT investigates k8s resources at runtime — needs to query
    # prometheus + alertmanager + loki (intra-ns; baseline covers) and
    # the apiserver (baseline covers). No external egress required.
