---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: holmesgpt
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  install:
    disableWait: true
  upgrade:
    disableWait: true
  values:
    defaultPodOptions:
      automountServiceAccountToken: true
    serviceAccount:
      holmesgpt:
        enabled: true
    controllers:
      holmesgpt:
        annotations:
          reloader.stakater.com/auto: "true"
        type: deployment
        serviceAccount:
          identifier: holmesgpt
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: docker.io/robustadev/holmes
              tag: 0.28.0
            command:
              - holmes
              - server
            env:
              MODEL: ollama/qwen2.5:14b
              OLLAMA_API_BASE: http://ollama.ai.svc.cluster.local:11434
              HOLMES_HOST: 0.0.0.0
              HOLMES_PORT: "8080"
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault
    service:
      app:
        controller: holmesgpt
        ports:
          http:
            port: 8080
    persistence:
      tmp:
        type: emptyDir
        advancedMounts:
          holmesgpt:
            app:
              - path: /tmp
                subPath: tmp
              - path: /home/holmes/.cache
                subPath: cache
