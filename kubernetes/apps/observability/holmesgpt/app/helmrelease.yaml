---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: holmesgpt
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  install:
    disableWait: true
  upgrade:
    disableWait: true
  values:
    defaultPodOptions:
      automountServiceAccountToken: true
    serviceAccount:
      holmesgpt:
        enabled: true
    controllers:
      holmesgpt:
        annotations:
          reloader.stakater.com/auto: "true"
        type: deployment
        serviceAccount:
          identifier: holmesgpt
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: docker.io/robustadev/holmes
              tag: 0.30.1
            command:
              - python
              - /app/server.py
            env:
              MODEL: ollama/qwen2.5:32b
              OLLAMA_API_BASE: http://ollama-spark.ai.svc.cluster.local:11434
              OVERRIDE_MAX_CONTENT_SIZE: "16384"
              OVERRIDE_MAX_OUTPUT_TOKEN: "4096"
              # Default litellm timeout is 600s; the 1500s band-aid (PR
              # #11651) was sized for P40 qwen2.5:7b tool-calling. Since
              # the Spark cutover (PR #11752), per-token latency is much
              # lower and the historical worst-case investigations don't
              # need this much headroom. Step-down to 900s; revisit 600s
              # after a 48h soak with p95 alert latency observed under
              # 5 min in Grafana.
              LITELLM_REQUEST_TIMEOUT: "900"
              LITELLM_TIMEOUT: "900"
              HOLMES_HOST: 0.0.0.0
              HOLMES_PORT: "8080"
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault
    service:
      app:
        controller: holmesgpt
        ports:
          http:
            port: 8080
    route:
      app:
        hostnames:
          - "holmesgpt.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - kind: Service
                name: holmesgpt-oauth2-proxy
                port: 4180
    persistence:
      tmp:
        type: emptyDir
        advancedMounts:
          holmesgpt:
            app:
              - path: /tmp
                subPath: tmp
              - path: /home/holmes/.cache
                subPath: cache
