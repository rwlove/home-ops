---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: holmesgpt
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  install:
    disableWait: true
  upgrade:
    disableWait: true
  values:
    defaultPodOptions:
      automountServiceAccountToken: true
    serviceAccount:
      holmesgpt:
        enabled: true
    controllers:
      holmesgpt:
        annotations:
          reloader.stakater.com/auto: "true"
        type: deployment
        serviceAccount:
          identifier: holmesgpt
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: docker.io/robustadev/holmes
              tag: 0.30.0
            command:
              - python
              - /app/server.py
            env:
              MODEL: ollama/qwen2.5:7b
              OLLAMA_API_BASE: http://ollama.ai.svc.cluster.local:11434
              OVERRIDE_MAX_CONTENT_SIZE: "16384"
              OVERRIDE_MAX_OUTPUT_TOKEN: "4096"
              # Default litellm timeout is 600s — tool-calling investigations
              # against qwen2.5:7b on P40 frequently exceed it (verified
              # 2026-05-19 via direct /api/chat probe; investigation timed out
              # at 600s with `litellm.Timeout: Connection timed out`). Align
              # with the n8n outer-timeout of 1500s per
              # `project_n8n_holmesgpt_timeout_workaround` memory.
              LITELLM_REQUEST_TIMEOUT: "1500"
              LITELLM_TIMEOUT: "1500"
              HOLMES_HOST: 0.0.0.0
              HOLMES_PORT: "8080"
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault
    service:
      app:
        controller: holmesgpt
        ports:
          http:
            port: 8080
    route:
      app:
        hostnames:
          - "holmesgpt.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - kind: Service
                name: holmesgpt-oauth2-proxy
                port: 4180
    persistence:
      tmp:
        type: emptyDir
        advancedMounts:
          holmesgpt:
            app:
              - path: /tmp
                subPath: tmp
              - path: /home/holmes/.cache
                subPath: cache
