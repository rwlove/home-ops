---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: holmesgpt
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 30m
  install:
    disableWait: true
  upgrade:
    disableWait: true
  values:
    defaultPodOptions:
      automountServiceAccountToken: true
    serviceAccount:
      holmesgpt:
        enabled: true
    controllers:
      holmesgpt:
        annotations:
          reloader.stakater.com/auto: "true"
        type: deployment
        serviceAccount:
          identifier: holmesgpt
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: docker.io/robustadev/holmes
              tag: 0.30.1
            command:
              - python
              - /app/server.py
            env:
              MODEL: ollama/qwen2.5:32b
              OLLAMA_API_BASE: http://ollama-spark.ai.svc.cluster.local:11434
              OVERRIDE_MAX_CONTENT_SIZE: "16384"
              OVERRIDE_MAX_OUTPUT_TOKEN: "4096"
              # Upstream default 600s. Verified safe on Spark +
              # qwen2.5:32b 2026-05-21: 18 LLM calls observed in a real
              # multi-tool investigation, per-call max 92s (16K-prompt /
              # 4K-output round-trip). 600s gives ~6.5× headroom; the
              # 1500s band-aid (PR #11651, sized for P40 qwen2.5:7b)
              # and the 900s soak step (PR #11803) are both retired.
              LITELLM_REQUEST_TIMEOUT: "600"
              LITELLM_TIMEOUT: "600"
              HOLMES_HOST: 0.0.0.0
              HOLMES_PORT: "8080"
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
              seccompProfile:
                type: RuntimeDefault
    service:
      app:
        controller: holmesgpt
        ports:
          http:
            port: 8080
    route:
      app:
        annotations:
          glance/name: "HolmesGPT"
          glance/show: "true"
          glance/id: "Observability"
        hostnames:
          - "holmesgpt.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - kind: Service
                name: holmesgpt-oauth2-proxy
                port: 4180
    persistence:
      tmp:
        type: emptyDir
        advancedMounts:
          holmesgpt:
            app:
              - path: /tmp
                subPath: tmp
              - path: /home/holmes/.cache
                subPath: cache
