---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
#
# Cilium 1.19 requires at least one ingress or egress rule when
# endpointSelector is set — empty rules with enableDefaultDeny:false
# failed schema validation and never applied. Same bug class as the
# goldilocks-allow fix (PR #11597).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kube-ops-view-allow
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: kube-ops-view
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # HTTPRoute on internal gateway → kube-ops-view:8080. Auth is
    # enforced at the gateway by the extAuth SecurityPolicy
    # (securitypolicy.yaml) — the oauth2-proxy hop was retired in the
    # #12767 pilot.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
