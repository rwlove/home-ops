---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-ops-view
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  values:
    defaultPodOptions:
      automountServiceAccountToken: true

    controllers:
      kube-ops-view:
        serviceAccount:
          identifier: kube-ops-view

        type: statefulset

        containers:
          app:
            image:
              repository: docker.io/hjacobs/kube-ops-view
              tag: 23.5.0@sha256:a4fae38f93d7e0475b2bcef28c72a65d39d824daed22b26c4cef0a6da89aac7e
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 384Mi


    service:
      app:
        controller: kube-ops-view
        ports:
          http:
            port: &httpPort 8080

    route:
      app:
        annotations:
          glance/name: "Kube Ops View"
          glance/show: "true"
          # glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/netdata.png"
          glance/id: "Network"
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - kind: Service
                name: kube-ops-view
                port: *httpPort
    serviceAccount:
      kube-ops-view: {}
