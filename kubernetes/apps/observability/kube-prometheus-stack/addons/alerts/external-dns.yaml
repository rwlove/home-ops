---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: external-dns-rules
spec:
  groups:
    - name: external-dns.rules
      rules:
        # external-dns runs with --interval=1m --policy=sync, so the
        # sync timestamp updates every minute on a healthy controller
        # regardless of whether there are zone changes. A 10-minute
        # stale window catches "controller hung" reliably; the
        # previous 1-hour threshold delayed paging by ~55 min.
        # Crashes manifest as `up == 0` / metric absent and are
        # covered by ExternalDNSDown below.
        - alert: ExternalDNSStale
          expr: |
            time() - external_dns_controller_last_sync_timestamp_seconds > 600
          for: 5m
          annotations:
            summary: >-
              ExternalDNS ({{ $labels.job }}) sync timestamp hasn't advanced in 10+ minutes
          labels:
            severity: critical
        - alert: ExternalDNSDown
          expr: |
            absent(up{job=~".*external-dns.*"} == 1)
          for: 5m
          annotations:
            summary: >-
              ExternalDNS scrape target absent for 5+ minutes (pod likely crashed or evicted)
          labels:
            severity: critical

        - alert: ExternalDNSSourceError
          expr: |
            external_dns_source_errors_total > 0
          for: 5m
          annotations:
            summary: >-
              {{ $labels.job }} has source errors for more than 5 minutes
          labels:
            severity: critical

        - alert: ExternalDNSApplyChangesError
          expr: |
            external_dns_webhook_provider_applychanges_errors_total > 0
          for: 5m
          annotations:
            summary: >-
              {{ $labels.job }} has failed to apply changes for more than 5 minutes
          labels:
            severity: critical

        - alert: ExternalDNSRecordsError
          expr: |
            external_dns_webhook_provider_records_errors_total > 0
          for: 5m
          annotations:
            summary: >-
              {{ $labels.job }} has failed to gather records for more than 5 minutes
          labels:
            severity: critical
