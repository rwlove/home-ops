---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/alertmanagerconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmanager
spec:
  route:
    groupBy: ["alertname", "job"]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 6h
    receiver: "pushover"
    routes:
      - receiver: "null"
        matchers:
          - name: alertname
            value: Watchdog
            matchType: =
      - receiver: "null"
        matchers:
          - name: alertname
            value: InfoInhibitor
            matchType: =
      # Enrich critical alerts with HolmesGPT investigation via Windmill,
      # then `continue` to fall through to the existing pushover delivery
      # (immediate notification preserved; investigation arrives 1–3 min
      # later as a second pushover). Migrated from n8n 2026-05-19 —
      # see kubernetes/apps/home/windmill/workflows/alertmanager-…ts.
      - receiver: windmill-investigate
        continue: true
        matchers:
          - name: severity
            value: critical
            matchType: =
      - receiver: pushover
        matchers:
          - name: severity
            value: critical
            matchType: =
  inhibitRules:
    - equal: ["alertname", "namespace"]
      sourceMatch:
        - name: severity
          value: critical
          matchType: =
      targetMatch:
        - name: severity
          value: warning
          matchType: =
  receivers:
    - name: "null"
    - name: "pushover"
      pushoverConfigs:
        - html: true
          urlTitle: View in Alertmanager
          url: https://alertmanager.${SECRET_DOMAIN}
          message: |-
            {{- range .Alerts -}}
              {{- if .Annotations.description -}}
                {{ .Annotations.description }}
              {{- else if .Annotations.summary -}}
                {{ .Annotations.summary }}
              {{- else if .Annotations.message -}}
                {{ .Annotations.message }}
              {{- else -}}
                Alert description not available
              {{- end -}}
              {{- with .Labels.namespace }} <i>ns={{ . }}</i>{{ end -}}
              {{- with .Labels.pod }} <i>pod={{ . }}</i>{{ end -}}
              {{- with .Labels.container }} <i>c={{ . }}</i>{{ end -}}
              {{- with .Labels.instance }} <i>i={{ . }}</i>{{ end -}}
              <br>
            {{- end -}}
          monospace: false
          priority: |-
            {{ if eq .Status "firing" }}1{{ else }}0{{ end }}
          sendResolved: true
          sound: gamelan
          title: >-
            [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}]
            {{ .CommonLabels.alertname }}
          ttl: 86400s
          token:
            name: alertmanager-secret
            key: pushover_api_token
          userKey:
            name: alertmanager-secret
            key: pushover_api_userkey
    - name: windmill-investigate
      webhookConfigs:
        # Windmill API runs the script and returns the result. We use
        # `run` (async, fire-and-forget) since Alertmanager doesn't
        # need to wait for HolmesGPT — the result goes to ntfy
        # directly from the script.
        - url: http://windmill-app.home.svc.cluster.local:8000/api/w/lovenet/jobs/run/p/f/lovenet/alertmanager-holmesgpt-notify
          sendResolved: false
          maxAlerts: 1
          httpConfig:
            bearerTokenSecret:
              name: alertmanager-secret
              key: windmill_webhook_token
