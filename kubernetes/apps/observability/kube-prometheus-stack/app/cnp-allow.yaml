---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: prometheus-allow
spec:
  # Prometheus StatefulSet pods carry `app.kubernetes.io/name: prometheus`.
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  # Additive — default-deny is what triggers the lockdown; these rules
  # punch holes through it. Baseline covers kube-apiserver, DNS, host
  # probes, intra-namespace, and the universal `allow-monitoring-scrape`
  # ingress.
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # HTTPRoute on internal gateway → prometheus:9090 (web UI / API).
    # Home Assistant prometheus sensor → prometheus:9090 (direct pull
    # from home ns for the HA `prometheus` integration; egress side
    # was punched through in PR #11699).
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
        - matchLabels:
            io.kubernetes.pod.namespace: home
            app.kubernetes.io/name: home-assistant
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
  egress:
    # Prometheus scrapes every namespace's metrics endpoints, plus
    # kubelet/cAdvisor on every node, plus the kubeApiServer endpoints
    # listed in the chart values (192.168.{1,4}.{9,10}), plus
    # off-cluster LAN node-exporters on beast/brain/security-storage:9100
    # (static_configs in additional-scrape-configs). Enumerating all
    # scrape targets is impossible at the policy layer — they span
    # every pod CIDR, every node, and every static LAN endpoint.
    #
    # cluster: any pod identity in the k8s cluster (covers all
    #   ServiceMonitor + PodMonitor + Probe targets that resolve to
    #   pods).
    # host + remote-node: kubelet :10250 + per-node DaemonSet exporters
    #   (node-exporter :9100 in-cluster via nodeIP path) on the prom
    #   pod's own node + every other node.
    # world: off-cluster LAN hosts (beast/brain/security-storage
    #   node-exporters; identified as separate from `host` because they
    #   are not Kubernetes nodes — verified post-lockdown that these
    #   three node-exporter targets went down without world egress).
    - toEntities:
        - cluster
        - host
        - remote-node
        - world
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: alertmanager-allow
spec:
  # Alertmanager StatefulSet pods carry `app.kubernetes.io/name: alertmanager`.
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # HTTPRoute on internal gateway → alertmanager:9093 (web UI).
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            app.kubernetes.io/name: envoy
      toPorts:
        - ports:
            - port: "9093"
              protocol: TCP
  egress:
    # Windmill webhook receiver for `windmill-investigate` route in
    # alertmanagerconfig — enriches critical alerts via HolmesGPT
    # before falling through to pushover. Migrated from n8n 2026-05-19.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: home
            app.kubernetes.io/name: windmill-app
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # Pushover notification API.
    #
    # api.pushover.net is canonical (no CNAME chain). Cilium 1.19
    # matchPattern silently fails for canonical FQDNs through K8s DNS
    # search-domain augmentation — per memory
    # project_cilium_matchpattern_fqdn_limits.md. Use toEntities:world+443,
    # matches the precedent in PRs #11498/#11512/#11517/#11533. Alertmanager
    # → Pushover is the Tier-1 escalation path; matchPattern silently
    # failing here breaks paging.
    - toEntities: [world]
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: prometheus-operator-allow
spec:
  # Prometheus operator pod.
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: kube-prometheus-stack-prometheus-operator
  enableDefaultDeny:
    egress: false
    ingress: false
  ingress:
    # kube-apiserver calls the admission webhook on port 10250.
    # Cilium policy matches on the pod's container port; apiserver
    # carries the reserved:kube-apiserver identity (not a pod
    # identity), so use fromEntities — same reason allow-apiserver in
    # baseline uses toEntities for egress.
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "10250"
              protocol: TCP
