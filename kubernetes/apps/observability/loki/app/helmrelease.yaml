---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
spec:
  chart:
    spec:
      chart: loki
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
      version: 7.0.0
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    deploymentMode: SingleBinary

    loki:
      auth_enabled: false
      analytics:
        reporting_enabled: false
      podAnnotations:
        configmap.reloader.stakater.com/reload: loki-chunks-bucket-v1
      commonConfig:
        replication_factor: 1
      compactor:
        working_directory: /var/loki/compactor/retention
        delete_request_store: s3
        retention_enabled: true
      ingester:
        chunk_encoding: snappy
      limits_config:
        ingestion_burst_size_mb: 128
        ingestion_rate_mb: 64
        max_line_size: 1MB
        max_line_size_truncate: true
        max_query_parallelism: 100
        per_stream_rate_limit: 64M
        per_stream_rate_limit_burst: 128M
        reject_old_samples: true
        reject_old_samples_max_age: 168h
        retention_period: 30d
        shard_streams:
          enabled: true
        split_queries_by_interval: 1h
      rulerConfig:
        enable_api: true
        enable_alertmanager_v2: true
        alertmanager_url: http://alertmanager-operated.observability.svc.cluster.local:9093
        storage:
          type: local
          local:
            directory: /rules
        rule_path: /rules/fake
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      server:
        log_level: info
        grpc_server_max_recv_msg_size: 8388608
        grpc_server_max_send_msg_size: 8388608
      storage:
        type: s3
        bucketNames:
          chunks: loki-chunks-v1
          ruler: loki-chunks-v1
          admin: loki-chunks-v1
        s3:
          s3ForcePathStyle: true
          insecure: true

    singleBinary:
      replicas: 1
      persistence:
        storageClass: ceph-block
        size: 30Gi

    # Disable SimpleScalable components — we use SingleBinary mode
    write:
      replicas: 0
    read:
      replicas: 0
    backend:
      replicas: 0
    gateway:
      enabled: false

    # Disable Memcached caches — homelab log volume is tiny and the
    # default chunks/results caches request too much memory to fit.
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false

    # Disable bundled monitoring/canary/test for homelab
    monitoring:
      dashboards:
        annotations:
          grafana_folder: Loki
      rules:
        enabled: false
      serviceMonitor:
        enabled: false
        metricsInstance:
          enabled: false
      selfMonitoring:
        enabled: false
        grafanaAgent:
          installOperator: false
    lokiCanary:
      enabled: false
    test:
      enabled: false

    # Sidecar still needed for ruler config discovery
    sidecar:
      image:
        repository: ghcr.io/kiwigrid/k8s-sidecar
      rules:
        searchNamespace: ALL
        folder: /rules/fake

  valuesFrom:
    - targetPath: loki.storage.s3.endpoint
      kind: ConfigMap
      name: loki-chunks-bucket-v1
      valuesKey: BUCKET_HOST
    - targetPath: loki.storage.s3.access_key_id
      kind: Secret
      name: loki-chunks-bucket-v1
      valuesKey: AWS_ACCESS_KEY_ID
    - targetPath: loki.storage.s3.secret_access_key
      kind: Secret
      name: loki-chunks-bucket-v1
      valuesKey: AWS_SECRET_ACCESS_KEY
