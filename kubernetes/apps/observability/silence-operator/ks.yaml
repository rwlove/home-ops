---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: silence-operator
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: &appname silence-operator
  targetNamespace: observability
  path: "./kubernetes/apps/observability/silence-operator/app"
  interval: 10m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: home-ops-kubernetes
    namespace: flux-system
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: silence-operator-silences
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: &appname silence-operator-silences
  targetNamespace: observability
  path: "./kubernetes/apps/observability/silence-operator/silences"
  interval: 10m
  prune: true
  wait: false
  sourceRef:
    kind: GitRepository
    name: home-ops-kubernetes
    namespace: flux-system
  dependsOn:
    - name: silence-operator
      namespace: observability
