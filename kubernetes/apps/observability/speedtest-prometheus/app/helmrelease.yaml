---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app speedtest-prometheus
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m
  install:
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true

    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    controllers:
      main:
        pod:
          securityContext:
            runAsGroup: 568
            runAsNonRoot: true

            runAsUser: 568
        containers:
          main:
            image:
              repository: ghcr.io/miguelndecarvalho/speedtest-exporter
              tag: v3.5.4@sha256:f1064d49124c7fc45faabb87c6c876a2fd04e92b3dc14d4b871301217ba30fed

            env:
              SPEEDTEST_PORT: &httpPort 9798

            resources:
              requests:
                cpu: 15m
                memory: 128M
              limits:
                memory: 128M

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    service:
      main:
        controller: main
        ports:
          http:
            port: *httpPort
    persistence:
      config:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /.config

    serviceMonitor:
      main:
        serviceName: *app
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 60m
            scrapeTimeout: 5m
