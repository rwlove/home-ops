---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vector-agent
spec:
  chartRef:
    kind: OCIRepository
    name: app-template

  interval: 30m

  install:
    disableWait: true
  upgrade:
    disableWait: true

  values:
    defaultPodOptions:
      automountServiceAccountToken: true
    controllers:
      vector-agent:
        pod:
          # Tolerate masters (legacy: log-collection ran cluster-wide
          # including control plane) and Spark's arm64 dedication taint
          # so per-node log shipping reaches every node.
          tolerations:
            - key: node-role.kubernetes.io/master
              effect: NoSchedule
            - key: kubernetes.io/arch
              operator: Equal
              value: arm64
              effect: NoSchedule

        annotations:
          reloader.stakater.com/auto: "true"

        serviceAccount:
          identifier: vector-agent

        strategy: RollingUpdate
        type: daemonset
        containers:
          app:
            image:
              repository: ghcr.io/vectordotdev/vector
              tag: 0.56.0-debian@sha256:93b072b416fd29152f1bfe5bd2925a0b48999aeb069f3ae000691f82a135c200

            args: ["--config", "/etc/vector/vector.yaml"]

            ports:
              - name: metrics
                containerPort: 9598
                protocol: TCP

            env:
              PROCFS_ROOT: /host/proc
              SYSFS_ROOT: /host/sys
              VECTOR_SELF_NODE_NAME:
                valueFrom:
                  fieldRef:
                    apiVersion: v1
                    fieldPath: spec.nodeName
              VECTOR_SELF_POD_NAME:
                valueFrom:
                  fieldRef:
                    apiVersion: v1
                    fieldPath: metadata.name
              VECTOR_SELF_POD_NAMESPACE:
                valueFrom:
                  fieldRef:
                    apiVersion: v1
                    fieldPath: metadata.namespace

            resources:
              requests:
                cpu: 23m
                memory: 918M
              limits:
                memory: 918M

            securityContext:
              privileged: true

    service:
      metrics:
        controller: vector-agent
        ports:
          metrics:
            port: 9598

    persistence:
      config:
        type: configMap
        name: vector-agent-configmap
        globalMounts:
          - path: /etc/vector/vector.yaml
            subPath: vector.yaml
            readOnly: true

      data:
        type: emptyDir
        globalMounts:
          - path: /vector-data-dir

      procfs:
        type: hostPath
        hostPath: /proc
        hostPathType: Directory
        globalMounts:
          - path: /host/proc
            readOnly: true

      sysfs:
        type: hostPath
        hostPath: /sys
        hostPathType: Directory
        globalMounts:
          - path: /host/sys
            readOnly: true

      var-lib:
        type: hostPath
        hostPath: /var/lib
        hostPathType: Directory
        globalMounts:
          - path: /var/lib
            readOnly: true

      var-log:
        type: hostPath
        hostPath: /var/log
        hostPathType: Directory
        globalMounts:
          - path: /var/log
            readOnly: true

    serviceAccount:
      vector-agent: {}
