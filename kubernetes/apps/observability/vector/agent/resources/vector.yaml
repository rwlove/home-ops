---
# yamllint disable
data_dir: /vector-data-dir

# Sources
sources:
  internal_metrics_source:
    type: internal_metrics

  journald_source:
    type: journald
    journal_directory: /var/log/journal

  kubernetes_source:
    type: kubernetes_logs
    use_apiserver_cache: true
    pod_annotation_fields:
      container_image: container_image
      container_name: container_name
      pod_labels: pod_labels
      pod_name: pod_name
      pod_annotations: ""
    namespace_annotation_fields:
      namespace_labels: ""
    node_annotation_fields:
      node_labels: ""

  # Phase 5.P — apiserver audit log. The file only exists on
  # control-plane nodes (after the operator follows
  # `~/vaults/claude/runbooks/home-ops/apiserver_audit_logging.md`
  # per node); on worker nodes the file is absent and Vector's
  # file source quietly tails nothing.
  kube_apiserver_audit_source:
    type: file
    include:
      - /var/log/kubernetes/audit.log
    read_from: beginning
    fingerprint:
      strategy: device_and_inode

# Sinks
sinks:
  journald:
    type: vector
    compression: true
    version: "2"
    address: vector-aggregator-app.observability.svc.cluster.local:6002
    inputs: ["journald_source"]

  kubernetes:
    type: vector
    compression: true
    version: "2"
    address: vector-aggregator-app.observability.svc.cluster.local:6000
    inputs: ["kubernetes_source"]

  kube_apiserver_audit:
    type: vector
    compression: true
    version: "2"
    address: vector-aggregator-app.observability.svc.cluster.local:6000
    inputs: ["kube_apiserver_audit_source"]

  prometheus_metrics:
    type: prometheus_exporter
    address: 0.0.0.0:9598
    inputs: ["internal_metrics_source"]
