---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: renovate-jobs-allow
spec:
  # Egress allowlist for the operator-spawned Job pods (executor +
  # discovery + the pump jobs). Operator 4.11.0 (#12472) moved repo
  # discovery into its own Job pod that carries ONLY batch labels — no
  # `renovate-operator.mogenius.com/job-type` — so the previous
  # job-type In[executor,discovery] selector silently stopped matching
  # discovery pods. default-deny then dropped their api.github.com
  # egress (verified via Hubble: `Policy denied DROPPED` SYN→140.82.x:443),
  # discovery failed auth every hour, and no executor ever spawned —
  # stalling the dependency dashboard from 2026-06-12. Match any Job pod
  # in this renovate-only namespace by label-key presence instead, which
  # is robust against operator label churn and also covers executors.
  # Mirrors the ARC allow-job-container-egress pattern.
  endpointSelector:
    matchExpressions:
      - key: batch.kubernetes.io/job-name
        operator: Exists
  # Additive — default-deny is what triggers the lockdown.
  enableDefaultDeny:
    egress: false
    ingress: false
  egress:
    # Dragonfly (Redis) in databases ns — RENOVATE_REDIS_URL is set to
    # `redis://dragonfly.databases.svc.cluster.local:6379` for the
    # repository cache shared across runs.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
            app.kubernetes.io/name: dragonfly
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
    # Conservative wildcard for renovate scanning: discovery + executor
    # pods clone GitHub repos, query every registry mentioned by every
    # tracked dependency (ghcr.io, registry.k8s.io, docker.io, quay.io,
    # gcr.io, mcr.microsoft.com, etc.), pull npm/pypi/crates/maven
    # metadata, fetch helm chart indexes from arbitrary hosts, and call
    # api.github.com to open PRs. The set of upstream registries grows
    # every time a new dependency lands in the repo, so an allow-list
    # would silently break renovate runs on dependency churn.
    #
    # TODO: tighten once a registry mirror (ZOT) or HTTP forward proxy
    # mediates all renovate egress. As-is this matches pre-default-deny
    # behavior.
    - toFQDNs:
        - matchPattern: "*"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "80"
              protocol: TCP
