---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate-operator
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: renovate-operator-secret
    template:
      data:
        DOCKERHUB_USERNAME: "{{ .dockerhub_username }}"
        DOCKERHUB_TOKEN: "{{ .dockerhub_token }}"
  dataFrom:
    - extract:
        key: dockerhub

---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-app-pem
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: github-app-pem
  data:
    - secretKey: private_key_pem
      remoteRef:
        key: Github
        property: renovate_app_private_key
