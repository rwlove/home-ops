---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/renovate-operator.mogenius.com/renovatejob_v1alpha1.json
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: rwlove-home-ops
  namespace: renovate
spec:
  discoveryFilters:
    - "rwlove/*"
  extraEnv:
    - name: LOG_LEVEL
      value: "info"
    - name: RENOVATE_ALLOWED_COMMANDS
      value: "['pnpm run bundle']"
    - name: RENOVATE_ENDPOINT
      value: https://api.github.com/
    - name: RENOVATE_PLATFORM
      value: github
    - name: RENOVATE_PLATFORM_COMMIT
      value: disabled  # See renovate.json5 — platformCommit trips Repository-has-changed abort.
    - name: DOCKERHUB_USERNAME
      valueFrom:
        secretKeyRef:
          name: renovate-operator-secret
          key: DOCKERHUB_USERNAME
    - name: DOCKERHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: renovate-operator-secret
          key: DOCKERHUB_TOKEN
    - name: RENOVATE_HOST_RULES
      value: >-
        [{"hostType":"docker","matchHost":"docker.io","username":"$(DOCKERHUB_USERNAME)","password":"$(DOCKERHUB_TOKEN)"}]
    - name: RENOVATE_REDIS_URL
      value: redis://dragonfly.databases.svc.cluster.local:6379
    - name: RENOVATE_REPOSITORY_CACHE
      value: enabled
    - name: RENOVATE_CACHE_PRIVATE_PACKAGES
      value: "true"
  image: ghcr.io/renovatebot/renovate:43.243.1
  parallelism: 5
  provider:
    name: github
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  schedule: 0 * * * *
  secretRef: github-auth-token-secret
  webhook:
    enabled: true
    authentication:
      enabled: false
