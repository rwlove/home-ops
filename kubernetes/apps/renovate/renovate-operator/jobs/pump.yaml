---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/renovate-operator.mogenius.com/renovatejob_v1alpha1.json
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: rwlove-pump
  namespace: renovate
spec:
  discoveryFilters:
    - "rwlove/home-ops"
  extraEnv:
    - name: LOG_LEVEL
      value: "info"
    - name: RENOVATE_ENDPOINT
      value: https://api.github.com/
    - name: RENOVATE_PLATFORM
      value: github
    - name: RENOVATE_PLATFORM_COMMIT
      value: enabled
    - name: RENOVATE_REDIS_URL
      value: redis://dragonfly.databases.svc.cluster.local:6379
    - name: RENOVATE_REPOSITORY_CACHE
      value: enabled
    - name: RENOVATE_CACHE_PRIVATE_PACKAGES
      value: "true"
    # Restrict Renovate to only the pump HelmRelease so a webhook-triggered
    # run skips the rest of the repo.
    - name: RENOVATE_INCLUDE_PATHS
      value: >-
        ["kubernetes/apps/collab/pump/app/helmrelease.yaml"]
    # Don't rewrite the global "Renovate Dashboard 🤖" issue from this
    # narrow run — the rwlove-home-ops job owns it.
    - name: RENOVATE_DEPENDENCY_DASHBOARD
      value: "false"
  image: ghcr.io/renovatebot/renovate:43.244.1
  parallelism: 1
  provider:
    name: github
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  # Webhook-driven; cron set to once a year so scheduled runs are effectively a no-op.
  #
  # NOTE on bootstrap: the operator only honors webhook-triggered schedule
  # calls for projects that a previous discovery run has registered. With
  # an effectively-yearly schedule, a brand-new job has no discovery history
  # and webhook calls return 500 ("failed to run renovate for project").
  #
  # First-time bootstrap: temporarily bump the schedule with kubectl patch
  # (e.g. */1 * * * *), wait for one rwlove-pump-discovery-* pod to complete,
  # then revert (Flux will reconcile back to the yearly schedule on its
  # next pass anyway).
  schedule: 0 0 1 1 *
  secretRef: github-auth-token-secret
  webhook:
    enabled: true
    authentication:
      enabled: false
