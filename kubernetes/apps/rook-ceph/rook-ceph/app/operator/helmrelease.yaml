---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-operator
spec:
  chartRef:
    kind: OCIRepository
    name: rook-ceph
  interval: 1h
  values:
    # workaround: https://github.com/rook/rook/issues/17644 — remove when rook ships
    # the ceph-csi driver ServiceAccounts/RBAC its bundled ceph-csi-operator
    # references. rook 1.20.0 deploys the operator + Driver CRs but NOT the driver
    # SAs/RBAC — the operator only references SAs by name (<prefix><driver>-<role>-sa)
    # and never creates them, so ctrlplugin Deployments wedge at 0/2 (serviceaccount
    # not found), killing ceph-block + cephfs attach/detach cluster-wide. We vendor
    # the SAs+RBAC in ./csi-driver-rbac.yaml; this prefix aligns the operator's SA
    # references to those vendored names. Renovate is pinned <1.20.0. Tracking:
    # home-ops#12266.
    ceph-csi-operator:
      controllerManager:
        manager:
          env:
            csiServiceAccountPrefix: "ceph-csi-operator-"
    csi:
      # Tolerate Spark's arm64 dedication taint. ollama-spark-0 uses
      # ceph-block PVCs (ollama-spark-data-pvc + ollama-spark-models-
      # pvc), so the RBD CSI nodeplugin MUST run on Spark — without
      # this it cannot mount RBD volumes on a tainted node. The chart
      # applies pluginTolerations to both RBD and CephFS nodeplugin
      # DaemonSets; cephfs CSI on Spark is unused but harmless.
      pluginTolerations:
        - key: kubernetes.io/arch
          operator: Equal
          value: arm64
          effect: NoSchedule
    image:
      repository: ghcr.io/rook/ceph

    monitoring:
      enabled: true

    resources:
      limits:
        memory: 768Mi
      requests:
        cpu: 70m
        memory: 768Mi
  timeout: 15m
