---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-operator
spec:
  chartRef:
    kind: OCIRepository
    name: rook-ceph
  interval: 1h
  values:
    # CSI driver SAs/RBAC, the csiServiceAccountPrefix, and the driver
    # nodePlugin tolerations are all owned by the ceph-csi-drivers
    # HelmRelease now (../../csi-drivers). rook 1.20 removed CSI settings
    # from this chart: csi.pluginTolerations is silently ignored here and
    # the Spark arm64 toleration lives in the drivers chart values. See
    # rook/rook#17644 and reference_rook_1_20_csi_rbac_outage in memory.
    image:
      repository: ghcr.io/rook/ceph

    monitoring:
      enabled: true

    resources:
      limits:
        memory: 768Mi
      requests:
        cpu: 70m
        memory: 768Mi
  timeout: 15m
