---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
spec:
  chartRef:
    kind: OCIRepository
    name: rook-ceph-cluster
  interval: 1h
  postRenderers:
    # The rook-ceph cluster chart ships CephNodeDiskspaceWarning with
    # `device=~"/.*"` — which matches every block device on the node,
    # including CSI plugin mounts (/dev/rbd*, /dev/longhorn/*). That
    # turns the rule into a noisy "any PVC filling up" alert with
    # `predict_linear < 0` regardless of actual fill %.
    #
    # Scope the matcher to actual node disks. Real OSD-node disks (sd*,
    # nvme*, mapper/ when used as OSD LVM) still alert; transient and
    # legitimate PVC growth is covered by the kube-prometheus-stack
    # NodeFilesystemSpaceFillingUp rule (stricter: requires both
    # <15% free AND fills in 24h).
    #
    # Index path is the current chart layout — `test` op verifies it
    # before `replace`, so a chart upgrade that reorders rules will
    # fail loudly here rather than silently mis-patch a different rule.
    - kustomize:
        patches:
          - patch: |-
              - op: test
                path: /spec/groups/6/rules/4/alert
                value: CephNodeDiskspaceWarning
              - op: replace
                path: /spec/groups/6/rules/4/expr
                value: |
                  predict_linear(node_filesystem_free_bytes{device=~"/.*",device!~"/dev/(rbd|longhorn).*"}[2d], 3600 * 24 * 5) *on(instance) group_left(nodename) node_uname_info < 0
            target:
              kind: PrometheusRule
              name: prometheus-ceph-rules
  values:
    cephBlockPools:
      - name: ceph-blockpool
        spec:
          enableCrushUpdates: true
          failureDomain: host
          replicated:
            size: 3

        storageClass:
          allowVolumeExpansion: true
          enabled: true
          isDefault: true
          name: ceph-block
          parameters:
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph
            csi.storage.k8s.io/fstype: ext4
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
            imageFeatures: layering
            imageFormat: "2"
          reclaimPolicy: Delete

    cephClusterSpec:
      crashCollector:
        disable: false

      dashboard:
        enabled: true
        prometheusEndpoint: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
        ssl: false
        urlPrefix: /

      dataDirHostPath: /var/lib/rook

      mgr:
        modules:
          - enabled: true

            name: rook
      resources:
        mgr:
          limits:
            # Active mgr's memory creeps with enabled modules (prometheus,
            # pg_autoscaler, balancer, devicehealth). 940Mi was too tight —
            # the active mgr peaked at 938Mi and OOMKilled. 1.5Gi gives
            # ~60% headroom over that peak.
            memory: 1536Mi
          requests:
            cpu: 100m
            memory: 1536Mi
        mgr-sidecar:
          limits:
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 256Mi
        mon:
          limits:
            memory: 1Gi
          requests:
            cpu: 50m
            memory: 1Gi
        osd:
          limits:
            memory: 4Gi
          requests:
            cpu: 100m
            memory: 4Gi

      storage:
        config:
          osdsPerDevice: "1"
        nodes:
          - devices:
              - name: "/dev/disk/by-id/nvme-WD_Blue_SN570_2TB_23172Q802011_1-part1"
            name: "master1.${SECRET_DOMAIN}"
          - devices:
              - name: "/dev/disk/by-id/nvme-WD_Blue_SN570_2TB_23172Q802600_1-part2"
            name: "worker2.${SECRET_DOMAIN}"
          - devices:
              - name: "/dev/disk/by-id/nvme-eui.e8238fa6bf530001001b448b4cec4fe7"
            name: "worker3.${SECRET_DOMAIN}"
          - devices:
              - name: "/dev/disk/by-id/nvme-WD_Blue_SN570_2TB_23172Q802182_1-part2"
            name: "worker4.${SECRET_DOMAIN}"
          - devices:
              - name: "/dev/vdb"
            name: "worker5.${SECRET_DOMAIN}"
          - devices:
              - name: "/dev/vdb"
            name: "worker6.${SECRET_DOMAIN}"
          - devices:
              - name: "/dev/vdb"
            name: "worker7.${SECRET_DOMAIN}"
          - devices:
              - name: "/dev/vdb"
            name: "worker8.${SECRET_DOMAIN}"
        useAllDevices: false
        useAllNodes: false

    cephFileSystems:
      - name: ceph-filesystem
        spec:
          dataPools:
            - failureDomain: host
              name: data0
              replicated:
                size: 3
          metadataPool:
            replicated:
              size: 3
          metadataServer:
            activeCount: 1
            activeStandby: true
            priorityClassName: system-cluster-critical
            resources:
              # Container limit sized to comfortably contain Ceph's
              # mds_cache_memory_limit (default 1 GiB) plus working
              # set + heap overhead. The previous 120Mi was below
              # the bare daemon's startup footprint and OOM-killed
              # both replicas under any cache load.
              limits:
                memory: 2Gi
              requests:
                cpu: 1000m
                memory: 256Mi

        storageClass:
          allowVolumeExpansion: true
          enabled: true
          isDefault: false
          name: ceph-filesystem
          parameters:
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph
            csi.storage.k8s.io/fstype: ext4
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
            csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
          pool: data0
          reclaimPolicy: Delete

    cephObjectStores:
      - name: ceph-objectstore
        spec:
          dataPool:
            erasureCoded:
              codingChunks: 1
              dataChunks: 2
            failureDomain: host
          gateway:
            instances: 2
            port: 80
            priorityClassName: system-cluster-critical
            resources:
              limits:
                memory: 800Mi
              requests:
                cpu: 50m
                memory: 800Mi
          healthCheck:
            bucket:
              interval: 60s
          metadataPool:
            failureDomain: host
            replicated:
              size: 3
          preservePoolsOnDelete: true
        storageClass:
          enabled: true
          name: ceph-bucket
          parameters:
            region: us-east-1
          reclaimPolicy: Delete

    configOverride: |
      [global]
      bdev_enable_discard = true
      bdev_async_discard = true
      # EOF

    monitoring:
      createPrometheusRules: true
      enabled: true

    route:
      dashboard:
        annotations:
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/rook.svg"
          glance/id: "Storage"
          glance/name: "Rook"
          glance/show: "true"
        host:
          name: "rook.${SECRET_DOMAIN}"
          path: /
          pathType: PathPrefix
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
  timeout: 15m
