---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
spec:
  chartRef:
    kind: OCIRepository
    name: rook-ceph-cluster
  interval: 1h
  timeout: 15m
  values:
    cephBlockPools:
      - name: ceph-blockpool
        spec:
          enableCrushUpdates: true
          failureDomain: host
          replicated:
            size: 3

        storageClass:
          allowVolumeExpansion: true
          enabled: true
          isDefault: true
          name: ceph-block
          parameters:
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph
            csi.storage.k8s.io/fstype: ext4
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
            imageFeatures: layering
            imageFormat: "2"
          reclaimPolicy: Delete

    cephClusterSpec:
      crashCollector:
        disable: false

      dashboard:
        enabled: true
        prometheusEndpoint: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
        ssl: false
        urlPrefix: /

      dataDirHostPath: /var/lib/rook

      mgr:
        modules:
          - name: rook
            enabled: true

      resources:
        mgr:
          limits:
            memory: 940Mi
          requests:
            cpu: 100m
            memory: 940Mi
        mgr-sidecar:
          limits:
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 256Mi
        mon:
          limits:
            memory: 840Mi
          requests:
            cpu: 50m
            memory: 840Mi
        osd:
          limits:
            memory: 4Gi
          requests:
            cpu: 100m
            memory: 4Gi

      storage:
        config:
          osdsPerDevice: "1"
        nodes:
          - name: "master1.${SECRET_DOMAIN}"
            devices:
              - name: "/dev/disk/by-id/nvme-WD_Blue_SN570_2TB_23172Q802011_1-part1"
          - name: "worker2.${SECRET_DOMAIN}"
            devices:
              - name: "/dev/disk/by-id/nvme-WD_Blue_SN570_2TB_23172Q802600_1-part2"
          - name: "worker3.${SECRET_DOMAIN}"
            devices:
              - name: "/dev/disk/by-id/nvme-eui.e8238fa6bf530001001b448b4cec4fe7"
          - name: "worker4.${SECRET_DOMAIN}"
            devices:
              - name: "/dev/disk/by-id/nvme-WD_Blue_SN570_2TB_23172Q802182_1-part2"
          - name: "worker5.${SECRET_DOMAIN}"
            devices:
              - name: "/dev/vdb"
          - name: "worker6.${SECRET_DOMAIN}"
            devices:
              - name: "/dev/vdb"
          - name: "worker7.${SECRET_DOMAIN}"
            devices:
              - name: "/dev/vdb"
          - name: "worker8.${SECRET_DOMAIN}"
            devices:
              - name: "/dev/vdb"
        useAllDevices: false
        useAllNodes: false

    cephFileSystems:
      - name: ceph-filesystem
        spec:
          dataPools:
            - failureDomain: host
              replicated:
                size: 3
              name: data0
          metadataPool:
            replicated:
              size: 3
          metadataServer:
            activeCount: 1
            activeStandby: true
            priorityClassName: system-cluster-critical
            resources:
              limits:
                memory: 120Mi
              requests:
                cpu: 1000m
                memory: 120Mi

        storageClass:
          allowVolumeExpansion: true
          enabled: true
          isDefault: false
          name: ceph-filesystem
          parameters:
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph
            csi.storage.k8s.io/fstype: ext4
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
            csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
          pool: data0
          reclaimPolicy: Delete

    cephObjectStores:
      - name: ceph-objectstore
        spec:
          dataPool:
            erasureCoded:
              codingChunks: 1
              dataChunks: 2
            failureDomain: host
          gateway:
            instances: 2
            port: 80
            priorityClassName: system-cluster-critical
            resources:
              limits:
                memory: 800Mi
              requests:
                cpu: 50m
                memory: 800Mi
          healthCheck:
            bucket:
              interval: 60s
          metadataPool:
            failureDomain: host
            replicated:
              size: 3
          preservePoolsOnDelete: true
        storageClass:
          enabled: true
          name: ceph-bucket
          parameters:
            region: us-east-1
          reclaimPolicy: Delete

    configOverride: |
      [global]
      bdev_enable_discard = true
      bdev_async_discard = true
      # EOF

    monitoring:
      createPrometheusRules: true
      enabled: true

    route:
      dashboard:
        annotations:
          glance/name: "Rook"
          glance/show: "true"
          glance/icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/rook.svg"
          glance/id: "Storage"
        host:
          name: "rook.${SECRET_DOMAIN}"
          path: /
          pathType: PathPrefix
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
