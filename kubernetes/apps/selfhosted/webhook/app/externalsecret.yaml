---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: webhook
spec:
  # Short refresh so HMAC secret rotations propagate within minutes,
  # not hours. The secret is tiny and rarely changes; 5m is well below
  # 1Password Connect rate limits.
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: webhook-secret
    creationPolicy: Owner
    template:
      data:
        GITHUB_WEBHOOK_SECRET: "{{ .renovate_app_webhook_secret }}"
  dataFrom:
    - extract:
        key: github
