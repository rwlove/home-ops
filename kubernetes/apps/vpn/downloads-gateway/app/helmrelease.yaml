---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: downloads-gateway
spec:
  chart:
    spec:
      # renovate: registryUrl=https://angelnu.github.io/helm-charts
      chart: pod-gateway
      sourceRef:
        kind: HelmRepository
        name: angelnu
      version: 7.1.1
  interval: 30m

  values:
    DNS: 172.16.1.1

    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        type: statefulset
        containers:
          main:
            image:
              repository: ghcr.io/angelnu/pod-gateway
              tag: v1.13.0@sha256:a5b032e15f7570493977b330a5a86dcffebb807d35685ad803e47afb62d105f2
            resources:
              requests:
                cpu: 15m
                memory: 30M
              limits:
                memory: 30M
            securityContext:
              privileged: true
            # The v7 client-side gateway-init script pings the gateway pod IP as a
            # connectivity check BEFORE establishing the VXLAN tunnel. Pod-gateway's
            # gateway_init.sh sets `iptables INPUT policy DROP` and only accepts
            # VXLAN/DHCP/loopback — ICMP from clients is dropped, so the client init
            # fails with "100% packet loss". Allow ICMP via postStart.
            lifecycle:
              postStart:
                exec:
                  command:
                    - /bin/sh
                    - -c
                    - |
                      until iptables -L INPUT -n 2>/dev/null | head -1 | grep -q 'policy DROP'; do
                        sleep 1
                      done
                      iptables -C INPUT -p icmp -j ACCEPT 2>/dev/null || \
                        iptables -I INPUT 1 -p icmp -j ACCEPT
          gluetun:
            enabled: true
            dependsOn: main
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
            env:
              VPN_INTERFACE: wg0
              FIREWALL: "off"
              DOT: "off"
              HEALTH_TARGET_ADDRESS: "1.1.1.1"
              HEALTH_VPN_DURATION_INITIAL: 30s
            envFrom:
              - secretRef:
                  name: downloads-gateway-vpnconfig
            resources:
              requests:
                cpu: 15m
                memory: 256M
              limits:
                memory: 256M
            securityContext:
              capabilities:
                add:
                  - NET_ADMIN
              privileged: true
          netshoot:
            image:
              repository: ghcr.io/nicolaka/netshoot
              tag: v0.15
            command:
              - sleep
              - infinity
            resources:
              requests:
                cpu: 15m
                memory: 30M
              limits:
                memory: 30M

    routed_namespaces:
      - downloads

    settings:
      DNS_LOCAL_CIDRS: "${SECRET_DOMAIN} cluster.local local"
      NOT_ROUTED_TO_GATEWAY_CIDRS: 10.42.0.0/16 10.43.0.0/16 192.168.0.0/16
      VPN_BLOCK_OTHER_TRAFFIC: true
      VPN_INTERFACE: wg0
      VPN_LOCAL_CIDRS: 10.42.0.0/16 10.43.0.0/16 192.168.0.0/16
      VPN_TRAFFIC_PORT: "51820"
      VXLAN_ID: 43
      VXLAN_IP_NETWORK: 172.16.1
      # Default is 0 (kernel-chosen). Cilium's CNI doesn't carry VXLAN traffic
      # cleanly with port 0 — the chart's settings.sh comment explicitly says
      # "change it to 4789 (preferably) when using Cillium".
      VXLAN_PORT: "4789"

    webhook:
      gatewayAnnotation: setGateway
      gatewayDefault: true
      gatewayLabel: setGateway
      image:
        repository: ghcr.io/angelnu/gateway-admision-controller
        tag: v3.12.0@sha256:6f6ab596afd5fef0ca4648eadfb21cd37ba86fa5afa8b85edcc072976a61fbed
      namespaceSelector:
        label: routed-gateway
        type: label
