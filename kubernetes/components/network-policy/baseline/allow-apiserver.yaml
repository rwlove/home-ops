---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-apiserver
  annotations:
    policy.cilium.io/audit-mode: "enabled"
spec:
  endpointSelector: {}
  enableDefaultDeny:
    egress: false
    ingress: false
  egress:
    # CRITICAL: do NOT replace this with toCIDR / ipBlock.
    # Cilium 1.19 with policy-cidr-match-mode="" silently drops
    # apiserver traffic from CIDR-only rules because the apiserver
    # carries the reserved:kube-apiserver identity, not a pod identity.
    # See: memory project_cilium_ipblock_apiserver.md
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
