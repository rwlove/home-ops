---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-intra-namespace
  annotations:
    policy.cilium.io/audit-mode: "enabled"
spec:
  endpointSelector: {}
  enableDefaultDeny:
    egress: false
    ingress: false
  # bjw-s app-template apps regularly have init-containers, sidecars, and
  # companion deployments inside the same namespace. This rule covers that
  # case without requiring per-controller policies.
  ingress:
    - fromEndpoints:
        - matchLabels: {}
  egress:
    - toEndpoints:
        - matchLabels: {}
