---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-monitoring-scrape
  annotations:
    policy.cilium.io/audit-mode: "enabled"
spec:
  endpointSelector: {}
  enableDefaultDeny:
    egress: false
    ingress: false
  # Allow Prometheus scrape from the observability namespace.
  # Selector matches the kube-prometheus-stack Prometheus pod
  # (label `app.kubernetes.io/name: prometheus`). Port is intentionally
  # unrestricted at this layer so apps with non-standard /metrics ports
  # don't break — tightening to named ports `metrics` / `http-metrics`
  # is a Phase 2+ refinement once the scrape footprint is mapped.
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: prometheus
